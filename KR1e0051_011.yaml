body:
  text: 春秋說卷十一宋洪咨夔撰僖公下八年春王正月公㑹王人齊侯宋公衛侯許男曹伯陳世子欵盟于洮鄭伯乞盟逃者匹夫之行乞者塗丐之節春秋疾鄭之反覆故其辭皆特筆夫伯業一出於假惟其假也故隨假而隨歸是㑹假王人以為重逃盟之鄭乞盟不暇茍能躬修王覲奉王靈以號令列國誰敢不從澗瀍在望一葦可杭王人能來桓公不能往其何以固狙詐攜二之心哉王人雖微諸侯北面受盟於其下冠履常分百世不與易也夏狄伐晉齊人伐戎以來戎寖衰而狄獨强入邢入衛交亂中國桓公方經營南方之楚未暇及狄隨其病而療之亦不敢肆惟晉不與諸侯㑹盟狄窺其孤敢為是伐信中國不可無伯也秋七月禘于大廟用致夫人左氏致哀姜榖梁致成風公羊致聲姜其說雖不同而哀姜與弒不可祔姑成風妾母不可配夫聲姜不見納幣逆女之本末皆致所不宜致也王者禘其祖之所自出魯僣用之已非禮又以致非所宜致之夫人失禮甚矣前禘以吉行今禘以致用周公其衰一至於此冬十有二月丁未天王崩自齊之伯天王不見於經者數十年僅以崩書天下知有伯主不知有王也天下有王而柄下移伯主之罪也惠王之崩魯不㑹葬天王何耶九年春王正月丁丑宋公御說卒通喪之廢久矣春秋以人子忘三年之愛隨事著貶衛侯晉卒惠公從齊與魯戰雖書葬不書子宋公御說卒襄公從齊與宰周公㑹雖書子不書葬夫有疆場之事腰絰衽革猶可自諉從人㑹伐初非有甚不得巳者而父死不葬假變禮以便其私三綱淪矣襄公葬其夫人醯醢百甕明器而實之何厚於伉儷而薄於親也夏公㑹宰周公齊侯宋子衛侯鄭伯許男曹伯于葵丘周公以三公為冢宰相成王宰周公其職也坐而論道謂之三公作而行之謂之士大夫面槐之位豈以供行李之役哉前是咺糾失冢宰之尊親行人之事猶未兼公也今兼乎公矣論道經邦師保左右自足以尊天子而懷諸侯開明堂而覲萬國顧僕僕焉趨伯主之㑹與王人微者相後先已則屈矣如王朝之體何是時惠王崩襄王立而有太叔帶之難桓公誠有志於定王室率六國執壤奠以修康王尸位之禮宰周公帥諸侯入應門如太保畢公故事子帶將震栗退聽之不暇而伯主養尊不朝公宰降尊下㑹奸宄有所窺而動何以戢戎心而遏亂萌且王使宰孔賜齊侯胙既知威顔咫尺獨不能一近穆穆之光乎伯業莫盛於葵丘之㑹而東略西否已不逃於逆料君子是以為桓公惜秋七月乙酉伯姬卒九月戊辰諸侯盟于葵丘諸侯不序即㑹葵丘之諸侯也諸侯自盟宰周公先歸不與也洮盟王人而首止不敢盟世子葵丘不敢盟宰周公知所尊矣㑹以夏盟以秋易時之久人無怠心信伯業之隆也然始焉不歃而五禁明終焉震矜而九國叛伯業自此畫矣夫惟王道而後體天行健自强而不息甲子晉侯詭諸卒冬晉里克殺其君之子奚齊君有不仁臣不可以讎其君父有不慈子不可以讎其父驪姬嬖欲立其子而譖殺太子申生獻公誠失君父之道矣臣子不得而讎也里克為申生傅既不能護存之有去而已又不能去乃於喪次殺受命繼位之奚齊是讎其君也申生垂死猶以君老子少為身後憂而克殺之豈不重申生之憂哉書殺其君之子克讎君之心著矣十年春王正月公如齊公以齊得立十年始朝齊桓公之待列國簡節疏目如此宜其為五伯之盛也狄滅溫溫子奔衛桓王與鄭人蘇忿生之田溫其一也蘇子國溫近在畿內狄為無道而滅之中國其無人乎狄入邢衛齊伯業方張能救而城之大義所激狄為之退聽者七八年至於盟寧母以招携狄遂伐晉㑹葵丘而起叛狄又滅溫以中國盛衰為外冦叛服之候自古然也晉里克弒其君卓及其大夫荀息忿心如山莫遏其髙怨心如河莫測其深里克一萌讎君之心剚刃驪姬之二子若刈草菅然何其慘也奚齊以未葬稱子卓以逾年稱君前殺後弒覆出為惡而惡愈甚與慶父再弒子般閔公同而及其大夫荀息息許竭股肱之力繼之以死疑若白圭之玷矣然申生既沒夷吾重耳與奚齊卓皆戎出長少不齊其為庶等奚齊則命嗣卓其母弟嬖庶奪嫡咎在獻公不在息息之始傅奚齊終輔卓顧託之命有所承矣故以死狥君而不失職夏齊侯許男伐北戎晉殺其大夫里克天下無中立之事國語紀驪姬隂託里克之妻克守不定遂有中立之說克傅太子所難者克克若不變太子可安既不能存於義當去又不能去而連弒二君原其患得患失之心欲以中立求生免禍而禍卒不能免荀彧之流也稱國以殺殺當其罪其稱大夫蓋殺於惠公又將圖我之疑而不正其弒君之戮秋七月冬大雨雪冬而雪冝也以大故書十有一年春晉殺其大夫㔻鄭父㔻鄭里克黨也克見殺㔻鄭在秦謀出晉君以濟私怨罪冝討矣然夷吾之立民不見德前日專殺一大夫今日專殺一大夫而祁舉七輿大夫皆不免刑何濫乎君之視臣如草芥何以能國夏公及夫人姜氏㑹齊侯于陽榖赫赫姜嫄其德不回聲姜之德回矣婦人送迎不踰閾陽榖之㑹夫婦偕焉桓公㑹齊侯於濼與夫人遂如齊拉脅之禍覆轍不逺公豈甘心蹈之哉溺其所甚愛忌其所可戒也况疇昔㑹陽榖齊侯委端朝諸侯今幾何時乃與魯夫人參㑹於此伯德其日衰乎秋八月大雩冬楚人伐黃十有二年春王三月庚午日有食之日食於朔則書朔庚午晦也十年之間食者三先是食於楚人滅弦之歲後是食於楚人伐徐之歲今兹食於楚人滅黃之歲天王無剛明之德以照臨四海而伯擅其權伯主無純一之志以力奬王室而夏寖有離心陽失其道隂得以干之狄滅溫而莫救戎伐京師而莫討其為中國患非一楚也故謫見於天若是其數夏楚人滅黃江黃道柏方睦於齊弦子恃之而不事楚楚滅之弦之滅黃之憂也黃恃諸侯之睦於齊不共楚職楚又滅之非楚能滅之齊滅之也貫之盟陽榖之㑹江黃慕齊舍楚而來與侈然一時之盛楚人之力非不能即討其叛乃遲之十餘年而後發盻盻然竊窺伯德之勤怠以為進退未嘗一日忘也初滅弦以嘗齊齊不救知其怠矣未幾狄滅溫亦不救知其荒矣於是遂啓伐黃之謀自冬而夏黃人效死以守國者非不力忍死以待齊者非不切而逺不能救卒如管仲之料齊誤黃黃誤弦也書滅弦滅黃皆罪伯秋七月冬十有二月丁丑陳侯杵臼卒十有三年春狄侵衛政刑明則敵國不敢侮忠信孝悌修則可撻堅甲利兵內治誠張外難不足弭也文公乘衛為狄滅之後靡廢不舉冝若可以禦外難矣而狄之䖍劉曽不為之少殺蓋雖能存其亡未能彊其弱也而狄不忌伯亦無所懲艾焉爾伯主以攘夷尊夏為業伐戎伐楚尚禦其侮狄伐邢入衛伐晉滅溫獨未嘗一辭問其罪彼固傲岸軒張謂莫已若故復有是舉齊果何所怯於狄不一懲之也是時楚人滅黃淮夷病把狄侵衛侵鄭諸戎伐京師入王城外侮交侵肆無忌憚伯業之衰一至於此吁誠者物之終始始之攘夷尊夏不出於誠終將若之何哉夏四月葬陳宣公公㑹齊侯宋公陳侯衛侯鄭伯許男曹伯于鹹好大之心騁則逐逺而遺近徇義之志移則舍重而趨輕隨之係小子失丈夫纍於私也宰孔謂東略之不知西則否矣蓋京師在齊之西其經營西事畫於葵丘之㑹而以區區驕盈之心夸示四方將略於東矣是㑹為淮夷病把故東略以為㑹淮之張本非急於謀王室也時子帶作難諸戎輔之秦晉伐戎以救周而齊不救方且遣管仲平戎仲孫湫致諸侯以戍周夫不能戢戎而平戎不能靖周而戍周誠於為王室謀者果如是乎故春秋於此數事皆不書秋九月大雩冬公子友如齊十有四年春諸侯城緣陵舉事以氣為主志氣之氣愈久而不折血氣之氣雖强而易衰淮夷病把㑹八國於鹹以謀之公子友如齊春諸侯城緣陵以如齊觀之則齊侯先返其國鋭者憊矣齊侯先返其國諸侯自為把城身處其逸人供其勞授役庀工莫相統一無怪乎器用不具城池未固而去為惠不終也城邢城楚丘城緣陵皆有救災恤難存亡繼絶之義而緣陵之城總舉諸侯譏桓為可知夏六月季姬及鄫子遇于防使鄫子來朝鄭忽配而後廟季姬先與鄫子遇而後歸女德微矣昏禮廢矣世謂公愛姬使自擇耦而為是遇未面遽親誠有不近人情者蓋姬許嫁已久公怒鄫子之不朝而未歸故遇於防使朝而請其歸耳入春秋以來鄫未嘗通於魯乃為姬所使而來朝易曰夫子制義從婦凶也鄫子從婦若此冝其有用社之凶秋八月辛卯沙鹿崩按自此至僖公三十三年永樂大典並闕今祇録經文狄侵鄭冬蔡侯肸卒十有五年春王正月公如齊楚人伐徐三月公㑹齊侯宋公陳侯衛侯鄭伯許男曹伯􅉀于牡丘遂次于匡公孫敖帥師及諸侯之大夫救徐夏五月日有食之秋七月齊師曹師伐厲八月螽九月公至自㑹季姬歸于鄫己卯晦震夷伯之廟冬宋人伐曹楚人敗徐于婁林十有一月壬戌晉侯及秦伯戰于韓獲晉侯十有六年春王正月戊申朔隕石于宋五是月六鷁退飛過宋都三月壬申公子季友卒夏四月丙申鄫季姬卒秋七月甲子公孫茲卒冬十有二月公㑹齊侯宋公陳侯衛侯鄭伯許男邢侯曹伯于淮十有七年春齊人徐人伐英氏夏滅項秋夫人姜氏㑹齊侯于卞九月公至自㑹冬十有二月乙亥齊侯小白卒十有八年春王正月宋公曹伯衛人邾人伐齊夏師救齊五月戊寅宋師及齊師戰于甗齊師敗績狄救齊秋八月丁亥葬齊桓公冬邢人狄人伐衛十有九年春王三月宋人執滕子嬰齊夏六月宋公曹人邾人盟于曹南鄫子㑹盟于邾己酉邾人執鄫子用之秋宋人圍曹衛人伐邢冬㑹陳人蔡人楚人鄭人盟于齊梁亡二十年春新作南門夏郜子來朝五月乙巳西宫災鄭人入滑秋齊人狄人􅉀于邢冬楚人伐隨二十有一年春狄侵衛宋人齊人楚人盟于鹿上夏大旱秋宋公楚子陳侯蔡侯鄭伯許男曹伯㑹于盂執宋公以伐宋冬公伐邾楚人使宜申來獻捷十有二月癸丑公㑹諸侯盟于薄釋宋公二十有二年春公伐邾取須句夏宋公衛侯許男滕子伐鄭秋八月丁未及邾人戰于升陘冬十有一月己巳朔宋公及楚人戰于泓宋師敗績二十有三年春齊侯伐宋圍緡夏五月庚寅宋公茲父卒秋楚人伐陳冬十有一月把子卒二十有四年春王正月夏狄伐鄭秋七月冬天王出居于鄭晉侯夷吾卒二十有五年春王正月丙午衛侯燬滅邢夏四月癸酉衛侯燬卒宋蕩伯姬來逆婦宋殺其大夫秋楚人圍陳納頓子于頓葬衛文公冬十有二月癸亥公㑹衛子莒慶盟于洮二十有六年春王正月己未公㑹莒子衛寧速盟于向齊人侵我西鄙公追齊師至酅弗及夏齊人伐我北鄙衛人伐齊公子遂如楚乞師秋楚人滅夔以夔子歸冬楚人伐宋圍緡公以楚師伐齊取榖公至自伐齊二十有七年春把子來朝夏六月庚寅齊侯昭卒秋八月乙未葬齊孝公乙巳公子遂帥師入把冬楚人陳侯蔡侯鄭伯許男圍宋十有二月甲戌公㑹諸侯盟于宋二十有八年春晉侯侵曹晉侯伐衛公子買戍衛不卒戍刺之楚人救衛三月丙午晉侯入曹執曹伯畀宋人夏四月己巳晉侯齊師宋師秦師及楚人戰于城濮楚師敗績楚殺其大夫得臣衛侯出奔楚五月癸丑公㑹晉侯齊侯宋公蔡侯鄭伯衛子莒子盟于踐土陳侯如㑹公朝于王所六月衛侯鄭自楚復歸于衛衛元咺出奔晉陳侯欵卒秋把伯姬來公子遂如齊冬公㑹晉侯齊侯宋公蔡侯鄭伯陳子莒子邾子秦人于溫天王狩于河陽壬申公朝于王所晉人執衛侯歸之于京師衛元咺自晉復歸于衛諸侯遂圍許曹伯襄復歸于曹遂㑹諸侯圍許二十有九年春介葛盧來公至自圍許夏六月㑹王人晉人宋人齊人陳人蔡人秦人盟于翟泉秋大雨雹冬介葛盧來三十年春王正月夏狄侵齊秋衛殺其大夫元咺及公子瑕衛侯鄭歸于衛晉人秦人圍鄭介人侵蕭冬天王使宰周公來聘公子遂如京師遂如晉三十有一年春取濟西田公子遂如晉夏四月四卜郊不從乃免牲猶三望秋七月冬把伯姬來求婦狄圍衛十有二月衛遷于帝丘三十有二年春王正月夏四月己丑鄭伯捷卒衛人侵狄秋衛人及狄盟冬十有二月己卯晉侯重耳卒三十有三年春王二月秦人入滑齊侯使國歸父來聘夏四月辛巳晉人及姜戎敗秦師于殽癸巳葬晉文公狄侵齊公伐邾取訾婁秋公子遂帥師伐邾晉人敗狄于箕冬十月公如齊十有二月公至自齊乙巳公薨于小寢隕霜不殺草李梅實晉人陳人鄭人伐許
