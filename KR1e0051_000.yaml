body:
  text: 御製書洪咨夔春秋説論隱公作偽事春秋以三傳為近古後世注疏家愈逺愈竒而愈不得其正即如不書隱公即位左氏謂攝蓋引而不發似矣公羊以為桓貴則已失之惟榖梁一則謂成公志再則謂成人美終則謂輕千乘之國蹈道則未持論平正而不苛然三傳即能得聖人筆削之精義耶吾不敢信而後世操同室之戈炫獨出之見求勝人而反昧已比比是也如洪咨夔春秋説之論隱公直以為作偽日拙吹求實已甚焉其言蓋出於盧同春秋摘微之緒論盧同摘微曰隱越次而立久不歸位外示攝而中實奪之故不書即位明春秋之所由作也是書久佚惟宋杜諤春秋會義採其説今於永樂大典散篇內裒輯得之夫同去三傳幾千百年而咨夔又去同幾四百餘年拾人唾餘而以為自出已見此何能欺千載之公論乎謂之為責賢者備猶屬左袒耳欽定四庫全書經部五洪氏春秋説春秋類提要臣等謹按洪氏春秋説三十卷宋洪咨夔撰咨夔字舜俞於潛人厯官端明殿學士事迹具宋史本傳是書咨夔自序稱自考功罷歸杜門深省作春秋説按本傳稱理宗初咨夔為考功員外郎以忤史彌逺又言李全必為國患為李知孝梁成大所劾鐫秩家居者七年是書蓋是時所作也又本傳第稱咨夔所著有兩漢詔令攬抄春秋説諸書而皆不載其卷數朱彛尊經義考引吳任臣之言云止三卷而永樂大典吳潛所作咨夔行狀則謂春秋説實三十卷今考是書篇帙繁重斷非三卷所能盡潛與咨夔同官相契當親見其手定之本任臣所言蓋後來傳聞之説耳其書明鬯而考據事勢推勘情偽議論尤多前人所未發如以書公子友如陳為著季氏専魯之始以晉侯執曹伯負芻而不為曹立君正為異日歸之之地以書大搜昌間為季氏示威于衆以脅國人皆得筆削微意惟謂慶父出奔為季友故縱謂劉子單子以王猛入王城為不知有君頗有紕繆然棄短取長其卓然可傳者不能沒也今兩漢詔令等書久已散佚此書亦無傳本惟永樂大典尚多載其文謹裒輯編次釐正訛舛仍分為三十卷以還舊觀至春秋經文三傳各有異同今咨夔原本經文已不可見就其所説推之知其大槩多從左氏而間亦參取于公榖今並加案語附識其下又自僖公十四年秋至三十三年襄公十六年夏至三十一年永樂大典原本已佚而他家經解又絶無徴引無從輯補今亦姑闕之焉乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀自序帝王誥命訖于平王國風變于黍離聖人傷王者之不作因魯史修春秋以奉天命而立人極夫天命流行于人極之中無一息間斷人惟不知吾心有天而外求天謂吉凶禍福天未嘗定往往無天而動于惡然天雖有時而未定終必有時而定天者定則人者屈此人極之所由立也此春秋成亂臣賊子所以懼也彼亂臣賊子惟利是計豈懼夫空言之貶身後之辱哉懼夫天者定而人者屈失其所以為利也故凡犯天下之清議冒天下之大罪能逭諸一時不能逭諸異日能逭諸其身不能逭諸其子若孫人誰無愛身愛子孫之念知天命有不可逭則欲動于惡將有所懼而戢此撥亂反正之筆所以有功于人極也且易春秋在魯皆所以司天人之契人欲窮而天理滅其卦為剝春秋二百四十二年純乎剝者也以齊桓霸天下始末求之每四十年當一爻隂愈進則亂愈甚盟宋之後晉以天下之權授之楚而大夫専盟諸侯皆廪廪乎贅斿之危五陰之剝成矣其末又以天下之權授之吳吳楚與越參立而交橫大夫各朵頥其國禍亂極矣而獲麟于西狩亂極必治安知無王者作此碩果不食剝所以不終于剝也春秋以傷王者不作而始以幸王者復作而終以魯聖賢之澤未泯一變可至道而託之以詔萬世天道至教聖人至德備見于行事斷斷乎循之則治違之則亂得之則生失之則死信人極非春秋不立也余自考功罷歸杜門深省有感于聖人以天治人之意作春秋説天目洪咨夔舜俞序春秋説自序考證第一頁後三行不能逭諸其子若孫句考平齋集本無若字今從永樂大典原文第一頁後三行知天命不可逭句平齋集天命作天定今從原文第一頁後七行以齊桓霸天下始末求之句平齋集避宋欽宗諱以齊桓作齊威今從永樂大典改正後倣此第二頁前七行違之則亂三句平齋集違字作失字又無得之則生二句今從永樂大典原文增改
