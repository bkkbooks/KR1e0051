body:
  text: 春秋說卷九宋洪咨夔撰閔公元年春王正月公以亂立不成乎即位之禮故不書即位子般孟任出也閔公姜出也僖公風出也子般長僖公次之閔公又次之在禮立嗣以適不以長莊公無適嗣哀姜之娣叔姜有子子以母貴則閔公當立使莊公合謀在庭審所宜嗣請命于周而立公國未有釁又主于齊本一正而國定矣而牽于私愛乃以盟臂孟任之子託季友季友逢君之私以奉般許之般立不足以厭國人之望慶父遂動于惡况哀姜初歸以孟任之嬖與荘公要約而後入今娣之子不得立而黨氏甥立哀姜之心能平乎故慶父弑般哀姜與聞之般卒齊人以大義立公公立纔八嵗已能􅉀齊侯納季子盖早慧矣慶父負不可赦之惡而忌其慧遂使卜齮賊之于武闈蓋與跋扈之禍正同是則再弑之禍萌於荘公之私嬖成于季子之私奉而立公之不早定也齊人救郉饑與之食病與之藥中流失船而與之壺烈火延灼而與之沃是之謂救桓公之伯救凡四荆伐鄭則救鄭楚圍許則救許楚伐徐則救徐而救邢者再人方懐倒懸之急而我惻然動心投袂而起不容頃刻安仁之𤼵也充是心則彌滿六合周徧萬有矣入春秋以来戎患早而淺狄患遲而深桓公方伐山戎而還狄伐邢如入無人之境是輕伯也管仲請救邢以從簡書固足見釋難拯危之仁而禦外綏内正伯業之所由盛故書救以善之夏六月辛酉𦵏我君荘公秋八月公及齊侯盟于落姑君薨稱子某既𦵏稱子踰年稱公不可曠年無君也荘公即世以亂𦵏緩公踰年改元不成乎即位之禮𦵏荘公而後書公公雖㓜知所痛矣落姑之盟出公意故書及眇然羈丱之中創鉅痛深急於求助而盟元舅以復賢望雍容進趨不失兩君相見之禮濟濟乎有成人之風矣得賢師傅輔掖之迪其方開之性𤼵其欲進之機火然泉逹日引月長晉悼可為也奈何哀姜無保佑之慈季友無擁䕶之忠轉柁帆摧出門軸折君子深惜之季子来歸淫風之行未有不召亂者荘公之世縱侈宣淫上下無間文姜與齊襄疾驅于通道大都已則築臺臨黨氏而摟孟任哀姜通於共仲而僕人鄧扈樂又淫於宫中一家之中如蜩螗沸羮欲不亂得乎成風事成季而屬僖公則子般及公之立皆非其志特借之以為驅除般卒成季出奔公立而復之猶望扶顚掖危之力而巨惡在列曽不知問聽其再動於惡武闈之禍方作而身奉成風之子適邾共仲奔莒乃入立之成季雖不與知其謀縱虎兕於通衢意果安在國人特以方亂而季子歸皆有慰喜之意聖人因而書之大惡實不容掩也况一書季子来歸而季氏得政權去公室之漸皆自此始矣冬齊仲孫来桓公方與公為落姑之􅉀大夫隨以省難来非不念魯也而聲慶父之罪以致討猶寂無聞豈以季子既歸必有以處此歟季子縱罪人以濟其私武闈禍𤼵曽不旋踵齊魯之望孤矣夫以魯之君臣縱淫召亂而謂猶秉周禮者何故動於人情者一時之變根於人心者百世之常周公伯禽所以封殖人心者豈以一賊臣而遂冺哉異時韓宣子見易象與魯春秋曰周禮盡在魯相去幾何年所見猶仲孫也兵環城外弦歌不輟屋壁可壊絲竹自如至此而後知入人深矣然仲孫書来不書其所以来名曰省魯實以覘魯聖人盖危之故與介葛盧白狄来同辭二年春王正月齊人遷陽桓公之伯始滅譚繼滅遂已而降鄣遷陽皆以勢迫而力脅之也人情重遷而强之遷國無以立民無以生仁者為之乎封衛救邢不足以掩其過故仲尼之門無道桓文之事者夏五月乙酉吉禘于荘公吉凶之禮不可參舉而錯行荘公之䘮未祥而禘用吉禮可乎夫魯之郊禘非禮也周公其衰矣成王以周公能為人臣不能為之功賜之天子之禮樂非周公意也季夏六月魯以禘禮祀周公于太廟牲用白牡尊用犧象山罍鬱尊用黄目灌用王瓉大圭升歌清廟下管象朱干玉戚冕而舞大武皮弁素積裼而舞大夏其禮盛矣伯禽受非禮之賜初惟以祀周公後世仍周公之祀遂僣用之羣公之廟禘者禘其所自出而羣廟合食焉此天子之禮也諸侯僣天子則大夫僣諸侯八佾雍徹無所不至矣春秋于僣禮不可勝譏隨事而見故假吉禘以譏禘之僣秋八月辛丑公薨子般之弑卒而不薨未踰年不稱公也公之弑薨而不地不忍著其地猶隠公也賊不討不書𦵏慶父自縊猶不討也其不言弑為魯諱也雖為魯諱而夫人之孫慶父之奔實有不可掩者存明堂位曰君臣未嘗相弑安知春秋之㣲而顯哉九月夫人姜氏孫于邾文姜與聞桓弑哀姜與聞閔弑身負巨惡國無所容故皆託辭以孫孫一也文姜稱夫人而不氏哀姜以氏見者何文姜淫于齊孫于齊不待著氏而惡己見哀姜淫于魯孫于邾非著氏無以昭其惡也哀姜不孫于齊而孫于邾者何文姜孫而襄公受之哀姜孫而桓公不之受也夫三綱五常之理未嘗一息冺焉而窮人欲者自滅之夫婦之義以文姜而滅母子之道以哀姜而滅乖氣薫蒸逆節暴白豈無故而然哉鍾巫氏一念之烈也公子慶父出奔莒慶父弑般而如齊弑閔而奔莒奔窘于如矣而不失其為公子志逸賊也天下之惡無黨惡者則惡不自動天下之姦無保姦者則姦不自容故討惡必討黨惡誅姦必誅保姦皇極無所不受而淫朋比徳之必去正以是也慶父初弑使季友仗大義聲其罪其出如齊齊不納焉彼必知懼不敢復動于惡季友縱之齊人納之彼知魯不能討齊有足恃故敢蹈前非而復出今季友緩追逸賊猶前日齊則懲往事不復納矣齊不之納故夫人不孫齊而孫邾慶父不奔齊而奔莒邾莒小國非隠姦匿惡之地而于夷之薨及宻之縊特一息留耳惡無黨姦無保俯仰覆載窄於窶數夫然後亂臣賊子懼冬齊髙子来􅉀厭亂思治人之常情困窮無聊尤易為徳黨氏初變國人震動得一季友来而國勢定讙曰季子喜可知也武闈再變國人益震動得一髙傒来而國勢定讙曰髙子喜又可知也然季子之来不能存閔公于嵗月之近髙子之来乃能定僖公於三十三年之久季子私髙子公也桓公本中材之主管夷吾相之所用各當其材而伯業濟大夫出疆利社稷安國家則専之仲孫髙子皆以専境外之畫不稱使其得人何如哉十有二月狄入衛小雅盡廢周道凌夷伊川被髪而祭卒沒于陸渾之戎氣召而類應也衛自宣公以来三綱五常之理滅其能不召狄乎邶詩終于二子乗舟鄘詩終于載馳衛詩終于木𤓰實一本末也州吁之亂罪人隨得狄猶未敢動至蘧蒢戚施之刺興而伋壽争相為死父子夫婦兄弟之倫一切掃地重以五國逆王命而納朔朔伐周而納子頽君臣之倫盡廢窮人欲而滅天理此所以有狄禍也然康叔之化浹人者深人心之天理未嘗泯自朔䜛殺太子伋而代立至其子懿公國人常欲敗之辭甲諉鶴乃其中心之𤼵見耳夫天倫壊而狄敢入人心正而衛復興聖賢教化之深真國脉所係哉鄭棄其師不教民而戰是謂棄之况以大衆付之好利不顧其君者乎夫君子難進而易退故用人莫重乎始進髙克始進不以禮柔行巽入深中于君心而得兵權禾之螟木之蝎雖知其毒庸可去乎是以俾之将兵河上幸其死敵不返失衆自奔而不計吾師之勝負得䘮是棄其師也棄其師是棄其國也詩序以為危國亡師之本得其旨矣
