  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1e0051_WYG_007-1a, image: WYG0156/WYG0156-0509a.png}
body:
  text: 春秋説卷七宋洪咨夔撰莊公三十有七年春齊人執鄭詹不朝則黜爵削地天子所以待諸侯也伯主與列國比肩事主耳茍無以深服其心則無事相朝之禮豈得而強其或不朝亦惟布德義修辭令以來之豈冝遽討哉况鄭雖不朝執政大臣猶詣齊受約束執之非所以勸其來也齊不朝周而責鄭之朝齊鄭有辭矣故執稱人夏齊人殱于遂賁育之不戒童子之不抗齊之於遂不啻泰山之壓卵而遂敢於盡齊戍曽不反顧者讎之深奮之決雖寡猶衆也義不足以激民志而恃力以相軋仁不足以維人心而挾智以相御力窮智竭卒不能成久大之功伯所以止於假也會鄄而鄭遂叛盟幽而魯已疑滅遂而遂之餘民猶得以鬱鬱不平之氣逞桓公而知人不可以強服盍亦反其道而行之秋鄭詹自齊逃來鄭伯逃歸鄭詹逃來逃者匹夫之行也詹為鄭大臣而見執有罪無罪當明白所以然之故而茍于求生倉皇逃來逃者為逸囚受者為逋藪春秋疾之冬多麋魯舊有麋而今多麋淫獸也時有淫行十有八年春王三月日有食之夏公追戎于濟西費誓征徐戎所作征築同日何其嚴也而隱桓下與會盟甚至伐天王之使以歸無敢問者陸梁非一日矣公因其來侵追之於濟水之西凛然疆索之意知會戎之為可恥則知追戎之為可大矣秋有􅈮短狐以含沙射人為災前所未有也賊臣之惡隱而未動而象已兆矣冬十月十有九年春王正月夏四月秋公子結媵陳人之婦于鄄遂及齊侯宋公􅉀陳微者之婦非陳侯婦也而公子結媵之晉執井伯以媵秦穆姬媵卑辱之甚結之媵以媵為援也同􅉀於幽公疑於從伯且受鄭詹之逃齊桓知公有異意期於宋魯尋􅉀於鄄以堅其從公不欲往又重于違齊故使大夫以媵便道而趨􅉀示非為􅉀而往輕伯甚矣疑於從伯魯未為失而玩侮􅉀主外為虛文之交中實詭道之尚明白洞達者不為春秋所以探其用心而書之按此條經文諸家皆以為公子結矯命專盟故書遂以貶之惟范寧穀梁注云魯實使公子結要二國之盟欲自託于大國未審得盟與否故以媵婦為名原文蓋本此而以為齊要宋魯為盟説復小異謹附識於此夫人薑氏如莒父母國義有不得歸况莒乎襄公弒桓公立文薑嘗一如齊齊人以發夕之迹未陳雅不欲其來故不復再往而如莒公之不能防間至此益甚原公之意豈不知和氣婉容奉令承志為孝而失為孝之道者不學故也凱風之美孝子其詩曰母氏聖善我無令人勸之不從諫之不從至於痛自刻責如此卒能感動不安其室之母以成其志至誠未有不動者也公不以納母於善為孝而以從母於惡為孝有愧睍睆好音多矣未幾再如莒可勝嘆哉冬齊人宋人陳人伐我西鄙誠未有不動詐未有不窮齊師加我屢矣未嘗書伐假媵而􅉀以為諼則齊執辭以伐矣二十年春王二月夫人薑氏如莒夏齊大災天火曰災大水曰災旱甚曰災大疫癘亦曰災此不必其為何災其為非常之變明矣魯往弔災如宋故書伯圖起而王迹熄設心舉慮發號施令之間動與天違故天出災之大者以警戒之烏可不恐懼修省以答天譴而委之適然之數乎管氏茍有格心之學必有見乎此秋七月冬齊人伐戎北戎伐齊嘗乞師於鄭齊有戎患舊矣桓公之伯正欲尊中國敵王愾楚有自王之罪未遽問而首伐戎治小以警大攻瑕以撼堅用兵先後之序也孔明用蜀所急者魏而五月渡瀘深入不毛先致力於南夷蓋得此意二十有一年春王正月夏五月辛酉鄭伯突卒秋七月戊戌夫人薑氏薨冬十有二月葬鄭厲公鄭莊公多內嬖適庶子十二人其爭國者忽突亹儀也忽弒亹殺而儀立突竟以篡得國死諡以厲孝子慈孫不能改公議之在人如是哉二十有二年春王正月肆大眚過誤麗于刑者肆赦之宥過無大之意也孽自已作惡由身積出於禮則入於刑五刑之用無非天討豈得而私宥之立人之道曰仁與義仁非義以裁之其弊必流於姑息過雖大亦宥故雖小必刑聖人仁之至義之盡也有罪不刑曰吾將以為仁適所以害吾仁此舉豈特害仁而已哉公欲結婚於父仇之齊乃先肆大眚謂前是過惡之大者一置不復問惟一置不問則齊可婚矣此公自為謀也癸丑葬我小君文薑邦君之妻君稱之曰夫人邦人稱之曰君夫人稱諸異邦曰寡小君薨以夫人書尊於邦人之辭也葬以小君書通於諸侯之辭也隱母聲子桓母仲子皆媵妾不成禮故不書葬文薑適母赴告祔姑反哭皆成禮故書古者婦人無諡以姓配諡魯之私也陳人殺其公子御寇左氏陳人殺其太子御寇史記宣公有嬖姬生子欵欲立之乃殺其太子御寇而春秋以公子書御寇蓋嘗為太子也按劉敝云嫡子既誓稱世子未誓稱公子原文不知此義故立説未明其書人殺之者非宣公也夏五月秋七月丙申及齊高傒􅉀于防有求於人雖屈已不憚方齊急於摟魯則公子結可參伯盟及魯急於婚齊則大夫高傒可與公盟春秋書及不書公其志公失足於齊之自歟冬公如齊納幣公志在婚齊特以文薑意不在桓遲遲至今耳文薑薨公得以行其志納幣不使大夫躬奉玄纁於臨淄之庭越嵗乃至無恥已甚尚何讎婚喪婚之恤哉二十有三年春公至自齊祭叔來聘王室無政天子之內臣多外交祭伯來不書朝祭叔來書聘豈其託王聘為辭歟抑自聘也夏公如齊觀社公至自齊心之官寄於目制目所以養其心非禮勿視為克已第一事而無淫於觀於逸於逰於田觀尤無逸所重也魯非無社乃越境觀於齊有所慕而動託詞以往耳此心一放如隄壞波決蕩乎不可復返敗禮踰義何所不至哉一嵗再至春秋深危之荆人來聘此春秋之所進正春秋之所憂也荆蠻僻陋兵革相尋乃氣習之常而今以聘自通於魯窺吾中國禮樂之盛意蓋叵測聖人與造化同量歸斯受之故進之以人進未已也憂未已也公及齊侯遇于穀蕭叔朝公勝母之閭曽參不入以地嫌也先是夫人薑氏嘗再會齊侯於防於穀今以納婚之故方與高傒盟於防又與桓公遇於榖魯道有蕩履綦猶存講兩君之好獨無他所乎雖然公急於親齊不恥也蕭叔宋附庸就朝公於所遇之地其以恥公乎秋丹桓宫楹禮者天下之防也血氣未定之時無義理以維之此心一蕩則縱欲壞防而不顧諸侯之楹宜黝堊而丹之桷宜礱斫而刻之夫人將廟謁藻飾之侈至此驕妻妾也讎不宜婚喪不宜婚而吾侈大禰廟示急於奉祭祀欺國人也御孫以為大惡有以哉冬十有一月曹伯射姑卒十有二月甲寅公會齊侯盟于扈婚禮人道之大上以承宗廟下以繼後世故謹之重之媒妁通二姓之言不自為要約也公之婚齊乃自為要約既盟而納幣又盟而逆女相孚不在於言前相疑常在於事表故一再要諸鬼神以為信夫亂長於屢盟仇成於怨耦君子是以知哀薑之禍魯也二十有四年春王三月刻桓宮桷葬曹莊公夏公如齊逆女秋公至自齊八月丁丑夫人薑氏入戊寅大夫宗婦覿用幣韓侯迎止于蹶之里此禮之廢久矣公能修舉已廢之禮豈不謂賢而身逆讎女不可以事宗廟敗禮之大者也齊女類無賢行僖公知文薑淫邪越境送於歡俾桓公會而受之身為之防也哀薑之行猶文薑其於桓公則姑姊妹之列鼓鐘於宮聲聞於外其誰不知之故難於尋於歡之送而公逆之於齊相為要約先至後入無非墮薑氏籠絡之中前車既覆後車不戒廟祏有靈必深痛之矣况男正位乎外女正位乎內男女正天地之大義夫人始入受大夫及宗婦之覿皆用幣女不安於榛栗棗修之贄而用男子之禮隂陽顛錯內外淆舛家道窮必睽尚何能保終吉乎大水衰末之世類多水災冬戎侵曹曹羈出奔陳赤歸于曹戎之侵曹為納赤也齊方以攘夷尊夏為伯業雖嘗伐戎未有以懾其心奪之氣故敢於侵曹以專出羈入赤之權夫以振鐸之國而廢置豫奪聽命於戎得無病伯乎郭公二十有五年春陳侯使女叔來聘講信修睦親仁善鄰春秋所深喜陳從齊宋嘗伐我非其本心魯既昏齊陳首聘魯以結鄰國之好未幾公子友如陳報聘忿以義消怨以禮釋兵自此其弭矣故曰匪寇婚媾終無尤也宜女叔以字見夏五月癸丑衛侯朔卒六月辛未朔日有食之鼓用牲于社伯姬歸于杞姬公庶女也聘逆送致之禮皆略故獨著其歸秋大水鼓用牲于社于門前此非無日食大水而頻年日以眚告水以洚告惟此時為然伐鼓用牲記禮之失也豈惟禮之失哉應天以實不以文日為陽精有物食之水為隂類高下皆被其災陽微隂盛之徴明矣公方制於哀薑不思修身齊家之道以行禦災召和之實區區欲以伐鼓助陽而抑隂天可以文欺哉詩曰十月之交朔日辛卯日有食之亦孔之醜又曰煜煜震電不寧不令百川沸騰山冢崒崩日食水災沓見於幽王之時褒姒滅周之兆也魯禍兆於哀薑天變不虛如此冬公子友如陳友莊公之母弟宜如齊年鄭語以弟書而書公子蓋友已賜氏得政矣季氏專魯權輿於此故因報聘謹其始而書之
