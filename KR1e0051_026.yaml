body:
  text: 春秋說卷二十六宋洪咨夔撰昭公四二十有四年春王二月丙戌仲孫貜卒婼至自晉公羊叔孫舍至自晉穀梁婼至自晉左氏婼至自晉氏不氏異辭固難乎臆斷而告至于廟則責備賢者之意先是行父見執不至而意如見執乃至蓋以君禮自處也昭子囚執逾年不為義疚其賢為何如見釋而歸習聞意如之故而不究其禮於是陷於告至之僣而不自知春秋深惜之夏五月乙未朔日有食之秋八月大雩丁酉把伯郁釐卒冬吳滅巢楚平王以篡立任費無極而朝政紊廢大子建而家道隳精神不彊氣勢消鑠地大數圻而城郢懼吳也吳所以謀楚者必先并小以翦除其枝葉攻瑕以撼搖其本根然後一舉而拔之故州來伐矣頓胡沈蔡陳許之師敗矣而又滅巢八小國皆楚役既躪籍於吳則其黨衰其與寡郢雖未入已在吳掌握中矣沈尹戌以是為亡郢之始有以哉葬杞平公二十有五年春叔孫婼如宋夏叔詣㑹晉趙鞅宋樂大心衛北宮喜鄭游吉曹人邾人滕人薛人小邾人于黃父景王崩王室亂劉子單子以王猛居于皇非小變也晉親則同姓尊則方伯偃然不知率諸侯勤王越明年然後不得已為圍郊之舉敬王為東王尹氏立王子朝為西王尤非小變也晉不汲汲奔問官守徐遣士景伯涖問曲直之故于周又越再明年然後不得已為黃父之㑹夫嫠不恤緯而憂宗周之隕為將及焉今王室實蠢蠢焉使非子大叔有以發范獻子之機猶未徴㑹也十國既㑹趙簡子所宜拊膺流涕以天子蒙塵于外激揚諸大夫之義氣鼓行直前亟置九鼎於泰山之安方且令列國輸王粟具戌人期以明年納王苟知王為當納何待來年宋樂大心敢以不輸粟傲盟主蓋已窺其不誠於為周矣大邦維屏大宗維翰故桓文之伯皆以同奬王室為辭晉世主夏盟獨不念厥紹乎春秋於是㑹知其不誠於為周無褒辭知其伯業之替不足責亦無貶辭有鸜鵒來巢鸜鵒不踰濟而魯有之公出失所之兆見矣易曰各正性命保合太和聖人盡己之性盡人之性以至於盡物之性皆乾道之用也鴟梟之漂搖鴻雁之哀鳴鴇羽之集苞栩託物取興猶以失性為慮而况天運之變地氣之移宜無而有宜穴而巢乎因一物之失性而知萬物之失其性因萬物之失性而知天地之失其性故易之作聖人與天地萬物同患秋七月上辛大雩季辛又雩祭不欲疏亦不欲數文公自正月不雨至于秋七月未嘗雩今以旱故靡愛斯牲一月再雩不可謂無憂民之志而其失在數說命戒黷于祭祀髙宗肜日亦戒典祀毋豐于昵昵且黷則齊明昏而精神散神不享矣是時魯君臣之情方睽陽亢而不下濟隂伏而不上承乖氣薰灼禍亂將起數雩何益於旱哉在昔聖君賢臣相與同寅協恭以成天下之治七政循晷而寒暑平五行秩叙而風雨順皆一德之和召之也成湯桑林之禱終以讒夫昌歟為責宣王雲漢之憂末以大夫君子為勸意在是歟九月己亥公孫于齊次于陽州齊侯唁公于野井隂凝冰堅非一日之積而繫用金柅莫嚴乎其初初之不柅逮冰堅而後圖之其能濟乎季氏自友至意如專國四世豫奪廢置盡出其手國人惟知有季氏不知有公公難乎克矣公難乎克其付之無可奈何而遂已乎曰病而輕於用藥以速其斃固不可藥石悉屏不用而聽其自斃亦不可也然則為公之計奈何曰任賢勿二去邪勿疑賢知所任則邪不難去隂陽消長之理也魯人不知有公而心乎公室猶有叔孫婼子家羈在是蓋剝極之碩果天遺之以為復返之機也有昭子之賢而公不知有子家之忠而公不聽乃與讒人徼幸以圖大事輕躁起禍尚誰咎哉孫猶夫人孫于齊諱之也次于陽州進而受唁于野井公之求於齊者切齊之恤乎我者緩也齊之有陳氏猶魯之有季氏同惡相濟其肯納公乎冬十月戊辰叔孫婼卒昭子討亂從之豎牛器識之髙也訪官名於郯子學問之敏也以器識之髙濟之學問之敏命義大戒瞭然于中其肯垂首帖耳從逐君之賊乎郎囿之築既譏其勦民而速成日食之異又察其不君而異志三命踰父兄且欲與之訟書辭無頗是固平子之所畏且深忌者也公平時無知人之明有賢不能任至欲伐季氏又適遇其如闞不與之謀失國宜哉夫不畏强禦義形於色之臣存則君存昭子不甘稽顙請命之欺竟遂祝宗祈死之志公之復國於是乎絶望矣悲夫十有一月己亥宋公佐卒于曲棘身罹虎厄者聞虎而膽栗嘗受疾痛者視痛而心碎宋有華向之亂宋公幾不免創巨痛深矣至聞公為季氏所逐惕然動于中奔走如晉謀納之豈非以己望人之心知人望己之心歟况精神動於夢寐楄柎藉幹己形治命而急於救難不廢于行遂道卒于曲棘可謂知命矣推己之謂恕盡己之謂忠元公其庶幾乎十有二月齊侯取鄆資齊之力取之公不得而有也公失國人之心非一日鬷戾陷圍救平子則公徒釋甲以踞昭子謀安衆而納公則公徒欲殺之蓋公之左右前後皆季氏黨戾氣薰漸逆謀蟠結不復可以義率故公不能自取鄆而齊為之取也齊取鄆以居公其無意於納公可卜矣二十有六年春王正月葬宋元公三月公至自齊居于鄆春秋大居正易之則亂天王方失其居而居狄泉公又失其居而居鄆人道不立未有甚於此時也夫神器非有道不可得大寶非有德不可守人心聚則為君散則匹夫耳故人君以五事治身而惟其敬也以二南治家而惟其正也以九經治國而惟其定也上無失德下無離心愛之如父母畏之如神明尊之如天地仰之如日月平時則如衆星之共北辰有難則如手足之護頭目安有去社稷逺宗廟淹恤於外而莫之恤乎公以失德失其位出不託於齊入不返於國鄆介乎內外之間進退觸藩不得已而居之居非其居也易曰窮大者必失其居故受之以旅夏公圍成秋公㑹齊侯莒子邾子把伯盟于鄟陵公至自㑹居于鄆公失位去國蔑一民寸地之有鄆與成皆我邑乃勞於取而敝於圍上失其道民散久矣至此尚何言哉然取鄆猶有齊為之主成則獨圍之公其孤矣人徒見申豐致貨于梁丘據以天棄魯尼齊侯納公之心曽不思景公初無心于納公也唁于野井卑公矣取鄆使居外公矣不誠無物人得以窺見肺肝此季氏之貨所以得行於嬖臣嬖臣之言所以得行于景公也景公無心於納公而猶率三小國為鄟陵之盟以謀之欺公又甚矣公在外而至存公也且以見公奉祏主以出猶不廢告至之禮也九月庚申楚子居卒冬十月天王入于成周王者無外其出其入皆有外之辭敬王居于狄泉在王城之東是為東王王子朝居于王城是為西王朝將奔楚天王自狄泉僅入于成周其餘黨猶盤據于王城也成周洛陽下都未麗辰極之正而王即安焉入非所宜入也晉師克鞏而天王入不為無牧圉之勞而王以自入為文不誠于勤王故不勇于納王此天王所以入成周而非京師也尹氏召伯毛伯以王子朝奔楚三綱淪九法斁而君臣之道微諸侯之國無不為權臣所制王室亦制于權臣故子朝之亂篡非其所能也尹氏主之奔非其所欲也尹氏挾之子朝之命委於權臣之手其曰以能左右之也王猛之入以之者劉單子朝之奔以之者尹氏適庶順逆之理雖殊而君弱臣强之禍則一可不監哉召伯毛伯黨權臣故同罪二十有七年春公如齊公至自齊居于鄆夏四月吳弒其君僚闔廬動無君之心蓄鱄設諸以伺僚間非一日矣弒君宜歸獄於光而以國書罪通國無臣子也季札於波流風靡中獨守退遜之節可謂賢矣然所貴於賢者為其能綱維世變扶植人極而有益於天下國家非以徒能潔身而大倫之不顧也僚之見弒闔廬謂季子雖至不吾廢季子亦自謂哀死事生以待天命立者從之故坐視君弒國危曽無沐浴請討之意使以季子之賢請諸天子告諸方伯合諸侯以行天討彼特機上肉耳賢有餘而勇不足闔廬遂為不討之賊春秋舉國以弒札之罪固在其中矣楚殺其大夫郤宛令尹子常賄而信讒費無極譛郤宛而殺之子常亦隨殺無極以弭謗郤費俱見殺而宛獨書且不失其為大夫宛無罪也無極在平王之時去朝吳出蔡侯朱喪太子建殺連尹奢忮毒傾險鬼蜮萬狀舉國皆知其為讒人而王之耳目聰明為所屏蔽莫敢言也至昭王立一用其讒而身戮族屠才反復手間蓋永某氏之鼠不知室已更主而竊囓鬪暴猶前日也嗚呼讒人亦何利之有哉秋晉士鞅宋樂祁犂衛北宮喜曹人邾人滕人㑹于扈主一之謂敬心兩用則非敬矣是㑹令諸侯戍周且謀魯兩用其心既不專於為周又不急於為魯具文以為欺也范獻子取貨於季孫而以難復豈特貨賄之能移人晉之有六卿即魯之有三家安肯贊其君為與國正君臣上下之分自為不利哉宜其係小子失丈夫冬十月曹伯午卒邾快來奔公如齊公至自齊居于鄆公一歲再如齊情迫詞切矣齊方臣妾畜之藐然如秦越之肥瘠不以動其心公茹辱告至而居鄆猶不悟其我欺也屯六三曰即鹿無虞惟入于林中君子幾不如舍往吝使公早用子家之計翻然舍齊而改圖尚庶幾自拔於難見幾不作往輒遇吝不至泣血漣如不已可勝歎哉二十有八年春王三月葬曹悼公公如晉次于乾侯齊於魯為甥舅之國晉於魯為同姓之邦魯之事齊晉又皆有過無不及患難相救傾危相扶宜如左右手而君為臣逐曽不見恤如齊復如晉祗重取辱焉晉無志於嗣伯天王有難猶待告急而後動安能不待告急而急魯前之㑹扈謀納公蓋其僞今之留公竟上不逆則其情也春秋為尊者諱公如晉及河而復與次于乾侯皆直書其事無隱辭著季氏逐君之本末由晉黨之長其惡以至此極豈止瑣尾流離褎如充耳而已哉觀書法可見聖人責晉之深哀公之切夏四月丙戌鄭伯寧卒六月葬鄭定公秋七月癸巳滕子寧卒冬葬滕悼公人而不仁如禮何夫子為季氏發也公孫于齊之後魯㑹宋曹鄭滕晉薛之葬凡六皆意如以禮交於列國無異公在也彼豈愛禮而然哉示人以整暇使恬然視公之出若有若亡而不我討也嗚呼其機深矣哉二十有九年春公至自乾侯居于鄆齊侯使髙張來唁公公如晉次于乾侯公以不見恤于齊而求晉晉以公安于齊不之納徘徊躑躅越歲始返猿窮狼㚄情狀畢見齊侯前親唁于野井今卑公益甚使髙張來唁非唁其不復于魯也唁其不受於晉也其名為唁實揶揄之也公不堪其揶揄踉蹡復投于晉晉之不我受猶故也公于是進退不能終為乾侯之鬼矣晉齊忘拯危恤難之義則同而晉之黨臣拒君其罪重于齊夏四月庚子叔詣卒叔孫婼求納公無疾而死叔詣欲納公亦無病而死齊人以為天棄魯季孫亦自謂天命非我罪豈天果右惡人乎二子不堪意如之無道欲討不能惟有一死以謝國人齎恨以歿人也非天也天則有時而定矣秋七月冬十月鄆潰旅始于瑣瑣中于焚次終于焚巢公蓋備嘗之季氏四世專魯民知有季氏不知有公說甲執氷舉國皆同惡也齊人取鄆以居公公再次乾侯鄆之民遂渙然逃散使無以為歸三綱五常淪斁殆盡人可誅而家可瀦也然公獨得一鄆以居不能加惠以係其心卒使舍順趨逆魚爛以潰其與梁亡何異哉三十年春王正月公在乾侯諸侯失國託于諸侯禮也進無所受退無所歸則託非所託矣公初不見受于晉而次乾侯不過暫焉信宿鄆潰無所歸而在乾侯則羇泊之迹遂定不宜在而在也不宜在而書在以存公國不可一日而無君况一歲之始乎夏六月庚辰晉侯去疾卒秋八月葬晉頃公冬十有二月吳滅徐徐子章羽奔楚力窮不能守則滅貪生不能死則奔奔滅並舉吳之吞小徐之不死社稷各抵其罪也吳志在圖楚必先芟夷其枝葉滅州來滅胡沈滅巢又執鍾吾子遂伐徐徐滅而楚之與國略盡入郢之勢成矣其諸伍貟為之謀耶三十有一年春王正月公在乾侯季孫意如㑹晉荀躒于適歷君能制命為義臣能承命為信君制于臣有美意而不獲伸則信義兩失之公連年在晉境晉定公屢欲納公范鞅以取貨之故終始黨意如而主張之定公之美意壅矣方召意如之來坐之庭下詰以出君之罪而誅之直咳唾間乃使荀躒逆㑹于適歷越四月然後唁公于乾侯是意如為重公為輕也君怒未怠子姑歸祭躒之為季氏地者其鞅意歟鞅所謂懷利以事君者夏四月丁巳薛伯穀卒晉侯使荀躒唁公于乾侯秋葬薛獻公冬黑肱以濫來奔魯方出其君黑肱叛邾君以地來奔氣類感召也不以黑肱繫之邾其不臣于邾非一日也名叛人則出君之罪宜何如微而顯矣十有二月辛亥朔日有食之三十有二年春王正月公在乾侯取闞闞孰取之公取之也闞本我邑而勞于取一民寸土公不能有也公何為取闞闞有羣公之墓在公意若曰吾不能守宗廟猶將保墳墓也羣公全付有家不能保而思保墳墓以為孝蓋始絶望于入也悲夫夏吳伐越越再見也越從楚伐吳非越志也故人越吳初伐越首兵也故國吳國吳不容不國越以僭王皆外之也天道貴中國而賤僭逆故於僭逆之橫常隂有以制之吳之起釁于越其越沼吳之張本乎秋七月冬仲孫何忌㑹晉韓不信齊髙張宋仲幾衛世叔申鄭國參曹人莒人薛人把人小邾人城成周成王營洛邑又作成周遷殷民以為京師之東都而復歸于宗周至平王有犬戎之難始遷洛邑成周猶未居也敬王有子朝之難始入居于此晉合諸侯之力戍之五年王欲徼福于成王請修成周之城俾蝥賊逺屏是非以城成周望晉也以芟夷朝黨于王城望晉也王城之賊苟殄萬乘之君自尊安用城為晉政下移伯業日替以天王苟安為幸而不以王室偏安為憂遂合諸侯之大夫尋盟而城之乃歸其戍於是勤王之事畢矣未幾儋翩率子朝之徒作亂天王出居姑蕕城何益哉昔王室自宗周遷洛巳不勝黍離之悲降而成周其卑愈甚自是洛陽河南遂為東西周至赧王分治而周亡晉實為之也書入成周于前所以著天王即安之非正書城成周於後所以著諸侯勤王之不終十有二月己未公薨于乾侯君子以正而斃為貴客死乾侯豈其正乎季氏無君之罪固不容赦有民不能用其力有賢不能用其謀而宗廟社稷喪其匕鬯不能復屯膏之凶公蓋有以取之也使國人尚有臣子之心盟主不失方伯之職列國未忘患難相恤之義亦何至是哉書薨于乾侯數者之罪俱見
