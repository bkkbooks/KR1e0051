body:
  text: 春秋説卷五宋洪咨䕫撰莊公一元年春王正月堯三年之喪畢月正元日舜格于文祖始用初政之禮湯三年之喪畢十有二月朔伊尹以冕服奉嗣王歸于亳始從吉服之禮古之通喪皆然至康王受末命即尸天子以冕服見諸侯而禮始變魯禮從周逾年改元即位謁宗廟臨朝治國家用變禮也桓葬於去年之十二月逾年改元公當行即位之禮創鉅痛深非他喪比而其禮不忍講故不書然體元居正據舊鑑新以蓋既往之愆刷無涯之恥公可不深念哉獨孤臣孽子其操心也危其慮患也深故達操宜危而不危慮宜深而不深則否何能傾屯何能亨乎三月夫人孫于齊母子之際人有處其不幸者公是也父之讎不與共戴天而母子之愛無絶法徇義則妨恩徇恩則害義公蓋難乎處矣痛割方深指目正沸夫人何能自寧勢迫情窘退歸于齊非公不願其留也詩人刺公不能防閑其母防閑之道莫難乎其始方欲孫之時羞惡動於中此心天理豈能無一縷之明納約自牖正在於是使能委曲譬曉謂在禮則歸唁而不得在情則浮言之胥動惕然退處眷然哭泣之哀則嫌疑之謗自弭何以孫為三諫不從繼之號泣積誠所感何能不動顧乃因其孫而聽之至齊則雄狐猶前日之綏綏也始之羞惡依然晦蝕往來憧憧愈無忌憚春秋託辭書孫而不書姜氏微而顯矣易之蠱曰幹母之蠱不可貞蓋有致曲之禮存焉惜無以是為公告者夏單伯逆王姬秋築王姬之館于外諸侯不敢敵天子王姬下嫁使魯主之單伯命大夫所以逆于京師也不言公使者斬焉衰絰之中婚不當主也不言京師者桓王之喪未葬則服未除姬不當歸也不言為齊逆王姬者不共戴天之讎禮不當接也周命魯冒喪忘讎而主女義不可主則辭既不能辭乃權所處之宜築館于外齊可外王姬不可外也外王姬則外王室其失愈甚此春秋所以貴正不貴權歟冬十月乙亥陳侯林卒王使榮叔來錫桓公命春官以九儀之命正邦國之位命為人君之大柄非一人所得專也天命有德五服五章哉命出於天君代天而行之加非其人則違乎天矣桓麗大惡王已失刑又以異數追錫於身後天命不僣而僣用之故王不書天以示貶是時王姬方下嫁於齊使魯主之魯重於違王命而仇讎之人非所以接婚姻於是築館于外王察人子之意有所不安故錫其父以安之使若死於正命然以弭其未報之怨是教天下以忘親事仇非孝治之道也故書錫命介於逆姬歸齊之間王姬歸于齊齊師遷紀郱鄑郚平王之孫齊侯之子齊之尚王姬舊矣然愛女者不以與凡子襄公之無禮義國人昌言而咏歌之莊王獨不聞乎紀女為桓王后莊王之母家也王姬朝適齊齊暮遷紀三邑投鼠忌器獨不為王后地乎不顯申伯王之元舅召伯旣定其宅又徹其田又俶其城營其寢廟尊王故也而齊首迫王舅之國使不得一日安其居無人心甚矣王之不謹於歸女取辱至此尚誰咎二年春王二月葬陳莊公夏公子慶父帥師伐於餘丘公初即位未有一命施於國一惠及於民首動大衆為無名之伐以迫邾按於餘丘公穀以為邾邑杜預以為國名考全經之例未有伐人之邑而不繫其國者亦未有邑而書伐者知杜說于義為長原文本公穀立義似為失考四矢返兮以禦亂兮公習於技射未嘗學問故慶父得以乗所好而動其兵秋七月齊王姬卒王姬無書卒者卒之悲之也以桃李之華配禽獸之行朝至齊都夕遷紀邑念傷桓王之心豈不惄焉如擣目擊閨門之内皆非人道之常又豈不烈焉如焚心失和平氣受沉鬱未數月而卒可以知其賢矣悲夫冬十有二月夫人姜氏會齊侯于禚孫齊不書姜氏會齊侯書姜氏孫猶託辭以往會則直會矣會之不閑駸駸乎鍾鼓琴瑟以饗矣南山載馳魯道有蕩安然行之無一毫愧恥之意自是會始乙酉宋公馮卒三年春王正月溺會齊師伐衞溺未命之大夫也公父死于齊手而以兵從之天王置君于衞而我伐之無父無君也有天下國家者不可使好樂毫髮見于外人臣逢君長君之惡者皆由是而入以濟其固寵盗權之計公春秋鼎盛儀偉而技精氣銳而志廣好樂形矣故慶父以伐於餘丘慫惥之于初溺以會齊伐衞鼓舞于其後此心蕩搖不可復遏自是無歲不有佳兵之舉春秋蓋深憂之夏四月葬宋莊公五月葬桓王崩七年而葬緩也王室匱于財而不可缺于禮故葬之緩匹夫喪不以時舉猶為不孝萬乘之貴葬親不以時至于此極人子之心安乎前平王崩不書葬後莊王崩不書葬而桓王以葬書前後不會此會之也秋紀季以酅入于齊知其不可奈何而安之若命者紀是也齊欲吞紀非一日紀心知之而地褊力微勢孤助寡其何能支久親于魯而魯不足依主于王而王不能庇以微乎微之國一朝遷三邑其存餘幾滅可立待也于是兄弟相與熟計存亡之輕重與其併命以死社稷孰若用權以存宗廟弟推抱器歸周之意兄為去邠踰梁之舉國雖滅祀未遽絶也于是季以酅先入于齊齊受其來不奪之邑遂得以附庸自存可謂見幾而作矣凡以邑而奔者皆盗也酅入于不得已春秋哀之冬公次于滑兩傳謂欲救紀而不能左氏謂會鄭伯謀紀公方與齊結好親紀則敵齊尚何謀救之有其諸即近邑為遊觀之樂而以救紀為辭歟四年春王二月夫人姜氏享齊侯于祝丘頤之初九觀我朶頤心之動也六二顚頤征凶身之動也六三拂頤貞凶一于妄動而不知止也人惟無禮義以止其情漸而至于放肆不可復返豈心之本體然哉舎之則亡也文姜嬪魯幾年矣未嘗歸寧僖公卒而襄公立桓公始與偕如齊如之為言猶假禮而往也桓公薨而公立夫人遂孫于齊孫之為言猶託辭以行也會于禚則愧恥之心亡享于祝丘則無恥之惡積文姜與襄公猶冠履之不可雙其理寧不曉然自如而孫自孫而會自會而享情以漸放惡以漸長豈一朝一夕之故哉三月紀伯姬卒夏齊侯陳侯鄭伯遇于垂紀侯大去其國六月乙丑齊侯葬紀伯姬齊巧於滅國者也喬木之下無茂草紀迫於齊勢何能久自僖公以來日謀兼并而未嘗以兵壓之耽耽虎視之意動而風聲鶴唳自足以破其膽故齊鄭無故如紀而紀始恐中間與為黄之盟若一置宿憾於度外一朝談笑遷其三邑而紀季隨以酅入取果於旣熟撼齒於已搖紀滅在漏刻矣而一兵不出惟與陳鄭遇于垂紀侯即去其國恫疑虚喝坐収全功此即如紀之故智也紀與周魯為姻好王不能庇母家魯不能庇女家蕞爾之邦尚復何策故使季以酅入齊存其五廟而身去之如脱敝屣是之謂大去國受于王室傳于先公宜效死以守而去之可乎上而宗廟不至於曠祀下而生民不至於糜爛於國滅之中抑其善者也伯姬之卒未葬而國滅襄公假義以欺世為之葬無歸之骨比事觀之情見罪著矣公羊謂許復九世之讎豈聖人意哉秋七月冬公及齊人狩于禚公習於技射有馳騁武事之好襄公侈之田狩以中其欲而蠱其方寸使忘大讎安大辱而惟遊樂之耽也禚即姜氏會齊侯之地今復挾其子以狩國人謂之何哉人齊以掩國人之恥地狩以著文姜之迹而書及以見公汲汲從齊之志此之謂盡而不汙五年春王正月夏夫人姜氏如齊師軍中有婦人則氣不揚禚之會祝丘之享疾驅通道大都已播其惡於萬民今又宣淫於師以褫三軍之氣萬目睽睽恬然不顧天奪其魄尚何能久乎秋郳犂來來朝郳即小邾婁始通於魯朝而棄禮故郳以地書犂來以名書冬公會齊人宋人陳人蔡人伐衞夫人夏如師公冬會伐文姜與聞伐衞之事也以敝笱之子納新臺之子其何以逃國人之指目春秋人諸侯所以人公也六年春王正月王人子突救衞夏六月衞侯朔入于衞伐者擅辭救者善辭子者貴辭朔者絶辭是非邪正判矣古者立國之制王畿千里公侯百里伯七十里子男五十里小大相維也天子六軍大國三軍次國二軍小國一軍强弱相制也王畿有强榦之勢足以運列國於掌握之上諸侯有棊布之形足以敵王愾於號召之下制度嚴而紀綱定堂陛尊而藩維固孰有逆王命者王政不行國自為政陵弱暴寡吞卑并小大國至方數圻於是尾大不掉敢與王抗蔡衞陳三國從王伐鄭猶取敗而還齊合魯宋陳蔡伐衞豈一王人之微所能勝哉然以一王人之微當五國連衡之衆所恃者名尊而義正耳使五國有一少知名義必蹙然斂縮之不暇而懵於改過勇於犯分合力拒王師以納推刃兩兄之朔其罪可勝誅耶比之象曰先王以建萬國親諸侯是役非封建之過也封建之壞之過也秋公至自伐衞螟冬齊人來歸衞俘是俘之歸豈特盗跖以分均為仁哉文姜與聞伐衞故齊歸其俘曰魯侯之力以罔國人使知夫人所以往來無停輈者為謀衞耳且以鼓舞公使踴躍於齊之從也宋納鄭君而責賂魯成宋亂而取賂齊帥四國入朔亦俘厥寶玉以為賂大惡以賂免大位以賂得亂臣賊子所以相尋無忌憚也歟七年春夫人姜氏會齊侯于防夏四月辛卯夜恒星不見夜中星隕如雨二十八宿及五星日月皆陰陽之精其本在地上發于天而經星與緯星異經星不動隨天左轉有出沒而無贏縮五星日月則動而不常以經星為次舎恒星即經星也今經星不見緯星則見矣王命不行於諸侯簒君參錯於列國三綱五常之理皆失其經上感於天而經星為之不見至夜半星隕紛然如雨豈小變哉天秉陽垂日星星不見而復隕陽不足可知有國者毋以天道逺而自恕也秋大水無麥苗大水陰之盛無麥苗水為災也他穀不書獨書麥苗秋中農趣収斂穀班班已登塲惟宿麥方茁青青覆塊耳麥性最畏水潦浸之餘根苗俱腐時過不可復種其害尤甚故謹書之天變見於上地變見於下如此其亟而不知警無復警矣冬夫人姜氏會齊侯于穀襄公以衞寶餂公公深德之惟恐母黨之不密故文姜得以濟其一歲再會之志八年春王正月師次于郎以俟陳人蔡人甲午治兵夏師及齊師圍郕郕降于齊師秋師還郎為魯壯邑自城郎之後桓常狩于此公嘗次于此後又築臺于此其地必有遊觀之勝公自將大衆復次焉隕星謫見浲水挻災天戒烱然曾不知懼方擁兵翺翔以待陳蔡之集是以天變為不足畏也陳蔡雖有師期豈不曰伐國大事聨兵大役童昏何得坐而令我旣爽來期無以謝愧于是非時舉治兵之禮以自文已而獨與齊師圍郕郕至微之國兩大邦合師圍之宜其不能支而遂降不降魯而降齊惟强是從也師于是徒手而還矣夫行拂亂其所為所以動心忍性增益其所不能公踰時俟陳蔡而陳蔡不至三時圖郕而郕不我降頻年從仇讎之齊得寶則歸而得國不之歸静念前非退求今是此正増益不能之時于此而不知悔無復悔矣冬十有一月癸未齊無知弑其君諸兒天道福善禍淫如影之隨形響之應聲不可誣也襄公滅天理窮人欲宜其有無知之禍桓公弑隱代立魯不能討而以婦人起釁拉脅車中襄公殺桓濟淫魯不敢仇而以公子失寵喋血户下是天道也無知不書公孫與衞州吁不稱公子同
