body:
  text: 春秋説卷二十八宋洪咨夔撰定公下九年春王正月夏四月戊申鄭伯蠆卒得寶玉大弓大璜封父龜天子之器也越棘大弓天子之戎器也傳記寶玉大弓不同其為魯鎮器一耳有國者守是世傳之鎮器而為盜有将何以保社稷事宗廟況前日竊之不見其主名今日得之不知其自來是蕩無紀綱法制聽其自取信其自歸也陽虎初竊弓玉其志固将并三家以及魯蒲圃之殺不遂陽關之叛已迫知無益於用而歸之失者復得豈特喜鎮器之還危者復安蓋深幸國禍之定六月葬鄭獻公秋齊侯衛侯次于五氏齊僖公欲圖伯而與衛侯胥命于蒲景公欲圖嗣伯而與衛侯次于五氏行非其道果何以濟哉秦伯卒冬葬秦哀公魯會其葬也秦静觀諸夏之紛擾僅以卒葬見十年春王三月及齊平夏公會齊侯于夾谷公至自夾谷陽貨有從事失時之問而對以将仕前是夫子未嘗仕于季氏專魯虎專季氏之時也虎既敗奔三家方幸免于難定公得以用夫子夫子亦得以行乎季孫此如大病之餘凛凛然懼死之及飲食起居之節不得不惟醫之聽既愈則拒醫而死已矣魯自圍鄆以來齊再伐我我亦再侵齊忽内事外禍難隨作迨夫子為司寇始賛其上一意安静和平之是務而降心下氣以與齊平内難既靖外争又弭于是禮樂刑政凡所以經理其國者皆次第舉行國勢之立人心之定日異而月不同以此撻堅甲折遐衝有餘用矣夾谷之會夫子攝相事兵萊人刑優施而齊侯歸田以謝過豈非有文事有武備之功哉知以謀之仁以守之勇以行之天下之達徳備矣晉趙鞅帥師圍衛齊人來歸鄆讙龜隂田立之斯立道之斯行綏之斯來動之斯和天徳也人力一毫不與焉齊前以鄆歸我陽虎居之及虎既敗遂挈鄆讙龜隂之田以奔齊以景公千駟之驕晏子豚肩之吝田豈輕以歸我哉一敬足以勝百邪一誠足以制百偽觀感之下彼蓋不期其歸而自來歸也此與虞芮質厥成文王蹶厥生同意然歸田之義方行歸樂之謀己動忠信不足而變詐有餘春秋所以人齊叔孫州仇仲孫何忌帥師圍郈秋叔孫州仇仲孫何忌帥師圍郈善制變者静觀羣動而察其幾幾微杪忽之間吾能先見其所以然之故投袂而起發無不中矣公山弗擾以費叛墮費之幾也侯犯以郈叛墮郈之幾也是時夫子用於魯道化之行不疾而速齊人且章章歸疆而郈叛於國内何哉郈蓋叔孫氏之私邑也大夫専諸侯之國陪臣専大夫之家級夷廉圯相觀而惡理勢之所必至然使大夫不親受陪臣之禍私邑未易墮公室未易彊也二家合力圍郈師再舉不能克夫子蓋已黙得可墮之幾矣宋樂大心出奔曹宋公子地出奔陳冬齊侯衛侯鄭游速會于安甫景公得晏子為之輔其志未嘗不欲伯也晩節不會召陵氣出盟主之上已而鄭叛晉則與鄭盟于鹹衛叛晉則與衛盟于沙至此遂合鄭衛為安甫之會且以歸田致郈結我為黄之盟尋又會宋于洮乗晉之替而摟諸侯謀非不善也而齊竟不復伯所以圖伯者非其道也夫五伯假之亦必以義濟權然後可以長齊盟方昭公為季氏逐祈哀請命于齊者累嵗使能興師問逐君之罪則與國莫不響應伯何難哉失此可伯之機乃始掇拾諸侯于磔裂渙散之中晏子之智末矣叔孫州仇如齊宋公之弟辰暨仲佗石彄出奔陳十有一年春宋公之弟辰及仲佗石彄公子地自陳入于蕭以叛宋景公以樂溷之譛失樂大心以向魋之嬖失公子地而一弟二卿皆隨之而奔君不君也弟辰及仲佗石彄公子地叛于蕭樂大心自曹而至同其叛臣不臣也究觀本末公初無意于逐弟弟亦無意于去國特二卿强之而出故書暨其入蕭以叛則辰于怫鬱無聊之中倡為不軌二卿從之樂大心參焉故書及助寡而親戚叛窮乖而家人睽公之失道可知矣然兄弟䦧于墻外禦其侮天理未嘗冺也式相好矣毋相猶矣人欲不可肆也而世之失同氣之驩者皆始于小嫌終成大隙使辰于迋地之小嫌能忍則出奔入叛大隙何自而成亦何至冐天下之大戒為萬世之大僇哉前連書出奔罪在公後特書及叛罪在辰佗彄地大心則從叛者也陳曹則助叛者也故為君臣父子兄弟皆不可不知春秋夏四月秋宋樂大心自曹入于蕭冬及鄭平叔還如鄭涖盟忿起争桑輿尸血刃憾弭灌𤓰驩然猶舊人心惟危不能無血氣之争危者平之春秋之所甚貴也然鄭人來渝平平非所以為平也宋人及楚人平平非其所宜平也公及齊侯平莒及郯莒人不肯平非出于本心不可強之平也惟彼此有厭亂之志内外無宿怨之情春融氷泮萬險皆夷則民之幸國之福也魯與齊鄭邇年交侵非有大過特一念不自克耳夫子用于魯以一視同仁為心以皇建其極為政此疆彼界皆吾赤子何忍投之鋒鏑之下故所以謀吾國格吾君而行乎季孫者以平為先務雖降心下氣卑辭隆禮以及齊平又及鄭平叔還又如鄭涖前定之盟不敢憚也書及平不書公可見國人之心皆樂乎平矣易曰不克訟復即命渝安貞吉是平以之十有二年春薛伯定卒夏葬薛襄公叔孫州仇帥師墮郈衞公孟彄帥師伐曹季孫斯仲孫何忌帥師墮費秋大雩冬十月癸亥公會齊侯盟于黄十有一月丙寅朔日有食之公至自黄十有二月公圍成公至自圍成自昔聖賢之為天下必有經綸之學經之而後綸之非直致也明矣故處事有道立事有機成事有權機至權應與時偕行縱横萬變不出乎道功滿一世而人不知射隼髙墉君子得可為之時揚于王庭小人有難安之勢用此道也夫子為魯司宼仲由為季氏宰聖賢共治莫盛于此時其曰家不藏甲邑無百雉之城固禮之大經也而轉移有機括施行有端緒必非直致者蓋人之常情涉危然後思安履禍然後圖福三家但知專國而不悟絜矩之非其道陪臣已專其家使非身受陪臣之害安肯為國墮其彊盛之邑迨陽虎欲去三桓而公山弗擾以費叛圉人既殺郈宰公若而侯犯以郈叛季孫叔孫身受其害而邑有可墮之機矣然欲墮雖動於其心而墮不出其手猶恐中阻或為後悔故聽叔孫帥師自墮郈季孫自與仲孫帥師自墮費撼齒于既搖則不駭碎甑于手堕則無怨聲氣不揺形迹俱冺而彊公室弱私家之勢已立中庸所謂不見而章不動而變無為而成者此也所謂四時錯行日月代明小徳川流大徳敦化與天地同其大者此也若墮成則蓋有待焉非畏成之彊也公狃于兩邑之墮不思成未有變非可遽墮乃率然躬帥師圍之公斂處父遂得以保障為孟孫謀公之輕于舉動大抵如此故至以危之知至自圍成之危公則知墮成非夫子所急也昭昭矣明年攝相而魯大治制國不過千乘都城不過百雉家富不過百乘凡所以為世道之坊必将次第舉行天下不難治也成何足慮哉惜乎女樂至而膰肉輟一息有不可留者此道之将行将廢所以歸之命十有三年春齊侯衞侯次于垂葭夏築蛇淵囿大蒐于比蒲築囿大蒐皆在夫子去魯之後中軍既舎季孫意如嘗大講比蒲昌間之蒐使斯民習知有私室而不知有國故昭公之逐執氷以踞恬不為怪至此兩都既墮公親帥師圍成成雖弗克民知有君矣故斯與叔孟一再合兵簡習以收前日之柄而民非公有公不復自将矣然則夫子用舎進退之異實繫公私強弱之分衞公孟彄帥師伐曹秋晉趙鞅入于晉陽以叛冬晉荀寅士吉射入于朝歌以叛自昔國家禍亂莫非養而成激而動晉政下移六卿以賄為政始相忌繼相惡定公拱黙于上聽其自為勝負是養亂也養亂如養癰需時而潰一旦趙鞅以私憾圍邯鄲殺午午黨荀寅士吉射伐趙氏鞅奔晉陽知文子韓簡子魏襄子奉公以伐旬范寅吉射奔朝歌相繼據其邑以叛勢有所激也天下有道征伐自天子出天下無道征伐自諸侯出降而從大夫出則無道甚矣況家自有兵人自為政動干戈于邦内而君不與聞叛狀已著其入晉陽朝歌以叛特平日無君之心所呈露爾春秋略曲直之辨而探其心皆不知有君于是槩蔽之以叛三卿叛上于數月之頃養成禍亂其責抑有歸矣晉趙鞅歸于晉皇極之世人無有淫朋無有比徳朋比之俗成則天下無公是非惟視所與多寡强弱以為勝負内植黨以助邪謀外結援以張逆勢而國非其國矣晉三卿相先後而叛以王法繩之皆不能逭于誅韓簡子魏襄子與荀范惡而黨于趙乃為趙鞅請而歸之討荀范則不遺餘力是同罪異罰也荀范挾齊魯衞鄭之助以抗其上終不能勝韓魏趙之彊晉于是為三家分矣信乎人臣有黨非國家之福薛弑其君比舉國以弑非謂國人皆當誅也其君盡失國人之心而國人皆不知有君也有一仗大義以討賊則主名見矣十有四年春衞公叔戍來奔衞趙陽出奔宋人心皆有所明有所蔽則明者蝕而色之蔽為多閨門之情親衽席之愛密不自覺也仲叔圉治賔客祝鮀治宗廟王孫賈治軍旅衞靈公雖無道而能保其國疑有知人之明者一為南子所蔽公叔戍欲去夫人之黨反以愬而逐未幾其子蒯瞶亦以南子逐一嵗之間奔者四五雖不能無取逐之端大略皆此故也豔妻煽方處可不戒哉二月辛巳楚公子結陳公孫佗人帥師滅頓以頓子牂歸夏衛北宫結來奔五月於越敗吳于檇李吳子光卒以詐遇詐詐有時而窮以力遇力力有時而窮窮則我之施于人者人得以反諸我矣楚之詐力中國莫能制也而窮于吳吳之詐力楚人莫能當也而窮于越越之敗吳即吳所以敗頓胡沈蔡陳許之術吳輕剽而越深阻故越得以制其窮也況闔閭畜專諸以屠僚用子胥以鞭郢處心忍矣而身死于兵亦天理之窮必復歟公會齊侯衞侯于牽公至自會秋齊侯宋公會于洮天下之惡一也惡可容于魯則亦可容于晉惡可容于晉則亦可容于列國有國者不可不思其反也昭公見逐于彊臣晉實主之竟以客死及晉有叛臣牽之會謀救范中行氏洮之會亦范氏故范獻子外交列國而齊魯宋衛方仇晉故相率為其子謀猶晉主逐君之季氏也然是時公制于三桓齊制于陳氏宋之叛臣猶巢窟于蕭衛父子争國禍亂将起乃助朝歌之叛以不忠不義勸其臣獨不自為地乎天王使石尚來歸脤大宗伯脤膰以親兄弟之國諸侯助祭于天子天子均福于諸侯交相為親也入春秋以來魯未嘗助周祭周亦未嘗賜魯胙一旦天子有事于文武使命士歸俎實而恵術行焉公何修而得此吁蓋有由矣齊伯而賜胙秦彊而致胙希濶之禮初不徒施魯自用夫子為大司宼相禮夾谷齊人歸疆再明年而墮兩都又明年誅少正卯與聞國政三月而商賈信於市男女别於塗綏來動和之效日異而月不同雖以女樂之歸而行餘風未冺夫子猶謂魯為可變故施異禮以親之使夫子得卒攝相之業必将率諸侯駿奔于清廟而天子所以錫魯者亦将復周公魯公之盛矣惜乎色斯舉之速也衛世子蒯聵出奔宋衛公孟彄出奔鄭家道窮必乖故受之以睽君心惑于所嬖而父子天性之愛不能以相保豈特一衛靈為然南子通于宋朝蒯聵不堪婁豬艾豭之辱必有形于辭色者南子于是譛而逐之公孟彄蒯瞶黨亦相繼出奔靈公惑于所蔽而骨肉離此所以胎禍亂也子雖無去父之道而行猶可免以待天性之復故蒯瞶不失其為世子宋公之弟辰自蕭來奔大蒐于比蒲邾子來會公三家蒐而公臨之邾隠公就會公于比蒲以魯連講大蒐之禮果為何事殆有意乎吞邾是以來而覘之且示尊魯欲彌縫其闕也明年來朝又來奔䘮再明年而仲孫伐邾未幾季孫叔孫仲孫帥師同伐邾取漷東沂西田邾事魯益勤魯圖邾益急書來㑹見邾有疑懼之心城莒父及霄哲夫成城哲婦傾城聖人以女樂去是自撤其金湯也亟城何益哉是嵗無冬非闕文也昭公見逐于彊臣公立不以正無其始也夫子攝相國内大治而君臣荒淫眡朝廢禮無其終也無始故不書正無終故不書冬按洪氏以無冬為貶説本何休家鉉翁云聖人豈以去位之故而削冬不紀耶辨最明晰原文非是十有五年春王正月邾子來朝鼷鼠食郊牛牛死改卜牛晉其角進之窮也姤其角遇之窮也角為一體之尊而窮於上易猶危之況隂類戕之乎魯郊牛先卜而後在滌故所卜皆在郊禮五月之前季孫行父用事鼷鼠食郊牛角牛死夫角之見食居上者已失其為尊況舉體皆食非一處且至于死是大為小所吞也國命其能永乎成免牛不郊公君臣不悟改卜牛而夏郊可見不畏于天甚于成二月辛丑楚子滅胡以胡子豹歸春秋書滅國始于齊人滅譚終于楚子滅胡大抵皆不仁之為也而楚以封豕長蛇貪惏無厭之慾行之故所滅為尤多胡頓本楚之𨽻召陵之會始從晉胡又乘吳之入楚盡俘楚邑之近胡者固有取滅之道而楚以期嵗之間連滅兩國其不仁為何如春秋舉楚以爵豈許其滅哉前滅頓者二大夫今滅胡楚子自行甚之也豹勇于俘大國怯于死社稷何哉夏五月辛亥郊壬申公薨于髙寢莊宣成三公薨于路寢僖公薨于小寢文公薨于臺下襄公薨于楚宫公薨于髙寢路寢正也餘非正而宫寢之制可推見于此鄭罕達帥師伐宋齊侯衞侯次于渠蒢邾子來奔䘮秋七月壬申姒氏卒八月庚辰朔日有食之九月滕子來會葬前乎昭公後乎哀公皆不堪彊臣之辱死于外公寄命季氏之手十有五年垂首帖耳不敢一語異遂獲薨于髙寢而以禮葬此邾滕所以為公幸接武而來也夫奔喪會葬諸侯事天子之禮兩國以非禮施而魯安受之世衰道微陵僣非一春秋必謹書不敢畧者所以示萬世之防丁巳葬我君定公雨不克葬戊午日下昃乃克葬慎終之禮臣子所當盡心有一不敬則死其君親矣宣公葬小君敬嬴雨不克葬庚寅日中而克葬穀梁氏謂䘮不以制今葬千乘之君而無禦雨之備卜有定日而至易辰日昃方窆匆匆竣事季氏于慎終之禮不敬甚矣始不克葬末乃克葬幸其得葬也辛巳葬定姒姒氏定公妾哀公母嗣位未逾年未正夫人之位卒葬之禮皆略之故不書夫人小君公諡定姒氏亦諡定從夫也襄公妾母曰定姒今亦曰定姒蓋不嫌與祖姑同諡矣冬城漆邾庶其以漆來奔有年矣今而城之将有事乎邾也邾奔喪屬邇已動陵偪之謀季氏用心之險如此
