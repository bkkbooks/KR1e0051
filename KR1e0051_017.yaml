body:
  text: 春秋説卷十七宋洪咨夔撰宣公三十有三年春齊師伐莒夏楚子伐宋秋螽冬晉殺其大夫先縠僨軍之將誅則士氣奮邲之戰知莊子謂果遇必敗彘子尸之是討蓋未為過而舉國以殺大夫何哉當國者私意也街亭之敗雖歸罪馬謖之違節制孔明亦自降三等三軍之命懸於主將不當盡諉諸佐也晉既敗歸桓子請死以士貞子重楚勝之語既復其位乃獨討不用命之縠假設縠有他罪當并討亦何至盡滅其族哉罪同伐異而刑復濫視秦穆不殺三帥為有愧矣十有四年春衛殺其大夫孔達誤國之誅與延世之賞不容以並行衛叛清丘之盟救陳晉欲加討遂殺孔達以説於晉而免衛無政矣夫以救陳為不失先世之好則達不當殺以背晉為不賴同盟之信則達既殺不當復室其子而襲祿位既殺其人又録其後刑惡賞善果安主乎夏五月壬申曹伯夀卒晉侯伐鄭秋九月楚子圍宋晉為邲而伐鄭楚為陳而圍宋已而宋及楚平鄭則去晉而不返強弱判矣中行桓子於伐鄭之役搜焉而還欲示以整俾謀而來夫整不在國而在野無實政而為夸辭安能回鄭之南乎自是不惟鄭宋從楚而魯亦從楚矣葬曹文公冬公孫歸父會齊侯于穀魯以楚強欲與會而歸父先會齊侯謀之示事齊不敢有二心也歸父襄仲之子有寵於公且挾齊以制魯而軍國之權皆歸之伐邾伐莒兵在其手如齊會楚政出其門雖季孫行父亦拱立下風而不敢議觀其出會爼豆大國之君如敵體則視其家所立之君何如哉慢上忽下不亡何待十有五年春公孫歸父會楚子于宋公即位以來一於事齊晉楚之會盟征伐漠乎不以關念鳯翔千仞覽德而下意必有恃而後從也楚方圍宋孟獻子言於公朝聘以謀其不免誅而薦賄則無及於是歸父為是會比年龍斷晉楚之間遷延猶豫而不決者今其決矣此非有所慕而決也有所畏而決也公以篡得國始豈不懼盟主之討晉之禍亂適相後先遂玩晉於股掌之上楚魯遼絶固非所憂而莊王討徴舒之罪陳幾亡國茲復圍篡立之宋元惡大憝以氣類相為戚休魯於是深念久逋天下之討凛然若白刃之臨其前不俟楚誅而薦賄以免矣厯觀一時中外之盛衰人情之去就未嘗不惜晉有復伯之機而為楚得也夏五月宋人及楚人平楚圍宋三時矣晉不能救託天方授楚以自解而告宋使無降易子析骸之餘其能忍鮒轍之涸以待西江之汲乎恤病討二清丘猶在宋及楚平晉之罪也而人宋楚者使若微者自相與平以殺中國之恥也楚一討陳而降鄭敗晉服魯平宋雷動風行所過輒靡蕃服未有若此之盛雖人宋楚以殺中國之恥中國之恥微而章矣彼宋鮑篡立久逋大誅顧於楚討陳弒之後怒螳臂而捋虎鬚幾致亡國平而書及情見勢屈也負且乘致寇至其解之六三乎六月癸卯晉師滅赤狄潞氏以潞子嬰兒歸赤狄嘗再侵齊又伐晉及清小醜烏得無罪人而不仁疾之已甚亂也何至盡滅潞氏而後快於心乎况潞子夫人景公之姊鄷舒為政而殺之舒固當誅潞子之弱扶持安全之可也而滅其族以嬰兒歸蓋與操枓摩笄之貪同志安在其為討殺姊之惡乎晉以師著潞以爵見甚晉而哀潞也是時晉略狄土立黎侯而還宜與城邢封衛見録顧沒而不書假存國之義蓋滅國之惡春秋其可以名欺哉秦人伐晉王札子殺召伯毛伯専殺與矯殺不同矯猶假君命以為辭専則擅行無所假矣王子生長富貴易納於邪居寵而不思危恃愛而不知畏越禮踰法何所不至此札所以専殺不知有王也管蔡得罪於社稷猶曰周公之過鄭伯克段于鄢必深誅其設心王兄弟有専殺之罪施之於朝則傷恩置而不問則廢法亦難乎其處矣夔之教胄子曰剛而無虐簡而無傲薰陶濡染之久習與性成何至心放氣盈橫不可制哉書王札子殺二伯則師氏國子之教不素可見矣秋螽仲孫蔑會齊高固于無婁公子遂會趙盾盟于衡雍大夫始會大夫也此援其比為無婁之會三傳皆不言其為何事大抵魯彌縫于齊也公自惠公卒不復如齊間使大夫與其君臣會以示相親睦而高固實壻叔姬介之以為密也吁妾婦之道哉初稅畝魯為近道之國國勢雖弱而不黷兵以為強國用雖貧而不加賦以為富為民一念不能無間斷而脈猶未盡絶也公以篡立無所逃罪惟恃媚大奉強以為安既賂齊又賂晉又薦賄于楚行李往來大國者凡幾而獻功獻物隨之此國計所以無大兵大役而自匱也自昔貢助徹之法皆什取一蓋八家同養公田公田之中民廬井竈蔥韭盡在其中官收公田之入不及其私肥私而瘠公也今宣通公私為一隨畝而稅不専公田之入私縮而公贏矣稅畝以初書周公伯禽以來所未有變法以厲民拔本以朘國可勝貶乎三代軍賦一出於井田軍賦之制不壞則井田之制不壞齊雖作內政以寓軍令斡魚鹽以濟國用而田之井猶自若也魯初稅畝遂變三代之賦未幾作丘甲遂變三代之兵而井田之壞不待秦矣信乎暴君汚吏必慢其經界按洪咨夔平齋集載初稅畝講義一條云臣謂立法以取民莫患乎其作俑也夫君與民本一家國用之而取諸民民出其所有以供乎上猶子奉父孰不敬應然自昔什一之法公田藉民力而耕收其嵗入民田之私則未嘗有稅魯創法履畝以稅之國用不足蓋有甚不獲已者乃聖人于此書初以示譏蓋以初之所創疑若特一時之暫而後之沿襲必假是以行其無藝之斂如螽之生蝝其害未有底止二吾不足而用田賦此其俑也武帝紀書初算商車初算緡錢初榷酒酟頗識此意此條與春秋説義足相發附録于此冬蝝生飢秋方螽冬又蝝浮陽不斂而雪不時祁寒不凝而土不縮故螽之遺種復生今年之飢若此明年更何堪乎公逆節乖政干隂陽之和非一端而稅畝變古流毒百世二吾之取大半之斂什五之征兩稅之定皆此作俑猶螽遺蝝一産百孽戢戢無藝其為方來害不可以算數計也吁民瘼何時而瘳乎十有六年春王正月晉人滅赤狄甲氏及留吁赤狄三族盡滅之不仁甚矣而晉亦可悲焉晉楚之爭諸侯幾年于此一旦師敗于邲而陳鄭魯宋皆為楚有豈惟城濮之羞抑左衽之憂晉將何以為謀哉於是屢逞不仁于狄以示桑榆之得前既使趙同獻俘于周今又以俘獻前既賞桓子狄臣千室今又請于王以黻冕賜士會為太傅張大其功夸示得意而狄之别種幾何縱能盡之果足蓋掬指之舟乎是猶獵南山田青丘人方屠虎殪兕轔麕割熊而已亦收拾雉兔矜雋賈勇於朋儔豈不可悲也哉荀林父士會迭將皆不書見春秋所深貶夏成周宣榭火王城有宣王東會諸侯時所築之榭不戒于火而燼焉中興之迹掃矣商六百年大戊祖乙盤庚諸君皆由衰復興周八百年中興惟一宣王東遷以後遂儕列國蓋商質而周文質之敝猶可起文之敝為難振委靡蓄縮不絶如縷齊晉更伯猶有望於扶掖而興起之至此楚以強暴狎主夏盟而後會東都之風於是絶望矣子曰如有用我者吾其為東周乎東周果何道哉行夏之時乘殷之輅服周之冕樂則韶舞此聖人興周之規模而綏來動和特其末效餘功也秋郯伯姬來歸伋妻白母出蓋有之而伯姬出於郯必謹書之者重夫婦之道喪傷父母之訓微也女子養德於父母家十年不出姆教婉娩聽從執麻枲治絲繭織紝組紃學女事以共衣服觀於祭祀納酒漿籩豆葅醢禮相助奠則勤儉孝敬之事皆少而慣見熟講至先嫁三月必教以婦德婦言婦容婦功往送之門又教以必敬必戒毋違夫子故采蘩之不失節雞鳴之相警戒螽斯之不妬忌葛覃之躬儉節用承上接下撫內應外無不曲中於禮安有見出而不終者哉伯姬生長富貴敬嬴之事皆所親見濡染既深刮濯難盡閨門之行可想矣來歸實魯之辱冬大有年聖人之心天地之心也天地之心主於生聖人之心亦主於生詎忍斯民捐為溝中瘠哉自古有年自今其有時和嵗豐之相仍家給人足之無間聖人與天地之所同欲也而公在位之久逆政舛令所以干二氣之和斁五行之敘者非一方螽之後繼以大旱大水之餘復繼以飢以至再螽且蝝而飢因之民生不辰逢此艱厄塗有餓莩野無青草阽危孰甚焉而忽得五穀大熟之嵗枵者飫之羸者起之惙者蘇之上天所以續民命於既絶延國脈於寖微者其心蓋惓惓也自非周公魯公禮樂仁義之澤未斬其何以回上天震怒之威紓民不聊生之戚一至於此哉聖人於視民由已之時睹粒米狼戾之盛為民喜為國幸踴躍慶快不自已而侈之曰大有年此天地至仁之心所由見不特記異而已也十有七年春王正月庚子許男錫我卒丁未蔡侯申卒夏葬許昭公葬蔡文公六月癸卯日有食之己未公會晉侯衛侯曹伯邾子同盟于斷道有道之世天下大同人心一而風俗純也後世往往強異以為同同不出於親睦之真情而出於勢合乍合乍離無足怪者晉失復伯之機不競於楚陳鄭宋去不復返齊侯召會亦不至人心畔散而強糾之是盟雖同於外楚而連雞之勢其何關於輕重易曰同人于門無咎又曰同人于宗吝清丘斷道之同其吝道乎公事齊之志分前年歸父會楚子今年身會晉侯彼此兩屬係應皆私負大不義終以狐媚鼠畏保其身尤吝之大者秋公至自會冬十有一月壬午公弟叔肸卒母弟有矣未有以公弟書者賢之也公篡立而叔肸非之以明君臣之義雖非之而不忍去以全兄弟之情不仕於朝不食其祿終身於貧賤其聞伯夷叔齊之風而起者歟魯攝鄭克以來鬩墻爭國推刃同氣不知凡幾其能盡兄弟之義卓然有立者得三人焉宋公疾以太子茲父固請而命子魚子魚曰臣不及也且又不順遂走而退鄭人欲立子良子良辭曰以賢則去疾不足以順則公子堅長乃立襄公而叔肸參焉當人紀紛糾天倫晦斁之中而安於義命若此可不謂賢乎十有八年春晉侯衛世子臧伐齊戲笑召辱狠怒起戎忿與欲之為損大矣故君子以懲窒為難齊於郤克之來帷婦人于房觀之以博一笑迷於欲也克以齊不會斷道為辭執其大夫而伐之激於忿也頃公以戲笑敗國固失君道矣景公興師以濟其臣之狠怒亦豈君道哉况德不足以懷二禮不足以勸來而責人之必我從是驅之趨楚也是役同盟諸侯無一從者惟衛以世子從蓋齊晉未嘗兵交一旦創見孰不動危疑之心哉公伐杞夏四月秋七月邾人戕鄫子于鄫邾人嘗用鄫子于次雎之社大讐未報今又戕其君習為無道隂遣刺客殘之也周廬之不密梐枑之不嚴譏衛之不肅故變生意外而莫之禦荆軻之匕首見夏無且以藥囊提之莽何羅觸寶瑟僵金日磾能捽胡投殿下胡為鄫乃無一人在君之側乎小過九三曰弗過防之從或戕之凶鄫子之謂矣甲戌楚子旅卒赴告通於魯也卒以爵正其僭也莊王即位日夜淫樂逮伍舉進隱幡然改聽所誅者數百人所進者數百人任賢共政國人大説彼其曠嵗不蜚不鳴之中國家之利病人材之臧否民情物理之休戚是非皆隂窺密察瞭然洞燭藏權術於不露待機會而後發初非沈迷酣放以為樂而自塗其耳目也機括一移精采立變追躡伯迹狎主夏盟討陳而復封敗晉而不伐克鄭入宋皆退三十里與之平規模位置與桓文相頡頏寧得以蠻荆之俗而少之公孫歸父如晉冬十月壬戌公薨于路寢非所據而據焉身必危公以非所據鰓鰓然惟恐人之乘其後折節降志下色卑辭媚齊以為容至以子女事其大夫不敢愛它可知己齊甘其餌既不足虞則移之以媚晉又移之以媚楚左折右旋意逃大討夫以桓公之篡身死拉脅天之報施不爽若此而公薨于路寢天亦有時而不定乎抑公之巧於偷生逃死過於桓乎不然人之生也直罔之生也幸而免乎歸父還自晉至笙遂奔齊善善及子孫惡惡止其身誅天下之大惡則不當以是論邾定公學弒君之獄殺其人壞其室而汙其宫可使梟獍遺種于吾國乎公子慶父弒兩君季子雖緩之使逸卒不貸於奚斯之聲公子遂弒君赤及其母弟視罪猶慶父也乃能脫身大僇執國重柄歸父世之復怙寵而無忌憚會齊楚兩大國之君如敵已是旌逆標惡以示國人而使天下亂臣賊子指為口實者也狐鼠之憑城社固熏灼所不及水涸林枯魚鳥獨無失依之時乎公之末年歸父與公謀而聘晉欲借晉以去三桓其意蓋將兼三家而擅一國非真為公室計也行人之駕未稅路寢之訃已聞季文子以殺適立庶告于朝平日鬱拂之抱至此而泄舉東門氏盡逐之得其機矣鄭子家卒鄭人討幽公之亂斫子家之棺而逐其族君子不以為過而謂魯不當逐襄仲之族可乎歸父袒括髮即位哭三踊而出遂奔齊雖復命去國為有禮難乎蓋前人之愆然於抑揚闔闢之間季氏之權益重矣經書歸父如晉還自晉遂奔齊不憚辭費欲天下後世知東門襄仲能逃於其身不能逃於其子也故曰春秋成而亂臣賊子懼春秋説卷十七考證第二頁後八行魯以楚強欲與會云云于三傳無所見原文蓋推當日事勢而得之謹識于此第六頁後八行今宣通公私為一云云按此條經文何休謂時民不肯盡力于公田故宣公履踐案行擇其善畝榖最好者稅取之徐邈則謂除去公田之外又稅田十之一與何説異原本蓋本徐説謹識于此第八頁前五行赤狄三族盡滅之句按經文甲氏留吁止二族考左傳晉所滅者又有鐸辰杜預注云鐸辰不書留吁之屬原文所稱三族蓋本此謹識第八頁後八行王城有宣王東會諸侯時所築之榭句按公榖以榭為樂器所藏杜預以榭為講武屋原文未能折衷故苐云宣王所築之榭謹附識于此十一頁後六行是盟雖同于外楚句按是盟榖梁以為同外楚程傳以為同謀伐齊原文從榖梁謹識于此
