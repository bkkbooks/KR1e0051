body:
  text: 春秋說卷二十四宋洪咨夔撰昭公二八年春陳侯之弟招殺陳世子偃師夏四月辛丑陳侯溺卒凡以弟書皆兄有愛弟之心也招前㑹後放皆稱公子其殺世子乃稱弟何哉兄有愛弟之心而弟不弟也怙兄之寵殺兄之嫡而迫兄於死社稷為墟招之罪不勝誅矣夫愛弟者天倫之至情豈料其忮毒至此極然亦知愛而不知教之過也叔弓如晉楚人執陳行人干徴師殺之陳公子留出奔鄭陳之罪在招而干徴師無罪見殺故不失其為行人招殺世子而立留留為賊所立聞楚殺行人而出奔故以公子書不以君書秋搜于紅春搜夏苗秋獮冬狩禮也魯嘗大閲嘗狩未嘗苗秋舉搜禮固非其時簡習車徒亦有國者不容廢然中軍既舍四分公室季氏擇二二子各一皆盡征之而貢於公公無民矣民各有屬兵各有主人私其私權不相統雖事晉平齊昏吳好楚可以苟目前之安不容不聨合卒乘參㑹御右而同簡之為有事之備自根牟至于商衛革車千乘皆三家之兵也閟宫之詩曰公車千乘朱英緑縢二矛重弓公徒三萬貝胄朱綅蒸徒增增是搜也車徒尚安有公哉故不書公陳人殺其大夫公子過大雩冬十月壬午楚師滅陳執陳公子招放之于越殺陳孔奐葬陳哀公公子過孔奐招之黨也陳人殺過過固有罪哀公既卒嗣子又奔無君命而擅殺所以不失其爵也楚殺行人又殺孔奐而賊殺世子之招則執而放之于越鯨鯢脫網蛙黽是録其失刑可知况又乘人之危滅其國以為己利楚圍實穿窬之雄也陳滅而哀公葬于以見人心未去國脉猶存滅而不滅聖人蓋幸之九年春叔弓㑹楚子于陳許遷于夷夏四月陳災許以大嶽之後屢垂亡而不亡陳以顓帝之族再就滅而不滅所馮者厚也楚子乘公子招之亂滅陳使穿封戌為公則陳已不復存而㑹繫之陳災繫之陳何耶齊人既滅遂又殱于遂蓋滅非其罪國人猶有自相保聚不願為齊之從而存遂者故復以國見陳之復見亦此類也天未厭陳民未去陳雖以力滅之安得終滅之禆竈謂五年陳將復封蓋知天而不知人者秋仲孫貜如齊冬築郎囿齊王之囿民以為大魯誠何時而用民力於築囿季平子欲速成叔孫昭子欲勿亟昭子蓋未測平子之心也中軍未舍之前公猶有餘民自四分公室而民盡去公雖童昏安能無幾微見於辭色季孫欲鼓舞其欲而消磨其不平於是治園囿以奉遊觀使之玩耳目之細娛不知贅旒辨髦之為辱而國移矣賦芧以博狙喜哺果以遏兒啼此其術也否則彼何愛於君俾有臺池魚鳥之樂哉十年春王正月夏齊欒施來奔齊景公流連多欲淫於刑而吝於施是為陳氏驅民也惠欒髙誠知惡陳冝兢厲戒懼圖所以陰制潜禦之術而怙其富彊昏於酒內不知怨之積禍之發欒施奔而陳始大矣晏平仲切切乎齊將為陳之憂苟乘兩家兵爭之釁聲其亂國之罪倡國人併逐之豈非興起公室之機㑹聽欒之奔助陳之大君子是以知其無勇也秋七月季孫意如叔弓仲孫貜帥師伐莒作丘甲之後四卿並將以伐齊大國三軍陰益而四矣中軍既舍三卿並將以伐莒名為二軍而實三也季氏將所有四分其國之二叔仲氏各將四分其國之一三家鼎峙不相統屬人帥所私共為是役合而搜分而將勢利密而情義踈同室參商矣此三桓子孫之所以微戊子晉侯彪卒九月叔孫婼如晉葬晉平公十有二月甲子宋公成卒十有一年春王二月叔弓如宋葬宋平公夏四月丁巳楚子䖍誘蔡侯般殺之于申楚公子棄疾帥師圍蔡陳夏徴舒弒其君中國不能討而楚討之齊慶封黨崔杼弒其君中國不能討而楚討之蔡世子般弒其君中國不能討而楚討之天下大惡無終逭之理天故假手於楚也楚子殺般般罪當討而生名䖍者何故以利心討之也義利之相去不能一髮而舜跖分焉䖍奉孫吳以討陳曰將定而國陳人聽命而遂縣之今又以甘言厚幣誘蔡侯醉而執殺之命棄疾圍蔡事雖義而心則利以巧用詐以詐濟貪東紿西罔謂莫已智而不能掩天下之耳目誘之一辭春秋所以原心而定罪五月甲申夫人歸氏薨大搜于比蒲公室無一民間嵗再搜皆三家之衆也前止以搜書今乃以大搜書蓋搜特大夫用諸侯之禮搜至於大則大夫用天子之禮矣八佾雍徹無非僣天子之禮然不過誇耀其家人大搜則表表然與國人公之無忌憚一至此尚望其忌君母之喪乎桓公大閲以諸侯僣天子三家大搜以大夫僣天子春秋為扶植綱常而作蓋深痛之也仲孫貜㑹邾子盟于祲祥德不孤必有鄰修諸己者無闕人將觀而化慕而來不期親而自親矣否則寡助之至親戚亦叛安能强人附我乎公立以來君臣如晉如楚如齊如宋如滕無虛嵗與國無一介之跡涉魯庭者且十年邾自昔屢朝于魯今亦見侮不復至孟僖子至往㑹于祲祥以修好禮我無以來之冝輕於鴻毛矣秋季孫意如㑹晉韓起齊國弱宋華亥衛北宫他鄭罕虎曹人把人于厥憗晉自重丘之後諸侯不㑹者十八年虢之後諸大夫不㑹者十年而諸夏皆奔走于楚晉君慆淫而臣苟偷不復念伯業之紹矣陳滅不能救蔡圍又不能救昭公初立韓宣子勉强為厥憗之㑹以謀救蔡而終不能以此見政柄倒執未有能彊其國者是㑹序大夫無譏辭不足譏也不屑之教誨也九月己亥葬我小君齊歸易言十年乃字十年勿用天有十日周則必變也公在襄公之喪冝戚而有嘉容今母夫人之葬仍不知戚童心雖越十餘年猶在此而不變終不變矣故曰下愚不移冬十有一月丁酉楚師滅蔡執蔡世子有以歸用之弒君之賊在官在宫者殺無赦蔡般遺孽楚執以歸猶以世子繫之國者諸侯無伯强暴恣行久圍堅守力窮勢屈見滅於以亂治亂之䖍而莫之救為可哀也宋襄圖伯用鄫子于雎社而不得其死楚靈滅國用隱太子于岡山而不得其死魯伐莒獻俘始用人于亳社春秋雖諱不書而公亦不得其死淫鬼不靈何福可邀山與社皆聰明正直而一者牲人以要福神其福之乎十有二年春齊髙偃帥師納北燕伯于陽入者歸之易納者歸之難北燕伯奔齊以避諸大夫之逼出名而納不名其納之正邪非也齊為義不終行大事不以信使燕伯失所歸也先是景公親伐燕以納簡公取賂而還今命將以納非復親伐之勤雖可以返諸國都牽於賂己之私僅納之陽以塞其請而已信義安在哉異時取鄆居公即此意三月壬申鄭伯嘉卒夏宋公使華定來聘公如晉至河乃復善鄭以勸來者猶懼不蔇况不禮焉鄭不來矣周桓公為鄭言也敬以逆之猶懼其二又卑一睦焉逆羣好也魯穆叔為小邾言也周之於鄭魯之於小邾小不加敬己有不來之懼魯豈卑於邾鄭而晉卻之又卻之耶魯為諸夏之望盟主經營糾合之功常以得魯為重今至河輒卻是公之昏弱不足為江湖鳬鴈之多寡晉無志於伯亦不以機心一生海鷗不下為憂也五月葬鄭簡公楚殺其大夫成熊秋七月冬十月公子憖出奔齊權彊之難去甚於負嵎之虎非赤手所能搏也齊欒施高彊惡陳氏不能克而奔魯魯南蒯公子憖謀季氏不能克而蒯以費叛憖奔齊智小而謀大故施與憖之曠宗失位略同而陳氏季氏之禍其國亦略同然憖愛公室之心則可亮也楚子伐徐晉伐鮮虞君子以信義為主小人以機詐為功晉荀吳舍車崇卒出竒用詐敗狄于太原今復用滅虢之故智僞㑹齊師假道于白狄别種之鮮虞遂入昔陽滅肥信義一隳機詐百出而文襄之霸業衰矣况桓文之伯以攘楚為大務狄雖小出跳踉悉置不治服其大則小當自讋也晉伯業日衰楚求諸侯而麇至求昏而薦女滅陳滅蔡拱睨不之救而又伐徐其橫極矣晉方且汲汲惟狄之是治尚為知務乎伐徐楚以爵舉伐鮮虞晉以國舉致楚之橫皆晉之為故深致其貶十有三年春叔弓帥師圍費季友賢行父材宿狡意如愚四世相承根據蟠結非有剛明之君忠智之臣協力共濟盛陰非衰陽所能決也南蒯與叔仲小公子憖謀去季氏而歸其室于公憖告公遂從公如晉公蓋聞其謀矣使天祐魯因其族黨內離家臣外叛一舉而拔盤錯以張公室豈非至幸而君德不强臣謀匪正蒯懼不克遂以費叛徒能亂其國而已費不以叛書者公與聞其謀是叛季氏非叛公也叔弓圍費為季氏討耳其後公山弗擾又以費叛季氏不能自遏其無君之心安能遏陪臣無季氏之心哉夏四月楚公子比自晉歸于楚弒其君䖍于乾溪按左氏楚䖍篡立比奔晉者十三年以召而歸初無心於歸也脅盟于鄧而入楚蔡公殺䖍二子推比為王亦無心於王也棄疾先除王宫使觀從告乾溪之師先歸者復所師潰而王縊又無心於弒也無心於歸無心於王又無心於弒而以弒書春秋豈輕加人以大惡之名哉觀自晉一辭則為有心矣衛侯鄭自楚復歸于衛楚有奉焉爾衛元咺自晉復歸于衛晉有力焉爾凡書自皆挾有力之奉而入非有挾則不能入也比挾晉返楚因與羣失職之族仇憾之黨相表裏而自立據䖍巢穴翦䖍羽翼使進無所容退無所歸而死夫殺人以刃與挺其為殺同迫而置之死地不可謂不弒也或疑比未嘗臣䖍不當言弒䖍非同氣之兄乎聖人耳目所接其記比之有挾而歸篡謀已定委折情節本末具備惟經質而傳文故學者舍經任傳遷就其說以求合於經而辭多費能略傳而折諸經則知簡嚴易直之㫖矣楚公子棄疾弒公子比聚衆蠱于一器其獨存于搏裂噬囓之餘者必毒之巨者也䖍久次乾溪棄疾使以先歸復所告而師潰王縊比立未定又以王至周呼恐之使自殺深險變詐一舉而吞兩兄遂應當璧之兆巧于紾臂矣䖍篡立而比弒之比弒立而棄疾又弒之乖沴所鍾自相屠剝固積惡之殃所必至觀棄疾嗾比于弒然後攘國于亂賊之手其設心措慮之慘毒蠱之尤巨者也兩傳曰殺公羊曰弒從公羊秋公㑹劉子晉侯齊侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯把伯小邾子于平丘八月甲戌同盟于平丘晉悼公興伯之初同盟雞澤而單子㑹以諸侯有異志姑假王室卿士以為重也諸侯既盟之後即芻狗視之自是㑹盟無王人者四十年是㑹劉子忽序之諸侯之上必有大不得已者蓋自晉芘一孫林父而諸侯二聽一向戌而諸侯散楚雄視漢上氣勢翕赫滅陳滅蔡圜視莫救中國氣自厭厭矣故又屈劉子為是㑹以繫諸侯之心時楚兄弟相屠荐犯大惡聲罪致討正晉伯復興之機治兵邾南甲車四千乘王人在前諸侯在後以此衆進師出有名楚雖彊可以氣厭而義傾也顧徒能服齊以為威而不能致楚之討冝中國終于厭厭也再書平丘春秋不惟有憾于晉且有憾于劉子公不與盟晉人執季孫意如以歸公至自㑹晉伯方興則厚魯以繫列國之心晉伯既衰則薄魯以折諸侯之氣前以僑如譛故不見成公執行父今以邾莒訴故公不與盟執意如以歸君臣同辱而季氏之罪狀不白豈伯討乎公以㑹致晉以人舉直書其事而不諱者甚盟主之虐用其威也蔡侯廬歸于蔡陳侯吳歸于陳國之存亡視人心之去留一旅可以祀夏三户可以亡秦國雖滅而有不滅者存也陳蔡嘗為楚滅矣今以自歸為文前不與䖍之滅後不與棄疾之専封固也然滅陳滅蔡之日悼太子之子吳與隱太子之子廬未知其誰立而皆以爵歸國雖見滅其餘民猶相與扶植故君之遺嗣以幸一日之復興是陳滅而陳之民未忘陳蔡滅而蔡之民未忘蔡也而况棄疾篡立之始凛凛然不敢寧晉方合諸侯于平丘又安保其不吾討是以假興滅繼絶之義復兩滅國以及諸遷國示非有所利而攘之且使知吾之立一反前轍而圖其新則反側者安窺覦者定離二者合而竊議浮謗者弭國庶幾靖矣棄疾巧於自為謀皆此類也史記平王以詐弒兩王而自立恐國人及諸侯叛之乃施惠百姓復陳蔡之地而立其後蓋識此意冬十月葬蔡靈公公如晉至河乃復吳滅州來楚吳皆僭王楚滅國類稱人吳滅州來以國舉春秋豈寬於楚而嚴於吳哉楚所滅大抵其與國之背己者吳直滅人之與國以逞威耳况入州來已五十餘年耽耽虎視竟間楚亂而滅之自此滅巢滅徐其勢日盛晉通吳之責有歸矣十有四年春意如至自晉意如専政于魯大搜比蒲敢僣天子之禮用人亳社始效悖亂之俗以凶傲忮狠濟無君之心疽癰內訌痱跖外錮魯之命脉其存幾何使晉因邾莒之訴執而歸周肆諸市朝不獨為魯拔一蠧根亦足俾列國大夫暴蔑其君者知所警懼乃以子服惠伯之私縱而歸之虎兕出柙其傷愈多魯之君臣雖喜其幸而免亦憂其不幸而脫告至于廟儼如公至肆無忌憚甚於未執公其危矣哉行父執而歸不致意如執而歸乃致春秋蓋深痛魯之有兩君也不然何去其族三月曹伯滕卒夏四月秋葬曹武公八月莒子去疾卒冬莒殺其公子意恢放太甲于桐有伊尹之志則可無伊尹之志則篡也莒著丘公卒蒲餘侯兹夫與公子鐸為國選立人心所與之庚輿以易郊公之不肖不可謂無功而國君廢立一出大夫之手非所以訓也故不書郊公之出而書其所善意恢之見殺以著當國者逼逐其君専殺公子之罪
