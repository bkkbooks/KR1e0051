body:
  text: 春秋說卷一宋洪咨夔撰隠公上元年春王正月元者乾之元春者乾之亨正者乾之利貞皆天徳也王者有是徳而後可以王天下諸侯有是徳而後可以君一國而承事王者嗣立之始書之欲其自始至終與天同運也其以正月係之王王者三代之通稱天王則獨指周而言三代所尚雖不同時以作事商周未始不同于夏也苐自昔帝王繼天出治莫重乎正朔正月上日受終于文祖正月朔旦受命于神宗有所授則有所受故正朔具而謹始之道備春秋五始有正而無朔聖人猶愛餼羊豈以為可畧哉魯君纂服皆不告于天王其于禀承正朔初政已失之故不書朔以著其無所承而書正所以存王也即位或書或不書行即位之禮則書公之不書以攝自詭而禮不行焉自有天地以來君位無代匱者堯老舜攝實則相堯周公攝政成王已立皆非代君也以攝欺天下自公始世子必􅊎于王公非所􅊎國統必屬于父公非所屬按榖梁傳有先君既勝其邪心以與隠句則隠之立非無父命也揆之于禮反之于心而不安于是謂桓㓜而攝需其長乃歸之立十有一年而不歸果攝也哉始求遜國之名終享擅國之利作偽日拙公之心迹敗矣三月公及邾儀父盟于蔑記私盟之始也盟非治世所尚爾詐我虞而後有盟未有乆而可頼者魯之于邾為近公據非其據中不自安故扳援以為宻𫝊謂攝位求好得其情矣附庸例書字如蕭叔之類夏五月鄭伯克段于鄢舜之于象純乎天周公之于管蔡奉乎天鄭伯之于段人勝而天滅矣詩曰兄及弟矣式相好矣無相猶矣段之不弟罪固不可揜莊公猶之又甚之宿怨以斃段遷怒以讐姜大惡其可悔乎夫克莫善于克己莫不善于克人莊不自克而以克其弟無人心矣聖人書克以著其心嚴矣哉秋七月天王使宰咺來歸惠公仲子之賵公以庶長違父命而自立託之攝以欺國人王室所當問也周方衰㣲不能問而致君大義周禮未泯力雖不能問而不容不覺其欺公立數月天王首歸桓母仲子之賵以示桓之當立且大其事使冢宰來失禮之中葢猶有㣲權在公卑王室偃然受其禮曾無惕懼之意王之㣲權亦不得行焉以矯枉過正之禮為啓寵納侮之端坐而論道者不得不任其責故宰以名貶王繫之天尊周也仲子繫之惠公正桓也其不曰夫人賵非所當賵也一語而數義具九月及宋人盟于宿有歉于已而求于人雖屈已納交不以為辱情之迫也公以千乗之重下與宋之㣲者盟葢居攝而中餒方求好于宋以植其黨雖㣲者抗禮不敢較也聖人恥之故書及不書公按此條經文三傳皆以為魯以微者與盟故不書其人惟趙匡以為公親與盟諱而不書原文所云葢本趙氏之說冬十有二月祭伯來天子之宰方以非禮辱于魯祭伯又不命而出無名而來周之紀綱蕩然矣凡書來皆莫名其所以來之意公子益師卒平王之喪公不唁惠公之𦵏公不臨于所厚者薄無所不薄也先公之子益師何有哉故卒而不日二年春正以正天下之不正王之大柄也公不知有王立非其正踰年矣王不知所正焉故自此終公之身無王正公㑹戎于潛記私㑹之始也周禮蕃服世一見其朝也周公置之國門之外所以逺之也公方攝位戎窺其有慊然不自安之心敢牽帥為潛之㑹公亦幸戎之親已會之如敵已不以為嫌焉春秋以戎敵公其譏明矣夏五月莒人入向春秋無義戰强凌弱衆暴寡自書莒人入向始上無明天子下無賢方伯故小國亦得以擅其兵也無駭帥師入極極如顓臾須句之類皆附庸也無駭以未賜族之大夫將尊師衆以壓之極不支矣在易之師剛中而應行險而順以此毒天下而民從之貴乎以順動也入者内不受之辭豈順動乎秋八月庚辰公及戎盟于唐春㑹于潛戎請盟公辭焉亡幾何遽為唐之盟盟之不足恃公固知之矣而顧汲汲盟之以修戎好内歉故也徐戎並興而有費􅊎築與征同日其嚴于禦戎若此公顧援而進之既㑹而盟如待大國魯自此卑矣時月日具聖人之慮葢深九月紀裂繻來逆女冬十月伯姬歸于紀昬姻人道之始紀侯以未命之裂繻來逆女尠吾女矣歸妹永終知敝女歸之正不正以禮不以禮可以占終焉君子是以知伯姬之不能有紀也紀子伯莒子盟于宻子伯子帛其說不一大要紀莒自為盟非為魯也以告魯而書也十有二月乙卯夫人子氏薨春秋之始無以妾母為夫人者此夫人葢公之妻也公以攝欺世不以君禮自處妻則用夫人之禮以貴之小人揜其不善而著其善君子視之如見肺肝故子氏不書卒而書薨以成其為君夫人書薨而不書𦵏以見其不敢自正其為君夫人按夫人先君薨者經文例不書𦵏非于義有所貶損也原文非是鄭人伐衛大司馬九伐之法天子聲罪而討也列國燕伐燕耳鄭以公孫滑奔衛衛人為之取廩延故執此辭擅兵以攻衛是何責人之周而罪已之畧也莊公志于殺弟大叔段奔共其子滑奔衛父子不相保公之怒可少霽矣又伐衛以討其藪逋夫極之于其所徃施之諸臣猶不可况猶子乎伐國非將卑師少而人之罪鄭深也三年春王二月巳已日有食之日為衆陽之宗而陰犯之故食猶君徳本清明而有蠱之者其明傷矣歴家推剥蝕有定數然有道之世三光全而寒暑平今謫見于上人君能寅畏修省以還吾清明之天則咎徵轉為休徴矣伐鼓用幣特其末三月庚戌天王崩舜五十陟方乃死而為法于天下可傳于後世平王在位五十一年非不久也黍離之風竟不復振其崩至無以為𦵏悠悠嵗月志不自强故終于弱而已矣顧命一書志王崩之變禮為多而康王初立召畢二公率諸侯入應門左右則臣子奔喪之常百世不與易也天王之崩赴于魯公不奔喪亦不遣使以弔蔑周甚矣夫君親之尊一也公不知臨親之𦵏尚安知有王公不知有王則其臣安知有公非自隳其坊乎夏四月辛卯尹氏卒天子之大夫外交于魯故尹氏之喪告書尹氏去其官謹世卿非人之戒也王者以徳詔爵其賢耶象賢而用之雖父子並為司徒不害緇衣之美其不賢耶一日不可尸厥官况可世官如尹氏乎故用人者當論賢不賢不當論世不世尹氏族强不顧禮法而外交越百九十餘年竟成王子朝之禍秋武氏子來求賻武氏世官也子未成人者也桓王之立以未踰年改元未出命遣使故武氏子以自來書其使非所使求非所求則冢宰之責也魯于天王之喪雖赴不弔王室不足於𦵏而求賻焉是媿魯也夫猶有望于魯也夫八月庚辰宋公和卒胡文定謂諸侯曰薨而書卒以不請命于王而自立不與其為諸侯也劉原父荅温公書謂薨者臣子之辭温公亦以為然合而觀之可見薨魯卒諸侯之意冬十有二月齊侯鄭伯盟于石門鄭去周為邇在周為宻故列國喜于交鄭伯主重于得鄭外冦急于摟鄭春秋書鄭之交于諸侯為多石門之盟其首也信不由中盟何足尚哉癸未𦵏宋穆公宋殷後其爵公王請諡于天諸侯請諡于王不請而諡非王制也死喪相恤邦交之常故魯㑹其𦵏然天王之崩屬邇不㑹周而㑹宋是不能三年之喪而緦小功之察也四年春王二月莒人伐把取牟婁封建之法先王取地上有水自然之比而為之所以協比上下之情使之一徳以尊王室而安生民也故分疆畫壤有其制車服旌旗有其等講信修睦有其禮救灾䘏難有其義而連有帥卒有正州有牧小大相維内外相統賜弓矢然後得専征其所征惟不共王命是問非以從欲濟忿而便其私也是以王室尊安民生寜一五等之爵各保其社稷以無墜厥祀及其衰也王者號令不行於諸侯大不字小彊不恤弱以勢力相雄長以智謀相吞噬無日不惟干戈之尋周初千八百國至春秋存者無幾而封建之法壊矣莒前年入向今年伐把取非其有之邑區區蕞爾之國猶擅兵若是况大于莒者乎書取深疾之戊申衛州吁弑其君完春秋弑逆非一國衛其首也衛本紂畿内之地成王以封康叔其政化後革而先衰故夷王時變風詩作實居十三國之首莊姜莊公夫人以公子州吁之母上僭而失位故作緑衣戴媯生子完莊姜以為己子而州吁弑之姜送戴媯大歸故作燕燕州吁弑嫡之後莊姜推原禍亂之本以為由已不見答于先君之所由致故作日月禮莫嚴于嫡庶之辨莊公以私嬖納州吁于邪又屬以兵是授之弑完之刃也夫愛始于袵席變形于閨門而禍流社稷一至于此州吁絶公子之屬籍而莊公不父之罪隠然見于其中可為萬世之戒夏公及宋公遇于清二君志于㑹而為草次不期之遇其心所存不欲國人窺之也葢公以攝居位不能不以桓為慮宋繆公致國于與夷而公子馮奔鄭殤公亦不能不以馮為憂二君之隠于中者畧同故為此遇也宋公陳侯蔡人衛人伐鄭執孤疑之心者來䜛賊之口人之得以間吾骨肉之好必中心隠然之間有以召之也宋殤公得國于繆公繆公之子馮奔鄭鄭人欲納之未有迹也而殤公忌馮之心已潛動于中故州吁得以伐鄭除害之語中之遂興此師自此凡十一戰至于身弑馮立然後已豈惟䜛言能禍人國哉忌馮一念之動天昭昭乎臨之矣况黨州吁弑君之賊春秋所必誅乎秋翬帥師㑹宋公陳侯蔡人衛人伐鄭伐鄭之役衛州吁使公孫文仲將而宋公身在兵間宋志明矣戎者國之大事師者君之大柄帥師直以翬書何哉語曰其身不正雖令不從宋伐鄭以除公子馮之害與公之不誠于遜桓機心械事適相為符故翬逆探其心固請從宋以遂其専而公惟其言之聴也異日激成鍾巫之變實兆于此九月衛人殺州吁于濮冬十有二月衛人立晉弑逆之賊夫人得而討之無所逃于天地之間也州吁弑君自立其民不和而求寵于諸侯使諸侯少誰何之罪人之得易耳宋陳乃合力左右之黨遂立矣然未得魯不敢以為安使魯能請于周聲其罪以王命討誰敢不從宋為衛請翬帥師以從伐鄭則魯亦與之黨益盛矣而其民之未和猶如故也石碏以王覲為可則是當時諸侯之犯名義非王命不敢以自安使王室能以大義號召諸侯誅一不義紀綱振而風采變中興不難惜其君臣之不自亢也衛人以討賊望之諸侯諸侯不足望望之魯魯不足望望之周周又不足望其志良可悲矣碏之謀行殺州吁于陳之濮稱人以殺國人殺之也天尊地卑而乾坤立名義之在人心未嘗少蝕故可以義動而不可以威刼可以禮率而不可以力制茍失其心泰山累卵矣州吁材非不勇兵非不銳黨非不盛而國人之心終不可强而和必討賊而後已雖殺之于濮幾于失賊而羣心之勃塞自是而始舒豈非康叔之化在人未泯乎公子晉稱人以立國人立之也立無王命猶為不宜立然國人之心于是乎定矣故曰民為貴君為輕五年春公觀魚于棠戒懼之心易移耽樂之情難制公子翬飛揚之志勃勃乎不可遏公顧玩細娱忘大患而觀魚于逺地之棠孟子所謂不賢者雖有此不樂也非不樂也所樂非所樂也况一嵗之事在春田不之蒐耕不之省而肆為逰觀之舉不知務甚矣諉曰春獻王鮪將登寢廟獨無􅈄人乎夏四月𦵏衛桓公按史記衛始伯也頃侯時夷王命衛為侯至平王命武公為公自是皆僣公也春秋書衛以侯卒而公之著國人之私也君弑賊不討不書𦵏桓公之𦵏雖緩賊討可無憾矣秋衛師入郕郕間衛亂而侵之衛甫定即入郕修怨何其亟也兵法出其所不意衛之逆賊閱八月而後討桓公十有四月而後𦵏州吁用兵暴虐瘡痍未瘳宣公自外初立上下之情未孚郕固不虞其遽及我也師一舉入其國其得兵家之利乎春秋正誼不謀利書入甚之也九月考仲子之宮初獻六羽仲子不得並配于惠公之廟故為之别築宫以祭而因姓以名宫公以攝欺世今五年矣其欺久而不續則人將得而窺之故又為此示國人以將遜之意而申其欺夫不敬其親而敬他人者謂之悖禮公于𦵏親不屈半趾以臨窆而以盛禮施之先君之妾其果出于是心之真乎成王賜周公以天子禮樂魯自是僣用八佾而仲子之廟落成降殺用六婦人無武事故不言佾而言羽初獻六羽以見前是之皆八也又以見他廟之八猶故而仲子則六也又以見宫非所當宫羽非所當羽特飾欺之具也邾人鄭人伐宋宋再挾衛以伐鄭又取邾田其不義可知邾鄭所以合而伐之也是役邾倡而鄭和故邾以附庸序于鄭之上重主兵也春秋無義戰而多忿兵使志足以御氣禮足以制情方將自責自修之不暇何暇連兵以伐人而逞其報復之私哉此所以兵無稅駕之期民無息肩之日螟大田之詩曰去其螟螣及其蝥賊毋害我田穉而螟居其首春秋不書螣及蝥賊之害而書螟與詩意合葢螟為食苖心之虫視食根節與葉為特重故謹天戒而書之夫人心受病則百骸不能以自立君心不正則萬化不能以自美民心渙散則國脉不能以自長公觀苖心之螟盍知所警乎冬十有二月辛巳公子彄卒彄卒書日恩禮厚也以臧僖伯之賢𦵏之加一等未為過然公之為人工于飾欺方諌如棠詭辭以拒之生無旌禮死則厚𦵏以葢其憾不情甚矣宋人伐鄭圍長葛天理人欲相為消長人欲日長則天理日消人欲窮則天理滅矣宋繆公舎其子馮而歸國于與夷其志豈無望與夷之撫馮猶巳之撫與夷也而殤公撫存之不加忌克之是用馮遂出奔于鄭又極之于其所徃必欲使無寄足之地再挾弑君之衛以伐鄭亦足以快其私矣而馮不去害不除不能一日忘也長葛之圍逾年不解必取而後已人知其為報鄭吾知其欲急鄭而蹙馮也甚矣滅天理而窮人欲也
