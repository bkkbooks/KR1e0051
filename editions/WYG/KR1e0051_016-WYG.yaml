body:
  text: 春秋説卷十六宋洪咨夔撰宣公二八年春公至自㑹夏六月公子遂如齊至黄乃復辛巳有事于大廟仲遂卒于垂壬午猶繹萬入去籥五年一禘三年一祫大事于大廟禘祫也有事于大廟不以大書嵗祭之常也遂負天下之大惡而以善卒王法廢矣方遂使齊病未及死不請而自還輕齊而専魯也大廟方祭而遂赴聞赴自齊境之垂至非以是日卒也前書公子遂繼書仲遂病革賜氏異數以慰其生為盖棺榮也季友仲遂卒皆以名氏見魯政在大夫此其根本也卿卒不繹而猶繹舞猶用萬惟去有聲之籥知其非義而依違於其間禮樂之變也顔子問為邦夫子告以夏時殷輅周冕韶舞此其禮樂之正也春秋則因其變而記之變與正相為表裏皆所以示經世之大法也戊子夫人嬴氏薨母以子貴尊妾母為夫人盖有近例國人不以為異也辛巳仲遂以卒聞戊子嬴氏以薨告相去不能旬豈凶徳參㑹人不能討而天大討之耶晉師白狄伐秦狄為中國患㡬與楚等赤狄白狄皆其别種也赤狄侵齊氣􅆋方張晉又援白狄以伐甥舅之秦戚疎易位矣謀國者何其左耶盾以元惡執晉政諸侯莫肯為用惟白狄未嘗通於中國援而進之客邪入腹矣異時秦亦以白狄伐晉反鋒入室誰之咎乎楚人滅舒蓼楚滅弦滅黄滅夔滅江滅六遂滅舒蓼循江而下以及於淮蠶食蠧壊浸淫日廣所以與吳越接壤而首盟呉越斷髪文身之俗未能自通中國而先與楚盟攀援氣類以漸而進豈惟舒蓼之悲哉秋七月甲子日有食之既食既不見於他時而見於桓宣之世簒弑之臣不討而天實臨之冬十月己丑葬我小君敬嬴雨不克葬庚寅日中而克葬妾母一用小君之禮反哭成喪定諡升祔自成風始也成風事季友而立其子敬嬴亦事襄仲而立其子季友襄仲當國以成風敬嬴為有大功於社稷而尊為夫人成風敬嬴之功顯則季友襄仲之功顯妾母尊則友與仲安得不尊乎然成風與哀姜並祔猶存其適室出姜歸齊不復返而敬嬴専祔遂滅其正配緑衣黄裳失位至此豈不重可悲乎紼以旱故不麻而葛葬以雨故不丑而寅天監其昭昭乎城平陽魯當螽旱相仍之餘葬小君之綍不能麻而葛之君民俱匱可知矣方且無故而城邑恤民之心安在哉楚師伐陳九年春王正月公如齊公至自齊夏仲孫蔑如京師禮厚於所畏而薄於所忽小人惟勢之强弱是計大分所繫不問也公春如齊修五年再朝之禮蔑以夏如京師畏齊而敬起忽周而慢生勢之徇而分之畧也周於是時因其不朝不聘號召諸侯以討簒弑之賊孰不敬應何待徴聘而後來厚賄而後勸哉齊侯伐萊秋取根牟按公羊以根牟為邾邑杜預以根牟為東夷國而以書取為魯取則同與上齊侯伐萊本不相屬洪咨夔于本條下亦無明文考後成六年取鄟説云宣九年取根牟語承上文盖齊取萊邑也知原文獨以根牟為萊邑書取為齊取取根牟經文當與伐萊合為一條謹識於此八月滕子卒九月晉侯宋公衛侯鄭伯曹伯㑹于扈晉荀林父帥師伐陳辛酉晉侯黑臀卒于扈齊弑君而諸侯盟于扈以謀齊不克而還宋弑君而諸侯㑹于扈以平宋無功而還今晉不省在已之愆又㑹于扈以討不睦而林父帥師伐不㑹之陳陳其心服乎前在扈皆不序而此序盟主卒于㑹事大體重也冬十月癸酉衛侯鄭卒宋人圍滕滕子方卒宋舉大兵圍之伐喪之惡不問而知然襄公伐齊之喪書爵而此人宋者襄受齊桓之屬猶有名今特乘艱危陵小弱爾况宋有大罪莫之討而反圍無罪之滕乎明年宋師又伐滕滕何能服楚子伐鄭晉卻缺帥師救鄭鄭往來晉楚之間凡幾而書救者三善其救也然初荆伐鄭而人救之繼楚伐鄭而人救之今楚子伐鄭而卿帥師救之伐者自州國而爵救者自人而卿楚勢日彊抑非前日之楚矣為中國謀者可不懼哉陳殺其大夫洩冶事有悖理傷道而忌人之議其後非立威無以鉗之陳君臣宣淫於朝洩冶以民無效焉且聞不令為諫言未至於危也而遽見殺殺一人以鉗千萬人之口也天下國家之禍莫大於不聞過而諱過聞過而諱誰敢復嬰逆鱗則過愈不聞而惡日積大壅必大决不可遏矣况朝之有正臣隠然猶虎豹之在山故孔父仇牧之閑不去亂臣賊子之謀不行靈公殺冶是自撤其閑也不旋踵而見弑宜哉入春秋百餘年未有以諫死者冶獨以諫死疾風勁草世幾何人傳者猶以無自立辟謂冶不能遜言避禍使人人有遜言避禍之心君之得失國之存亡皆置諸度外君臣之倫廢矣詩曰既明且哲以保其身夙夜匪懈以事一人豈緘黙保身而已乎十年春公如齊公至自齊齊人歸我濟西田齊人取濟西田刼我也歸我其辭順矣魯以子壻事齊齊以臣僕畜魯公毎朝必告至盖以親齊為榮而不自知其辱茍可以悦其心而還吾有無所不至矣夫畏齊深則取我賂事齊堅則歸我田操舎予奪一出其手而魯命制焉齊其狙公也哉夏四月丙辰日有食之己巳齊侯元卒齊崔氏出奔衛父臣父政茍未至於厲民蠧國毋庸忘芰歜之嗜而遽改之也崔杼有寵於恵公髙國平日之所不快恵公朝卒而崔氏暮逐是幸君父之變逞其憾以去其偪耳人徒見杼有弑君大惡遂以逐之為早辨然以逐崔之日弑光之時計之相去五十餘年何以知其舉族之皆可坐乎逐子家之族遣歸父之家皆討弑君之惡崔惡未動以一人之偪而逐一族連坐之法用矣故書氏公如齊五月公至自齊癸巳陳夏徴舒弑其君平國天道禍淫淫未有能逭於禍者不在其身則在其嗣晉獻齊桓淫多内嬖其身雖免公子争國禍亂蔓延而不已襄公與文姜疾驅於通道大都懿公納閻職之妻而使職驂乘荘公數如崔氏以崔杼之冠賜人皆身見弑陳靈公與孔寧儀行父宣淫于徴舒之母殺諫者以鉗國人之口自以為人莫我議矣而禍𤼵於嬉笑之間身滅國亡天道豈逺乎哉至此而後知洩冶愛君之忠六月宋師伐滕公孫歸父如齊葬齊恵公春公如齊夏公如齊既奔喪則不復身㑹葬也自此公不復如齊濟西之田既歸尚何求哉夫是之謂勢利之交晉人宋人衛人曹人伐鄭楚伐鄭屢矣晉既救之又戍之不可謂不加意以繫其心而方與晉平隨與楚平方與楚成隨與晉成鄭固惟强是從而晉不能强也其不能强不强於為義也夫據㑹要以觀方來則六合輻輳未足多主盟諸夏要在得鼔舞闔闢之機耳陳鄭皆往來于楚時陳方弑其君凛凛懼討移四國之師以伐陳陳服而鄭亦服楚自退聴盖我師之出執言正行險順非忿争而力競也晉有可强之機不知用雖能取成何闗勝負而機為楚得入陳圍鄭勃勃乎不可禦春秋望晉之意孤矣宜貶而稱人秋天王使王季子來聘平王東遷以後號令不行於諸侯而王靈之加於魯毎于嗣立正不正之間猶深致其意凡以適立則遣使於即位之年來聘荘文是也立不以正則遲之以待其定而後來桓僖宣是也周之權不足以正天下之賞罰其意猶不忘乎天下之公是非此所以於陵夷削弱之中區區命脈猶足以自夀也王季子之後不復有聘周之微權亦泯矣公孫歸父帥師伐邾取繹大水季孫行父如齊冬公孫歸父如齊齊君嗣立歸父如齊㑹葬行父如齊初聘未幾歸父又如齊可謂密矣然觀頃公即位首逐父之寵臣無一毫手澤存焉之意薄徳如此何有於魯公之奔喪必有所不能堪者故使聘雖絡繹而身不復往若密而實疎也歸父取繹即如齊謝貪而畏人也哉齊侯使國佐來聘饑嵗凶年穀不登君膳不祭肺馬不食穀馳道不除祭事不縣以民瘼為已憂也天官有荒式地官有荒政鄉師有艱厄之賙遺人有凶荒之備以活民為已責也夫然故嵗雖儉而民不饑春秋時先王仁民之政不復講而水旱螽螟猶有不為災者恤災救艱之意未忘也惟公於大水之後以饑告蝝生之後又以饑告盖其視斯民疾苦若秦越然漠不以轉壑内溝動其念饑之一辭不仁之心盡見焉楚子伐鄭十有一年春王正月夏楚子陳侯鄭伯盟于辰陵宋楚盟鹿上之後其㑹盂盟薄盟宋皆楚主之而㮣之以諸侯楚為無道猶未敢傲然自尊於列國之上也其後晉楚争陳鄭者非一至此陳鄭皆服於楚盟于辰陵於是楚主夏盟矣夫人心可以義動難以力服前此晉楚力争二國撫左則右動鎮前則後起不能一其所趨今楚以徴舒大惡天下莫討合兩國而圖之義氣所激其誰不應不待戰邲而晉九萬里風已在其下矣晉有復伯之機不能用而為楚得可勝憾哉公孫歸父㑹齊人伐莒秋晉侯㑹狄于欑函一謀事之當否而優劣分一舉事之是非而强弱判齊魯伐不宜伐之莒晉侯㑹不宜㑹之狄方自以為功而天下大惡乃為楚討天下大義乃為楚執猶分弓並轡競獵狐兔而熊豹犀兕已輸敏手中國為無人矣冬十月楚人殺陳夏徴舒衛人殺州吁齊人殺無知楚人殺徴舒皆稱人人人得而討也人人得而討之則亂臣賊子懼丁亥楚子入陳納公孫寧儀行父于陳入者内弗受之辭納者亦内弗受之辭楚子伐陳謂陳無動将討於少西氏遂入陳殺夏徴舒轘諸栗門因縣陳使非蹊田一言陳其滅矣故書入公孫寧儀行父與靈公宣淫于夏姬殺洩冶以鉗國人之口而置君鳴鏑之下其罪不勝誅顧芘而歸之討惡而遺毒故書納夫不見可欲使心不亂楚荘於是乎見可欲矣方令陳人無動之時惟在于義因入陳而見其國之富遂起縣陳之心方将討少西之時惟在於陳因殺徴舒而見其母之美遂起納姬之意公孫寧儀行父之不討所以為生夏姬地也抑所以為納夏姬地也縣陳而復封慕姬而不納情止於義固可深喜觀申叔時貪其富之諫申公巫臣貪其色之言則已動于可欲矣凡中人之情易流多隨所見而動非禮勿視為克已之首有以哉十有二年春葬陳靈公亂臣賊子不討者多矣衛殺州吁齊殺無知楚殺徴舒而見弑之君皆以葬書聖人之心盖為之一快矣至此而知楚荘有功于中國不見絶于春秋也鄭君夷晉君夷臯與陳君平國皆以無道而弑其諡皆曰靈又以見易名之有定法楚子圍鄭夏六月乙卯晉荀林父帥師及楚子戰于邲晉師敗績謀國之道必先自治而後治人則人莫我禦文公之伯諸侯定襄王以示義伐原以示信大蒐以示禮作執秩以正其官於是收城濮之捷諸夏之氣為之一伸荘王之入中國徳立刑行政成事時典從禮順而國人之訓軍實之儆日加飭焉晉之羣臣相與起敬起畏楚之氣已盖乎諸夏矣邲之勝非幸勝也况楚克鄭已許平晉救方至自可全師而還荀林父不能専進退之决以乖敵和以亂易整自取敗北為城濮羞此晉所以主兵也吁長子帥師弟子輿尸凶晉之不競宜哉秋七月冬十有二月戊寅楚子滅蕭虎狼蝮蚖有時而不噬囓不可以不噬囓而保其仁也荘王之伯滅陳克鄭而不取若有仁心矣不旋踵而滅蕭盖噬囓者其質之本然不噬囓者其時之適然楚荘天性鷙悍忍刻豈以一日矯揉盡變其平生之素哉晉人宋人衛人曹人同盟于清丘同非心同其同乃所以為異四國同盟口血未乾而宋衛自相尋戈尚得為同乎楚之慿陵中國如火烈烈延燎未已諸國皆懼而為是盟同舟之勢也而其方同遽異者勢之同非心之同也故卿皆人之宋師伐陳衛人救陳陳有大罪然非有瑕之宋所得討宜乎衛以救書
