body:
  text: 春秋説卷四宋洪咨䕫撰桓公下十年春王正月自三年無王至十年復書王見公雖無王天王雖不王王法未嘗不存也况四年不備秋冬七年復不備秋冬至此又三嵗矣故書王以正之聖人于十年之間未嘗一日忘討賊以魯為天下之望魯賊不討世之亂臣賊子皆得藉為口實惓惓于為魯乃所以為天下也按桓十年書王之義何休以為十年者數之終劉敞以為十年者三朝之節桓公至是三不朝矣故書王以存大法其説較原文為明確附識于此庚申曹伯終生卒夏五月葬曹桓公秋公㑹衛侯于桃丘弗遇有子曰信近於義言可復也孟子曰言不必信惟義所在信而裁之以義不至為硜硜小人之信矣公與衛先有㑹期及往㑹則我拒非衛為不信以見欺裁以義也公大惡未討當時勢均力齊之國皆與為盟㑹惟衛宣公未嘗進之公故急於要衛桃丘之約衛黽勉諾之然退思吾國嘗有州吁之難陳猶能為致討魯衛兄弟之國吾坐視其禍亂不之問也已得罪于黍苗之詩而又㑹之豈周公康叔之心乎寜違宿諾毋犯非義翻然悔悟力拒不來公踉蹡獨往躊躇獨返非所以令國人見也春秋以衛主㑹為辭以弗遇文之殺魯恥而善衛之意在其中惜無沐浴請討以𤼵衛之機者冬十有二月丙午齊侯衛侯鄭伯來戰于郎兵出無名事故不成名其為賊敵乃可服公大惡未討是舉宜有名矣然弑立之君一列于盟㑹則不復討既已黨之又復討之則黨為私好討為私仇雖有名猶無名也公之初立鄭首㑹垂盟越齊繼㑹嬴㑹郕而又同成宋亂黨惡昭昭矣然自致女易田之後不復聘㑹盖前是茍以利合其心終慊于義迨衛拒魯于桃丘其義益著遂合兵為郎之戰而盟㑹已定師不可名衛索于齊鄭亦不能自名矣春秋無書來戰者特于此異其辭罪三國不能名其師也十有一年春正月齊人衛人鄭人盟于惡曹三國方來戰于郎尋為惡曹之盟同疎魯也衛宣公終身與公面目之不覿玉帛之不交齊僖鄭莊則反覆無常利合勢睽其知義與否判然矣然齊鄭黨賊之罪固不可悔衛亦未免于縱賊是盟雖同于疎魯何能爲世道之有無故三國之君皆㣲而人之以示貶夏五月癸未鄭伯寤生卒秋七月葬鄭莊公九月宋人執鄭祭仲突歸于鄭鄭忽出奔衛君子殺身以成仁祭仲為鄭相見怵于宋而畏死求生故書執且人宋立嫡以長不以賢突為忽弟而以庶干嫡故書突不繫之鄭冢嫡君之貳國之本忽為嗣子而不能守宗廟社稷至于失國出奔故書鄭忽不繫世子三罪蔽矣其原則莊公之罪也詩曰刑于寡妻至于兄弟以御于家邦兄弟天倫之愛不以薄物細故而間和樂湛孺冲融翕合家人觀而化之子孫則而象之孝友婣睦之風成乖爭陵犯之意息而積善之家有餘慶矣莊公以䦧墻之怨設心措慮必克而後已又極之猶子之所往推刃同氣㦧莫甚焉其何以訓厥後馬鬛未燥鴒原已寒一入一出相劘相刃突竟以得宋而庶者立忽竟以失齊而嫡者亡子亹子儀皆不獲其死積惡之家必有餘殃天之報施不爽如是哉奕者舉棋必定祭仲茍一旦之命廢君立君而又求君稔鄭無涯之禍孔子曰茍患失之無所不至矣仲之謂也公羊以為知權何耶柔㑹宋公陳侯蔡叔盟于折名柔著大夫盟諸侯之始也公將㑹宋公使柔先為折之盟以嘗之兩惡相值兩心俱危故也公㑹宋公于夫鍾冬十有二月公㑹宋公于闞十有二年春正月夏六月壬寅公㑹杞侯莒子盟于曲池秋七月丁亥公㑹宋公燕人盟于穀丘八月壬辰陳侯躍卒公㑹宋公于虚冬十有一月公㑹宋公于龜丙戌公㑹鄭伯盟于武父丙戌衛侯晉卒十有二月及鄭師伐宋丁未戰于宋同聲相應同氣相求同惡亦相濟然以勢利而合亦必以勢利而離小人常情也公之初立凜凜乎懼王室之誅列國之討鄭貪于易田首與㑹盟以植其黨懼心殺矣繼與齊陳鄭同取成宋亂之賂而又昏于齊懼心平矣至天王遣冢宰下聘其罪一洗而空之懼心肆矣故雖衛不我與晏然無求于衛既而齊鄭聘好皆絶而膽始寒始求與衛㑹衛拒弗㑹齊鄭又與衛來戰于郎而平日膠漆渙焉氷炭而膽愈寒遂求好于宋以弑立大惡相似其勢易合既講于折之盟即為夫鍾之㑹而于闞于虚于龜繼之其㑹愈宻其情愈親謂必終二君之身無毫髪之隙而鄭突以宋責賂無厭來與魯為武父之盟而我有鄭可挾于是約鄭伐宋遂戰于宋當采葑采菲之日自謂及爾同死至華落色衰惟恐棄背之不速在同舟遇風之時不翅左右手及反面若不相識落陷穽又下石焉立心勿恒凶公之心術可知矣宋魯弑而鄭簒以燕伐燕何足多較春秋所以悉書其㑹其伐不厭其詳者著公用心之曲折也十有三年春二月公㑹紀侯鄭伯己巳及齊侯宋公衛侯燕人戰齊師宋師衛師燕師敗績三君之㑹七國之戰非細故也而春秋不地恥迫魯也紀齊之憾舊鄭宋之憾新魯于齊衛宋之憾重燕則從人者也十年來戰于郎郎吾近邑其勢已迫今龍門之戰又迫于郎戰而勝魯猶可國不勝國其墟矣故公待紀鄭之集而後戰四國之師既敗績不言戰可也言及戰而後敗績殊死鏖敵而後能敗之也始為魯危終為魯幸幸豈可恃哉是戰及郎之戰皆翁壻自為兵主家道窮必乖故受之以睽必至之理也三月葬衛宣公父死不葬爰及干戈武王急于為天下除殘義士猶或非之宣公晉卒于去年之冬恵公朔戰于今年之春委几筵而從戎喪師徒而歸葬薄于親而厚于人人子之心安乎衛侯戰不稱子無人子之心也魯不以戰廢㑹葬之禮故録之夏大水元年秋大水今復夏大水陽㣲而隂盛夫豈一日之故哉秋七月冬十月十有四年春正月公㑹鄭伯于曹公與突之得國其事同故其情親方相與敗四國之師又㑹于曹以修武父之好係應之私也無冰古者藏冰頒冰皆以時出内隂陽之氣也七月之詩曰一之日觱𤼵二之日栗烈又曰二之日鑿冰沖沖三之日納于凌隂觱𤼵建子栗烈建丑鑿冰于栗烈之月則凌隂之納三之日建寅也冬燠至春終無可藏而後正月以無冰書按原文謂經從夏正故有此説不知夏正之正月則東風解凍自應無冰且春秋所以垂尊王之大法豈紀周事而反從夏時哉洪説非是夏五史闕文也以己亥為三豕而曲通之鑿矣以華黍由庚為逸而補之贅矣鄭伯使其弟語來盟凡使弟來固見相親之情亦其心腹之謀有非他人可與聞者春秋以使非所使例譏之鄭突與忽亹儀同氣爭國如獵狐兎而猶有寵愛之弟來修前好天理不以人欲横流而遂泯於此亦可見矣秋八月壬申御廩災乙亥嘗潔爾牛羊以往烝嘗先祖是皇神保是享鬼神洋洋乎在其上心茍有媿格思難矣公立非其道無以見祖禰御廩藏粢盛之地而焚之安知非周公魯公意乎公不知警懼偃然奉黍稷以告西成何受福之有哉冬十有二月丁巳齊侯禄父卒宋人以齊人蔡人衛人陳人伐鄭宋責鄭賂無厭頻年交兵四國㣲者將兵從宋伐鄭進退作止一唯宋之聽故以之夫國各其國人各其人兵戎大事而委民命于他人之手左之右之吾不復制無乃輕棄其民乎易曰長子帥師弟子輿尸凶用兵最忌節制之分號令之不一故諸侯能左右他國之師如魯以楚伐齊蔡以呉伐楚宋以齊蔡衛陳伐鄭無不取勝而還權之一也春秋正誼不謀利其書以皆貶十有五年春二月天王使家父來求車王者以萬乗之尊備五路之等常旂麾赤異其制賔祀戎田殊其用輪人輿人輈人創之巾車典路車僕掌之其嚴如此至諸侯有功則庸之以車大路之命康叔路車之遣申伯皆異數也車之為用上可以錫下下不可以貢乎上而可求乎先王盛時九貢致邦國之用雖不貢車而造車百工之需無不貢故其用備今職貢不登王路有闕至于遣使下求求者固非先王之法而所以致上之求者罪有歸矣毛伯求金武氏子求賻皆不書王求車書天王使家父無貶辭豈非車以闕禮而求出于不得已求財則可以得已也然書求已見上下之交譏三月乙未天王崩天子七月同軌畢至桓王崩周非有大故逺日宜卜而不卜必有不備于禮者觀求車于未崩之前可見矣夏四月已已葬齊僖公五月鄭伯突出奔蔡鄭世子忽復歸于鄭𢎞毅有守則可以託孤寄命頑頓無恥則必至欺君賣國祭仲士君子之節喪久矣方射王中肩之時仲為左拒莫之諫且為公娶鄧曼以固私寵平時無挺直之風臨難安得有堅正之節理所必至也鄭忽以世子宜立宋莊公誘仲執之要以立突使能見危致命禍亂可弭而愛身忘國視君如弁髦出忽立突身遂相之既相之矣以雍糾之謀先𤼵制人于是又出突而入忽迨忽為髙渠彌所弑既不能效孔父仇牧之死而齊人殺子亹于首止又以知免求生切而名義之不顧患失重而權數之捷出上有敗則因而搆之有便于已則欺賣而利之身謀善矣社稷何賴焉鄭伯突出奔不正其君鄭故生名忽復歸于鄭鄭盖其有也而弱不能定位故止繫之世子抑揚輕重意各有在許叔入于許公㑹齊侯于艾三國入許之後許叔居許東偏十有五年矣未能反其國也魯齊鄭皆易世叔遂乘鄭方亂而入許太岳之祀以似以續春秋固幸之而入者難詞非鄭亂則許猶不得入也齊魯㑹于艾以謀定許其難可知是㑹齊與魯久睽而復合邾人牟人葛人來朝公何君也來朝者不絶書滕杞紀異歲而朝穀鄧同時而朝邾牟葛旅至而朝書來朝皆貶而貶有輕重異嵗而朝者存其爵同時而朝者則著其名旅至而朝者則人以狄之貶其以事王室之禮事公也邾最近魯不朝不㑹幾年于此盖少知順逆之理者今乃與牟葛偕來操執不固懲矯過深為義不終失禮逾甚故與牟葛同其貶秋九月鄭伯突入于櫟櫟鄭别都莊公城之過制遂為窟奸藪惡之地入者不正其入也按左氏突殺檀伯居櫟子儀立十有四年突自櫟侵鄭獲傅瑕與盟使納已瑕遂殺子儀而納之始以刼祭仲而立終以刼傅瑕而復險忮深狡可知矣突入櫟之後忽之存亡不見于經而詩人反覆輾轉不能自已既恨其失大國之助又痛其權臣擅命又閔其無忠臣良士國人之情眷眷若此豈為一無能為之忽哉先君之世子其立正也突據過制之都又挾諸侯之助一國大勢盡趨之首尾凡幾年不能遽復其國以非其正人心不與也世道之變故不一人心之義理常存以人心眷眷于先君世子若此忽能人百己千彊柔明愚亦何至畢命賊手泯然不聞于世哉洪範六極弱居末良有以夫冬十有一月公㑹宋公衛侯陳侯于袲伐鄭㑹而後伐見趦趄猶豫之意鄭莊深狡輕視列國魯宋衛陳宿憾猶在是舉非愛鄭也抑忽扶突以甚鄭之禍也人欲天理固不兩立而是非邪正終有私欲不能盡蝕者方為是㑹孰非為突而來突之干嫡則人心所共疾也合無名之師右不正之孽彼此相視中何能安躊躇四顧念助忽則非其志右突則非其義于是黽勉而伐弗克遽還且徐議所以為後圖也褰裳一詩思大國之正已當五國㑹袲之時決討突定忽之計一舉響振分義昭白豈不大慰涉溱渉洧之思乎十有六年春正月公㑹宋公蔡侯衛侯于曹夏四月公㑹宋公衛侯陳侯蔡侯伐鄭秋七月公至自伐鄭天下之事所以使人樂于從而無依違之志勇于進而無反顧之心惟其義而已五國為突伐鄭動非以義故或從或違紛紛乎其不齊去年冬㑹矣今年春㑹矣夏又㑹而後伐志茍堅一何以屢㑹為哉况㑹于曹而陳不來㑹伐鄭而蔡後至依違反顧人人異意同人惟君子能通天下之志詎可非義而强同哉觀人心不可强同于非義則公之不義其能逃列國之指目故至以危之冬城向凡城雖時以重民力必書十有一月衛侯朔出奔齊朔以䜛得國連殺二兄國人不與請于天子而立黔牟朔以是出奔時衛黨方盛王室衰㣲彼縱有罪當討何能遽逐之盖得人則得國失人則失國以國人之半加王室之半下怨上怒朔不容不出也州吁弑立不討不已朔以䜛嗣亦迫之奔衛之人心知義若此魯得無愧乎十有七年春正月丙辰公㑹齊侯紀侯盟于黄公非道得國始而懼未幾安又未幾肆終而驕在位既久齊宋衛鄭陳蔡皆親于我滕把紀邾鄧穀牟葛皆朝于我疇昔思芘其身猶懼不給今則侈然思所以芘人前年與齊侯㑹于艾以謀定許去年與諸侯㑹于曹以謀納鄭今年又與齊侯盟于黄以謀保紀字小扶危覆之宇下公為何人敢任斯事多見其不知量也况齊紀之舊憾新怨方積磨牙澤吻俟機而發而魯亦凜凜寢蛟抱兕之是虞紀乃主之公與紀未幾皆墮襄公之穽豈為不幸哉二月丙午公㑹邾儀父盟于趡公穀作及及者内志也隠公初攝欲扳邾以自親故盟蔑書及公非有求于邾其㑹而盟歟夏五月丙午及齊師戰于奚十二年及鄭師伐宋十三年及齊宋衛燕戰今及齊師戰于奚又及宋衛伐邾及猶汲汲也公之大惡人不我討已幸顧敢汲汲稱兵以向人暴虎馮河死而無悔固惡人之常而弗戢自焚不義自斃亦天理之必然也况公春與齊盟夏與齊戰對面而肝膽分反手而爪距露凶狡甚矣書及不書公無君道也恥之也六月丁丑蔡侯封人卒秋八月蔡季自陳歸于蔡癸巳葬蔡柦侯左氏註獻舞即季公羊註封人卒季立獻舞是季未嘗立也其歸如季子之歸魯國人屬之耳季賢内足以繫國人之思外足以得陳人之助可以得國而無心于得子臧季札之流歟方是時兄弟爭國如魯之桓宋之莊陳之厲鄭之突忽以及于齊何可勝數季獨退然獨立于風靡瀾倒之表其出也既明且哲而無遯尾之厲其歸也不忮不求而有勞謙之吉可不謂賢乎故春秋貴之啖助謂季愛君以禮請諡于王正私諡妄尊之非故書桓侯不書公胡氏從其説及宋人衛人伐邾公方盟齊而戰方盟邾而伐棄盟不信不信不立其何以行之哉齊以疆場之事猶有可諉邾前見伐不報且率牟葛來朝且盟趡以尋盟蔑之好何所得罪而媚彊陵弱為是無名之伐積惡滅身禍其至矣冬十月朔日有食之十有八年春王正月桓無王此以王法正其終公㑹齊侯于濼公與夫人姜氏遂如齊艾之㑹甫數月而戰奚之戰復數月而㑹公玩齊耶齊玩公耶易曰困于石據于蒺蔾入于其宫不見其妻凶孟子曰身不行道不行於妻子公據非其位行非其道何以納姜氏于軌物之中世之敗國亡家大抵自婦人始婦人隂類隂柔易以入人朝薫夕染深錮肺肝前遮後紿宻塗耳目于是出入動息一惟婦言是聽父子以是而間兄弟以是而隙家道日睽而豺虎起于衽席身且不保矣敝笱在梁其魚魴鰥敝敗之笱何能制魴鰥之巨魚故欲齊其家者所以必先修其身夏四月丙子公薨于齊丁酉公之喪至自齊秋七月冬十有二月己丑葬我君桓公天下之理未有久屈不伸者久屈而伸有非人力所能及是之謂天天倫相戕之禍入春秋凡幾屈伸本末皆可考不特州吁之討而已也鄭伯容心于克段死骨未寒而公子五爭衛朔設謀于讒伋失國雖復而竟滅其後陳佗殺太子免而嗣立蔡人殺之若斃犬豕然宋馮倚賊督以得國其身僅免而子弑于萬不寜者累世魯秉周禮天下以為有道之國君臣未嘗相弑而桓首犯大戒天王不正諸侯不伐國人不問幾漏吞舟矣恢網未始漏也干戈之慘潛于嗜欲刀鋸之毒萌于燕笑十八年不討之賊卒假手于彭生而拉之非天歟天道報施不爽若影響契劵時有遲速終歸于定使大惡而可逭天地且不立矣隠薨不地而此地隠不葬而此葬其賊在齊不在魯也葬曰我君所以見臣子尊君親上之至情
