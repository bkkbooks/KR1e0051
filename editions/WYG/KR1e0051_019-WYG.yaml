body:
  text: 春秋說卷十九宋洪咨夔撰成公二七年春王正月鼷鼠食郊牛角改卜牛鼷鼠又食其角乃免牛天子之喪創巨痛深越紼而行僣禮上帝之所不享也宣二年十月匡王崩三年春正月郊牛之口傷改卜牛牛死乃不郊公之五年十有一月定王崩葬不之會乃講郊禮於期祥之餘鼷鼠食郊牛角改卜牛鼷鼠復食其角諄諄之命無以過是公可不畏於天乎吳伐郯堇能治病無以制其毒則能殺人吴自太伯至夀夢十九世國始益大僣稱王故春秋狄之如荆楚楚至莊王之伯其盛極矣而亡大夫申公巫臣教吳制楚遂生一敵晉因引而進之夫吳楚自相劘軋固諸夏之利而運掉鼔舞操縱闔闢吾失其權則亦能為諸侯之害此吳所以堂堂為郯之伐也夏五月曹伯來朝不郊猶三望秋楚公子嬰齊帥師伐鄭公㑹晉侯齊侯宋公衛侯曹伯莒子邾子把伯救鄭八月戊辰同盟于馬陵救未有不善者救至於再善之善者也齊桓間嵗再救邢其在聶北次而後救非復前日解倒懸之急故不及事楚去年伐鄭晉獨救之不以煩同盟之國謂吾力足以制之也今年楚復伐鄭其志非服鄭不已景公親率列國救之慮非協力不濟也獨救不為寡同救不為衆權其勢之輕重緩急而為之謀楚莫敢争而馬陵之盟過於蟲牢之盛矣夫義氣之感人捷於威令楚方伐鄭晉不踰時救之八國之君不旋踵而皆集從楚之莒亦與焉何其速也楚師既退八國之君同受馬陵之盟無異志背楚之鄭亦與焉何其一也春秋再書救鄭繼以同盟不復序可以觀義激人心之效矣使毎事皆然晉何難於伯公至自㑹公以㑹至不以盟至所以著為救鄭而出也吳入州來馬陵方㑹而吴入楚之州來晉與吳相為表裏也吳雖寖彊非楚有晉虞何敢輕入其邑九國之師震撼山岳吳遂乘其危疑而入也子反子重左枝右梧之不暇蠻夷屬於楚者盡為吳有始通於上國晉借之聲援張之氣􅆋也此葢兵家用冦兵攻冦兵之法而不計其弊冬大雩冬旱也三年大雩五年大水再越嵗又大雩季氏專政干和召異熯燎相仍天愛周公之魯欲其君臣知警懼也衛孫林父出奔晉晉為林父狡之一窟八年春晉侯使韓穿來言汶陽之田歸之于齊貪夫索夢於覆蕉癡兒出涎於畫餠魯從晉於鞌晉使齊歸我汶陽之田曾未幾時復與齊同盟馬陵使我以田歸於齊一予一奪如反覆手豈惟晉制命之非哉義不足以反其所有而資人之力以脅取之恩不足以懷其所得而竭吾之力以强服之始以悖入終以悖出此田所以復為齊也訟之上九曰或錫之鞶帶終朝三褫之其取田歸田之謂歟晉欒書帥師侵蔡齊桓公侵蔡蔡潰遂伐楚晉亦侵蔡遂侵楚其跡似矣而桓公規模素定一舉能服楚於召陵景公無服楚之規模徒以前年未得志潛師襲蔡以牟小利何逺畧之有哉此所以書侵蔡不書侵楚公孫嬰齊如莒宋公使華元來聘夏宋公使公孫夀來納幣納采問名納吉納徵請期昏禮之正也魯女之歸未有以納幣書者豈惟禮之不備亦其微者來不足紀錄也共姬之賢雖在閨闥而淑聞已昭衛晉方將來媵宋何敢畧其禮而微其使故納幣必重之以卿春秋喜而錄之以勸女德之修使知微無不顯者晉殺其大夫趙同趙括君心不明則譖愬得行亦必有逢君之惡者左右之同括放趙嬰於齊嬰曰我在故欒氏不作是欒氏常有憾於趙也至是莊姬譛同括於晉侯曰将為亂欒郤為徵遂以無罪殺二大夫使欒郤知名義至重鬼神難欺不誣證其將則女子之譖未必遽行也悲夫天道不爽欒郤終皆有竒禍秋七月天子使召伯來錫公命君天下曰天子尊王以天則春秋書法也而此獨變其文者何葢天命有德故有命服之錫以示勸公於定王之喪不奔簡王之立不朝周縱不能聲罪致討何至為無名之錫王失其尊公安其寵故變文以示譏使習其讀者深求其意也冬十月癸卯把叔姬卒晉侯使士燮來聘叔孫僑如會晉士燮齊人邾人伐郯魯於晉靡役不從何必先聘而後㑹葢汶陽之田復使歸齊二三其德諸侯皆有貳心故先遣士燮道伐郯之意以嘗魯魯請緩師微示不滿燮設辭以恐動之遂連齊邾為是役其志重在於合齊魯而假郯以行郯為吳伐拱視莫恤迨其既成乃討事吳之罪晉無政矣衛人來媵鼔鐘于宫聲聞于外女有賢行雖處隱奥而婉嫕淑謹之聞自有不容掩者潛雖伏而孔昭也魯女之歸非一共姬適宋獨能致三國之媵媵至三國非禮然三大國以娣袂之良願備九女之列夫豈無故而然程氏以為一女子之賢尚聞於諸侯况君子哉九年春王正月把伯來逆叔姬之喪以歸叔姬之出未必皆其罪也來歸于魯鬱悒以歿把伯隙始而厚終至躬請其喪以歸意者天理之還歟抑以共姬致三國之媵起敬起慕而來歟按杞伯逆叔姬喪左傳以為魯請之公羊以為魯脅而歸之大約魯以逆喪為請而把屈意從之也原文所云不免附㑹夫血氣與義理為消長方其反目絶之惟恐不亟及其論定還之惟恐不勤說弧有合暌之理葢以是也夫婦三綱之一生睽死合雖愈於棄背而不返亦可以觀人道之薄矣公㑹晉侯齊侯宋公衛侯鄭伯曹伯莒子把伯同盟于蒲景公之世諸侯同盟凡五始焉清丘之同方同而隨異終焉蒲之同因異以求同皆非心之同也清丘人其卿以示貶蒲雖無貶辭而蟲牢之盟以己丑書馬陵之盟以戊辰書其謹若此蒲獨不日葢畧之也或謂日不日無關於褒貶然前之同盟皆日此乃畧之九國之同非淺事畧豈無意哉天下之理惟義足以激人心惟信足以固衆志奪魯已取之田歸之齊信義安在故諸侯貳而為是盟同葢一時之彊同也况執鄭伯於既盟之後自盟而自背之乎公至自㑹二月伯姬歸于宋夏季孫行父如宋致女晉人來媵世衰道微士君子以節行著曽不多見况閨門之子乎前是魯女郯伯姬來歸把叔姬又來歸其行豈無可疑者而共姬乃能使宋以卿納幣魯以卿致女衛晉齊先後來媵非肅雍卓然自拔於流俗能如是哉宜春秋錄之詳秋七月丙子齊侯無野卒晉人執鄭伯晉欒書帥師伐鄭疑生而蛇影墮機動而鷗鳥飛跡若可疑而未得其可疑之實遽發其機於逆詐億不信之地可乎鄭成公同盟于馬陵又同盟于蒲未有貳志也而楚以重賂求鄭正其用間之深鄭方㑹楚尋復如晉向背去就猶未决特在我有以繫其心耳執諸銅鞮使欒書伐鄭何其忿之烈也夫以鄭平時反覆情固難保而今焉誠欲叛晉必不如晉如而執之執而伐之既墮楚間遂為楚驅凡諸侯之我從者皆有不自保之意欒知范韓之為國謀者荒矣宜乎人晉以示貶冬十有一月葬齊頃公楚公子嬰齊帥師伐莒庚申莒潰楚人入鄆甚矣小國之為可憫也黄本楚之𨽻而從齊楚人伐黄齊不救而黄滅莒亦楚之𨽻而從晉楚人伐莒晉不救而莒潰夫以黄莒之從齊晉豈非慕中國之義而來以成其出幽遷喬之志而主夏盟者乃坐視豺狼之吞噬曾不為動其心即夷而存即華而亡即夷而安即華而危小國其誰不解體人徒見浹辰之間楚入莒之三都歸咎城惡而無備使晉出一兵以為之聲援楚亦何敢長驅深入如入無人之境哉書伐書潰書入之詳葢病晉秦人白狄伐晉狄一也有赤白之種晉於赤狄芟夷藴崇不遺力而白嘗為之用置不復虞秦乃用之以伐晉元氣存則金石皆我助憊則皆我賊矣景公末年信義不立奪魯田而魯之心離執鄭伯而鄭之心離至於無罪殺二大夫而國人之心離秦兵不向晉凡幾年一旦挾白狄以逞乘元氣之憊也此所謂國必自伐而後人伐之鄭人圍許鄭舉國何其無蜂蟻之心哉君為晉執國之鉅痛也凡為臣子者宜合謀并力脫君於坎窞之中非如晉人之反首茇舍征繕待命以歸夷吾則必糾合同盟之諸侯為釋宋公之舉而乃動大衆以圍無罪之許示不急君以為諼君難之不急而許之急乎鄭以反覆變詐為國機械既熟至施之君父而不恤且啓更立之争豈惟公孫申設謀之非通國同其罪可也城中城前嘗城鄆今又城中城盟主信義不足恃魯懲莒潰而有懼心矣然金城湯池必以人心為固而後能守魯自初稅畆作丘甲以來賦役日重且連嵗從晉於役民不得休人心不固而亟城焉春秋所必譏也十年春衛侯之弟黑背帥師侵鄭厚同氣之愛使之與聞國政人主之美意也然中人之情位禄不期驕侈而驕侈至非所以愛之也故弟聘弟盟春秋必譏而兵柄所屬尤深其譏豈惟蔓草不可除之憂哉有功而賞涉於私有罪而罰失於忍賞罰廢則軍國之紀綱壞此寵弟所以不帥師也是役衛為晉侵鄭以趣楚成晉之中乾外彊可見夏四月五卜郊不從乃不郊僖公四卜郊已凟矣卜至於五凟抑甚焉人君有以當上天之心而後可以見上帝鼎之聖人亨以享上帝是也公德不修政非已出無一足以當天心而欲舉郊見之禮宜其五卜而五不從也四月卜郊與僖同以此見魯季郊多用夏五月公㑹晉侯齊侯宋公衛侯曹伯伐鄭恩威伯主之大柄用之不得其宜則失其柄矣鄭伯既執之後鄭不急君而更立君晉歸之無名留之無益於是合五國之師以納之葢無策矣而又待襄鍾之賂乃釋伐不足以為威歸不足以為恩而惟賂是聞晉無仁賢為之謀也故鄭伯歸不書齊人來媵異姓來媵且至於三非禮也齊雖有所慕而來魯不宜受也夫朝廷侈於妬上婦人侈於妬下伯姬以至賢為三國所争媵故侈大其能容之吁螽斯小星而下此風不聞久矣姬賢矣哉豪傑之士雖無文王猶興姬其婦人女子豪傑也哉丙午晉侯獳卒秋七月公如晉晉侯重耳卒葬晉文公晉侯驩卒公子遂如晉葬晉襄公今公親如晉㑹景公之葬於事盟主之禮厚矣何為不書葬而書如文襄之覇君薨大夫弔卿共葬事視先王之制為己過今又以葬天王之禮會晉葬自七月徃越明年三月始告至非禮取辱甚矣故微其辭使若非為㑹葬而往者冬十月十有一年春王三月公至自晉晉侯使郤犫來聘己丑及郤犫盟夏季孫行父如晉魯之不亢甚矣予田而復奪伐國而强從往朝而不敬㑹葬而見止今又要之盟而親與大夫盟行父即如晉報聘雖曰晉未可貳盍思所以振起吾國之道乎孟子曰人役而恥為役知恥則將有所激而自奮魯其甘心人役者哉秋叔孫僑如如齊間于人者離必合晉以汶陽田執齊魯軒輊之權有年魯既重辱始悟墮晉人之術而受其愚遂與齊復修甥舅之好匪冦婚媾何尤哉所恨魯君臣悔悟之不早冬十月十有二年春周公出奔晉王公坐而論道相須一體何可有毫釐之間周公楚惡偪争政不勝怒而出奔君臣兩失其道矣然不奔他國乃奔晉恃卻至方有訟田之憾於周也凡自周無出出則所適之國猶周索之外非吾宇下矣葢參譏之夏公㑹晉侯衛侯于瑣澤笑語于怒罵之餘摩撫于朴撃之後皆矯情飾貌之為也晉既成于楚欲有事于秦狄而慮公以見止之憾或不我從則諸侯相視而解體於是挾衛㑹魯于瑣澤以示相親睦將有大役於我而外為之禮貌也故敗狄未幾乞師㑹伐秦秋晉人敗狄于交剛冬十月
