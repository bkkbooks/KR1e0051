body:
  text: 春秋説卷十宋洪咨夔撰僖公上元年春王正月按左氏共仲使卜齮賊閔公于武闈成季以僖公適邾共仲奔莒乃入立之公羊曰桓公使髙子将南陽之甲立僖公而城魯合而論之季友挟齊而立公也日旦於隂伏風𤼵之餘春囬於窮冬沍寒之後國家禍亂天所以開聖賢之君也衛既殺伋惠公懿公禍不旋踵已而賢如文公者出而衛復立晉既殺申生奚卓惠懷亂靡有定已而賢如重耳者出而晉遂伯魯自桓公弑隠溢為文姜哀姜之禍再弑㡬亡國已而賢如僖公者出能遵伯禽之法儉以足用寛以愛民務農重榖而魯再振是雖傾否返剥理數當然而觀變熟則心志老渉事多則血氣定操心危則謀慮深思治切則作為果與優㳺沉酣於富貴而不知艱難者異矣春秋作於魯以魯有可變之資望之蓋切其望僖公尤切觀魯頌介商周之間可知已公能充其天資加之學力且合衆賢為之助紀綱修法度立因周而用魯髙屋建瓴之勢未必不易於齊晉而悠悠以老嵗月坐閲桓文襄穆之伯更王迭衰東西奔走從人之不暇而詩人所以期望頌禱不能自已者竟無以慰滿人意豈不重可惜㦲亂立故不書即位齊師宋師曹伯次于聶北救邢夏六月邢遷于夷儀齊師宋師曹師城邢邢周公之裔再有狄禍伯主之羞也桓公初救邢直前不顧如觧倒懸之急再救邢次而後救徐行撲焚得無緩乎邢雖救而不免於遷緩之咎也然行三軍者臨事而懼好謀而成畏三軍者量敵而進慮勝而㑹兵不可直遂敵不可輕視也况今日已滅衛之狄非復前日初伐邢之狄冐然奮擊勝固甚善脱不如意其勢愈張故聶北之次宋曹既集觀釁俟機而後進如審固之鏃𤼵必破的何敵之敢當前救以人今救以師視勢而為之輕重也師逐狄人具邢器用而遷之師無私焉邢遷如歸且合衆師城夷儀以弭後虞其為邢謀蓋深於初救邢之時矣書三國次聶北救邢以著其緩再書三國之師城邢以著其勤功過不相掩也秋七月戊辰夫人姜氏薨于夷齊人以歸哀姜通於共仲再弑皆與聞其故桓公自邾召而殺之以義斷恩也其曰薨于夷猶桓公之薨于齊也曰齊人以歸齊以自薨為辭而歸我使我得而受也按以歸之義左傳榖梁俱謂以喪歸齊原文獨從胡傳作齊以歸之于魯汪克寛纂疏云以歸之後越一百七十日而喪始至魯則此條觧作歸齊者為是謹訂于此楚人伐鄭八月公㑹齊侯宋公鄭伯曹伯邾人于檉荆伐鄭之後八年而書荆人來聘以人麗州猶未齒中國也荆再伐鄭之後八年而書楚人伐鄭以人麗國則與吾齒中國矣坤之初六履霜堅氷姤之初六繋用金柅蠢爾蠻荆遏之於共㣲猶易為力日進日盛其何以制之桓公圖伯以來楚自州而人自人而國風聲氣􅆋其進未艾豈得不遺伯主之憂六國㑹檉鄭與其列是楚師已退為鄭謀所以禦患於方來者其必有成畫矣然猶不輕動也九月公敗邾師于偃共仲之難季子以公適邾夫人亦孫于邾公出入之間邾無毫髪之助故哀姜既薨之後即有是役設詐以取勝逞憾以决忿而不顧于檉之㑹其為初政之累蓋多冬十月壬午公子友帥師敗莒師于酈獲莒挐魯以賂求慶父于莒莒人歸之及宻聞奚斯之聲而縊天下之惡一也陳不得賂不以宋萬歸莒不得賂不以慶父歸其以天下之惡為利乎酈魯地莒師以索賂來至此而友敗之獲其弟挐公於是賜以汶陽之田及費是季氏得兵權擅公室之張本也莊公之立公子慶父首帥師伐於餘丘而得兵㡬成亡國之禍僖公之立公子友帥師敗莒而得兵遂開專國之釁慶父之謀淺而狂其禍速季友之謀深而狡其釁遲而三家分魯主之者卒季氏也其帥師皆以公子書春秋之慮患深矣十有二月丁巳夫人氏之喪至自齊大義滅親桓公固得以行伯討而同氣之愛必有不忍之心存書氏不書姜以示貶且為齊隠也秋七月以薨歸越四月而後告至邾莒之師在境敗邾敗莒而道無梗喪始能來也明年以小君之禮葬子無絶母之道寜過于厚也公之喪至自齊夫人氏之喪至自齊春秋皆有惨怛悲痛之意二年春王正月城楚丘旄丘之詩狄人逼逐黎侯衛不能修方伯連率之職狄既逐黎衛亦有狄難定之方中衛為狄所滅東徙渡河野處漕邑齊桓公攘戎人而封之文公徙居楚丘始建城市營宫室得其時制百姓説之齊能修方伯連率之職也然城不係之齊楚丘不係之衛而併屬之魯蓋攘狄之功齊主之城衛之功魯主之楚丘在衛已不能有是役告功而後衛得以徙居保與國而輔伯業公之力居多此與木𤓰之美齊桓正相表裏也若曰齊不當專封故㣲之則衛自康叔以來其封已久今不過城之而已豈可遂以為封哉城邢亦此意學者無以序詩者之辭而揣聖人之筆夏五月辛己葬我小君哀姜虞師晉師滅下陽晉欲伐虢虞不假之道則下陽不滅下陽不滅則虢不亡虢不亡則虞尚能自保躐序虞于晉上誅虞公用心之不仁而自貽禍也入春秋六十餘年齊魯宋鄭曹衛陳蔡諸國㑹盟聘伐無虚嵗晉獨至此始見亦未嘗從伯主之後深養安全之功靜觀紛紜之變規模堅定非便儇輕佻者之為國雖多難而重耳一出遂伯諸侯百餘年主諸夏之盟龍蛇之蟄以存身此所以成久大之業秋九月齊侯宋公江人黄人盟于貫貫之盟大國言齊宋逺國言江黄其餘莫敢不至伯圖之盛也夫仁言不如仁聲之入人深桓公之伯滅譚滅遂降鄣遷陽非不足以震盪人之耳目人心終不可強服前年城魯去年城邢今年城衛亂者使之定危者使之安亡者使之存救灾禦患之仁聞於逺近楚之與國如江黄知伯主之可恃亦驩然舍彼而從此是豈家濡煦手摩撫以得之哉聲所動也伯者假仁而行猶足以感動人心於呼吸之頃而况誠於仁者乎冬十月不雨楚人侵鄭三年春王正月不雨夏四月不雨徐人取舒徐僭王而黨楚舒亦楚黨也蠻夷自相攻伯主不之問而問楚楚服徐何足慮哉按趙鵬飛云考齊桓于荘二十六年伐徐蓋此後徐服于齊矣則取舒齊之謀也襲其不備而取之奪楚援也觀後楚疾徐而兩伐之齊為合諸侯而使大夫救徐則可知矣原文非是六月雨桑林自責雲漢知懼天人精祲之交間不容髪魯書雩書不雨屢矣僖公獨能勤民而閔雨飭過求已循省百官放佞臣郭都等理寃獄四百餘人而旱不為灾雨亦時應自今以始嵗其有之詩莫不鼓舞歌詠之暗室屋漏之地接乎神明實德真誠之感㨗于桴鼓春秋毎時書不雨見無時不以未雨為憂而六月之雨即此閔雨一念中來也洪範肅時雨若有民人社稷者其毋謂天道逺秋齊侯宋公江人黄人㑹于陽榖冬公子友如齊涖盟兼并易能也堅凝之難去年盟貫大而齊宋逺而江黄莫敢不至固足見人心之一猶未保其凝也今年㑹陽榖莫敢不至如貫而一者凝矣可即戎奚疑凡盟必質諸鬼神以為信㑹而不盟不待質諸鬼神而自信故委端搢笏皆諭厥志無障谷無貯粟無易樹子無以妾為妻循是行之與天下為公王道逺乎㢤楚聞此氣已奪未伐而先服矣是㑹公不與故季友如齊臨前定之盟以見從齊之固楚人伐鄭楚以鄭從齊之故去年侵今年伐而齊不之救齊豈忘鄭哉示不為鼷鼠𤼵機且以盡其黔驢之技也鄭知齊可恃膽壮力倍自足以抗楚楚不能得鄭其氣再竭而三衰明年我師出莫我當矣是之謂持重全勝之謀四年春王正月公㑹齊侯宋公陳侯衛侯鄭伯許男曹伯侵蔡蔡潰遂伐楚次于陘夏許男新臣卒楚屈完來盟于師盟于召陵桓公尊中國攘外冦之謀最為謹重蓋自㑹北杏始伯至于今二十有六年然後因侵蔡伐楚易曰公用射隼于髙墉之上獲之無不利藏器于身待時而動不中不𤼵也奮伐荆楚罙入其阻殷武之始以治楚為急征伐玁狁蠻荆來威采芑之終以服荆為難髙宗宣王中興之世猶不敢以小醜易視之矧中國之勢方微狄亦頡頏不可制何能亟與楚爭故帖荆䂓模必先治其在我者救鄭而鄭信盟魯而魯定城邢衛而邢衛安㑹江黄而江黄附于是合八國南伐自侵蔡始出其不意攻其無備初為無鐘鼓之侵繼為有鐘鼓之伐竒中生正堂堂而前楚望風斂手莫敢抗吾亦不以乘勝猛進為功而次陘修問罪之辭名正言順心和氣平雍容閒暇不竦不戁視楚猶巢中之雛特不舉手探耳而屈完遂來盟又退一舍再盟于召陵楚服堅矣中國之不淪于左衽者此全勝也夫伐宋伐鄭伐戎伐山戎皆以人救邢則以師惟是役躬率諸侯跋履險阻其嚴重何如㢤楚之大罪在自王不此之問而問包茅之不貢使可以辭對也包茅入則吾尊王之義行尚何求晉之伯也一戰而楚屈齊之伯也不戰而楚盟然而為謀之淺深用力之久近功效亦可見矣故曰五伯桓公為盛齊人執陳轅濤塗秋及江人黄人伐陳八月公至自伐楚公以伐楚至不以伐陳至本為楚徃也陳誤師行烏能無罪執其大夫而伐之抑甚矣初盟于貫繼㑹于陽榖江黄從伯之心既堅驅以伐楚宜無異志而侵蔡次陘不與焉示楚以吾謀之定吾力之全非藉小國掎角而後足以踣楚也淝水之役桓冲深以根本為憂遣精鋭三千入援京師謝安固却之曰朝廷處分已定兵甲無闕西藩宜留以自防夷吾之謀必有深于謝傅者矣故用江黄于伐陳不用于伐楚葬許穆公許男卒于次陘之後公未告至之前卒于師明矣凡諸侯薨于朝㑹加一等許男爵葬以侯禮此固周家之典不請于王而私加之是擅爵人也伐私伐執私執盟私盟爵私爵召陵之役伯業最盛而刑賞皆不出于天子其何以使楚人心服而不貳哉冬十有二月公孫兹帥師㑹齊人宋人衛人鄭人許人曹人侵陳公孫兹叔牙子公孫敖慶父子賊臣之子皆次第帥師季友所以培三桓之族也齊桓公不修其軍而以誤軍道執陳轅濤塗秋伐之冬又侵之克己之功不加故責人重于責己非伯討也陳鄭封畛宻邇濤塗以師出陳鄭國必甚病謀于鄭大夫申侯兩國同其利害申侯既善之乃自為反覆以供資糧屝屨媚伯主身挹虎牢之賜而陳受其討濤塗推心腹以待申侯申侯設機械以賣濤塗握手論心曾未轉盼而擠之千仭之穽其為人何如㦲夫自齊伯以來陳始終無貳心鄭則常懷首鼠之詐桓公不察大佞之似忠而樂其以利説使齊失主伯之體陳受誤伯之責諸侯一再奔走從伯服討陳之勞春秋書人以斥之不明不逺故也詩不云乎䜛人罔極交亂四國五年春晉侯殺其世子申生物欲一熾而父子不相保人心之危如是哉按檀弓君安驪姬而申生不敢言天下豈有無父之國而不敢行辭於狐突曰吾君老矣子少國家多難伯氏不出而圖吾君伯氏茍出而圖吾君申生受賜而死再拜稽首乃卒是以為恭世子讀至此未嘗不流涕也夫身受莫大之誣有死無懟而以君老子少惓惓為身後憂此心通天矣或以為大仁之賊其無天乎春秋父子之禍未有不生於淫嬖者而衛宣公之殺伋與申生無所逃而待烹其處死最可悲聖人録二子乗舟於新臺之後斥殺世子以晉侯伋申生之心白矣然獻公以驪姬之嬖欲致國於奚齊卓子而奚齊卓子皆不得其死視此可使為人父者知禍淫之戒為人子者知奪嫡之戒把伯姬來朝其子伯姬荘公女也歸把未再嵗而有洮之㑹愛之不以禮故多犯非禮方歸寜之時把伯踵之來朝聴於婦矣非歸寜之時以其子而朝無其夫矣陽皆失位而後隂皆失位故曰未濟男之窮也夏公孫兹如牟公及齊侯宋公陳侯衛侯鄭伯許男曹伯㑹王世子于首止秋八月諸侯盟于首止震為長子出可以守宗廟社稷以為祭主主鬯一揺豈宗廟社稷之福哉惠王以愛故欲易鄭立帶故桓公合諸侯㑹王世子以定其位世子君貳也諸侯不敢與齒書及以㑹固出於聖人正名辨分之筆桓公蓋亦知所尊矣秋盟首止諸侯自盟而世子不與可㑹不可盟也桓公此舉有功於王室甚大而不能弭母弟寵子帶之禍何哉首止非可㑹之地也世子從曰撫軍守曰監國今舍問安視膳之職而㑹于衛地請之君父乎抑自㑹乎伯主有志於定儲位帥七國之君朝于京師拜稽首而言曰元良萬國之本也立嫡萬世之法也不宜動揺臣謹帥諸侯願從世子于㑹惟王進退之王方倚齊為重且喜其來朝又知天下屬心於世子不可易必命之㑹嫡庶章明奸萌沮遏王室有泰山之安而伯功與日月參光矣不知出此而私為是㑹天王之意未囬世子之黨已立諸侯之心雖合鄭伯之志已離非所以為善後計也四皓之招十八學士之集卒莫能保合同氣之和其源皆出於此鄭伯逃歸不盟從王命人臣之職分也鄭伯以王命不與首止之盟而以逃歸書何罪之深耶鄭於周為宻王有命焉宜内告天王以重國本而福天下外告伯主以朝京師而决大義世子堅定王室尊安在一言以𤼵之言而不從執義在我拱立不盟夫誰能屈顧乃樂於撫女從楚之私而甘心為匹夫之逃其心在於幸亂而喜禍親僣亂而背中國故春秋深貶之楚人滅弦弦子奔黄弦恃江黄道栢之睦于齊不事楚又不設備是有取亡之道而得亡國之善辭以其心中國而力不足禦楚人齊不救而楚得以滅之也書子以著無罪書奔以見不死社稷猶譚子奔莒九月戊申朔日有食之冬晉人執虞公貪璧馬之利忘輔車之害虞已在晉掌握中矣宋公執滕子嬰齊以爵及名見而虞公非爵且不名虞已為晉晉用虞人執其君也雉誘於媒魚誘於餌以慾禍身固魚鳥之辜而設媒與餌者夫豈仁人之用心㦲晉襲滅虞修其祀且歸職貢于王信巧與經稱人以執其罪自不可掩矣六年春王正月夏公㑹齊侯宋公陳侯衛侯曹伯伐鄭圍新城秋楚人圍許諸侯遂救許批亢擣虚形格勢禁則自為觧耳此兵法也鄭以逃盟致伯討楚不急觧新城之圍而圍許攻其所必救諸侯救許而新城之圍觧楚固善兵矣然兵法十則圍之合六國之師僅圍新城一邑楚以其兵獨圍許豈楚力多於六國哉桓公志在服鄭不在舉鄭故紓徐以待其成楚志在得許而諸侯之救至知許不可得故釋縛焚櫬使復其所許之存伯主之功也冬公至自伐鄭七年春齊人伐鄭夏小邾子來朝前稱郳黎來今稱小邾子杜預以為始得王命何休以為齊桓公白天子進之經𫝊皆無據依蓋小邾本子爵而淪于殊俗始通于魯猶用夷禮故書郳書名猶楚之為荆至此能用夏禮而朝故進書國爵猶荆人之為楚子也若曰以王命進爵則郳為小邾亦併進其國邪鄭殺其大夫申侯申侯以賣陳病鄭受虎牢虎牢鄭險要而伯主以賜鄭臣是鄭之疆理齊得而擅之人臣可外交而有之無鄭君矣鄭文忌伯主之威藴怨未𤼵又美城以侈之雖㣲轅濤塗逞憾之譛其君能閔黙拱視乎因齊人來伐歸罪申侯下齊以救國而鄭去擅據險要之臣齊不我疑中其機矣申侯有取死之道故稱國以殺且譏專殺大夫秋七月公㑹齊侯宋公陳世子欵鄭世子華盟于甯母召陵之盟首止之㑹皆伯業之大者而陳以誤道討鄭以逃歸伐豈人心之難一㢤萃聚也利見大人亨聚以正也人心皆有是理故惟正可以聚天下之心責楚以共祭㑹世子以定儲尊周之名非不美而不能帥諸侯以朝周人有疑心矣甯母之盟非復前日之盛而陳鄭以世子來其携可知管仲彌縫桓公之闕使修禮於諸侯諸侯官受方物是又假尊王以令也仲知非王無以立伯胡不相桓公朝天子乎其曰招携以禮管氏而知禮孰不知禮曹伯班卒公子友如齊冬葬曹昭公
