body:
  text: 春秋說卷二宋洪咨夔撰隠公下六年春鄭人來渝平公糓曰輸左氏曰渝詩載輸爾載輸墮也易復即命渝渝變也輸平渝平辭雖不同同於敗其成也魯有狐壤之憾于鄭頃嘗從宋伐之其後鄭入宋郛公託行人失辭而弗救盖與鄭平矣莊公深狡其間魯宋之好猶張儀所以間齊楚方魯宋之好合則求與我平迨魯宋之情虧則其平遂變玩魯于股掌之上也弭怨聖人之所深喜起戎聖人之所深惡特書來渝平鄭之機心呈露無餘矣夏五月辛酉公㑹齊侯盟于艾公初有憾于齊鄭而求好于宋鄭平而宋遂睽宋睽而鄭復離前失乎宋後失乎鄭魯之勢孤矣於是與齊解仇為艾之盟既而㑹齊及鄭參盟中丘為師期以伐宋公可謂巧于植黨矣秋七月冬宋人取長葛去年圍今年取守者之力窮取者之力亦窮矣宜殤公有弗戢自焚之禍七年春王三月叔姬歸于紀諸侯一娶九女諸娣從之祁祁如雲一日俱從也伯姬歸于紀已數年其娣叔姬始歸之豈禮也哉二女同居其志不同行故刑于二女為難况其君之袂不如其娣之袂良尤易于上僣委小星之命安江沱之分惟情之止乎禮義者能之叔姬之賢必有見乎此滕侯卒諸侯薨赴以名滕失禮不以名赴故魯史不得而記之春秋亦不得而書之亡日亦然夏城中丘用民力于夏非時也不務徳而益城非政也不城外邑而城内邑非地也按杜預左傳注中丘在瑯琊臨沂縣東北則魯之外邑也洪咨䕫以為内邑葢誤讀公羊傳中丘者何内之邑也句而不知公羊傳内字苐作魯字解耳而公汲汲乎修舊城豈非為内難之備乎吾能以徳為險以道為藩以人才為干城以民心為保障中丘雖不城人將畏服之不暇若猶未也舟中之人皆敵國石城湯池何益哉齊侯使其弟年來聘齊非無他卿大夫可使而使弟年來聘親乎魯也時鄭伯有弟不能和恊餬其口于四方隠公以遜弟為名攝位七年未知致國之日齊僖乃能以玉帛之聘屬之介弟友愛之情見矣然位不期驕禄不期侈以貴公子使之㳺列國交諸侯豈所以為愛乎異時其子無知秩服比于太子卒釀襄公之禍此實胚胎之秋公伐邾公初即位首求好于邾為蔑之盟曾㡬何時遽有是伐盖攝位之始他國未有我親者故親邾以為媒既而宋盟戎盟齊又盟蕞爾邾何足顧恤於是棄好啟戎反為宋討將恐將懼惟予與汝將安將樂女轉棄予書伐邾以見公二三其徳冬天王使凡伯來聘戎伐凡伯于楚丘以歸中外之防自有定制少有忌憚其敢凌天子乎公之初攝假戎為重既㑹于潜又盟于唐滋他族于其室而天王之使屢辱不報戎知魯厚于戎薄于周有所侮而動間凡伯之來聘伐之于楚丘以歸聲揺氣撼旁若無人職魯之繇也故書伐以大天王之使重魯之責書楚丘以罪衛之不救書以凡伯歸以罪凡伯不能死八年春宋公衛侯遇于垂遇者不期而㑹期而㑹亦以遇名遇之詭者也殤公之不義宣公之無道味同氣合以幣交而為是遇其同人于宗吝者乎三月鄭伯使宛來歸祊庚寅我入祊鄭玩魯如嬰兒操縱闔闢皆在其術中前年方來渝平今又使宛歸祊其志在于得許田故先以祊餂我使動於利而惟已之從也鄭以宣王母弟賜湯沐邑于泰山下而近于魯魯垂涎非一日特未有以𤼵其機鄭莊交惡于周舉以歸我公不顧禮義之逆順即入而有之豈惟勢利之交驟睽而忽合為可羞予非所當予取非所當取逆計王之不復東巡而擅地以行其私無周之心著矣夏六月已亥蔡侯考父卒辛亥宿男卒諸侯不生名死以名赴故書蔡宣公葬宿男不葬㑹則書不㑹則不書秋七月庚午宋公齊侯衛侯盟于瓦屋周禮有司盟之官諸侯有盟王朝實司之成王賜周公太公之盟是也春秋則私盟不告于王忠信交喪盟詛滋彰于是乎又有參盟瓦屋參盟之始也是盟齊侯平宋衛宜主㑹而首宋盖殤公恃强蔑義銳然有雄長與國之意故相與陽尊而陰貳之未㡬齊合魯鄭致伐何盟之足恃哉八月葬蔡宣公九月辛卯公及莒人盟于浮來道義明則君位尊紀綱修則國勢重顒顒卬卬如圭如璋人將望而起敬何敢易而侮之公以周公之系千乘之國位勢非不崇也而莒敢以㣲者敵我于浮來盖人求于我則我重我求于人則我輕公有求于宋而宋以卑者盟于宿有求于戎而戎以小國盟于唐今又汲汲于莒而莒得以人盟之重之為泰山輕之為鴻毛在我而已此君子所以戒自侮也螟冬十有二月無駭卒公子益師公子彄者賜族之大夫無駭俠皆未賜族之大夫若曰無駭以滅國去族終其身是聖人絶人自新之塗也其可哉九年春天王使南季來聘明王奉若天道樹后王君公承以大夫師長上之臨下下之事上等級相承如堂有陛所以定民志而立人極也故諸侯知所以事天子則大夫知所以事諸侯大夫知所以事諸侯則陪臣知所以事大夫廉陛之分明僥覦之志絶天下國家可保也否則下陵上替無以事上其何以使下乎魯周公之後四方於是乎觀禮我知尊周列國誰敢不尊周周尊則魯亦尊矣公即位九年未嘗躬執玉帛以朝王靈輕辱間年再聘且侈然傲視莫之答撤藩夷級既無以示絜矩之道則公子翬無君之心其可遏乎書王以天天尊地卑截然之大分不以世道陵遲而遂隳也三月癸酉大雨震電庚辰大雨雪禍亂天所以開聖人災異天所以愛人君鍾巫之禍機已成八日之間變異沓至陽方淫泄而為震電隂復堅凝而為大雪天畏棐忱懵不知悟而危亡應之矣故嘗謂春秋家以某變占後日某事之應不若以某變推前日某事之感俠卒夏城郎按左氏元年夏四月費伯帥師城郎郎之有城舊矣城之未㡬而又城非有警遽何用民力之亟耶觀其城皆以夏城中丘城祝丘亦以夏非惟農時有妨而前役之茍簡滅裂可想已掌固掌城郭溝池之固圖之堅也魯人三郊三遂峙乃楨榦儲之素也土功龍見而戒事火見而致用水昏正而栽日至而畢作之時也儲峙於未役之先興作於農功之暇而栽於盛隂用事之時霜潦斂縮土脈凝栗雷臿雲杵易為堅宻用能一勞而永逸夏則陽氣張而土脈奮凝者渙而栗者疏不可以為固宜其為異時屢戰之地秋七月冬公會齊侯于防宋致忿於鄭屢矣至此鄭挾王命告齊魯而伐之以報長葛之役齊欲從鄭而伐宋則瓦屋之盟背之為不義欲助宋而卻鄭則王命之臨違之為不恭故與公㑹而謀之謀其私也謀定而後㑹鄭于中丘為師期十年春王二月公㑹齊侯鄭伯于中丘夏翬帥師㑹齊人鄭人伐宋宋殤公愎鄭莊公􅃛愎者恃强以逞􅃛者用深以濟觀克段于鄢鄭伯於手足骨肉之間猶任智數以勝之况謀敵乎桓王即位周鄭交惡王之待鄭鄭之事周可知矣而鄭欲釋憾於宋將合與國未必其我從於是假尊王之名以宋公不共王職矯王命而告伐其用心險為術深齊魯皆在其牢籠鼓舞之中而不自知故中丘之㑹伐宋之役皆鄭意也而主之以齊至得地則歸之于魯主之齊則尊王者鄭之公歸之魯則取邑者魯之私其智數何如哉翬再書帥師㑹伐之専無君之心不可復遏矣六月壬戌公敗宋師于菅辛未取郜辛巳取防公初即位以宅非所據求好於宋宋乘其急使㣲者與為宿之盟公不暇與之較也而於心終不平故勉强從翬㑹伐鄭之後鄭入宋郛弗救至是挾齊鄭合攻之勢又親敗之于菅十日間連取兩邑逞憾何其烈乎再書取甚之也秋宋人衛人入鄭宋人蔡人衛人伐戴鄭伯伐取之鄭師在郊而宋衛入鄭用力為甚易擣其虚也宋蔡衛伐戴而鄭還師伐取戴用力為尤易制其憊也葢鄭伯巧于兵潜軍敗燕三覆衷戎皆出人之不意而此舉為尤巧方宋人乘勝逐利移師以伐戴雄心益張驕氣可掬視戴葢囊中物也而竭三國弩末之力不能取戴鄭乘三國之憊且戴已揺于是談笑收漁人之利而戴為鄭有是宋獵而鄭獲也其曰併三師取之過矣冬十月壬午齊人鄭人入郕鄭以畿内伯為王卿士屬近而勢宻果能推誠尊周何謀之不濟而義不勝利公不勝私取麥取禾歸祊易許每有無周之心王亦心薄之然矯權竊命猶足以號召與國制勝敵邦故伐衛鄙以王師入宋郛以王師告齊魯以王命郕人不㑹又討其違王命鄭師所至輒以勝告假王室之威也齊桓晉文之伯挾天子以令諸侯其實莊公開之十有一年春滕侯薛侯來朝歉者幸人之親已盈者樂人之尊已公内歉外盈故偃然受非禮之朝也且宰咺武氏子及凡伯南季之來傲視王室曽不遣一介拜賜何望朝周魯不知朝周滕薛乃旅朝于魯受之安乎况小國之仰大國如百榖之仰膏雨故相與盡事大之恭而芘焉公不自芘能芘乎人哉夏公㑹鄭伯于時來秋七月壬午公及齊侯鄭伯入許伐許之役謀之時來而後動合三國之兵以壓蕞爾之邦志在于得也既入其國乃知非義齊以歸之魯而魯不敢有歸之鄭而鄭不敢居卒使許叔公孫獲分東西偏處之以此見義理之在人心雖人欲横流中未始泯滅也冬十有一月壬辰公薨誠者物之終始不誠無物公與桓皆庶而公長嗣以長立國人未必有異議也公顧以攝自詭攝可暫不可乆乆攝而不歸上帝臨女詎可以智力欺哉公子翬窺見其不誠於遜桓於是進殺桓之謀方進是謀公聲翬罪而誅之猶可遏䜛人交亂之萌而且聽且卻特以菟裘將老為遷延展轉之計翬之反譛所以得行於桓也故賢公以遜愛之過也罪之以簒疾之過也善不至遜惡不至簒權其心而論之其惟慕遜國之美名貪有國之實利而為偽乎偽未有不敗者也夫君臣之分猶乾坤之不可易公雖以作偽賈禍魯為秉禮之國亂臣賊子宜即討亂臣賊子之不討通國之罪也與國之罪也方伯及天王之罪也薨公而不地不𦵏春秋所以存天地之大義明古今之大戒而立人極也歟
