body:
  text: 春秋説卷二十七宋洪咨夔撰定公上元年春王先君不得正其終則嗣君不得正其始魯蓋有之矣而首年皆以正書公獨無正何哉君位曠也夫正者王之所為天子班之諸侯禀之朝㑹廟謁出政布令於是乎用之所以謹人時之端嚴天道之奉也昭公薨太子衍廢而公以介弟未入意如蓋以君自處矣國無君而上卿自君行月正元日之禮天道失常人極失序聖人深懼焉故削其正以存萬世綱常之理以遏亂臣賊子之萌况正者所以正不正也公不得正其始可不思所以正不正於其終夫子為大司㓂齊人歸疆攝行相事與聞國政魯於是大治使久其用推所以正一國者正天下過化存神之妙範圍曲成之功皆公之歸矣奈何氣卑而志偷納於邪為易矯於正為難餂援立之私恩忘沮逼之大辱嗜慾動而精神昏便佞進而耳目亂女樂一受三日不朝邪長而正消前功隳矣其何以正季氏之不正哉此所以始於無正終於無冬三月晉人執宋仲幾于京師晉魏舒合諸侯之大夫于狄泉不以靖王城而以城成周齊髙張後期宋仲幾不受功蓋窺其無靖亂定功之實意而敢於慢令也晉苟欲以仲幾為戮天威咫尺請命而討與列國共棄之豈不名正言順而不請于王擅執于京師京師豈晉執人之地乎近在京師不請而執是無王也既執知其不可然後歸於京師已晚矣故書執于京師不書歸于京師以著其罪夏六月癸亥公之喪至自乾侯戊辰公即位即位不日而謹日志曠君位之久襲君位之亟也君薨而冢嫡立天地之常經古今之正義也太子衍在季氏亂大經廢正義而欲外求君亦宜早定顧遷延至夏叔孫逆喪始以公子宋主社稷羣臣之願告子家喪及壞隤而宋先入正棺兩楹而宋即位國無君者半年餘意如蓋行君事矣太子不立公子不召意如身行人君之事與國無異辭莽浞之惡可動也而反覆躊躇不敢動謂畏王法之誅耶京師之卑為己久畏同盟之討耶諸國之柄皆下移畏國人之不我與耶民知有季氏不知有君殆非一日然則意如敢於擅廢立不敢於攘大位果何所畏而然耶吾夫子講道於洙泗之上無非為扶植綱常計衞以正名為先齊以君君臣臣為本季子然問由求告之以弑父與君亦不從季康子問殺無道就有道告之以焉用殺八佾之舞泰山之旅皆明斥而深譙之凛凛乎秋霜烈日之不可犯其所以戢亂臣賊子之萌不待春秋作而後見此意如所以睥睨大位久而不敢動也曹操垂涎漢鼎終其身不敢簒論者歸之東都節義之力蓋有見乎此秋七月癸巳葬我君昭公桓公薨于齊䘮至自齊自丙子至丁酉纔兼旬乾侯雖晉境其去魯幾何昭公䘮至乃閲三時之久季孫固無心乎歸其䘮也䘮至踰月即葬其禮殺矣逐君而客死死又廢其嫡旅䘮久不至至又薄其葬且欲溝絶墓兆而惡其諡意如罪通天矣方且夸示得意用立武宫故事立所不宜立之宫以伸禱賜之報欺天人而誣宗廟小人而無忌憚哉九月大雩立煬宫冬十月隕霜殺菽十月納禾稼黍稷重稑禾麻菽麥菽之登其時也前是大雩為旱禱旱暵之餘毛澤俱盡而菽僅存其熟必晩又隕霜殺之民食何望乎季孫之惡通天而莫之討怨讟勃鬱乖盭薫蒸故民被旱霜相仍之禍二年春王正月夏五月壬辰雉門及兩觀災秋楚人伐吳冬十月新作雉門及兩觀諸侯之宫外門曰臯門朝門曰應門内有路門天子之宫加庫雉觀綿詩則諸侯無雉門明矣魯有雉門又設兩觀僭也魯之僭難於盡書春秋每因事而書災始兩觀延燎雉門門闕所以出號令布典章季氏大惡未討號令典章掃地矣故天示變以儆懼之人言不恤天災不畏方加其度作而新之其心固以逐君為能僭上為常也異時夫子誅少正卯於兩觀之下使早執國政必有以處意如矣三年春王正月公如晉至河乃復權臣鉗制其君之術行乎一有舉動之初則威約所及無不惟意之從推童牛之牿而反用之也公嗣立以來未嘗一跡渉境上始朝於晉即拒其來使之㗳然䘮氣而歸大國有以恐於外則權臣易以制於内其范獻子為季氏地歟吁昭公以見拒而不克立公又何所恃而立哉二月辛卯邾子穿卒夏四月秋葬邾莊公冬仲孫何忌及邾子盟于㧞四年春王二月癸巳陳侯吳卒三月公㑹劉子晉侯宋公蔡侯衞侯陳子鄭伯許男曹伯莒子邾子頓子胡子滕子薛伯把伯小邾子齊國夏于召陵侵楚同盟平丘之後晉侯不㑹諸侯已二十餘年至是楚與吳越之爭方拏劉文公志於攘夷尊夏而中興周乗王室之定與晉協謀糾合十有八國為此㑹以圖伐楚諸侯幸濶典之修而樂於相保無一人有異志自桓文迭伯以來未有如是之盛也然侵楚即還自是大㑹同遂絶筆其故何哉晉六卿嗜利自私植黨角立定公弱不能制内憂方深何暇嗣伯之問是㑹劉子主之晉不得已從之故謀方合而隨沮已殆之疾暫甦垂滅之燈强明其能久耶春秋謹錄而詳序之所以著伯業之終且悲劉文公有志而莫遂夏四月庚辰蔡公孫姓帥師滅沈以沈子嘉歸殺之沈蕞爾國其去來何闗諸夏之輕重晉以不㑹召陵使蔡伐之諸侯之㑹未旋軫蔡已滅沈執殺其君怙勢作威倚法以削何其毒之烈也晉嗾獒而蔡假虎罪有歸矣故書滅沈於㑹召陵盟臯鼬之間五月公及諸侯盟于臯鼬㑹于夷儀而同盟于重丘㑹于平丘而同盟于平丘㑹盟蓋一事也召陵既㑹公又及諸侯盟于臯鼬是盟公志也公内受制于彊臣外見拒于大國凛然懼無以自立故因諸侯之㑹汲汲求為是盟以假重操心危矣夫君子正位居體不求為可重之道而欲倚人以為重人何能為我重哉把伯成卒于㑹六月葬陳恵公公在㑹未至而㑹陳葬季孫專之也事無鉅細皆其所專春秋特因事而見許遷于容城秋七月公至自㑹劉卷卒天之所興則必為國而生賢天之所廢亦必奪賢者以空其國劉文公合諸侯于召陵謀伐楚十有八國翕然響應雖沮於晉荀寅之取貨侵楚即還使尚亡恙後舉或可圖也奈何天不祐周㑹至而卷卒矣因春秋錄文公卒葬未嘗不悲孔明之用心葬把悼公楚人圍蔡晉士鞅衞孔圉帥師伐鮮虞蔡以一裘故拘于楚者三年歸而從晉于㑹滅沈于行楚於是肆忿以圍之其勢亟矣晉之捄蔡宜若救焚拯溺之急乃與衞共伐鮮虞鮮虞何罪而屢伐哉避强而陵弱舎急而趨緩晉之無志於諸侯可知已葬劉文公冬十有一月庚午蔡侯以吳子及楚人戰于柏舉楚師敗績楚囊瓦出奔鄭自下者人髙之自後者人先之吳急蔡難惟蔡是以而春秋進之以子以其患難相救有中國之道也且以愧晉也凡師能左右之曰以吳方彊蔡能左右之何故蓋掎鹿雖貴於共踣連雞尤難以俱飛吳子身在軍行而開闔進退一聽於蔡怨深則報必慘勢急則力自倍遂使蔡得以逞憾于楚而敗其師雖蔡以吳實吳以蔡也世道溷濁士檢凋䘮晉大夫如韓宣子范獻子猶不免以賄自累而楚大夫之賄者如公子壬夫追舒及申皆以殺其身令尹子常之所聞也縱慾不懲嗜賄滋甚以求肅爽而止唐成公以求佩裘而止蔡昭侯蔡怨既深挾吳致死楚師告敗且入郢矣知不能逃三公子之誅於是出奔于鄭見利則趨不顧國仇見害則避不恤國禍為大臣而若此社稷何賴焉前書楚敗績後書吳入郢所以蔽囊瓦之罪嚴矣哉庚辰吳入郢鞭平王之尸妻昭王之母皆狄道也故吳以號舉敗楚則進而子之入郢則退而國之狂聖易念中外異書栽培傾覆皆其自取聖人之所以為天也凡師入國都如入把入許入曹入滑皆以國見兹入不曰楚而曰郢楚不能國矣子囊遺言築郢城囊瓦復増修以自固非無先事之備也而政以賄成刑以讒用貪功而甘受舒鳩人之誘忌能而不用沈尹戌之謀行之以修怨濟之以不仁及國有難則去而違之大臣若此此吳所以長驅深入如渉無人之境城何足恃哉信乎無仁賢則國空虛五年春王三月辛亥朔日有食之夏歸粟于蔡救災恤難與國之常今蔡受楚圍魯歸之粟豈季平子為政果以周亟為心哉蔡為晉滅不㑹召陵之沈用吳敗戰于柏舉之楚兩大國所與氣勢翕赫故用是以結之不然忍於其君而不忍於與國之饑有是理乎於越入吳吳方入郢越已入吳螳螂捕蟬不知黄雀之在後也楚越吳之彊使非其自為牽制中國當益微矣然吳之入郢不稱子楚為吳入不稱楚越之入吳又以於越稱之雖吳越自相攻中國之幸而封豕長蛇互吞迭噬聖人所深惡也六月丙申季孫意如卒卿大夫之卒著日其禮有加也仲遂負弑君之大惡而日卒意如負逐君之大惡亦日卒人君徳其援立之恩而厚送終之禮故謹録之况王法不行伯討不加與盗跖膾人肝於太山而死於牖下均為天之未定聖人能無感于中乎秋七月壬子叔孫不敢卒冬晉士鞅帥師圍鮮虞六年春王正月癸亥鄭㳺速帥師滅許以許男斯歸許叔入許之後遷于葉又遷于白羽又遷于容城轉徙流落之餘其存者幾滅蓋易爾然滅後十年復見於楚子圍蔡之役雖滅即復矣屢滅屢復可信大嶽之後所馮者厚按春秋之世許凡四遷魯昭九年許又曽遷夷原文未及二月公侵鄭公至自侵鄭夏季孫斯仲孫何忌如晉避危而趨安者人臣擇利之心好專而惡分者同列忌功之意魯為晉侵鄭以討胥靡之役非無卿大夫可將而公自将蓋晉命不可違鄭亦非脆敵故以敵諉君不㨗則晉怒歸公㨗則制勝由己擇利而行也鄭俘之獻二卿偕往功不得而專焉亦足以知季仲相忌而不相下矣秋晉人執宋行人樂祁犂晉前執衞石買今執宋樂祁犂皆以行人書不失行人之職也祁犂聘于晉獻楊楯于趙簡子而不及范獻子故見讒而執范趙固皆利於賄而楯為兵器二子方陰有相吞之志爭尤急而怒尤烈也晉定公執與國之行人以快權臣之私忿不君可知矣冬城中城穀梁以為三家張公修城以自固公寄命虎口力安及此其實三家城之也陽虎專政欲去三桓而代之侵鄭之役陷季桓子報幣之行困孟懿子彼知不免於禍故自晉還即城此以自衞虎亦隨盟公及三桓於周社盟國人於亳社詛于五父之衢蓋我詐爾虞相防閑也季孫斯仲孫忌帥師圍鄆齊嘗取鄆以居昭公昭客死乾侯鄆為齊有故二子帥師圍之未幾齊以鄆陽闗來歸陽虎乃居之以為政陪臣益彊亂由是起紀綱不立政事不修而急於取邑得馬安知其非禍哉圍鄆之後斯屢疲民以逞皆何忌從臾之故忌去何以示貶微其辭若闕文然公羊以為譏二名二名多矣胡獨於此譏之七年春王正月夏四月秋齊侯鄭伯盟于鹹齊人執衞行人北宫結以侵衞齊侯衞侯盟于沙管仲以其君覇晏子以其君顯顯未易圖也况於伯乎凡伯之興必有義舉以激人心之趨非徒威所能濟也盟鄟陵以來晏子以晉失諸侯相景公圖嗣伯志非不鋭而行非其道召陵之㑹不親至又挾鄭刼衞同為叛晉之盟國夏帥師伐我且先歸鄆以居陽虎使為内應豈義舉乎此所以志大心勞而功愈邈大雩齊國夏帥師伐我西鄙九月大雩冬十月八年春王正月公侵齊公至自侵齊二月公侵齊三月公至自侵齊兵無常勝故勝不可狃公狃於侵鄭之勝連月再侵齊皆自行而再告至春秋重為公危之季孫專魯陽虎專季氏内難将起如燎之火不可遏而身去社稷逺趨敵境一進無功遂至于再輕佻何如哉曹伯露卒夏齊國夏帥師伐我西鄙公㑹晉師于瓦公至自瓦齊伐我晉趙鞅士鞅荀寅救我未及境齊師去公進至衞地之瓦而㑹之魯君㑹外大夫非一此獨以㑹師見而不言所以㑹非諱之也志公舉動之輕也一再侵齊翩然身往已犯危地矣晉政下移三卿皆有無君之志何有於我公以千乘之尊越竟造其軍中不以禮㑹而以師㑹可不為之寒心乎凡此皆見聖人惓惓愛君之意秋七月戊辰陳侯柳卒晉趙鞅帥師侵鄭遂侵衞葬曹靖公九月葬陳懷公季孫斯仲孫何忌帥師侵衞冬衞侯鄭伯盟于曲濮天下有伯則諸侯依伯而立天下無伯則列國人自為守及同舟之勢迫延燎之情危則相援相保以為安此鄭衞所以合盟于曲濮也晉失嗣伯之道齊摟鄭盟鹹刼衞盟沙於是趙鞅有鄭衞之侵魯二子亦為晉侵衞二國方急宜成於晉而晉政多門内難将作有不足恃者乃自相保聚為此盟自是晉盟㑹絶不講者二十餘年人心去晉不可以復收矣從祀先公盗竊寳玉大弓從祀先公盗竊寳玉大弓陽虎将去三桓順祀先公而祈焉是一説也陽虎始以昭公之主從祀大廟以著季氏之罪取媚於國人又一説也然以陪臣專政肆為不道何暇於祈何待於取媚特以季孫家甲之衆難於坐執因假先公之祀就拘於侍祠之時耳寳玉大弓皆祖廟之守藏每大祭則出而陳之既事藏之今祀先公悉陳於庭虎既拘季孫遂并刼弓玉而去莫之敢校然則從祀先公盗竊寳玉大弓雖二事實一事也夫去三桓則三家為虎有取國之寳器則魯亦虎囊橐中物少須殺季孫於蒲圃次第而圖之其志已暴白矣楚子問周鼎王莽取漢璽盗賊之謀大畧相似聖人目擊時事而畧日月且不及季孫之執陽虎之竊是乃所謂危行言孫抑微其辭以存國體也
