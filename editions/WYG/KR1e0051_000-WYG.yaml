front:
  text: 御製書洪咨䕫春秋說論隠公作偽事春秋以三𫝊為近古後世注疏家愈逺愈竒而愈不得其正即如不書隠公即位左氏謂攝盖引而不發似矣公羊以為桓貴則已失之惟榖梁一則謂成公志再則謂成人美終則謂輕千乗之國蹈道則未持論平正而不苛然三𫝊即能得聖人筆削之精義耶吾不敢信而後世操同室之戈炫獨出之見求勝人而反昧已比比是也如洪咨䕫春秋說之論隠公直以為作偽日拙吹求實已甚焉其言盖出於盧仝春秋摘微之緒論盧仝摘微曰隠越次而立乆不歸位外示攝而中實奪之故不書即位明春秋之所由作也是書乆佚惟宋杜諤春秋㑹義採其説今於永樂大典散篇内裒輯得之夫仝去三𫝊㡬千百年而咨䕫又去仝㡬四百餘年拾人唾餘而以為自出已見此何能欺千載之公論乎謂之為責賢者備猶屬左袒耳欽定四庫全書經部五
