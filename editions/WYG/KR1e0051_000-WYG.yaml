body:
  text: 洪氏春秋説春秋類提要臣等謹按洪氏春秋説三十卷宋洪咨䕫撰咨䕫字舜俞於潛人厯官端明殿學士事迹具宋史本傳是書咨夔自序稱自考功罷歸杜門深省作春秋説按本傳稱理宗初咨䕫為考功員外郎以忤史彌逺又言李全必為國患為李知孝梁成大所劾鐫秩家居者七年是書葢是時所作也又本傳第稱咨夔所著有兩漢詔令擥抄春秋說諸書而皆不載其卷數朱彛尊經義考引吳任臣之言云止三卷而永樂大典吳潛所作咨䕫行状則謂春秋說實三十卷今考是書篇帙繁重斷非三卷所能盡潜與咨䕫同官相契當親見其手定之本任臣所言葢後來傳聞之説耳其書明鬯而考據事勢推勘情偽議論尤多前人所未𤼵如以書公子友如陳為著季氏専魯之始以晉侯執曹伯負芻而不為曹立君正為異日歸之之地以書大蒐昌間為季氏示威于衆以脅國人皆得筆削微意惟謂慶父出奔為季友故縱謂劉子單子以王猛入王城為不知有君頗有紕繆然棄短取長其卓然可傳者不能沒也今兩漢詔令等書久已散佚此書亦無傳本惟永樂大典尚多載其文謹裒輯編次釐正訛舛仍分為三十卷以還舊觀至春秋經文三傳各有異同今咨䕫原本經文已不可見就其所説推之知其大槩多從左氏而間亦參取于公榖今並加案語附識其下又自僖公十四年秋至三十三年襄公十六年夏至三十一年永樂大典原本已佚而他家經解又絶無徴引無從輯補今亦姑闕之焉乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀自序帝王誥命訖于平王國風變于黍離聖人傷王者之不作因魯史修春秋以奉天命而立人極夫天命流行于人極之中無一息間斷人惟不知吾心有天而外求天謂吉凶禍福天未嘗定徃徃無天而動于惡然天雖有時而未定終必有時而定天者定則人者屈此人極之所由立也此春秋成亂臣賊子所以懼也彼亂臣賊子惟利是計豈懼夫空言之貶身後之辱哉懼夫天者定而人者屈失其所以為利也故凡犯天下之清議冒天下之大罪能逭諸一時不能逭諸異日能逭諸其身不能逭諸其子若孫人誰無愛身愛子孫之念知天命有不可逭則欲動于惡將有所懼而戢此撥亂反正之筆所以有功于人極也且易春秋在魯皆所以司天人之契人欲窮而天理滅其卦為剥春秋二百四十二年純乎剥者也以齊桓覇天下始末求之每四十年當一爻隂愈進則亂愈甚盟宋之後晉以天下之權授之楚而大夫専盟諸侯皆廪廪乎贅斿之危五陰之剥成矣其末又以天下之權授之吳吳楚與越參立而交横大夫各朶頥其國禍亂極矣而獲麟于西狩亂極必治安知無王者作此碩果不食剥所以不終于剥也春秋以傷王者不作而始以幸王者復作而終以魯聖賢之澤未泯一變可至道而託之以詔萬世天道至教聖人至徳備見于行事斷斷乎循之則治違之則亂得之則生失之則死信人極非春秋不立也余自考功罷歸杜門深省有感于聖人以天治人之意作春秋說天目洪咨䕫舜俞序春秋説自序考證第一頁後三行不能逭諸其子若孫句考平齋集本無若字今從永樂大典原文第一頁後三行知天命不可逭句平齋集天命作天定今從原文第一頁後七行以齊桓霸天下始末求之句平齋集避宋欽宗諱以齊桓作齊威今從永樂大典改正後倣此第二頁前七行違之則亂三句平齋集違字作失字又無得之則生二句今從永樂大典原文増改
