body:
  text: 春秋說卷二十五宋洪咨夔撰昭公三十有五年春王正月吳子夷末卒二月癸酉有事于武宫籥入叔弓卒去樂卒事仲遂卒于垂壬午猶繹萬入去籥而他樂猶故也叔弓卒于武宫涖事之所籥入去樂卒事他樂盡徹也君於卿大夫之喪恩痛不忍舉可謂得禮矣常事何以書公方畏三家之偪恩痛之禮有為而為之也况公居父之喪有嘉容居母之喪無慼容曠禮多矣乃獨盡禮于叔弓其心豈為禮哉公室卑而私家强禮有不容不盡者按叔弓乃叔􅆄後非三家之叔孫氏也原文舛誤夏蔡朝吳出奔鄭讒人罔極交亂四國不交則讒不行盜言孔甘亂是用餤不甘則讒不入費無極害朝吳有寵於平王而處之蔡欲去之乃以在下位辱怵之使求進又以二三子莫之如怵上之人使亟圖朝呉既逐又以吳在蔡蔡必速飛怵其君使忘逐呉之怒吳蔽於嗜進以為忠於己蔡人蔽於保位亦以為忠於己平王蔽於忌能又以為忠於己但見其效謀之甘莫察其交鬭之巧讒盜之亂人國大抵然也雲霓惡草反覆致意每讀離騷而悲之六月丁巳朔日有食之秋晉荀吳帥師伐鮮虞前伐以國舉此伐以將舉晉治狄不遺餘力荀吳為將率以變詐取勝善戰服上刑名氏不容隱也冬公如晉十有六年春齊侯伐徐殉貨者亡征利者危蓋古今必至之理伐燕賂以燕姬瑶罋玉櫝斚耳伐徐賂以甲父之鼎兩伐皆指齊侯為言景公貪利無厭也吁有馬千駟公非不富也而不能止牛山之涕寳賄充牣果為誰聚哉楚子誘戎蠻子殺之楚䖍誘蔡般與此誘戎蠻子或名或不名分有中外惡有鉅細故罪有輕重固也而誘之措心則同蓋人生有欲見利則趨自非有學問以燭理禮義以維心鮮有不為之動垂棘屈産之璧馬可以滅虞商於六百里之地可以敗楚豈非坐誘至此哉夫以力攻人猶有勝負以智罔人猶有中否以利啗人則百中百勝是知誘乃不仁之甚者列國非無巧詐相傾未嘗以誘書惟於楚再書誘其狙詐積染之俗然歟夏公至自晉成公以七月如晉三月至襄公十一月如楚五月至皆以送葬而留公此行往返涉三時之久謂以邾莒之事止公則既釋季孫不應復以為公罪蓋晉君幼弱六卿奢傲一以悠悠待公不省歲月之遷也晉以悠悠待公而不恤其留魯以悠悠待公而不急其歸展轉淹囘若是遲久公蓋無能為有無矣居鄆在乾侯此其權輿秋八月己亥晉侯夷卒九月大雩季孫意如如晉冬十月葬晉昭公十有七年春小邾子來朝夏六月甲戌朔日有食之秋郯子來朝公踐位以來如晉如楚如宋如齊君臣之轍無停歲而朝聘之自外至無幾君庸臣僣國勢日削宿交舊好望望不顧亦人情之常也而小邾及郯兩君獨能於列國疎棄之中相繼朝魯不以盛衰彊弱為之變可不謂賢乎觀小邾穆公能答賦郯子能對官名則皆嘗從事於學矣宜其知禮而好義八月晉荀吳帥師滅陸渾之戎荀吳在春秋最善兵其敗狄大鹵則舎車而崇卒其伐鮮虞則偽㑹而假道其滅陸渾則先用牲于雒師乗其不虞而從之詐謀陰計出入鬼神戰國孫吳廉白之徒皆襲其餘智以取勝帥師荐以名見所以示呉當服善戰之刑也陸渾自秦晉遷之伊川屢為王室患膺而逺之豈無其道獸獮草薙使無遺育則過慘矣況晉既滅潞氏又滅甲氏及留吁既滅肥又圍鼔以鼔子鳶鞮歸今又滅陸渾其用力諸戎惟恐一謀之或遺而楚人横行中夏蠶食先王封建之國以飽溪壑曾莫之問謀左甚矣詭道雖得何補所喪乎冬有星孛于大辰日者人君之象心者天王之庭日食屬邇星孛繼見是時王室替而伯主衰諸侯弱而大夫彊中國微而僭亂横天為之憂示以大變而有天下國家者不自憂其憂越四十餘年星再孛於東方而春秋為戰國譬彼舟流莫知所届悲夫楚人及吳戰于長岸呉楚自相攻中國之利也而長岸之戰春秋乃憂之蓋楚吳俱强不忌吾中國為兩虎之鬭勇為此戰也然天道貴陽而賤陰進陽而退陰中國陽也外域陰也中國力不足以制外域必假外域以制外域楚方虎視而吳鞭平王之尸吳方䲭張而越棲夫差於甬東此皆天所以助吾中國之不及也楚吳其無以目前之强為足恃哉十有八年春王三月曹伯須卒夏五月壬午宋衛陳鄭災宋先是災使伯氏司里火所未至徹小屋塗大屋陳畚挶具綆缶備水器量輕重蓄水潦積土塗巡丈城繕守備表火道使華臣具正徒令遂正納郊保奔火所使華閱討右官官庀其司向戌討左亦如之使樂遄庀刑器亦如之使皇鄖命校正出馬工正出車備甲兵庀武守使西鉏吾庀府守令司宫巷伯儆宫二師令四鄉正敬享祝宗用馬於四墉祀盤庚於西門之外樂喜之政也及是四國同日火鄭火作辭晉公子公孫于東門使司冦出新客禁舊客勿出於宫使子寛子上巡羣屏攝至於大宫使公孫登徙大龜使祝史徙主祏於周廟告於先君使府人庫人各儆其事商成公儆司宫出舊宫人寘諸火所不及司馬司冦列居火道行火所焮城下之人伍列登城明日使野司冦各保其徴郊人助祝史除於國北禳火於𤣥冥囘禄祈於四鄘書焚室而寛其征與之材三日哭國不市子産之政也其後桓僖宫火南宫敬叔命周人出御書俟於宫子服景伯命宰人出禮書以待命校人乗馬巾車脂轄百官官備府庫慎守官人肅給濟濡帷幕鬱攸從之蒙葺公屋自太廟始外内以悛公父文伯命校人駕乗車季桓子命藏象魏富父槐去表之藳道還公宫魯之政也宋鄭魯火政大畧相似而寛征予材哭焚罷市於燎息之後子産畏天恤民非諸子所能及後世講禦火之政者當参觀之毋徒諉之天道云六月邾人入鄅秋葬曹平公冬許遷于白羽十有九年春宋公伐邾人之患莫大於知非不改其非好義不純於義邾俘鄅而反其夫人向氏固知非矣而俘獲不盡反遂招宋人之討宋為向寧之請伐邾固義舉矣而圍蟲取之終歸於利故向寧不以為恩而隨叛比事觀之可鑒矣夏五月戊辰許世子止弑其君買此乃聖人耳目所接謹而日之實弑無疑也臣弑其君子弑其父極天下之大惡豈容輕加諸人止不知嘗藥而加以弑事有甚於不嘗藥者何以待之輕重有權褒貶有等春秋所以為禮義之大宗止以弑書則是奉藥以弑無疑矣傳者好竒喜異每以不弑為弑以實弑為不弑學者又曲說以濟之聖人維持綱常之意不明於後世者豈惟止事哉夫使止果以不嘗藥弑又因其哭泣自責而日卒時葬以免之是簒弑大刑亦可以悔艾自贖亂臣賊子尚何懼之有己卯地震秋齊高發帥師伐莒冬葬許悼公弑君之賊不討而葬舉國無臣子之心也魯不能討又往㑹其葬魯亦無臣子之心也時季氏有無君之志弑逆之國皆以禮接使國人狎見玩聽恬不為怪而已謀濟矣故蔡許弑皆書葬二十年春王正月夏曹公孫㑹自鄸出奔宋大夫有罪待放於境三年不賜之環則去禮也㑹待放於鄸猶覬其君追念先世喜時讓國之善而復之久而不復然後出奔信得禮矣書自鄸而不失族責曹君不能存賢者之後也非為賢者之後諱也亦非以賢者之後録也秋盜殺衛侯之兄縶鄭殺三公子曰盜衛殺君之兄曰盜蔡殺其君申亦曰盜國有肆行之盜莫之禁何以國乎縶以惡疾不立衛侯所當親厚崇䕶使無非意之憂雖縶狎齊豹以致禍自失保身之道而大盜縱横敢於犯貴非惟忘投鼠忌器之意抑且有剪薙枝葉之心紀綱法度蕩然矣故春秋書盜書兄以見衛之無政冬十月宋華亥向寧華定出奔陳十有一月辛卯蔡侯廬卒二十有一年春王三月葬蔡平公夏晉侯使士鞅來聘魯之事晉抑而愈篤卻而復前轍交無虛歲晉自韓起來聘不遣一介行李惠顧於我者十有九年幸而士鞅之來宜有仁風義氣披拂鼓舞使知大國之可親顧乃責加牢於禮法之外豈惟卑魯實君命之辱也周官行人之職上公九牢諸侯七牢多寡等殺截然不容紊鞅雖大國之卿何得逾諸侯而逼天子犯上者作亂之階六卿分晉於是乎決矣宋華亥向寧華定自陳入于宋南里以叛一日三大夫同奔一日三大夫同叛君之視臣如土芥則臣視君如冦讐宋元公之不君可知矣然人臣敢於抗君豈一朝夕之積哉華父督弑君不討而立華氏自是累世為司馬向左師戌外交晉楚以自封寧即其子習富而驕侈作積貴而簡傲生日益月長如火烈烈犯上作亂而不忌始焉君臣交質而盟中焉君臣析門而守終焉君臣分黨而戰害於國凶於家世權之禍也春秋譏世卿有以哉書自陳以著陳人助逆奉叛之罪南里繫之宋以著入於國都以叛非外邑之比秋七月壬午朔日有食之叔輒哭日食昭子知其將死日食固非所哭日之所以食則可哭也前是日有食之季平子有不君君之異志而吝於用幣權日益重禍日益深觀變察機有感於陰沴之侵陽安得不為國家慟哉昭子能知平子之心何獨不知叔輒之心八月乙亥叔輒卒冬蔡侯朱出奔楚莒展輿出奔吳北燕伯欵出奔齊蔡侯朱出奔楚或爵或不爵雖殊其不能保守社稷為其臣所逐則一也公即位以來逐君者三國此風寖長魯禍迫矣明知禍變之迫不思轉移之機而安坐束手以待亂過涉滅頂凶尚誰咎哉公如晉至河乃復二十有二年春齊侯伐莒宋華亥向寧華定自宋南里出奔楚衛孫甯逐其君而入於戚以叛恃晉主之也宋華向刼其君而入南里以叛恃楚主之也逆無黨莫濟其逆姦無朋莫容其姦故春秋於朋姦黨逆之罪為尤嚴方宋三大夫奔陳以陳乃楚所封奔之可得楚助釋君而臣是助太宰犯既以諫楚子亢不衷以奬亂人宋人又以拒薳越使無楚主其叛䟦扈猖獗雖甚何至出入國都如無人之境哉始書出奔陳繼書自陳入以叛又書自宋南里出奔楚其入也有所助其出也有所受所以深討主叛之罪也叛臣莫或主之庶乎不敢輕動於惡此聖人維持人極之至意大蒐于昌間中軍既舎之後公無一民紅及比蒲嘗再蒐民已曉知三家之為我主矣至是意如專國逾十五年蓋自南遺公子慭謀去季氏公與聞其故疑隙寖開逐君之謀矢加弦而未發于是又大為昌間之蒐使國人習見有私家而無公室少焉君逐而民聽不聳雖有不吾與者知吾有以制其變亦不敢動矣此釋甲執氷以踞之張本也先王以蒐苗獮狩納民於軌物季氏以是納民於不軌不物春秋所以深探其心而為魯懼夏四月乙丑天王崩六月叔鞅如京師葬景王王室亂天下之禍莫大於牽閨門之愛而壊室家之法獻公以嬖故殺適立庶亂晉者數世桓公以嬖故五子爭立亂齊者亦數世父不父子不子兄不兄弟不弟雖有家不能一朝處矣景王以太子壽蚤世愛庶子朝欲立之㑹崩單子劉子立太子母弟猛為王而朝作亂西土不靜亦惟在王宫邦君室其以室言蓋治亂安危皆由内始未有身正而家不齊家齊而國不治天下不平者也春秋大正本反自貴者始書王室亂所以示家法不立風化不正為萬世人君溺嬖縱欲徇私斁倫之戒且示諸侯莫有勤王叔鞅目擊其亂而不之圖魯罪其首也劉子單子以王猛居于皇秋劉子單子以王猛入于王城冬十月王子猛卒君前臣名王猛以名見而劉蚠單旗不名豈其有功於王室而褒之哉以者不以者也不以而以之則二子為有罪焉奚其褒夫得乎丘民而為天子未有民心莫知所宗大臣獨出己意廢彼立此而能保翊戴之功者也景王既崩國嗣未立以寵則朝以序則猛民心不能無惑大臣於是時以置君大義號召國人俾曉然知庶不可以干嫡私不可以勝公舉國相與戴猛王子朝豈一尹氏所能獨立哉而劉單主猛尹氏主朝分朋植黨以勢力為勝負而名義實不明於人心故猛居于皇入于王城惟二子之以國人未有與焉此所以亂靡有定也春秋再書劉子單子曰以著二子過自尊亢但知專置君之權不思為定君之計其罪與不知有君者等也王書名以違父爭立之故卒書子以未踰年之故十有二月癸酉朔日有食之二十有三年春王正月叔孫婼如晉癸丑叔鞅卒晉人執我行人叔孫婼行人以人執執不宜執也婼書如晉又書行人不失行人之職也誦詩三百使於四方不能專對者多矣而況見危能思致命乎婼以邾愬魯而使晉既舉周制以免交訟之坐又送冠法以免貨取之嫌所居館舎一日必葺以示不汲汲求脫之意逾年始釋受禮而歸可謂不辱君命矣婼蓋三家中之最賢者故春秋樂書之晉人圍郊先王並建諸侯以藩屏王室而同姓為尤重安危存亡之所同也晉文侯修扞於艱蓋識此意敬王之立晉師圍郊討子朝非無勤王之勞也而圍以人書何哉不誠於定王室之亂也方其亂起晉能如手足之䕶頭目糾合諸侯同奬王室大而齊宋小而邾把其誰敢不從顧乃委之悠悠待告急而後遣將方告閒而即班師列國拱視莫敢號召秦越肥瘠邈不相關卒致斷蛇不殊養虎遺患疽根内結客毒更滋天子至蒙塵於外閱數年而未定誠於修扞者如是乎逺稽成王封唐叔之意近考文公定襄王之謀安得不三歎於斯夏六月蔡侯東國卒于楚蔡為楚滅復為楚出其君廢置予奪之權皆聽諸楚故朱奔楚不書入東國卒於楚不書出然東國實貨費無極怵蔡人逐朱而簒其位卒而侯之所以著其嘗簒也秋七月莒子庚輿來奔郊公居喪不慼國人逐之而立庚輿庚輿虐而好劍國人又逐之而納郊公國君無道人心弗與失守社稷罪固莫逭而十年之間逐君置君如反覆手天理民􅂜㡬乎熄矣此魯人所以相觀而動於惡戊辰吳敗頓胡沈蔡陳許之師于雞父胡子髠沈子逞滅獲陳夏齧百鷙不如一鶚百羊不如一狼兵家所以貴於知彼知己也吳伐州來楚薳越帥師及諸侯之師救之令尹卒而師熸六國之從楚者宜審小大强弱之勢斂師與楚俱退而乃不量彼巳輕視大敵自與為雞父之戰吳師一鼔以詐勝胡沈之君幼而狂遂取滅身之禍陳大夫齧壯而頑亦因以見獲力既不抗智復相絶吳蓋恢乎有餘刃矣書敗頓胡沈蔡陳許之師而不書楚楚不與戰也天王居于狄泉王猛不書天且以名見違父志而爭立也敬王書天而不名猛卒丐立得兄弟相及之正也為政以德譬如北辰居其所而衆星共之居有常所雖在渙散之時王居所以無咎也今子朝在王城天王居于狄泉失其常所矣天王居于鄭以出書此不書出雖居失常所而未離乎京師之近境人心猶知所繫屬也然則居天下之廣居立天下之正位行天下之大道可不務乎尹氏立王子朝大臣世執國柄酣豢富貴而無學問義理以養其心勢足以行他不暇顧意所欲為人莫敢忤此天下國家所以禍亂相尋莫知底止也節南山之詩曰尹氏太師維周之氐不弔昊天不宜空我師世權之盛民怨之切已見於幽王之時至春秋初年尹氏卒又著世卿之譏越二百年其官猶世根據深而氣燄盛威約素而風指行軋嫡扶庶胎禍啓爭王猛既以之不安厥位敬王又以之不常厥居亂天地之常經隳古今之正誼皆世執國柄之為也故以氏書夫以子朝之立問於介衆而民不與用寳於河而神不受特尹氏一族君之耳是時毛伯召伯南宫極南宫嚚甘桓公與尹辛同黨子朝者而書立惟尹氏豈非以首從定罪歟八月乙未地震冬公如晉至河有疾乃復公如晉至河而復者四惟此以疾言蓋以著前是皆晉人之見拒今則叔孫昭子之執未有釋期不敢嬰其怒而進託之疾而返也夫仁者不憂知者不惑勇者不懼使在我無一毫之慊則千萬人吾往尚何盱豫次且之有公昏庸而淫慝既昧修身齊家之道有婼羈之可任而親親賢賢復兩失之故内見制於强臣外見凌於大國傷弓方甚河雖一葦可杭不敢渡也易曰困于葛藟于臲卼曰動悔有悔征吉奈何困而不知悔乎
