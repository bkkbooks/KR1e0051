body:
  text: 春秋説卷二十三宋洪咨夔撰昭公一元年春王正月公即位日月出而爝火熄雷霆奮而隂沴消君徳之賢明威重權臣所甚畏也故必擇昏庸而易欺便翾而易制者君之李斯不利於立扶蘇而立胡亥梁冀不利于立清河而立蠡吾王莽不利于立王侯長大者而立孺子蜉蝣出隂鴟梟鳴夜而天下大權盡歸其手或幸而不至於凡下則又以仇士良故智百方蠱之使氣移體變而不自知翻乾簸坤出沒神鬼欺雛紿寡惟意所為盖千古一轍也襄公薨子野嗣立而卒齊歸之子公子稠居喪而不哀在慼而有嘉容其童心國人莫不知之穆叔謂不度之人鮮不為患若果立之必為季氏憂武子不聴卒立之比𦵏三易衰其不度盖季氏之所利也異時以輕躁出之鄆棲之乾侯往來齊晉經營復入不可得而客死季氏之所利者於是乎遂矣嗚呼託六尺之孤寄百里之命果如是乎叔孫豹㑹晉趙武楚公子圍齊國弱宋向戌衛齊惡陳公子招蔡公孫歸生鄭罕虎許人曹人于虢㑹于宋序趙武屈建盟于宋一諉之諸侯大夫而不序盖㑹之時晉先于楚猶如故盟之時楚始先㰱尸盟諸夏權歸强楚不忍復序也今㑹于虢乃仍序趙武于公子圍之上如㑹宋時盖㑹盟于宋有異禮虢雖舊書加牲楚欲尋舊轍以軋晉然用㑹宋之禮不用盟宋之禮晉猶不失其尊也而聖人所憂者不在荆楚在中國湨梁大夫盟之後澶淵商任沙隨夷儀重丘諸侯猶以位序見至㑹宋盟宋之後諸侯掃跡城杞者諸大夫㑹澶淵者諸大夫㑹虢者亦諸大夫名分不正紀綱不張楚于是窺見諸夏之亡君尋大㑹諸侯及淮夷于申用齊桓召陵故事而荆楚擅中國矣是㑹趙武以為功春秋以為罪三月取鄆莒魯爭鄆乆矣疆場一彼一此何常之有似不必深責其取也而莒人弑君纔數月魯能聲罪致討則義明而威立何至乘亂幸禍為鼠竊狗偷計見小利而忘大義瀆盟伐國㡬墮楚手豈不甚可羞哉夏秦伯之弟鍼出奔晉兄弟異榦而同根知孝則知友矣景公不能存其弟以慰母心何耶鍼雖寵汰聞其母懼選之訓幡然出奔猶未至悍戾而不知過公誠能擇師傅以導之明禮義以示之可使折節就繩墨脊令之原不寒鳲鳩之愛常壹斯免戾于春秋矣六月丁巳邾子華卒晉荀呉帥師敗狄于大原凡敗某師皆以權數變詐取勝荀呉出堂堂之師與狄遇于太原舍先王車攻之法而崇卒誘之以拒角薄之于未陳當在善戰服上刑之科昔悼公修文襄之業無終子嘉父因魏莊子納虎豹之皮以請和諸戎卒蒙其利平公繼之君臣以玩愒苟偷為政尸盟大權拱手授楚而區區與小醜校一日之勝負今日所敗之無終及羣狄即前日所和之無終與諸戎雖以詐勝難于力服中外離心誰為我用晉自是益不競矣秋莒去疾自齊入于莒莒展輿出奔吳莒人弑其君而展輿立展輿雖非手弑立不討賊失君國之道矣齊納去疾而展輿出奔去疾繫之莒展輿不繫之子人心戴之則為君去之則為獨夫豈不凛乎其可畏哉叔弓帥師疆鄆田乘時射利者匹夫之行魯乘莒君之弑而取鄆又乘莒君之奔而疆鄆田季氏自以為得射利之機矣間人之危幸人之禍而覆出為惡春秋以取鄆疆鄆繼書之利故也𦵏邾悼公冬十有一月己酉楚子麇卒楚公子比出奔晉舍經信傳學者之通患也鄭伯卒于鄵其卒明矣左氏則謂子駟使賊弑僖公而以瘧疾赴楚子麇卒其卒亦明矣左氏則謂公子圍入問疾縊而弑之亦以瘧疾赴春秋以公天下為心楚雖蠻夷其弑頵弑䖍皆直書無隠何所私於圍而故脫之實卒非弑也圍動無君之心固非一日因郟敖以病沒殺其二子而奪之位公子比于是出奔觀共王之子圍為長一語伍舉雖巧為覆䕶其惡自不容揜何待加之弑而後知其惡哉公羊榖梁不言弑左氏獨言之此之謂失之誣按此條公榖無文而榖梁昭三年執齊慶封傳有楚公子圍弑其兄之子而代之為君之語考康王靈王皆楚共王庶子郟敖康王子則榖梁亦以麇卒為弑也原文失考謹訂于此二年春晉侯使韓起來聘夏叔弓如晉秋鄭殺其大夫公孫黑時黑將作亂駟氏與諸大夫欲殺之子産使吏數以三罪而縊可謂當其罪矣而黑不失其為大夫與公孫者殺出于駟氏及諸大夫之謀雖以子産之賢亦未嘗禀承君命正其當殺之罪也吁諸侯毋専殺大夫而大夫乃擅殺大夫世變豈不重可嘆哉冬公如晉至河乃復季孫宿如晉季世諸侯之事盟主率以過禮為勤文公卒魯始㑹𦵏不書其人是時猶用大夫送𦵏之常制至襄公卒書公子遂如晉𦵏卿共𦵏事是一變也景公卒公親往弔且逾年留送其𦵏是再變也平公嬖寵少姜卒公親往弔及河而還是三變也每變輒下卑弱已甚雖士文伯以非伉儷陽敬來辭而季孫往致襚服則安受之是重在季孫之來不以公至為重也春秋比書其事晉人抑揚之意魯君臣輕重之實昭昭矣吁禮人不答反其敬公盍退而痛念見卻之辱收歛童心飭厲君徳使人改聼易視起敬起畏以弭權彊偪逐之禍也三年春王正月丁未滕子原卒夏叔弓如滕五月𦵏滕成公秋小邾子來朝八月大雩冬大雨雹董仲舒謂諸雹皆有所漸脅之象劉向謂盛陽雨水温煖而湯熱隂氣脅之不相入則轉而為雹大雨雹為季氏脅君之象無疑也而雹繼旱禱之餘則隂陽戰矣葢公雖童心猶在受制權臣常有不能堪者季氏强以力軋之陽方與隂違隂遂與陽薄故旱雹相仍以示變而終于隂勝也申豐諉之藏氷不用而不及乖沴愆伏之本其阿世之言歟北燕伯欵出奔齊春秋為扶植綱常而作凡書國君出奔君臣交貶也何則君不君而後臣不臣則君宜貶君不君而臣不可以不臣臣可逐君乎燕簡公多嬖寵欲立之大夫比而殺其外嬖遂懼而出奔為人君不能守宗廟社稷至為强臣凌逼而出故名之以聳天下後世之為君者而君以偪奔諸大夫之罪亦昭然暴白矣四年春王正月大雨雪僖大雨雪公羊以為雹此大雨雪左氏以為雹雪者隂陽之和雹者隂陽之戾固不同然雨𤾉寒燠過皆為災凡以大書其厲民暴物可知矣雪雖有霑足優渥之功而春非其時况至于大乎夏楚子蔡侯陳侯鄭伯許男徐子滕子頓子胡子沈子小邾子宋世子佐淮夷㑹于申楚人執徐子楚以宋盟求諸侯于晉晉舉而予之靈王遂合十一國及淮夷于申楚人得志于中國莫盛于此矣叔向先是有言公室今亦季世政在家門民無所依君日不悛以樂慆憂是知晉之君臣以淫偷為苟且嵗月之計雖不以諸侯與楚安能禁楚之自㑹乎楚人之彊非其自能彊皆中國不自彊召之也然自盟宋以來宜若列國讙趨于楚而歴考是㑹陳蔡許徐頓胡沈淮夷皆素屬于楚者鄭亦兩屬之舊所能來者小邾及滕而齊魯衛邾把初未嘗往宋惟以世子行以此見人心豈甘為強大之從苟有以維之孰肯舍喬入幽哉聖人不忍中國之皆為楚諸侯悉以爵見所以致其别于淮夷楚子執無罪之徐子既爵而人之又所以存徐也秋七月楚子蔡侯陳侯許男頓子胡子沈子淮夷伐呉執齊慶封殺之遂滅賴義利之不兩立若白黒然楚伐呉殺慶封似為義也遂滅頼則蒙義以規利盗跖之心見矣方齊崔慶同惡相濟以賂逭討自以為泰山之安天假手于盧蒲嫳以滅杼而封出奔吳受封邑之朱方富踰其舊使非天又假手于圍執而僇之則無君稔惡者皆可長保富貴是無人極也封雖非圍所得討以賊討賊賊何所逃殺封盡滅其族人心方為之一快而移師滅賴果何名乎徐既以無罪執賴復以無名滅天又將稔其惡為討簒夷凶之地歟觀書伐書執書遂滅可見凶熖勃勃乎其莫遏也九月取鄫莒昔滅鄫今取莒之鄫也莒之侮魯嘗甚矣魯前年取鄆今年取鄫報莒抑甚焉而意猶未巳也春秋所以貴於釋仇而弭怨冬十有二月乙卯叔孫豹卒穆叔以深目豭喙之夣而嬖豎牛餒死于牛之手立庶子婼而相之昭子即位朝其家衆曰牛禍叔孫氏使亂大從罪莫大焉必速殺之牛懼奔齊孟仲之子殺諸塞關之外仲尼曰叔孫昭子之不勞不可能也嗚呼懐私恩而泯大義甘巳榮而忘親辱後世皆是也安得如昭子者與之共論亂臣賊子之情哉五年春王正月舍中軍魯大國本三軍季文子不恤其民丘使出甲隂益為四而軍制始壞季武子不恤其國縮四為三三分公室各有其一季氏盡征之猶未屬饜也又舍中軍而四分之季氏擇二二子各一皆盡征之而貢于公由四而三由三而兩季氏遂有魯國之半軍制愈縮公室愈卑何復古復正之有哉自昔權臣以得兵為重季孫四分公室擇取其二不惟魯君垂命掌握三家强弱之勢分盖為吞噬叔仲之地矣朶頥方急安知陽貨已耽耽乎其後哉楚殺其大夫屈申公如晉夏莒牟夷以牟婁及防茲來奔秋七月公至自晉戊辰叔弓帥師敗莒師于蚡泉招亡納叛魯為逋藪又遣將以詐敗莒師嘻其甚矣季氏為國巧可以得地則巧無不為詐可以得勝則詐無不施力可以得國則力無或遺少焉南遺叛陽虎專而三家日微智力于是乎窮矣秦伯卒冬楚子蔡侯陳侯許男頓子沈子徐人越人伐吳楚仍嵗伐呉者三好戰必亡天稔其釁矣春秋之待夷狄不一而足其終始凡三變毎變益恕恕之深即憂之深也楚吳越皆以僣王得罪于春秋州不如國國不如人盖嚴其進也故楚初以州見繼以國見然後以人見吳則不復以州見即以國見視楚恕矣越既不以州見又不以國見即以人見視吳為又恕聖人豈輕于進之哉世變然也楚之方興齊晉迭伯攘夷尊夏規模整密召陵城濮之役力遏而深挫之其進艱矣吳之方興晉雖嗣伯未免假呉以制楚其進宜易于楚也逮越之通中國晉之君臣慆淫苟偷無志于振文悼之業越遂依楚逕造而横行其進又易于吳矣觀三國之進有難易而吾諸夏之輕重强弱皆可推見宜聖人憂世之心殆有日甚一日者六年春王正月把伯益姑卒把文公再從夷儀之㑹皆以伯序至城把之年來盟黜而為子今稱伯以卒則嘗復之矣王室以大公為政賞罰悉當于功罪則進退諸侯權皆我出何至九年之間予奪僅行于蕞爾之把耶𦵏秦景公夏季孫宿如晉𦵏杞文公宋華合比出奔衛人君生長深宫日與宦寺為密信之而不疑外廷之無恥者又自結于内廷表裏鉤聫彼此符應以肆欺君罔上之謀何可勝計宋平公前以寺人伊戾而殺太子痤後以寺人栁而逐大夫華合比其坎用牲同其視之信有又同其援向戌華亥為證又同使公有一縷之明鑒往懲來孰敢復襲已烹之故智而前後膚受浸潤之行若出一轍懵然不悟豈非所謂迷復之凶乎不寧惟是太子佐以華合比之故惡栁欲殺之及居喪栁熾炭于室將至而去之比𦵏又有寵柔佞便辟之移人如此哉夫柔佞便辟以固上寵膚受浸潤以行已謀此固宦官女子之常而為縉紳者乃俯首交結甘心附和以苟一旦之富貴妻妾不羞于墦間者㡬希可以觀世道矣秋九月大雩楚薳罷帥師伐吳冬叔弓如楚齊侯伐北燕亂臣賊子以賂免三綱絶矣夷考其所以賂亦随世為之變宋督弑君桓公取郜大鼎于宋是以寳賂也宣公簒位求定齊人取濟西田是以地賂也至衛人弑君復君晉平公執衛侯衛以衛姬歸乃釋之是以色賂也地賂重于寳色賂宻于地人欲横流以貪濟淫何所不至哉今齊景公伐北燕討逐君之罪晏子固以吾君賄為憂燕人以燕姬歸而求成果不克而還則平公所以待衛者也嗚呼出乎爾者反乎爾宜其涕出而女于吳七年春王正月暨齊平魯政在三家公室四分齊何所畏于我而急急求平哉齊魯皆季世景公棄其民民歸陳氏與魯君昏淫民歸三家事正同公昏于吳與齊女吳亦相先後兩弱之勢自相携扶盡釋前憾共圖休息故為是平及者我求于人之辭暨者人已交相求之辭此叔孫婼所以即如齊涖盟也三月公如楚國勢不能自立而左牽右掣惟人是從魯君臣所以交轍于齊楚也前是楚㑹諸侯于申公不果往知去就之義矣章華之臺成願與諸侯落之薳啟彊脅公以如楚孟僖子不能相禮前無是禮也楚方日彊晉方日偷魯但欲彌縫一時之闕以納交免禍如非所宜如賀非所當賀皆不暇禮之問禮亡而國随之魯安得不削叔孫婼如齊涖盟夏四月甲辰朔日有食之秋八月戊辰衛侯惡卒九月公至自楚冬十有一月癸未季孫宿卒凡日食皆隂侵陽之咎晉平公問誰當之士文伯不以正對謂衛君大惡魯將上卿而衛侯季孫相繼卒信有徴矣然宿為人臣而可當日乎葢其専政于魯國人事之如君列國亦待之如諸侯也方武子寢疾蟜固不說齊衰入見以示不畏及其喪也曾㸃倚其門而歌以明不與舉國君之二賢獨守禮不屈豈非國脈所恃以僅存歟十有二月癸亥𦵏衛襄公
