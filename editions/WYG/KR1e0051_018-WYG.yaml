body:
  text: 春秋説卷十八宋洪咨夔撰成公一元年春王正月公即位乾坤以六子為用震為長子必陽剛然後足以任主器之責故人君臨政願治之初貴剛健以自立立志苟剛則為善必勇親政必勤任賢必明撫民必仁日積一日歳積一歳人心堅附而國勢屹然増黃鐘大吕之重矣公嗣位得其正宜若可以有為而資稟懦柔志氣偷墮政權一出於季孫行父之手曽無以作民視聽而新之畏齊則依晉疑晉則趨楚予奪受愚弄之欺去留甘脅制之辱始不知奮終與俱靡魯自是日趨於微無足怪也觀初年即位於葬宣公之前而繼之作丘甲大畧可覘矣二月辛酉葬我君宣公未葬稱子而公以吉服行即位之禮襲文公之失也滕欲行三年䘮父兄百官皆不欲曰吾宗國魯先君莫之行是諸侯視魯為鵠的而使天下臣子不得盡其心非魯之罪乎無冰古者日在北陸而藏冰西陸朝覿而出之其出之也朝之禄位賓食䘮祭於是乎用之月令仲春天子乃獻羔開冰先薦寢廟三之日無以納則四之日無以出獻羔之薦廢矣周無寒歳秦無燠年秦急而周舒也魯之政近周故有常燠之徴三月作丘甲元者視大始以正本人君即位之始國人莫不洗心滌慮以觀新政撫則后虐則讐仁則榮不仁則辱皆於此乎判公立民未有所聞而丘甲首作豈體元長人之道哉周禮九夫為井四井為邑四邑為丘丘十六井出戎馬一匹牛三頭四丘為甸甸六十四井出長轂一乗戎馬四匹牛十二頭甲士三人歩卒七十二人丘無全甲而甸有甲也今甲出於丘若以為丘出甸賦是四倍於古矣魯雖變古重斂何至驟増至此蓋一丘出一甲士四丘之甸則甲士四人視昔三加之一非三加之九也壞井田之賦自宣公始壞井田之軍自成公始民生後世不得見先王太平之制皆作俑之為不特魯人不堪命而已也初政若此人心之去公室尚奚咎哉夏臧孫許及晉侯盟于赤棘人君體元繼天而出治莫先於仁以仁用國則安於盤石夀於旗翼觸之者碎犯之者焦奚大國之足畏初政不出於仁人心望望然去之國勢難乎其亢矣公立三月君國子民之政未有一二見於施行而首作丘甲變法増賦以厲民人心既不足恃於是盻盻然畏齊之見臨如羊之見豺鰓鰓然望晉之見援如狐之假虎而臧孫許汲汲求盟以為齊出楚師之備無本不立宜窘狀之畢見也秋王師敗績于茅戎王者無敵以自敗為文固也二傳皆以為晉敗之何哉中國與戎有天冠地履之分齊桓使管夷吾平戎於王不可也王而與戎平則等夷視之矣晉侯使瑕嘉平戎於王是循夷吾之故轍左周右戎已不可揜而王師大崩且拱睨而莫之救果誰罪哉故戎伐凡伯于楚丘所以罪衛王師敗績于茅戎所以罪晉冬十月二年春齊侯伐我北鄙莊公時齊人伐我西鄙文公時齊人侵我西鄙又齊侯侵我伐我西鄙魯在齊東故伐西為便伐北則必繞出其後僖公時嘗侵西鄙不得志尋用詭道趨於北蓋魯之備齊西宻而北疏避堅攻瑕故出於此今齊欲挾楚以逞而臧宣叔令修賦繕完具守備其待齊嚴矣齊知魯備常重於西於是伐北鄙圍龍取之遂南侵及巢丘攻其不備也然則魯其面面而備之寸寸而守之歟曰力不足矣孟子有言曰王如施仁政於民省刑罸薄税斂壯者以暇日修其孝悌忠信可使制挺以撻秦楚之堅甲利兵矣何備西襲北之足虞哉夏四月丙戌衛孫良夫帥師及齊師戰于新築衛師敗績齊不報陽穀之怨衛又為新築之役曲在衛明矣其書孫良夫帥師以取敗所以著人臣專兵好戰之罪六月癸酉季孫行父臧孫許叔孫僑如公孫嬰齊帥師㑹晉郤克衛孫良夫曹公子首及齊侯戰于鞌齊師敗績郭子儀屏姬侍以待盧把之來謂彼外陋内險左右見必笑使後得權吾族無類矣而齊以一笑幾至亡國頃公不君也晉魯衛曹之君征伐不自已出而驅民鋒鏑之下以泄臣子之憤其不君等耳而魯為甚掃國出師四卿俱將前所未有也魯本三軍自作丘甲隂益其一蓋四丘為甸甸出甲士三人今一丘出一甲則甸出甲士四人甲増而長轂戎馬士卒之數皆増故命四卿以帥之凡師必有主將以統其權是舉為季氏出而不立主將以分謗季氏實節制之也井田之制壞而軍制壞軍制壞而命將之法壞季氏私意之害可勝道哉秋七月齊侯使國佐如師己酉及國佐盟于袁婁鞌去國五百里袁婁去國五十里敗績于鞌而盟于袁婁齊之勢良迫矣然迫人者其智淺迫於人者其智深以郤獻子之忿戾濟之行父良夫公子首凶德之㑹其所以迫齊者皆難塞之請而國佐從容應之反魯衛之侵地慨然聽命無難色蓋以離晉之黨也魯衛利於得地而心離則晉不能以獨進又安知無韓魏肘跗之變收合餘燼背城借一宜其氣出晉上矣此晉所以汲汲與齊盟也孟子曰春秋無義戰一笑之辱四國騷動迫齊以求盟不義甚矣喜怒以類者鮮易者實多范武子之言其賢矣哉八月壬午宋公鮑卒庚寅衛侯速卒取汶陽田濟西我田也而曰取晉分曹而畀我也汶陽我田也而曰取晉敗齊而賂我也我能還之不失舊物何歉於義我不能還其所有資晉之力迫齊於險而取焉義安在哉取不顧義惟得是求則不奪不饜矣此春秋所以正誼不謀利冬楚師鄭師侵衛兵有以寡勝者有以衆勝者以寡勝謀勝也以衆勝力勝也侵未有荐書師者今合兩國之師侵衛為力厚矣而又乗人之䘮慘矣哉新築之役卻子自謂於先大夫無能為役請八百乗陽橋之役子重以君弱臣不如先大夫師衆而後可王卒盡行夫師克在和不在衆而必以衆濟焉可以觀人材與世日降矣十有一月公㑹楚公子嬰齊于蜀丙申公及楚人秦人宋人陳人衛人鄭人齊人曹人邾人薛人鄫人盟于蜀五伯桓公為盛貫陽穀之㑹大國稱齊宋逺國稱江黃固無不至者亦未聞十二國同一日之盟也昔盟于薄盟于宋皆楚主之不書公及楚而書公㑹諸侯猶知以從楚為恥也今楚以威臨乎我地逺師老少堅忍以待之當自郤公顧降尊遽與其大夫㑹已而遂率列國背晉與其大夫盟非楚能服魯魯不自彊也非楚能得諸侯魯誤之也季氏專魯不憚卑君辱國以紓目前之急而率諸國以從楚罪有在矣齊降列蔡許失位公㑹盟大夫聖人皆歴數之是恥固不容諱也君尊則大夫亦尊故嬰齊始以公子書三年春王正月公㑹晉侯宋公衛侯曹伯伐鄭天之愛中國厚矣楚自州而國自國而人自人而爵其勢勃勃未已也召陵之盟城濮之戰桓文深折其氣使不敢以無人視中國人謀之力也其後人謀有所不及而天實制之楚合十二國盟于蜀蔡許失位齊亦降列晉畏其衆辟易不暇而天意不以人謀不及聽其荐食巫臣已通呉于晉矣晉知其有後顧之憂遂合列國以伐與楚之鄭於盟蜀再閲月之後五年鄭卒同盟于蟲牢非天之厚中國使自生一敵以制其命誰實制楚乎是役雖東侵遇覆而敗晉宋衛曹之君皆書爵以伐春秋尊中國之心即上天厚中國之心也詎可徒以匱盟論哉辛亥葬衛穆公二月公至自伐鄭甲子新宫災三日哭新者有故之辭新廟奕奕因舊而修之非始創也是宫祖禰世居公修舊方新而有是變在禮焚其先人之室則三日哭以不能嗣守世業而重哀也桓宫舉諡此不舉諡非宣宫也西宫災不哭而哭新宫公宫之正也公知哭先人之室焚而政權下移不知自彊以保先世之業旅焚巢而號咷尚何益哉乙亥葬宋文公公所謂不仁而得國者生以忍簒死以忍殉夏公如晉鄭公子去疾帥師伐許公至自晉秋叔孫僑如帥師圍棘汶陽我田也我不能取資晉之力以取之非其義也公如晉拜賜田已歸于我矣而屬邑之棘猶不服至命將動衆以圍之無德之可懷也非德非義而謂人心可以力制勢刼包無魚起凶逺民也魯之謂矣然棘以魯邑為齊守豈齊善於魯乎曰然頃公敗於鞌而歸弛苑囿薄賦斂振孤問疾虚積聚以救民百姓説附諸侯不犯是懼而修政也魯則以勝齊受田合晉三帥及司馬司空輿師候正亞旅皆賜之命服其氣盈矣懼則視民為重盈則視民為輕人心去就之機正在於此大雩晉郤克衛孫良夫伐廧咎如聖人不為已甚不仁不可疾之已甚已甚非忠恕之道也郤克乗驟勝之鋒挾衛以逞風疾而盡帆甚其威矣晉以酆舒之故敗赤狄于曲梁遂滅潞以潞子嬰兒歸可以已而未已也又滅其别種甲氏及留吁鐸辰重可以已而猶未已也至是又有廧咎如之伐蹊田之牛既奪走險之鹿且殪巢傾穴覆盡餘種乃已郤子求快其忍心也朝以忿心施之齊夕以忍心用之狄人欲橫流何所不至異時予錡與至犨三郤併命於一日天道其好還乎冬十有一月晉侯使荀庚來聘衛侯使孫良夫來聘丙午及荀庚盟丁未及孫良夫盟人之常情信行則禮文可略疑生則權術必用晉衛來聘親魯也聘而荐盟疑魯也何為親而復疑公即位以來兩從乎晉楚也去年從晉于鞌取汶陽田能幾何日即與楚公子嬰齊㑹盟于蜀今茲雖朝於晉安知退無二志故晉使與衛使同時而來託聘為辭以覘之盟不同日而先後纔易一辰所以堅魯之從也庚良夫皆卿魯豈無卿可㰱而公親辱焉不親辱不足以釋晉之疑也春秋謹書兩國先聘而後盟以見彼此權術相御之意鄭伐許鄭為無道一歳再伐許故狄之夫畏强者必凌弱鄭方東西奔走乎晉楚之命而欲軋許以取償焉許其我從乎按鄭自晉敗于邲之後專心事楚未嘗兼事晉也原文未合情事四年春宋公使華元來聘三月壬申鄭伯堅卒把伯來朝把不朝于魯有年矣一旦繼晉衛宋來聘之後而朝非親魯也覘魯也何言乎覘魯把伯與叔姬有脱輻之憾欲出之而未決故朝魯以覘之我重則姬留我輕則姬出既知魯不足畏而出姬之意始決矣甥舅之恩薄夫婦之義微女子至以母家强弱為去留可悲也夫夏四月甲寅臧孫許卒公如晉葬鄭襄公諸侯五月同盟至襄公卒於三月葬於四月何其速也悼公貪疆許田謀動干戈葬期不暇俟也公如晉而魯㑹鄭葬其季孫行父之專歟秋公至自晉冬城鄆公荐歳如晉不見禮而歸欲求成于楚而叛晉故城鄆其志固有所激也然楚非我族類何可從晉我臭味何可叛公其忍恥匿怨以事晉乎曰禮人不答反其敬亦惟求我所以招侮之端耳使我君德誠修朝綱誠振人材之用舍誠不私民情之休戚誠無壅則晉將起敬不暇今焉志不自奮柄不自執窮民力而不恤折國勢而不羞我方擁虚器于上則不似人君人固望而輕之縱背晉即楚楚其我敬乎垂衡之勢愈重則俯愈甚増而不已首懼至地耳公盍反而思之鄭伯伐許諸侯執䘮未逾年改元雖葬猶稱子悼公不俟葬期而葬其父遂以君禮行師窮威于鄰國以重前人之無道不孝孰甚焉春秋于伐許屢變書法前以國著襄黷兵之罪後以伯著悼忘親之罪悼罪浮于襄矣五年春王正月把叔姬來歸僖公時把伯姬來求婦姑親為婦屈以魯為足托也今把伯方朝叔姬即歸豈惟婦德之衰抑魯不足托也淇則有岸隰則有畔君子重傷之仲孫蔑如宋夏叔孫僑如㑹晉荀首于穀梁山崩山附于地剥山高起而圯剥附著于地失其所以為高矣春秋時上失其道剥下以自豐下剥則上危此梁山崩所以為天下記異也自昔有國之患莫大于諛佞之相蒙變異之不懼旱曰不為災潦曰不害稼彗曰除舊布新日月之眚曰躔度之常山為國鎮無故而崩伯宗從重人之言而委之朽壤卒無一辭致規切之意晉雖謀去故絳而分裂之變已萌諛言無益於人國可知己詩曰百川沸騰山冢崒崩下民之孽匪降自天嗚呼嚴矣哉秋大水冬十有一月己酉天王崩楚伯在定王之世氣􅆋莫盛于此時而問鼎輕重王孫滿天命一言楚子奪氣而退使能進用仁賢修明辭令以號召諸侯猶有可為之理顧安于頹壞莫克奮勵卒厭厭以没可歎也前此宣公葬匡王後此襄公葬簡王而公獨若罔聞知者何邪十有二月己丑公㑹晉侯齊侯宋公衛侯鄭伯曹伯邾子把伯同盟于蟲牢天下大勢合必離離必合雖闗乎人謀亦天運然也楚方强盛而申公巫臣在呉隂為茂木之蠧鄭去晉十有三年至是背楚請成而同盟豈晉謀所及哉楚奔命于呉而晉之離者合天蓋制之矣蟲牢鄭地在王畿内定王赴告方聞景公能就率諸侯㑹大葬而朝新陟仁風義㮣鼓動夷夏其誰不我從有尊王復伯之機㑹而不能用君子是以知晉君臣之無逺略六年春王正月公至自㑹二月辛巳立武宫武公宫也夫因人成事不足為功歴世寖逺宫不宜立而季文子之為此何哉外交于晉内專于魯假諸侯戰鞌之勝以震其主罔其國人于是立不宜立之宫以告成事夸得志使君臣上下知吾所以久專國柄者有是功也君不敢疑民不敢怨私家之權日重公室之勢日微煬宫且繼立矣取鄟書取不書滅為魯諱也夫狡焉思啟封疆以利社稷何國蔑有而魯之所取在季文子用事之日征伐自大夫出雖得鄟何補于失哉觀将伐顓臾章可以知聖人憂魯之意書取邿取鄫亦是意也若宣九年取根牟語承上文蓋齊取萊邑也昭元年取鄆則内邑也二者非滅國不得用取鄟之例衛孫良夫帥師侵宋人君有喜兵之意人臣有善戰之名皆非國之福也是役晉主兵不書而書衛蓋孫良夫好為不靖新築鞌之戰廧咎如之伐既委國以役于晉至討辭㑹之宋又從而慫惥之故獨書良夫帥師以著專國嗜兵之罪夏六月邾子來朝公孫嬰齊如晉壬申鄭伯費卒秋仲孫蔑叔孫僑如帥師侵宋受非望之恩于人則責之以其所難彊之以其所不欲有不得而辭者豢獒而嗾之噬也晉以汶陽田餂魯魯利於得田頥指氣使不敢少逆其意公孫嬰齊如晉受伐宋之命孟獻子叔孫宣伯帥師以侵之魯與宋初非有宿怨未酬也掣於利而義不能自立刼于勢而情不能以自保甘心臣僕矣侵宋出晉意春秋以自侵為罪與衛同所以示委國為人役者之戒楚公子嬰齊帥師伐鄭冬季孫行父如晉晉欒書帥師救鄭
