body:
  text: 春秋説卷六宋洪咨夔撰莊公二九年春齊人殺無知君弑而賊討也連稱管至父弑襄公而書無知弑主弑謀者也無知以虐于雍廪見殺而書齊人殺夫人得而殺之也所以伸齊臣子之心也州吁無知弑立踰年不成乎為君而以賊討亂臣賊子何所利而動于惡哉公及齊大夫盟于蔇以徳報徳以直報怨魯有大怨于齊不知報管仲召忽所以奉公子糾來奔信其不吾仇也魯果欲納糾以定齊撫機即𤼵如矢注弦何容更有擬議而徐行救焚方且與齊諸大夫為蔇之盟諸大夫託盟以緩其師坐失機會于交臂之頃糾小白得失勝負之所由判也昔尚父東就國道宿行遲逆旅之人曰時難得而易失客寢甚安殆非就國者也夜衣而行黎明至國萊人已與争營丘矣公固無足責孰謂管仲為子糾謀而不及此夏公伐齊納糾齊小白入于齊國人之心屬小白不屬糾故以小白繋之齊以納糾繋之公納者不受之詞入者不順之詞以王法繩之鬩墻争國其為不義均爾然叔牙奉小白奔於未亂之前夷吾奉子糾奔於已亂之後奔於未亂之前者其謀定奔於已亂之後者其慮擾故小白之入由巳子糾之納由人糾與小白之傅皆天下士而一著輕重之間一枰之勝負以决其可忽乎秋七月丁酉𦵏齊襄公桓公方與衞戰而㑹宣公之𦵏今齊魯之兵未解嚴而會襄公之𦵏不以師廢禮也然讎人之𦵏亦可以弗會矣八月庚申及齊師戰于乾時我師敗績機者時之會也見彈求鴞於時為早兎過𤼵矢於時為後襄公弑於冬公春盟而夏納糾善乗機者如是乎以小白之器能輔以叔牙之智一號令間精采立變而人心定矣人心既定而後為是戰不敗何待書及書戰書敗不書公為公諱也无妄之徃何之矣天命不祐行矣哉九月齊人取子糾殺之周公之誅管蔡為其得罪於宗廟社稷故也糾與小白等公子耳譬之逐鹿誰無得心而必欲殺之以絶後慮周公以公桓公以私公則人道立私則天常滅王伯界限正在此况鄭莊克段措心誠慘而餬其口於四方猶不置段於必死生竇之殺慘於鄭莊矣宋殤忌馮之在鄭前後凡幾戰鄭終䕶馮而納之國魯始欲納糾終不能䕶乃使齊人取諸吾懐而殺之庸弱一至此乎齊五公子之争魯子般之禍皆一念兆之矣其曰齊人分其罪於國人也管仲召忽同傅子糾忽死正也仲生權也身抱伯王之畧不肯没没與自經溝瀆者齒是以忍辱而相其讎使仲不能九合諸侯一匡天下以掩前恥則亦求生害仁者也觀取子糾殺之之辭仲不得不任其責冬浚洙壮直之志難奪虚憍之氣易挫齊之伐乾時之戰公非不鋭一有折衂嗒然自喪如霜後菰蒲披靡蕭颯無一㸃自振之意子糾我所主脅於請討之語而殺之退而浚洙以限戎馬之突若不能一朝安者何是氣前之盈而今之索也人心國勢茍無可恃之實金湯奚益哉十年春王正月公敗齊師于長勺困于葛藟于臲卼曰動悔有悔終吉人能于顛頓摧拉之中知所戒懼則去危就安易敗為勝特一轉之機爾公父仇不報母非不閑駿弱便儇人不比數盟納子糾而小白先入戰于乾時而我師敗績齊人聲言討糾不得而違也志奪氣喪亟浚洙以自固公于是乎困矣困則戒懼之心生衣食必以分人犧牲玉帛必以信小大之獄必以情凡討于國中者非復前日之狂剽也長勺之戰遂收敗齊之功且自是連敗宋師設詐取勝雖非所尚而魯抱大辱列國方蔑視如糞朽其所以能撑壓拄頹者猶幸其有此也公能無忘前挫熟思後圖國其庶幾乎二月公侵宋三月宋人遷宿宋閔不義迫宿而遷之宿自是不復見則國尋滅矣遷有滅之形而未遽滅無辭以滅之託遷以自文也夏六月齊師宋師次于郎公敗宋師于乘丘忿兵未有不敗者齊忿前敗宋忿前侵合師為郎之次而不亟進其心非有所歉必有所疑疑者事之賊公于是乗宋不整而敗之齊師乃還忿狠以逞威遲疑以喪功意是時夷吾雖相猶以未信尼之不力歟然齊自是不復仇魯春秋于長勺乗丘及鄑之戰皆書公敗某師固譏其以詐取勝而魯氣少揚聖人抑張之也秋九月荆敗蔡師于莘以蔡侯獻舞歸蜉蝣出陰訓狐嘯夜可以觀陰陽消長之候昔熊繹僻在荆山盖𦕈乎其㣲也厥後寖雄長江漢敢仇大邦采芑南征雖嘗來威而中國多故益得跳踉倔强于一隅侈然有坎蛙自尊之心蔡鄭懼而會鄧咄咄不可禦至是遂敗蔡師獻舞不能死國俘虜而歸狼貪虎暴目空諸夏而天眷中國已植小白於齊矣楚本祝融之後以僭王狄之故荆以州舉冬十月齊師滅譚譚子奔莒是役假譚立威以撼列國齊有一狼將羣羊之志夫行一不義殺一不辜而得天下弗為者三王之舉也伯者首以快恩仇為心規模狹矣譚公維私與齊有𤓰葛過譚不禮既立不賀罪設當問何至遽滅滅以釋憾盖出于作惡之私私忿一動肝膽之間森然白刄於此能自懲以還其和非有克已之學不能也春秋滅國三十六此實開其端滅以著齊之不義子以著譚之無罪奔以著譚子之不死社稷十有一年春王正月夏五月戊寅公敗宋師于鄑凡書敗某師以譎勝也齊三鼓而後進宋未陳而已薄公子偃蒙皋比竊出而先犯皆譎也春秋王者之事陰謀詭道而取勝豈所貴哉然兩軍相向呼吸勝敗國之安危繋焉不鼓不成列卒以身辱而國危者又烏足以語權秋宋大水宋告魯弔故書公連敗來侵之師仇怨方棘不廢弔災恤憐之義與兵交而㑹𦵏同意茍能充之天下為公矣冬王姬歸于齊王姬歸于襄我忘讎而主之故書逆書築館其辭詳今歸于桓不主我而過我其辭畧桓公率諸侯以尊王室豈無内徳之助然肅雍之車過于我而齊之逆者不以名著觀俟我堂著之刺親迎禮廢已久習俗移人賢者固不免也按左傳有齊侯來逆共姬之文杜預云不書齊侯逆不見公也原文以不書齊侯來逆遂謂親迎禮廢殊為失考十有二年春王三月紀叔姬歸于酅紀之五廟尚託酅以存紀侯去國而卒故叔姬歸奉垂絶之祀泉水思歸寧不得載馳欲歸唁不可今不歸魯而歸酅合於禮矣魯為禮義之國耳目濡染志尚貞潔疾風勁草凛然烈丈夫之風疾驅於通道大都者能不愧死故春秋書此以勵薄俗而勸節婦夏四月秋八月甲午宋萬弑其君捷及其大夫仇牧孔父義形于色仇牧不畏彊禦凛然大節以死殉君雖死猶生也宋三十年間再罹非常之禍其端皆兆於怒罵戲笑之頃履霜堅氷積漸所致也督弑殤公諸國取賂而定華氏督既相莊又相閔身負大惡不失再世之富貴亂臣賊子安得不相視而動心蒙澤之變督罪方討莊閔之保奸匿惡是自取禍也冬十月宋萬出奔陳陳受弑君之賊故書出奔陳得賂而後萬醢故不書討賊十有三年春齊侯宋人陳人蔡人邾人會于北杏三代有伯而無伯西伯戡黎征伐得而専召伯聽訟政刑得而决皆奉天子之命行之用能統合諸侯一徳以尊天子周衰王室不命伯齊衞胥命于蒲以伯自相命而列國不與至桓遂私伯矣夫會不可廢也而惡私會盟不可已也而惡私盟伯不可無也而惡私伯命伯者王私伯者伯伯主假王者之事以行其私盖王道之莠也北杏平宋之會列國駭其所未見皆以微者從桓方引而進之不暇校自是王者之迹絶望於天下後世矣是知伯者有功於一時得罪於萬世夏六月齊人滅遂齊桓一出而滅兩國非義也北杏之會諸侯以微者從未暇問而問遂人不至之罪所以脅諸侯惟我之聽不我聽則遂之視矣伯業之規模定於此夷吾伯齊始於作内政以寓軍令出則為節制之師前滅譚猶用大衆今滅遂將卑而師少自是凡伐國皆不稱師最後伐厲稱師者救徐故也而夷吾亦卒矣王以徳强伯以兵强竒正無窮以少敵衆是之謂勝兵故技擊不如節制秋七月冬公會齊侯盟于柯曹沬之盟桓公管仲非誠於為信也信魯以牢籠諸侯也北杏之會遂且不至何能保大國之必我從魯敢於刼盟意猶輕齊盟而背之其勢必稱兵以相向齊幸而勝尚可以伯不幸如長勺之敗則諸侯相視解體伯不可圖矣屈於一國之下伸於列國之上圖伯之術莫妙於此老子曰知其雄守其雌為天下谿十有四年春齊人陳人曹人伐宋夏單伯會伐宋制事有義處事有權伐宋之役單伯後至魯盖有權度矣北杏之會伯業造端人心駭所未見而宋背之謂宋為非則前是未聞有伯何得遽聽命謂宋為是則齊欲招攜懐逺股肱王室何得不聽命是非之間未容立判故會伐于既伐之後以待其定中乎權矣况宋魯自是不交兵寡怨之道也故春秋不再舉會伐之國秋七月荆入蔡十年荆以蔡侯獻舞歸十三年蔡人會北杏倚齊以自固也今荆復入其國都蔡之不懲不戒固冦之招而楚文敢為不道以陵蔑齊之與國其桓公之外憂歟未幾會鄄者再宋衞陳鄭莫不至同舟遇風之勢成矣冬單伯會齊侯宋公衞侯鄭伯于鄄十有五年春齊侯宋公陳侯衞侯鄭伯會于鄄鄄再會而不盟諸侯與伯之心翕翕有成矣前是盟會陳在衞下今進而班衞上夫予奪黜陟天子馭臣之柄人臣安得而専之自宋莊伐鄭已嘗升降蔡衞之班故伯者假此以行其權使陳誠有足進詔諸王而進之公其勸懲豈不足為伯業之助惜乎其效尤也夏夫人姜氏如齊襄桓易世夫人非歸寧而如齊果為何事齊知懲往以禮為坊則弗之受矣秋宋人齊人邾人伐郳鄭人侵宋宋有憾于附庸之郳齊為之伐小以快私忿序齊於宋之下非伯討也宋方伐郳鄭已侵宋舉動一差隨會隨叛伯主其審處事機以深服列國之心哉冬十月十有六年春王正月夏宋人齊人衞人伐鄭秋荆伐鄭鄭為畿内諸侯而與楚接伯主之所必争得鄭則可以屏周而扞楚失鄭則荆蠻迫而王室震矣蔡鄭懼楚而會鄧未幾蔡為楚禽鄭安得不恐今兹三國伐鄭楚亦伐鄭争鄭實兆于此而鄭以介居大國每首䑕兩端視强而從之是役宋以報前侵主兵故序齊上鄭突之黠反覆不常齊盖未有以大服其心也而荆之勢且日强矣冬十有二月會齊侯宋公陳侯衞侯鄭伯許男滑伯滕子同盟于幽北杏以來伯圖方興而人心未一故伐郳伐鄭宋猶序齊上至此同盟為九合之始始無一不惟伯之從矣春秋王者之事伯非所樂也天下無伯則王室之權散在于諸侯而不能相一天無二日猶故也天下有伯則王室之權盡禪于伯主日月無光爝火擅明矣後世伯府之為天下禍職此之階盟幽以同書見諸侯同心于從伯而會不書公公疑于從也夏商以來豈無衰世而未嘗有伯有伯則無王矣魯秉周禮其可輕從茍同哉此魯所以為近道邾子克卒
