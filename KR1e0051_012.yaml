body:
  text: 春秋説卷十二宋洪咨夔撰文公一元年春王正月公即位隱以攝不書即位莊閔僖以繼弒不書即位桓弒立偃然行即位之禮故書之以成其志聲其惡非正也公繼世得其正其書即位正矣而有大惡寓焉三年之通喪不行人君卒哭則除服素冠之刺不特一國為然而未葬稱子不敢以君自處此禮猶在也故宋子見於葵丘之會陳子見於溫之會未葬而會固其罪尚知執子禮未成乎為君惟衛宣公卒未葬惠公逾年以君禮從諸侯於戰書侯不書子哀戚之心無毫髮存者公書即位即衛朔之書侯也僖公薨於十有二月乙巳與正月始吉相去才兩旬雖逾年改元稱君有定制而未葬稱子禮何可廢降割方新服喪未久靈輴在寢觸目摧裂於此時而以吉服行見廟臨朝之禮人子之心安乎春秋書衛侯晉卒明年衛侯戰三月葬衛宣公公薨于小寢明年公即位夏四月丁巳葬我君僖公事辭正相類不孝之罪著矣孝者百行之本公不知孝於親本不立矣上忽天道下荒民政威權移而紀綱廢無怪乎其不君也人君奉元居正視大始而正本可不謹乎二月癸亥日有食之日以隂慝干陽故食其食必在合朔乃季秋月朔辰弗集於房十月之交朔日辛卯詩書記食朔可驗也而有食於晦者僖公薨於十二月乙巳循環至二月中當復遇乙巳癸亥為晦明矣若以為食月朔則當書三月若以為二月朔則日無癸亥其不書晦者朔重於晦也漢鄭興疏日月交會數應在朔而頃年日食多在晦先時而合月行疾也君亢急則臣促迫之象盧植封事晦而月見謂之朓王侯其舒此謂君政舒緩故日食晦也即此可類求之初政示變尤亟天王使叔服來會葬魯更數君前不正其終後不正其始王室未有來會葬者惟僖公以考終文公以適繼改元即位國勢晏然百年之所未見故天王遣使來以榮之夏四月丁巳葬我君僖公天王使毛伯來錫公命慰滿生於觖望之餘則踴躍慶快不自知其美之溢禮之過人情然也公初即位非如韓侯入覲可當淑旗綏章簟茀錯衡之賜非如文侯修扞可當秬鬯圭瓚彤弓盧矢之賜會葬之使方復錫命之使已屆公果何以得此於王哉意者魯百餘年間以無嫡嗣召亂今僖公正其終公正其始王中心喜之故所以寵異之者加厚雖過於禮猶不失誘而進之好德之意也王稱天與錫桓公命所書異蓋以此公不知躬拜嘉於天子之庭以修始朝之禮而使得臣如周虎拜稽首對揚王休其禮果如是乎晉侯伐衛叔孫得臣如京師衛人伐晉秋公孫敖會晉侯于戚晉以侯伐衛衛以人伐晉晉不德競而力爭無以使衛心服故孔逹帥師以敵襄公如子玉之敵文公於城濮也會戚而疆衛田晉抑甚矣人莫患乎血氣之爭能以義克躬自厚而薄責人則憾平而怨弭何至黷兵戕民而後快於心哉冬十月丁未楚世子商臣弒其君頵春秋弒君三十六世子弒者三楚其首也楚成以嬖庶撼適禍起閨門綱常墜絶矣易之師曰田有禽利執言無咎兵出有名而後敵可服也桓文以攘夷尊夏為伯業其治楚常患無名惟聲其自王之罪為有名又懼詆讕費辭未易折服而莫之問今此服楚之機會也臣弒其君凡在官者殺無赦子弒其父凡在宫者殺無赦殺其人壞其室汙其宫而豬焉子禍中國所無有以此問罪師出名正楚舉國將頓顙請命之不暇戢江漢而強中夏扶綱常而立人極功出桓文之上矣惜乎襄公無邾婁定公瞿然自責之學諸臣無吾夫子沐浴請討之言有其名而不能執竟使虎兕出柙長為中國患也公孫敖如齊二年春王二月甲子晉侯及秦師戰于彭衙秦師敗績詢茲黃髮之誓悔過非不切貪人敗類之詩引罪非不至而彭衙報殽之役猶不能不為血氣動信哉自克之難也前役秦之貪兵是役秦之忿兵皆穆公之尤其書晉侯及者秦以孟明視帥師晉襄公恃其善兵而親禦之重在君也丁丑作僖公主虞主用桑練主用栗期練而作栗主禮也公罹大變才兼旬侈然行即位吉禮無哀戚之心甚矣練冝作主而緩於作皆此心之見也親喪人子所自盡而不知盡他尚何尤三月乙巳及晉處父盟禮喪畢以士服見天子已見賜之黻冕圭璧然後歸是諸侯嗣立朝王猶待除喪况列國相朝乎僖公栗主未祔晉責公以不朝魯有人焉舉喪禮以告襄公縱欲以暴戾加人亦少瑟縮矣釋喪修朝違禮取辱晉以大夫敵公公俯首與盟不敢較魯所以日卑也往不如反不至盟不公深為魯諱其辱夏六月公孫敖會宋公陳侯鄭伯晉士縠盟于垂隴晉襄公暴而詐輕而無禮出師必身在戎行至會盟則命其臣與諸侯抗軒軒然以坎蛙自尊其意欲卑列國而國柄已隱然下移矣公孫敖慶父之子即孟孫氏公即位以來會晉侯盟宋陳鄭三國君皆敖臣而敵君也履霜堅冰至晉魯之政所以皆在大夫自十有二月不雨至于秋七月僖公每時書不雨閔閔望雨之心以日為嵗也公歷時書不雨心不在雨茫乎不知日月之變遷也肅時雨若僭恆㿩若公慢於親喪動與禮違不肅孰甚焉怠於國事政在臣下僭差孰甚焉此所以常㿩而不雨八月丁卯大事于大廟躋僖公天下自有至順易行之禮初不待過用其心心過於用則欲為禮乃陷於非禮欲為孝乃淪於不孝此所以不可不知春秋也國之大事在祀親喪未終大事於周公之廟而躋僖公夫為人後者為之子僖於閔雖庶兄嘗臣閔矣僖繼閔後豈容升之於上以亂昭穆之序哉公祭不以禮徒知以升次尊父為孝而不知納父逆祀乃不孝之大者在廷曽無一言何耶故夫子曰臧文仲安知禮冬晉人宋人陳人鄭人伐秦未報秦施而伐其師其為死君乎襄公要秦敗諸殽是無父也我見舅氏如母存焉文嬴猶在遂亡甥舅之好以傷母心是無母也事生追往兩失其道尚何問伐國之是非哉故人之公子遂如齊納幣莊公執喪未期如齊納幣今僖公之喪再期公子遂如齊納幣視莊為緩矣然五十步笑百步其為未終喪均也夫禮之於人猶酒之有蘖君子以厚小人以薄公之薄可勝數乎出薑始聘以襄仲終歸以襄仲薄之招也三年春王正月叔孫得臣會晉人宋人陳人衛人鄭人伐沈沈潰沈有爵無姓之國後為蔡所滅其微可知晉方嗣伯不能申世子商臣之罪以討楚而合六國以伐蕞爾事楚之沈軍聲所至望風逃潰沈雖莫我敢當而舍豺狼問狐狸勝服何關伯功之輕重損益哉故人之夏五月王子虎卒秦人伐晉濟河焚舟取王官及郊晉人不出遂自茅津濟封殽尸而還遂霸西戎用孟明也是舉可謂盛矣而人秦甚秦也序書者以秦誓作於敗殽之初史記以為封殽中尸乃誓於軍夫敗殽而誓則彭衙茅津之役雖悔而不知改封殽而誓則盡悔三役之非穆公為克終厥德矣當折衷以聖人録秦誓之意秋楚人圍江雨螽于宋宋微子之後有先王典禮在大水隕石退鷁雨螽皆以天變告於魯以見畏天之意故魯史得而記之他國不盡告也乖戾之氣上干天和災異之徴下應人事螽從天而雨不待孳乳蕃育而衆多之羽雲布風散所至無餘蓋天變之尤異者以為隊而死非矣冬公如晉十有二月己巳公及晉侯盟魯前以及處父盟為辱今以及晉侯盟為榮君德不強朝綱不飭仁賢不信而國空災變不懼而民困顧區區以大國喜怒親踈為吾榮辱仍嵗朝晉晉為改盟書如書及書至如常時前恥遽忘矣孟子曰仁則榮不仁則辱今惡辱而居不仁是猶惡濕而居下魯之君臣盍亦思榮辱不在人而在已乎晉陽處父帥師伐楚以救江此用批亢搗虛之術而用之非其道也齊伐鄭圍新城楚不救鄭而圍許諸侯移兵救許而新城之圍自解蓋許小而易危圍許乃所以救鄭也楚人圍江晉師伐楚以救之謂楚必還衛其國則江圍解如楚之救鄭曽不知情同而勢異江藐乎其小豈能當楚之久圍堂堂方強之楚外攻內守卒乘有餘力豈一處父所能怵而回之名為救江乃所以趣江於滅也春秋凡救皆善其救之急救之緩事雖不同必皆力合氣齊乃克有濟未有偏師能救者故桓公之伯救鄭者三國救邢者亦三國救許者六國救徐者八國不如是不足以脫人於一髮之危也晉伐沈則合諸國之兵救江則以偏師行豈有恤小扶危之實心哉書伐楚以救江罪晉也江黃以慕中國取滅悲夫四年春公至自晉夏逆婦薑于齊娶元妃以奉粢盛禮之大者宜書公逆女夫人薑氏至而略之何耶為魯諱也公以親迎之禮逆婦何所諱諱其成禮於齊也所逆不名其為誰猶及晉處父盟不書公也聲薑僖公之妃成風僖公之母時皆無恙婦有重姑閨門之盛不待執笲棗栗腵修見姑而婦禮已成於母家是無其姑也既無其姑何有於廟見故不至而夫人非所以為夫人也始進不以禮善後安在宜出薑之不允於魯狄侵齊秋楚人滅江晉侯伐秦事物先後緩急之序暸然易見如白黑而不之見私心蔽之也襄公嗣伯宜以攘冦亂衛中國為急而狄侵齊楚滅江一置不顧乃親帥師伐甥舅之國夫狄楚交亂諸夏天下之公怒秦取王官及郊一國之私怨急一國之私怨忘天下之公怒比事而觀其貶明矣衛侯使寧俞來聘魯衛兄弟之國聘使之絶幾年矣寧武子來聘講信修睦有加疇昔春秋所深喜也况其人之賢乎詩言志賦詩可以觀志帝王盛時教國子必以詩薰陶其正性融釋其邪慮邇之事父逺之事君皆於是取之而專對四方尤以為急公宴武子為賦湛露彤弓魯之僭也諸侯僭天子則大夫僭諸侯相維辟公天子穆穆見於三家之堂者其弊必至於此武子謂不敢干大禮以取戾何其婉歟異時穆叔如晉不拜肆夏文王之三亦此意冬十有一月壬寅夫人風氏薨五年春王正月王使榮叔歸含且賵三月辛亥葬我小君成風王使召伯來會葬魯侯燕喜令妻壽母僖公奉母之謹詩人鼓舞歌詠之然哀薑嫡母成風庶母庶不可以姦嫡猶江之有沱衣之有裳截然定分非私情所能移也公以奉親之私過尊僖妾母為夫人與哀薑並祔天王名器之司歸賵會葬一用夫人之禮以濟其非禮逆天理斁天常王不天矣夫生事之以禮死葬之以禮祭之以禮無違於禮則為孝子雖齊聖不先父食乃躋僖公於閔公之上抱衾與裯實命不猶乃祔成風於哀薑之列昭穆以亂嫡庶以紊違禮孰甚焉僖公成風而有靈必不安於非禮周公魯公而有靈必不使非禮行於吾之廟庭大室屋壞安知非先公意乎春秋書成風以夫人小君不沒其實而王不稱天視歸賵仲子其貶尤峻所以敘天彝立人極定萬世法也夏公孫敖如晉秦人入鄀秋楚人滅六楚人滅江秦穆公曰同盟滅敢不矜乎楚人滅六及蓼臧文仲曰臯陶庭堅不祀忽諸是皆悲中國無能修方伯連帥之職蠻夷得以肆行無道也唐虞及夏皆萬國商衰會盟津者八百國周封千八百國其後小不能事大大不能字小陵弱暴寡相為吞噬所存者無幾而為楚滅者居多使非召陵之盟城濮之戰則鼎無輕重直夜半負之而走耳桓文之伯不可謂無功於中國冬十月甲申許男業卒六年春葬許僖公夏季孫行父如陳秋季孫行父如晉自季友立僖公於是恩歸季氏政歸季氏友卒行父尚少公子遂公孫敖叔孫得臣分任國事至是行父連聘與國乃其得政之始夫世卿非國之利也以世卿行乎國政之久自非聖賢未有不挾富貴而擅威福者彼其初豈懵然於惟辟之義樂於專且僭哉便儇矯厲者鼓導於其前辟佞善柔者推助於其後此心無主外境易搖因翕翕相媚之情動沾沾目喜之意而思所以應人之求以作其趨據物之會以濟其欲日復一日騎虎勢成而患得患失無所不至矣文子襲父爵位涉僖文宣成襄五世凡七十餘年妾不帛馬不粟三思而行知謹畏矣而魯之大柄實以是而移權移既久習為當然國人尚安知有公室哉故春秋再書季孫行父以見祿去公室之漸八月乙亥晉侯歡卒冬十月公子遂如晉葬晉襄公先王之制諸侯之喪士弔大夫送葬晉文公卒魯往會葬不書其人至此始書公子遂如晉葬晉襄公則卿矣子大叔謂文襄之霸君薨大夫弔卿共葬事其實卿共葬事自襄始也春秋所以志變古之端著諸侯僣天子之罪晉殺其大夫陽處父晉狐射姑出奔狄陽處父之殺狐射姑之奔傳者皆以為易班漏言之故非經意也趙賈爭立君而殺也陽子成季之屬黨於趙氏其主趙孟所欲立必矣趙孟逆公子雍賈季亦使召公子樂趙孟殺樂而賈季殺處父以黨趙也處父身為太傅不能正嫡庶之序烏得無罪故稱國以殺書於葬襄公之後而賈季出奔繼之閏月不告月猶朝于廟不告朔曰不告月不告朔則朔日之禮不行不告月則一月之政皆不舉也在禮天子頒十二月朔於諸侯諸侯藏之祖廟每朔日朝於廟使大夫南面奉天子命君北面受而行之比時使有司先告朔此其常也今以附分之月非月之正故不以其朔告於廟而是月當行之務亦皆不講公之怠於政可知已豈惟公哉百官有司莫不怠於政也蠱上艮下巽上止而莫之為下順而莫之違所以為蠱魯之君臣上下相與耽逸養安頺然無一毫趨事赴功之意忽天道棄人時格王命忘民瘼閏不告月周禮遂廢尚朝於廟果何為哉是後積玩成習惰隳相師月朔例不復告故子貢欲去告朔之餼羊
