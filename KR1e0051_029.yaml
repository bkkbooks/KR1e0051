body:
  text: 春秋說卷二十九宋洪咨夔撰哀公上元年春王正月公即位昭公不堪季氏之逼而客死定公甘心季氏之陵而令終然則定勝乎曰昭躁定偷悻悻而死與厭厭而生其失君道一也公嗣定而立前有悻悻為躁之鑒後有厭厭為偷之懲宜思所以自拔者而偷不知懲躁不知鑒始安泄辱而苟存終危陵逼而輕動寖微寖滅之勢于是乎成矣夫子在定哀間非不知勢移而運去其存幾何猶灼然以為可變脉未盡絶也方去魯之衛季氏以冉有有功悔用聖人之不盡眷焉思之于是自衛歸魯公能乘季氏之思扳援以自輔則真儒已試之效可立致乃納約自牖徒聞于問答之詳日中見沫莫著于施行之實田恆弒君沐浴請討豈特為齊計正所以為魯計也而諉之三子公之不足與有為决于此矣異時欲去三桓君臣多間奔衛適越與昭同科一傳而悼公如小侯卑于三桓之家以知有聖人而不能用也即位雖得其正盍求所以保厥位者哉楚子陳侯隨侯許男圍蔡驕逸者伐國之斧斤戒懼者興邦之藥石葛藟臲卼動悔有悔困所以能出困也吳入郢秦救之楚賴以僅存至舟師陵師連敗于吳楚大惕懼亡令尹子西喜曰乃今可為矣于是乎遷郢于鄀改紀其政以定楚國越十年而滅頓滅胡以至圍蔡凡前日背我而他從乘約而肆侮無不酬者而楚之彊猶昔無敵國外患必亡獨孤臣孽子必逹天以入郢警楚傷弓懲羮之餘宜轉禍為福之易也是役合圍誠不恕然使疆于江汝之間而還蔡蓋降矣降而不取惟迫使遷何以不以待頓胡者待之蔡之叛楚蓋以子常一裘之憾激之使然追咎其所由來故力可以滅而不滅也許復見又以著楚之能興滅繼絶按何休范寧皆以為許斯自復其國惟杜預以為楚復封許原文蓋從杜說鼷鼠食郊牛改卜牛夏四月辛巳郊定公薨于夏五月定姒卒于秋七月兩大喪距今未期僭郊可寢也而不寢故鼷鼠食牛以示警食角之變成公為之廢郊而定公郊公不成之循而定之循初政已不畏于天其何以善後夫郊之用辛欲人君齊戒自新也凡辛卜上辛新而又新也成以辛丑郊定以辛亥郊公以辛巳郊用辛而無以新其德欲上當天心難矣秋齊侯衛侯伐晉國必自伐而後人伐之晉世主夏盟秦狄之外無敢伐之者今齊衛以其國難方殷合師致伐伯統絶矣世變窮矣景公靈公身在禍亂之中不自知乃為叛臣范氏伐盟主之晉胡不反觀蕭墻之內乎冬仲孫何忌帥師伐邾二年春王二月季孫斯叔孫州仇仲孫何忌帥師伐邾取漷東田及沂西田癸巳叔孫州仇仲孫何忌及邾子盟于句繹邾邇于魯事魯最謹而魯常有吞噬之志奔喪之轍未安伐邾之師已舉以仲孫獨出無功季孫叔孫又同帥師伐之不遺餘力曩嘗取邾田自漷水今取漷東田及沂西田寸攘尺略不盡不止也三卿同伐而二卿盟非季孫以田遜叔仲而亷于取也空國而出慮或得以乘其後故先入且視邾子為掌握中物不必身要之盟而後為得也觀此可知季孫權謀出于叔仲之上夏四月丙子衛侯元卒滕子來朝晉趙鞅帥師納衛世子蒯聵于戚君臣父子之分明人極所恃以立也父有過子為之隱而不敢證幾諫而不敢犯况敢控短長角勝負攘其所有以為己利乎蒯聵以南子之譖出奔靈公嘗欲立公子郢郢請改圖未嘗有命廢世子也靈公即世國人相與逆世子于宋而立之豈不名正言順顧乃立亡人之子輒輒幸于得國不思子無拒父之道而梟獍遞食遂興無窮之爭罪有歸矣蒯聵始奔于宋今納于戚皆繫之衛世子世子豈輒所得而廢哉衛君待子而為政曰必也正名乎曰求仁而得仁又誰怨觀此可以知夫子所以處之者矣晉趙鞅不誠于拯亂解紛而為惠不終故其納止于戚不返于其國也秋八月甲戌晉趙鞅帥師及鄭罕達帥師戰于鐵鄭師敗績一戰而彼已皆以帥師見兩惡之相遇也趙鞅與范中行氏先後俱叛鞅以韓魏之助得歸舊惡固在也何能禦鄭之助叛臣范中行叛于朝歌大惡不容貸也而齊輸之粟鄭罕達送之棄君助臣自取敗績又豈知義者之為乎春秋以送者禦者之罪惟鈞故特書之冬十月葬衛靈公十有一月蔡遷于州來蔡殺其大夫公子駟按左氏哀元年蔡請遷于吳至是蔡遷于州來據此則是歸過于駟之不時遷當書蔡殺其大夫公子駟蔡遷于州來不應遷在殺前也遷在殺前則是駟主遷州來之謀既遷悔其失計而殺之也蔡世事楚嘗為楚滅而復封之昭侯不忍一裘之辱召吳師以入郢楚報柏舉之役力可以滅蔡而不滅又使疆于江汝之間雖曰迫之使從社稷僅存亦楚賜也是楚猶可依也今乃背世事之楚入暫合之吳其能終撫我乎此主遷之駟所以見殺也舉國以殺蓋當國者悔而殺之故駟得以官族見三年春齊國夏衛石曼姑帥師圍戚晉納蒯聵于戚石曼姑挾齊圍之為輒故也君臣父子綱常之首人之所以異於禽獸者以此晉范中行氏入朝歌以叛而齊輸之粟棄君助臣也衛輒拒世子蒯聵之入而齊有戚之圍棄父助子也逆人倫背天理惟私意之快齊獨無君臣父子乎宜其有陳氏之禍也石曼姑非得齊不能圍戚故以齊主兵夏四月甲午地震五月辛卯桓宫僖宫災孔子在陳聞火曰其桓僖乎何以知其為桓僖也親盡廟當毁也何以知天意必於當毁未毁之廟而災之也三家張而公室微也三家皆出於桓而季氏得政於僖纍世專國日以彊盛逐君置君皆出其手魯且寖微寖滅矣故地震示變為未足又表之於桓僖之宫也桓僖異宫火同時起初非延燒故不書及非為適等也二宫雖皆祖廟豈無尊卑之别乎季孫斯叔孫州仇帥師城啓陽宋樂髠帥師伐曹秋七月丙子季孫斯卒夫子用於魯一舉而齊人歸鄆歡龜隂之田再舉而費郈墮三舉而少正卯誅國內大治使非季孫無忮忌之心則晏嬰子西之所以拒人者將復見於魯公安得而用之夫子非行乎季孫雖有綏來動和之道亦安得而施之管仲九合之功歸之鮑叔聖人負帝王之學其得略見毫髮以信萬世斯之力也女樂一至境變志改是亦中人之常情逮其將死乃嘆此國幾興以吾獲罪於孔子故不興且戒其子若相魯必召仲尼猶有貽厥孫謀之意惜乎康子不知以無違為孝隨墮公之魚之譖也人皆有是非之心緝之以天理則明者廣蝕之以人欲則明者昏悔縱情之無益知放心之當求則明者還桓子動心忍性於陽虎之變故用聖人雖不克終死以遺後其明者還乎然則季氏自友以來凡五世桓子其小異者蔡人放其大夫公孫獵于吳賞刑曰君威福惟辟順之則治易之則亂百世不與易也公子駟舉國以殺蓋當國者殺之公孫獵舉人以放則微而在下者相與共逐之非有朝廷之命也殺大夫不出於君放大夫又不出於朝無政日甚君何有焉自霜而氷明年盜殺昭侯由來漸矣冬十月癸卯秦伯卒王蓄德伯蓄謀彊國蓄力火宿而愈明水瀦而愈深蓄之而不輕出其成必大何天之衢亨蓄之功也入春秋以來晉見最晚主夏盟最久秦與晉相先後而見征伐㑹同與諸侯接者無幾晉悼末年秦人伐晉救鄭之後秦兵不出至此七十餘年雖嘗一出救楚隨即斂戢而晉楚兩國之離合勝負不知其幾紛紛籍籍秦若罔聞知者惟君卒始以赴見蓄全力以觀天下之變待諸侯之敝也十二國合而七七國并而秦豈一日一人之蓄哉老子曰知其雄守其雌為天下溪又曰與兮若冬涉川猶兮若畏四鄰儼兮其若容渙兮若氷之將釋秦蓋得之兹故於惠公之卒而有感叔孫州仇仲孫何忌帥師圍邾四年春王二月庚戌盜弒蔡侯申蔡公孫辰出奔吳宣十七年蔡侯申卒昭侯是其𤣥孫而與髙祖同名非誤也無其祖也無其祖何能有國此所以為楚滅也昭侯遷州來將如吳諸大夫恐其又遷也承公孫翩逐而射之入於家人而卒弒君者翩也書盜何哉易曰負且乘致冦至負也者小人之事也乘也者君子之器也小人而乘君子之器盜思奪之矣上慢下暴盜思伐之矣侯以一裘之吝楚人釋憾遂至喪國背楚遷吳君柄盡去殺大夫與放大夫皆非已出未幾見弒非上慢下暴之招乎故書盜以為萬世人君負乘致冦之戒翩惡隨討不待書而已著也辰姓霍皆弒君之黨故或逐或殺兩年之間公族大夫喪者五人葛藟何以為本根之庇乎葬秦惠公宋人執小邾子夏蔡殺其大夫公孫姓公孫霍晉人執戎蠻子赤歸于楚伯業興則御異域之權自我出伯政衰則與異域分其權伯統絶則折而從異域愈降愈下也晉主夏盟非一世攘異域以奬王室自城濮之戰始平公君臣偷安一旦以諸侯授楚甘出其下自是頽波不可復挽今楚討諸國之叛既克夷虎乃謀北方而圍蠻蠻子赤奔晉隂地晉非惟不能存顧使士蔑設詐執以卑楚時有范中行之難慮楚人之乘其釁惟恐與之不速也溫之㑹晉人執曹伯歸之于京師以示有所尊執蠻子歸于楚非京師楚乎晉不知有周而待楚以京師之禮蠻何足計晉之伯業掃地矣人晉所以貶之城西郛六月辛丑亳社災喪國之社屋之不受天陽也薄社北牖使隂明也殷都于亳武王克紂班其社於諸侯以為亡國之戒魯不知以亡國為戒君弱臣彊凜凜乎社稷阽危之在朝夕故災見亳社以大警之公猶不之懼耶觀問社於宰我不為無懼特陵遲之勢已成委之無可奈何而已善善不能用惡惡不能去此郭之所以亡公知有聖人不能用欲無亡得乎秋八月甲寅滕子結卒冬十有二月葬蔡昭公葬滕頃公五年春城毗夏齊侯伐宋晉趙鞅帥師伐衛秋九月癸酉齊侯杵臼卒冬叔還如齊閏月葬齊景公榖梁氏不正其閏喪事不數也公羊氏喪以閏數喪數略也三年之喪二十五月而畢故再朞之喪二年也九月七月之喪三時也五月之喪二時也三月之喪一時也凡喪之節應歲時之氣也三年之喪再期於再期之中以閏數則期不再矣是不能三年也列國喪娶喪㑹喪師不能通喪者皆是而獨於此託閏月以著喪期之縮禮壞不可盡紀因事以正之也故閏月不告所以正廢閏之失閏月㑹葬所以正用閏之非聖人之心天也天命流行初未嘗一息間斷聖人出而為三綱五常之宗主豈以世衰道微而聽禮之自為不正哉此所以建諸天地而不悖質諸鬼神而無疑百世以俟聖人而不惑六年春城邾瑕城漆而明年伐邾取其田城瑕而明年入邾虜其君其城以逼邾同而所以逼異漆者庶其來奔之邑我先得之而後城之瑕者邾邑我未之取而徑城之并吞弱小大國數圻此固怙彊倚衆者之常未聞地非我有而徑城者魯之彊梁益甚目中已無邾矣晉趙鞅帥師伐鮮虞吳伐陳夏齊國夏及高張來奔盜國者必骨肉乖亂而後行其謀弒君者必肘腋盡去而後動於惡景公舍羣公子屬嬖妾之子荼於國惠子髙昭子使立之荼既立矣陳乞僞事髙國而交鬬於諸大夫使謀先發而髙國奔髙國既奔陽生入而荼弒使髙國不奔陽生未可入荼未可弒也荼不弒國不亂陳不可得齊也逐髙國而荼弒齊國世亂而田氏有齊矣不畏强禦義形於色者殺而後君弒大抵然也二子受君之屬不能存其子又不能死可謂具臣矣叔還㑹吳于柤秋七月庚寅楚子軫卒更事熟涉變深則血氣老而心志定定而後明生焉性命之理得矣昭王知救陳必死而不已于行知雲變可移而不事於禜知河為疾祟而不越望以祭知前世爭國之禍以國遜羣公子而其子章立夫死生之際亦大矣志氣清明理趣昭徹不畏死而求生不徼福以起禍然則柏舉之役動心忍性增益其所不能不既多乎按左氏軫卒於城父不書不以行卒赴也齊陽生入于齊齊陳乞弒其君荼齊之亂景公舍長立少實為之而君臣父子兄弟之際皆墮陳乞之術不自覺彼其欲立陽生而請立荼於君以為諼欲去髙國而交鬭諸大夫以為僞欲盟大夫而稱受命鮑子以為誣欲弒孺子而言君舉不信羣臣以為激心梟獍而情鬼蜮其為術誠巧矣朱毛既與陽生殺荼野幕之下宜坐首惡而春秋乃以弒歸之乞雷霆從天而下平生隱慝人所不能知者天悉白之亂臣賊子雖欲逭大罪何所容其巧乎况陽生立而陳乞隨弒荼陽生亦何所逃罪於天地之間其不稱公子猶齊小白入于齊天倫泯矣冬仲孫何忌帥師伐邾宋向巢帥師伐曹
