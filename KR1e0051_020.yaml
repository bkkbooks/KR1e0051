body:
  text: 春秋説卷二十宋洪咨夔撰成公三十有三年春晉侯使郤錡來乞師乞卑辭也且愧辭也魯于晉靡役不從師何待乞哉厲公初立疑魯二之因會葬止公魯君臣方厭厭如泉下人何能以止為憾晉不能不疑魯之有憾于止也故首為瑣澤之會以示相親睦復使郤錡乞師以示相卑下時諸侯皆有二志魯苟能釋憾從我伐秦則他國誰敢異此慊然之意見于乞之一辭實則晉用其術以牢籠魯也三月公如京師夏五月公自京師遂會晉侯齊侯宋公衛侯鄭伯曹伯邾人滕人伐秦曹伯盧卒于師秋七月公至自伐秦君臣大分猶天地之不可易朝覲在大宗伯有常時司士有常儀朝士有常位不朝則削地黜移之法行焉周制舊矣王室東遷以來諸侯莫知朝王僖公為魯賢君亦惟因踐土之盟河陽之狩就朝于王所其如京師不過遣公子遂叔孫得臣而已公躬朝于王絶無而僅有也雖曰便道以如京遂事而伐秦非出尊王之實而前是諸侯亦嘗從晉伐秦未聞其便道而朝也則公之朝不猶愈乎然亦有由也秋霜烈日然後知春風之和羊腸九折然後知康莊之安公拜天王錫命之寵未嘗躬奉圭幣于庭而如晉朝者三曽不見禮且見止茹怒飲恨不敢少喘于是知王室之尊為可親故先如京師然後會伐使晉知由朝王而來非專為晉役也春秋書自京師遂會八國伐秦以微見魯情而他國過周不朝亦可見矣然魯非痛晉之辱亦安知周之為尊哉故以伐秦致冬葬曹宣公十有四年春王正月莒子朱卒夏衛孫林父自晉歸于衛外交人臣之大罪孫良夫用於衛挈國背君以臣僕于晉者靡不至所以結晉為異日地也其子林父為定公所惡而奔晉晉為反其邑焉且強其君使見而復之是脅君也公卒衎立人臣當與國同其憂乃不敢舍重器于衛盡置諸戚甚善晉大夫以避禍起是背國也脅君而歸背國而處卒至於逐其君林父之罪大矣信乎患失則無所不至秋叔孫僑如如齊逆女鄭公子喜帥師伐許九月僑如以夫人婦薑氏至自齊人君懦而無立志則一舉事皆制于人公之于齊修好逆女以婦至始終悉一僑如蓋專其事矣其書氏者適母為姑非妾母比也冬十月庚寅衛侯臧卒秦伯卒十有五年春王二月葬衛定公三月乙巳仲嬰齊卒襄仲負弒君之大罪其子歸父之逐雖出於季文子銜其欲去三桓而襄仲之惡在大義不容不討討當其罪則其逐固宜何庸更立弟嬰齊為之後雖曰善善及子孫惡惡止其身而汙瀦之室非他惡比也嬰齊卒不繫之公孫而繫之仲以譏魯為逆臣立後之非榖梁謂子由父疏是也故曰春秋成而亂臣賊子懼癸丑公會晉侯衛侯鄭伯曹伯宋世子成齊國佐邾人同盟于戚晉侯執曹伯歸于京師曹宣公卒公子負芻殺太子而自立諸侯請討之晉人以其役之勞請俟他年至此遂執曹伯歸于京師執之當其罪歸之中於禮名正言順矣然未可為伯討也何以言之厲公無意於曹之討也負芻之立諸侯及國人皆不義之宜討蓋已久而晉人必使列於八國之盟然後執使異日得藉以為復國之本况其既執之後當即為曹置君使子臧守節而逃遴選親賢豈無其人乃委而去之使負芻得以巧自為謀是知晉侯迫於諸侯之請國人之望不得不執初非誠於討惡今之歸于京師乃為異日歸自京師地也春秋書執於盟之後又挈晉侯於盟執之間不以諸侯同盟而執為辭可謂深探其心矣公至自會夏六月宋公固卒楚子伐鄭秋八月庚辰葬宋共公宋華元出奔晉宋華元自晉歸于宋宋殺其大夫山宋魚石出奔楚華元合晉楚之成非有縱橫出入之權術者不能其靖國人亦權術行焉方蕩澤乘幼君初立殺公子肥以弱公族其罪當討元為右師欲討懼不克乃以不能治官自諉而奔晉奔晉所以謀討也朝奔暮歸倚晉為膽然後攻蕩氏殺子山而魚石二司寇二宰皆出奔楚于是易置其人一新之而宋定不可謂非才也然我阻大國以制人人亦將阻大國以制我宋憂其未艾乎書奔晉自晉歸及出奔楚以見權術非君子之所貴冬十有一月叔孫僑如會晉士燮齊髙無咎宋華元衛孫林父鄭公子鰌邾人會吳于鍾離會又會外吳也殊會尊吳也晉吳既通之後九國之君同盟于蒲將欲會吳而不至今為鍾離之會皆大夫在彼方僭號自王其氣出吾列國之上安肯降體折節自辱於大夫之列此諸侯大夫所以異其禮以尊之如王世子之在首止也楚之初興有齊桓以遏之欲涉足中國之會盟不可得吳以國見未十年而列國之大夫殊會之列國之君又將殊會焉春秋不勝憂患斯世之心故會又會以外之許遷于葉許遷猶邢遷有所迫而遷也鄭欲吞許久矣徼福大嶽之後以僅存至此一伐再伐屢伐不勝其轔轢楚雖直之而不能芘於是遷國以避其鋒寡弱可奈何哉人百之已千之雖愚必明雖柔必強亦惟有此而已十有六年春王正月雨木冰冰者隂之凝也當東風解凍草木萌動之時雨而木冰根與枝俱折矣是蓋積隂之氣膠轕盤沍于兩間而萬木之生意不得達也三家專國隂凝冰堅將摧折其枝葉而伐其根豈止木稼為長官憂季文子見執而已哉夏四月辛未滕子卒鄭公子喜帥師侵宋晉楚之成合識者固知其不賴盟而鄭聽兩國之成非所樂也故如晉未幾即伐許以挑楚楚於是乎伐鄭以敗其成從楚未幾即侵宋以挑晉晉於是乎伐鄭以合其戰鄭以變詐為國雖子罕之賢未免與波俱流也雖然前日之鄭常奔走乎晉楚今日之鄭反軒輊乎晉楚觀楚人以汝隂之田求成則知鄭執與晉與楚之權矣六月丙寅朔日有食之晉侯使欒黶來乞師甲午晦晉侯及楚子鄭伯戰于鄢陵楚子鄭師敗績楚殺其大夫公子側震用伐鬼方三年有賞于大國以未濟為心也髙宗伐鬼方三年克之憊也以既濟為心也故臨事而懼可以制勝勝敵而驕不可以保勝楚鄭既合且敗宋於是晉有懼心郤犫如衛如齊乞師欒黶亦來乞師三國役於晉有年師何待乞以乞為行人之詞懼心見矣戰之日齊衛魯之師猶未集獨與楚鄭接於鄢陵而敗之懼而知戒所以勝也既勝入楚師三日榖范文子以惟命不于常為言蓋知其有驕心已而郤至獻捷于周矜其伐滿盈之氣拍塞上下而楚殺子反以討隕師之罪激奮多矣故楚竟不可制鄭終不可服晉遂兆君臣莫大之禍此心始終懼與驕之異也君重於師故楚敗不言師君在戎行不可盡諉其罪於臣故側雖殺不失其為大夫公子秋公會晉侯齊侯衛侯宋華元邾人于沙隨不見公會者禮之公見者禮之私會而復見蓋會同之禮既講退則奉贄交謁以致綢繆之好也沙隨公已與諸侯會退而求見不見知晉之情好疏矣晉以叔孫僑如壞隤待勝之譖而疏公曲實在晉而公於厲公初立嘗見止者纍月不書今一不見輒書非以我直彼曲為不必諱也謹讒人交亂之禍也夫以小國見陵於大國特季世之常而以臣譖君欲置之大譴之域則人道之大變也春秋不為尊者諱而特書之使後世推原不見公之由在僑如之譖用人者當謹聽言者當察而巷伯青蠅之詩為可鑒也聖人之垂戒深矣哉公至自會公會尹子晉侯齊國佐邾人伐鄭挾天子以令諸侯此桓文圖伯之術而後人莫之守急則假以濟事緩則棄之如遺所以挾者不能挾也晉敗楚鄭于鄢陵功非不偉而不足以回鄭其䇿既窮始不得已假王室卿士以重此役蓋已晚矣公告至方新趨會已亟虺隤鞅掌莫肯念勞觀至會之續書則知春秋之哀魯曹伯歸自京師晉執曹成公歸于京師姑以塞諸侯及國人之情非真有意于討惡也故負芻執歸逾年曹不置君使得以行其圖復之謀而歸自京師如反掌之易執歸始終不名晉初不奪其為君也厲公可謂巧于植私恩者矣九月晉人執季孫行父舍之于苕丘冬十月乙亥叔孫僑如出奔齊十有二月乙丑季孫行父及晉郤犫盟于扈公至自會乙酉刺公子偃用小人必亂比匪小人必傷蓋其用心隂賊而狠忮為謀險故為禍深僑如譖公于晉晉侯不見公季孫尋執一舉而併中之何其慘也然季孫之見執特以郤犫取貨僑如之故諸大夫未必皆以為當也故執不以歸舍之于苕丘而公待之于鄆僑如出奔季孫釋公始告至小人之亂邦如是哉公子偃以與謀而刺比匪小人而傷也十有七年春衛北宫括帥師侵鄭夏公會尹子單子晉侯齊侯宋公衛侯曹伯邾人伐鄭六月乙酉同盟于柯陵秋公至自會盟主之會諸侯假王人為重非一世也未有一役會兩卿士者厲公無道鄢陵雖勝而鄭不服故會沙隨復伐之不服猶故也於是會尹子而伐焉尹子同伐而鄭不服故命衛復侵之不服猶故也於是以一尹子為未足又重之以單子而伐焉招擕在禮服逺在德曽不內省其闕方且屈二卿士同盟以謀復舉而鄭終不可以強服晉之術於是愈窮矣然則盟主無以繫屬人心雖挾王室之尊摟與國之衆猶蔑如也夫救鄭而同馬陵之盟恤鄰拯難同於為義也伐鄭而同柯陵之盟窮兵不已同於為不義也是同不惟罪晉二子與列國之君同其罪也公以會至不以伐至見從伐非公之本心齊髙無咎出奔莒魯穆薑通于僑如僑如用其譖而季孫見執齊聲孟子通于慶克慶克用其詐而鮑牽刖髙無咎奔淫風未有不召亂者比年書之見兩君皆不能防間其母以致此九月辛丑用郊魯之郊固僭矣苟以誠敬將之猶不失昭事上帝之意奈何禮與敬之俱荒也夫四卜郊已瀆而五卜其瀆尤甚郊牛之口傷已慢而鼷鼠再食角尤慢孟春宜郊而展轉自夏涉秋至于九月其怠抑甚焉瀆與慢乘而怠繼之將何以格帝休之博臨乎用郊不宜用也晉侯使荀罃來乞師冬公會單子晉侯宋公衛侯曹伯齊人邾人伐鄭十有一月公至自伐鄭厲公之乞師三郤錡乞師愧辭也欒黶乞師懼辭也荀罃乞師怯辭也愧則屈懼則謀怯則避春伐鄭楚子重救之諸侯望風而還今伐鄭楚公子申救之諸侯又望風而還非怯之驗歟夫一鼓作氣再而衰三而竭晉自鄢陵既勝之後伐鄭者三曽不能得其要領徒為王人羞兵玩則無威也公前以會至今以伐至見晉窮于事武而魯疲于奔命壬申公孫嬰齊卒于貍脤十有二月丁巳朔日有食之邾子貜且卒晉殺其大夫郤錡郤犫郤至郤錡來乞師不敬孟獻子知必亡郤犫饗于衛傲寧惠子知必亡郤至獻捷于周驟稱其伐單子知必亡左氏紀録固近巫史而三郤之橫已久形于言動蓋不知其然而然也且犫受僑如之貨而譖魯至爭王官之田而抗周罪固應誅錡雖未見顯惡忮險得于家傳豪奪慣于氣習且與犫至譖伯宗欒弗忌而殺之其罪亦宜誅厲公聲其當誅之罪與國人共棄之是為公討顧乃以羣嬖為腹心伸其私怨而尸三卿以正攻邪猶有勝負以邪攻邪勝亦敗負亦敗此所以不旋踵而自禍也吁君以嬖亡臣以橫戮皆可以為後世戒楚人滅舒庸小國恃大國而不戒未有不亡者弦黃與舒庸是也吳晉初通楚為之戢鄢陵傷夷之後乃能以敗為勝晉屢伐鄭不能挽而回之而楚已滅恃吳之舒庸晉憊而楚張也使非悼公立中國皆楚矣十有八年春王正月晉殺其大夫胥童庚申晉弒其君州蒲胥童殺而後厲公弒也公既尸三卿胥童以甲劫欒書中行偃于朝兵在其手不殺胥童未敢動于惡也胥童何為不與孔父荀息同其書胥童私昵也君臣天地之大分君雖無道臣安得而弒之既以弒書乃歸惡于君而泯其人是許其弒乎春秋為扶植人極而作命義所在正庖丁解牛為之四顧為之躊躇之地一字何庸輕其舉國以弒在廷皆有無君之心也厲公屢動于兵民不堪命鄢陵既勝驕侈日甚欲盡去羣大夫而立所嬖人心皆失之公固自禍也而欒書中行偃執公于匠麗氏遲遲而未弒使有一人倡明大義糾合渙散以出君于難書偃必委而奔召士丐士丐辭召韓厥韓厥辭但知殺老牛莫之敢尸而不知以大分不可犯恐動之是與盜謀而不同負也丐厥縱書偃書偃使程滑心于弒者非一人春秋探當國者之心而以國弒既以示人君盡失人心之戒又以著卿大夫表裏元惡之罪其嚴乎故曰春秋成而亂臣賊子懼齊殺其大夫國佐忠於為國而不顧其身固人臣之美節義有餘而權不足非善用其忠者也國武子疾慶克之淫亂其心忠矣投鼠而不忌器遂以專殺克見殺人臣所以不可不知春秋按左傳國佐專殺慶克而以榖叛則已有虧臣節矣原文以忠許之立論殊謬公如晉夏楚子鄭伯伐宋宋魚石復入于彭城宋華元倚晉以逐蕩澤族黨魚石倚楚以復入彭城元以靖國石以叛國其假勢用權則同而逆順異故書復入以著其惡公至自晉晉侯使士丐來聘秋把伯來朝八月邾子來朝此聘悼公興晉第一事也魯天下望晉為盟主而肆非禮於魯諸侯相視孰無離心故重魯所以重晉也晉悼初立公即往賀告至未幾聘使隨至非復前日止公不見公之氣象矣把邾相繼來朝知魯見重於盟主故也魯以見重無二心諸侯其不睦乎築鹿囿入則無法家拂士出則無敵國外患國恆亡公不見禮於晉則城邑為不虞備凜然有戒心一為晉重小國繼朝而苑囿以非時築矣人心難收而易放如是哉己丑公薨于路寢冬楚人鄭人侵宋晉侯使士魴來乞師十有二月仲孫蔑會晉侯宋公衛侯邾子齊崔杼同盟于虛朾謀事常得於深沈而失于淺露處事常成于詳重而敗于輕躁能定能應則規模立矣悼公即位之初宋以楚鄭之侵告急義當救也而吾國之禍變甫定列國之趨嚮未一匆匆號召必有扞格齟齬不能響應者於是遣使乞師以示兵不輕舉而致其謙同盟于虛朾以觀人心之向背而一其趨楚知吾謀事之不苟處事之有序望風斂退坐收成功雍容不迫規模整整豈羣臣謀慮所及哉天資髙也是盟襄公以居喪故不會晉亦不必其會於是乎有禮丁未葬我君成公
