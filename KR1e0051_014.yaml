body:
  text: 春秋說卷十四宋洪咨夔撰文公三十有三年春王正月夏五月壬午陳侯朔卒邾子蘧蒢卒邾文公嘗用鄫子于社不仁甚矣遷繹而卒君子曰知命命豈不仁者所能知哉特將死其言適善耳自正月不雨至于秋七月上智與下愚不移中人之性茍知謹畏以自䇿勵則愚柔可進也公二年自十二月不雨至于秋七月十年自正月不雨至于秋七月今又自正月不雨至于秋七月其無志于民始終如一日非不移之愚乎帝出乎震齊乎巽相見乎離致役乎坤凡物春生夏長以及夏秋之交方苞褎𤼵日夜趨新之功至此而極不雨始于𤼵育之初終于秀實之際則無一得遂其生矣此所以皆書至于秋七月也與豳風首以七月流火意同大室屋壊王入大室祼清廟中央之室也魯用天子禮樂故周公大廟中央之室亦稱大室徂徠之松新甫之栢豈盡濯濯無可斷度尋尺者而大室之屋以不修而壊簡宗廟可知且逆祀僖公並祔成風皆魯禮所未有禘祫之時合羣廟食于太祖昭穆失序嫡妾亂紀祖禰之靈其能安乎室壊所以大訓魯也冬公如晉衛侯㑹公于沓狄侵衛十有二月己丑公及晉侯盟公還自晉鄭伯㑹公于棐衛鄭邀公于中途介之以平于晉未幾同盟于新城此非晉謀慮所及亦非公智力所能濟也乆動則思静乆危則思安衛鄭之從楚雖乆而蛇蝮之與居鬼蜮之與交職貢事役歳不堪命昔晉楚交争衛鄭故楚猶以列國待之晉不與争則楚以臣僕命兩國安能不動從伯之思乎魯事晉無間言藉以請平而遂平中其機也夫機㑹之來庸人可以就功名公一出三為諸侯所榮宜哉十有四年春王正月公至自晉邾人伐我南鄙叔彭生帥師伐邾邾文公卒魯往弔不敬故有是伐邾小于魯魯常易之然觀定公嗣位以一言郤八百乘之晉國雖小其可易哉夏五月乙亥齊侯潘卒六月公㑹宋公陳侯衛侯鄭伯許男曹伯晉趙盾癸酉同盟于新城旄丘責不修方伯連率之職下泉思明王賢伯諸侯欲得所恃以為安同是心也使上有明天子下有賢方伯孰肯甘心異國之從哉楚商臣弑立中國不能討而日横厥貉之次驅陳蔡宋鄭以田孟諸至以僕御待列國之君使受役于司馬其辱不能堪也觀鄭穆㑹公于棐請平于晉而賦鴻雁苦夷樂華情可見矣新城同盟者八國非有所迫而從非有所要而集歡然共歃不减桓公之在幽同舟遇風之勢也趙盾能于是時相靈公以主牛耳伯業可興而上敵諸侯不知此身之為大夫無其君矣豫之四曰由豫大有得勿疑朋盍簮五則曰頁疾恒不死權在剛正之大臣雖足以致人心之樂從而君猶患于偪况盾乎秋七月有星孛入于北斗斗為天之喉舌七政之樞機乾象莫尊焉彗孛掃入環域中非常之變也周内史叔服有宋齊晉之占豈非謂魁主海岱以東北乎夫善言天者驗於人故當占其所感不當徒占其所應是歳之春頃王崩周公閱與王孫蘇争政不赴告於列國諸侯亦一切不弔喪不㑹葬是天下無一臣子矣逆氣上干有是徴豈待占驗于七年之後哉公至自㑹晉人納㨗菑于邾弗克納晉以諸侯之師納㨗菑邾人辭曰齊出貜且長乃還鑑於前事也邾元妃齊姜生定公猶晉穆嬴生靈公適當嗣立晉既立靈公秦納公子雍而晉拒之使秦能悔所納之非正何至甥舅之國暴兵交惡連年而不已今納庶子不正猶秦其可效尤乎聞邾人辭順斂師去之勇於徙義矣左氏以為趙盾公羊以為郤缺而經書晉人則是國人皆欲還非止盾缺也弗克納即易之所謂弗克攻九月甲申公孫敖卒于齊齊公子商人弑其君舍齊桓公鴒原一念之烈羣公子争立自相魚肉不盡不止無虧首立見殺而孝公立孝公弟潘殺孝公子而立是為昭公昭公弟商人殺昭公子而立是為懿公懿公尋為歜職所殺報施若符節然惟惠公元不急于得國而國歸之子孫享之不耕穫不菑畬則利有攸往天命其可以有心圗哉羣公子之圗國商人為最慘驟施于國而多聚士以傾舍元曰爾求之乆矣其用心國人所知也舎未踰年稱君盖不稱君則不可加以弑則商人之罪不白而心術隠矣其曰公子見桓公諸子之禍至今猶未息也宋子哀來奔髙哀不食汚君之禄辭卿而出奔叔肸不食簒君之禄織履而不去同姓異姓之别也其皆清矣乎故皆書字冬單伯如齊齊人執單伯齊人執子叔姬舎既弑單伯請其母昭姬于齊商人并執之國人莫或非者同惡相濟故再書齊人十有五年春季孫行父如晉三月宋司馬華孫來盟晉有大傳魯有宗伯皆古官不書而宋司馬獨著宋以卿兼大夫他國則以大夫兼卿舉其重者書且示先代之後設官視他國為有異也昭公無道欲去羣公子羣公子嘗為先𤼵制人之謀鮑又禮于國人以傾之勢如癰之將潰堤之垂决人人有懼心故子哀來奔華孫來盟來奔者見幾而違之得去就之義來盟者以使他國便道私盟於我以自託也耦為同姓之卿不知為國謀以靖方來之變而外交以保身且暴揚先君之惡于辭宴之頃忠孝兩失之書曰司馬華孫所以著其忘君暴祖之罪夏曹伯來朝齊人歸公孫敖之喪齊懿弑其君魯甥之舎執其母子叔姬以元惡大憝結深怨于我安知無沐浴請討之臣於是以公孫敖之喪歸盖無瑕者可戮人敖慶父之子也慶父弑兩君魯不能正其罪而敖以孟孫氏任事於國齊之弑猶魯之弑齊當討則魯之孟孫亦當討以是刼我鉗三桓之口使不敢議其後也不然何所慕於魯何所愛于敖而歸其喪哉書曰齊人歸敖之喪而不曰敖之喪歸自齊可見齊之用意六月辛丑朔日有食之鼓用牲于社用莊公例也在廷無古學惟近例之循而不知其非後世禮之不古類坐此單伯至自齊禦寒莫如重裘止謗莫如自修單伯為魯請叔姬于齊齊為無道誣單伯以淫併叔姬執之此心無瑕雖不汲汲於自辨數而浮雲蔽日雲散日明齊無辭以歸之從容告至無愧色無愠容可不謂賢乎否則安能免行有不慊之餒晉郤缺帥師伐蔡戊申入蔡秋齊人侵我西鄙季孫行父如晉冬十有一月諸侯盟于扈宰天下如庖丁解牛必中肯綮之㑹則奏刀㳺刃恢乎有餘地天下之有犯大戒負大惡伯主能暴白其罪與衆棄之諸侯誰敢不服不待問蜂蠆而搏蟣虱也蔡不與新城之盟固當討齊弑其君視蔡罪為孰重大合宋衛蔡陳鄭曹許七國之君于扈以尋新城之盟且謀伐齊乃取賂而還夫弑立之賊夫人可討鼓行直前罪人斯得豈非復伯之機㑹而盾不之乘晉政其荒矣盾心其悖矣昔宋督弑君齊甞㑹諸侯于稷為賂故立華氏以成宋亂衛朔出奔齊甞㑹諸侯逆王命納之亦相與俘寳玉以歸彼亂臣賊子可以賂免則何所懼而戢此齊所以有無知之禍也齊有大罪晉取賂而縱之未幾靈公亦弑得非身為賊亂之勸而授之刃乎是盟晉黨惡諸侯同其惡故不序十有二月齊人來歸子叔姬齊侯侵我西鄙遂伐曹入其郛伯禽封于魯三年報政周公曰魯後世其北面事齊國勢之弱非一日之故矣齊弑我甥不敢問單伯請子叔姬乃從而執辱之執我女兄弟不敢校行父告于晉請釋之不惟不釋又我侵侵不敢敵行父復告于晉㑹諸侯盟扈以謀齊而公不敢與齊雖以叔姬來歸侵師又繼至且伐我來朝之曹入其郛齊暴如虎魯弱于鼠魯之畏齊不敢一動手搖足但知以隠忍為國而齊之加無禮于我日甚焉國勢厭厭矣此無他不能自强也無怠無荒四裔可使來王我方怠荒則與國視之蔑如尚何怪哉十有六年春季孫行父㑹齊侯于陽榖齊侯弗及盟聖人之待惡人婉而有直體觀陽虎吾將仕矣之對可知矣陽榖之㑹齊侯方侈然自尊安肯下與吾大夫盟請俟公疾間可以折行父軒軒之氣矣書曰弗及婉辭也春秋于季氏事多婉夏五月公四不視朔周室雖微猶能班朔於諸侯如盛時之制諸侯受于廟而行之所以若天時恭王命而繫人心也公先是閏不告月猶朝于廟今則託疾不視朔者四亦不復朝于廟其後遂月不視朔以為常忽天慢王而棄民矣夫一歳之重在正一月之重在朔一日之重在朝正以布治勤于正則一歳之事舉朔以讀法勤于朔則一月之事舉朝以聽政勤于朝則一日之事舉不惟事之舉也上能勤則一國之柄皆由已出上不能勤居養移而志氣沮嗜慾多而精神散習偷養安而四肢百骸頺乎不立于是國柄潜移于下命寄權臣之手矣公厭政若此宜公家日削私室日强也後之人臣有欲移人國柄者故有以天下為桎梏之論六月戊辰公子遂及齊侯盟于郪丘季孫行父㑹齊侯于陽榖請盟不肯不以君盟大夫也已而公使襄仲納賂于齊侯遂與大夫為郪丘之盟人心之動于利如此哉虎不受餌孰得而穽龍可豢而擾則無異于犬豕牛羊晉方謀齊以賄而却齊方外魯以賂而親國不以義為利而以利為利上下交征未有不危者二君之禍可驗已秋八月辛未夫人姜氏薨毁泉臺魯人以泉宫蛇妖出而聲姜薨故壊之夫妖由人興公上不畏天下不恤民中不念祖宗氣惰事毁將無以善其嗣故妖孽生之豈泉臺之咎哉人囿于天地之間有生必有死夫人之薨歸咎于臺可以勿毁而毁之不知命也楚人秦人巴人滅庸楚滅國多矣庸之滅以秦巴參之濟惡也庸在江漢之南文王之化武王之誓盖習聞而熟傳之雖處南蠻豈甘心事弑父弑君之賊故帥羣蠻以叛楚按楚穆沒于魯文十一年是歳楚莊王立三年矣得國以正非冇他故原文所云殊為失考楚方大饑謀徙險以避其鋒屢戰屢北且不能支使非秦巴黨惡為之助庸未滅也滅庸而楚益張二國之罪焉逃冬十有一月宋人弑其君杵臼昭公欲去羣公子虧睦族之仁得罪于君祖母闕事親之孝固人心所不與也君雖無道臣子可將乎齊公子商人驟施于國而多聚士盡其家貸于公有司以繼之所以傾舎而卒弑舎宋公子鮑禮于國人貸饑饋老事材恤親而數六卿所以傾杵臼也而卒弑杵臼其事大同舎弑以商人書杵臼弑不以鮑書襄夫人使帥甸攻殺之罪不專于鮑也然國人之饑者利其貸老者利其饋材者利其事親者利其恤六卿莫不利其數而昭公見傾文公立國人何所逃罪乎善乎晏子之言曰惟禮可以巳之在禮家施不及國十有七年春晉人衛人陳人鄭人伐宋夏四月癸亥葬我小君聲姜齊侯伐我西鄙六月癸未公及齊侯盟于榖魯辱于齊君臣頺墮瑟縮不敢動惟一意求與之平而前侵後伐其暴逾甚齊固多行不義必自斃魯抑畏首畏尾身其餘幾哉國勢之強弱不同皆有弑逆之禍以此見沈潜剛克髙明柔克之難諸侯㑹于扈宋人執其君晉荀林父帥三國討之已而又合諸侯于扈欲平宋亂名正言順大義白矣而伐皆人㑹不序諸侯不勇于為義也孟子之論氣是集義所生者非義襲而取之行有不慊于心則餒矣晉知命義大戒之不可犯故有討宋平宋之舉是義盖襲而取之非平日集義之功有以養其氣宜餒而易沮也昭公之弑主之者襄夫人傾之者公子鮑殺之者甸師六卿則皆與聞其謀晉誠以義討之鮑不當立也茍以立鮑為足以定宋則是勸公族之傾其上助人臣之仇其君豈所以訓乎未幾齊亦弑魯亦弑莒亦弑而晉亦弑亂臣賊子窺諸侯之無能勇于義而動也故伐宋㑹扈深致其貶秋公至自榖冬公子遂如齊十有八年春王二月丁丑公薨于臺下薨于路寢正也小寢已非其正臺下果何地乎成王平生學問涵養之功至顧命而盡見盖其理明氣定心静神夷死生大變莫能移之利貞誠之復也公生而怠忽慢弛放心莫收安能正而斃哉秦伯罃卒夏五月戊戌齊人弑其君商人以利合者利窮則散商人急于得國故驟施以摟國人國人利其施莫以弑其君執其君之母為非也然驟施豈可常哉前日之施予不續後来之觖望方深國人之心亦以是失之故初侵我稱齊人再侵與伐稱齊侯可見人心以利窮而散矣歜職共弑歸舍爵而行知國人共快其君之弑而無所畏也夫利商人而黨惡者齊人惡商人而縱盗者亦齊人君以此始亦以此終可為不義求國者之鑑六月癸酉葬我君文公秋公子遂叔孫得臣如齊冬十月子卒成風私事季友而屬其子於是僖公立敬嬴私事襄仲而屬其子於是宣公立襄仲襲季友之迹而動也赤立未踰年見弑宜與齊商人弑其君同科不書君而書子不書薨而書卒為魯隠也襄仲謀弑不之晉而之齊齊人弑立固幸同惡之相濟晉趙盾已動無君之心不暇恤也弑前書叔孫得臣介遂如齊弑後書季孫行父如齊叔季與聞其故所當誅者非特一襄仲也春秋雖為魯隠固有微而顯盡而不汚者存所以使亂臣賊子之黨同懼夫人姜氏歸于齊襄仲連殺夫人之二子以絶其本根哭而呼天大歸于齊非特為保身計且潔其身以不辱先君也齊商人弑君而立併誣其君之母叔姬以淫而執之雖屢請得歸所傷多矣赤方弑而夫人亟去之豈非有所懲乎然觀燕燕衛莊姜送歸妾有曰瞻望弗及實勞我心又曰先君之思以勗寡人其志寜死于衛不歸于齊則夫人之歸春秋特哀其非得己未許其歸之正也故薨葬皆不復見季孫行父如齊莒弑其君庶其一年而弑君者三國王教不行天常不立比屋可誅也莒僕憑藉國人之怒弑紀公以其寳玉來奔宜如楚商臣許止書世子而舉國以弑是弑君者非特世子在莒朝者皆亂臣賊子也
