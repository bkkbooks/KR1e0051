body:
  text: 春秋說卷十三宋洪咨䕫撰文公二七年春公伐邾三月甲戌取須句遂城郚僖嘗伐邾取須句今又伐邾取須句中間須句復為邾得故再伐而取之且城郚為須句之衛也貪於得地不恤其民伐國未至城築隨起方春農時騷然廢東作之務以事外何他政皆怠而兵獨勤耶夏四月宋公王臣卒宋人殺其大夫宋成公卒昭公立衆殺其大夫不忌君矣初政若此其何以終大夫不名義不繫其人也戊子晉人及秦人戰于令狐晉先蔑奔秦公子雍在秦公子樂在陳皆文公子也襄公卒諸大夫謀舍適幼而立庶長趙盾主雍賈季主樂樂來自陳盾殺諸郫雍之立决矣穆嬴抱太子啼于朝盾畏國人以大義逼已乃背逆雍之先蔑而立靈公以禦秦師潛師敗之於令狐先蔑于是奔秦晉置君不定秦納之不正故皆人之主兵者盾盾之罪不勝誅矣謀廢太子一也殺樂二也背雍三也雖釋邪從正許其知悔而廢置豫奪擅國掌中反覆轉移玩君股上弒立已兆矣蓋亂臣賊子必先有無君之心而後動于惡狄侵我西鄙邢衛溫鄭齊晉以及王室皆被狄患獨未及我耳今侵我西鄙無忌憚甚矣國無政朝無人元氣索然客邪坌入春秋深憂之秋八月公會諸侯晉大夫盟于扈翟泉之盟僖公與晉狐偃及列國之大夫會恥不書公今盟于扈晉趙盾主之公與大夫會而不恥者有諸侯以分其恥也齊桓之伯未嘗以大夫會諸侯不以大夫敵諸侯也不以大夫敵諸侯則君臣之分嚴而已自尊晉文之伯以大夫會諸侯所以尊已而卑人也侯均一等大夫可以敵列國之君則亦可以敵晉君矣豈别嫌明微之道哉靈公初立幼不能君盾會八國之君如晉君權擅於內威行於外諸侯何敢較而大夫僭君靈公之位贅焉耳况以擁戴之恩保養之力待君如子姓宜乎威福大柄之移生殺廢置皆在其手靈公之命寄焉爾諸侯不序大夫不名春秋所以大正本也冬徐伐莒公孫敖如莒涖盟徐取舒稱人伐莒稱國莒夏而舒夷也莒請盟于魯敖往涖盟以為其聲援似知保小之義而敖志在于聲已託公營私其意隳矣八年春王正月夏四月秋八月戊申天王崩冬十月壬午公子遂會晉趙盾盟于衡雍諸侯不稟王命私會私盟政不在天子矣大夫自相㑹盟雖有國事前未之見政不在諸侯矣遂専于魯盾専于晉會盟于扈如兩君不惟兆惡視夷皋之禍而三家専魯六卿分晉其來有漸矣乙酉公子遂會雒戎盟于暴初平王東遷辛有適伊川見被髮而祭于野者曰此其戎乎已而秦晉遷陸渾之戎于伊川其後楚子伐陸渾之戎遂至于雒伊雒之戎蓋陸渾族類也玉帛未通何可以禮接襄仲以盟趙盾而出就與雒戎盟不禀君命而引未嘗內通之戎以交中國豈所謂大夫出疆安國家利社稷者乎夫徙戎于雒秦晉之罪也進戎同盟襄仲之罪也故再書公子遂以著生事竟外之戒公孫敖如京師不至而復丙戌奔莒敖如京師弔周喪遂奔莒以從聲已其縱人欲紊天倫而廢君命罪不可赦已公得無罪乎天王崩當弔嗣王立當朝既不躬往特藉一介之使通事周之誠而行人之職曾不謹擇顧使已試無狀之敖將命中道而反以幣出奔不恭孰甚焉書如京師不至罪纍公也螽宋人殺其大夫司馬宋司城來奔大國三卿皆命於天子宋之有六卿私且僭也六卿皆公族固不失親睦之意而同姓之卿無異姓之卿參錯相維於其間君臣之情親而不尊相狎相疑之念起相謀相屠之禍作此八王所以亂晉也昭公之立以羣公子分據國卿而欲去之樂豫遂舍司馬以遜公子卬雖能和公室於一時而怨實深故華樂皇三族挾襄夫人以攻公黨司馬卬握節以死司城蕩意諸來奔效節府人而出卬意諸黨無道之昭而不能正不為無罪而握節效節於搶攘轇轕之中能守官矣故各以官書其人不足見故泯其名所以勸人臣之不失職戒人臣之不知道也九年春毛伯來求金武氏子求賻毛伯求金不書天王使來諒暗也求賻求金皆在王崩之後王室不足於葬故有求天子無求而有求固非天王之法度宫車晏駕臣子大痛舉天下而葬一人顧使不足於葬有求於我誰之罪耶夫人姜氏如齊二月叔孫得臣如京師辛丑葬襄王前是襄王嘗遣使會僖公之葬成風之喪又歸含賵遣使會葬其於魯恩禮有過無不及而公顧薄之王崩不親弔使敖如京師不至葬不親會又使得臣如京師與公子遂如晉葬襄公同事君之禮如是乎晉人殺其大夫先都三月夫人姜氏至自齊夫人出未嘗至今以歸寧至異之也何異爾禮夫人始歸當至公逆婦姜于齊而不至廢廟見之禮矣如齊而返告至于廟如始歸何前之倨後之恭是以異之也詩曰于以采蘩于沼于沚于以用之公侯之事夫人之職莫大於奉宗廟之祭祀而公怠於禮夫人亦廢禮歸魯六年因如齊始廟見采蘩之義安在乎晉人殺其大夫士縠及箕鄭父靈公幼晉政歸趙盾人心不能平也盾於是殺大夫之不附已者先都士縠箕鄭父所以死也大抵權臣専國之始其心何能自安盻盻然恐人之議已鰓鰓然慮人之間已睽睽然懼人之負已故必先鋤不附已者以立威而後國人屏氣拱手惟所為而莫之非莫之違權始一矣指鹿之問仗馬之斥黃河之投鸚鵡之戮皆此術也春秋憂之故以人斥盾楚人伐鄭公子遂會晉人宋人衛人許人救鄭昔荆伐鄭公會齊人宋人救鄭楚師夜遁今楚人伐鄭魯會四國同救鄭不及宜所書有異辭而書救如一者與其有救災恤危之心而不以事之濟否論也夫然後知春秋不論迹而論心夏狄侵齊秋八月曹伯襄卒九月癸酉地震冬楚子使椒來聘楚始來聘進荆稱人今再來聘子其君名其大夫一以中國之禮待之果褒而進之耶抑憂其方强未艾耶魯為中國之樞諸侯之表楚欲網羅諸侯控摶中國不可以不先得魯其所以親魯者非懼魯也魯我從則他國不患其不我從也齊桓方卒晉文未興楚與魯最親伐齊之師我能左右之而諸侯遂皆為楚役矣文襄伯後中絶不通靈公不足以嗣世業楚窺其不在諸侯北方可圖復以好交我非牢籠我耶惠伯徒譏越椒執幣之傲而不察其實有輕魯之心况魯何所取重於楚而來聘耶春秋一以中國之禮待之信乎為中國憂也秦人來歸僖公成風之襚珠玉曰含衣服曰襚成風薨再月而王歸含為已晚葬纍年而秦方歸襚抑何緩之甚耶秦未嘗聘魯假歸襚而來通蓋為僖公有翟泉及溫盟會之好而襚其庶母也觀燕喜之詩僖公奉母為甚至然未嘗以夫人之禮過尊之其尊成風為小君而並袝則文公之過也秦人歸襚曰僖公成風而不以夫人書僖公之心白矣葬曹共公十年春王三月辛卯臧孫辰卒夏秦伐晉晉人及姜戎敗秦于殽國而不人志其以貪取敗也令狐之役晉實背秦而秦納公子雍非其正亦宜自反顧猶修怨於三年之後所以國而不人也夫穆公一知悔則序秦誓於帝王之未康公一不知悔則春秋從而狄之是非得失判於操存舍亡之間曾不能以一髮可不懼哉楚殺其大夫宜申楚穆王商臣負天下大惡夫人得而討之子西為成王任事之臣而蒙再生之造奔告方伯連帥請致弒父與君之討可也而身事商臣者纍年始與子家謀弒之是以亂易亂非討逆也故稱國以殺然楚大夫無能以官見而宜申首以専殺書亦榮矣自正月不雨至于秋七月及蘇子盟于女栗祭伯來無王命而私交于我罪也蘇子以王卿士私與我相為要結罪又甚焉魯與有罪故不書公冬狄侵宋楚子蔡侯次于厥貉凡書次或救或伐未有不言其所為其不言所為則遊觀之所次如公次于滑之類是也楚子弒立己十年矣天王不誅方伯不討滅江滅六蓼無不如意陳鄭宋蔡又皆從之于是次厥貉為遊樂遂田于孟諸其黨惡之甚者則蔡莊公也此次何關于世道而謹書之蓋以示亂臣賊子之得志而晉之伯業衰矣十有一年春楚子伐麇夏叔仲彭生會晉郤缺于承筐是會為謀諸侯之從楚者楚負天下大惡晉不能聲罪致討失此機會肆無忌憚陳蔡宋鄭皆從之田麇恥而逃極力伐之不少貸其磨牙中夏未已也郤缺乃施施為承筐之會與魯謀之魯何足與謀哉晉不在諸侯誠不逃范山之料秋曹伯來朝公子遂如宋狄侵齊冬十月甲午叔孫得臣敗狄于鹹伯道衰而楚人與狄人縱橫四出莫能制狄侵宋未已又侵齊又向于魯乘勝而來震蕩飄忽叔孫得臣設謀敗之雖敗之非其正而與晉人敗狄于箕同一快也狄自是懲艾不復向魯矣十有二年春王正月郕伯來奔不名必有非其罪者經曰伯傳曰太子𫝊可信乎按左𫝊謂郕太子以夫鍾與郕邽來奔公以諸侯逆之故書曰郕伯是說也先儒多疑之趙匡云諸侯嗣位未踰年尚稱子豈有身未即位以邑出奔而稱郕伯之理且鄭忽曹羈莒展皆已即位及其出奔猶但稱名况未嗣位者乎劉敞云郕太子來奔而稱郕伯若實郕伯來奔又何以辨哉且魯以諸侯逆之春秋遂沒其専土叛君之罪反謂之諸侯而尊之則何以稱不登叛人哉較原文辨尤明晰附録于此把伯來朝把改稱伯時王所復也王之黜陟其猶行於把乎二月庚子子叔姬卒叔姬稱子猶先君之子稱公子也夏楚人圍巢秋滕子來朝秦伯使術來聘魯方怠於政而三數年間楚來聘秦歸襚曹把滕來朝秦又來聘果何以得此於人哉有駜之詩曰君子有榖貽孫子于胥樂兮僖公在位三十餘年輔伯之外未嘗興爭城爭地之兵結怨於鄰國公嗣立十餘年亦未嘗輕動一兵所謂善道貽子孫者猶在而人猶知所慕也秦方歸襚復來聘願徼福于周公魯公以事魯待我加厚矣以穆公之賢不能以爵見其臣不能以名見而康公書伯術書名豈非講信修睦繼好息民春秋所深喜歟冬十有二月戊午晉人秦人戰于河曲晉人及秦人戰于令狐曲在晉也故書及秦伐晉曲在秦也故國秦晉人秦人戰于河曲兩皆曲也晉從秦師秦薄晉軍交綏而退未憖而遁不戰言戰何哉探其稔惡肆忿之心而著之也聖人用皇極之法權衡斯世好惡黨偏一無所狥惟其平而已晉舍所當立逆雍而背之晉之罪也晉立君已得其正而秦伐之秦之罪也晉引置君不定之咎秦省納雍非正之愆則仇怨可忘宿好可繼何至於復戰今戰河曲不容専罪一國兩皆人之其罪均矣此猶積年不决之訟均蔽其罪而後定故終康公之世不復書交兵季孫行父帥師城諸及鄆城築未有書帥師者城兩邑而行父用軍法總大衆以從役兵權墮其手矣凡權臣非得兵權不能専
