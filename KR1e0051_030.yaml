body:
  text: 春秋說卷三十宋洪咨夔撰哀公下七年春宋皇瑗帥師侵鄭晉魏曼多帥師侵衛夏公會吳于鄫伯統既絶列國相刃相軋若蚊蚊蜂蠆紛拏而澒洞未知所底止也而魯之圖邾為尤亟吳夫差入越敗齊之餘欲伯中國叔還首會之于柤來徵百牢明知棄禮過物不敢校卑屈甚矣屈于吳將求伸於邾也故會鄫未至而公入邾尊强虐小自謂計得而吳師不旋踵已迫于我齊亦取二邑所得毫芒所喪丘山康子之謀魯又出桓子下矣苟子之不欲雖賞之不竊康子以欲召盜此其大者秋公伐邾八月己酉入邾以邾子益來魯頻年伐邾公未嘗出今季康子欲伐邾饗大夫以謀之孟孫意異而公親伐公為康子役也邾不禦寇長驅深入處其公宫且以邾子益獻于亳社虐小不道前此安有是哉執當書以歸而書以來微其辭以晦虐邾之迹也季氏得政五世師多親帥惟康子未嘗帥師蓋先是伐邾取田三卿皆出桓子以身在外慮人之乘其間是以先歸而二卿盟康子有見於此故常身守而公將非以柄歸之公也身處其安公履其危師雖從公而已實制之以尊主之名行卑君之實以空國之慮為保家之計術愈巧謀愈深太宰嚭謂國君道長而大夫不出門破其心矣季氏專國始以得兵為重中以擅兵為彊末以遙制兵柄為安有國者烏可不謹其微哉宋人圍曹冬鄭駟𢎞帥師救曹兵法十則圍之宋之圍曹非將卑師少而人之方伐又圍甚之也鄭救曹以帥師書急於拯難不嫌於動大衆然亦非衆不能救也救則存不救則滅春秋所以善鄭而惡宋八年春王正月宋公入曹以曹伯陽歸內作色荒外作禽荒有一于此未或不亡色與禽豈遽能亡人之國哉有所好樂則小人乘而投之曲木附曲木以類而進國斯相與共亡之矣曹背晉奸宋以致討前年伐去年圍伯陽宜知戒懼而與公孫彊習為田弋之荒宜其入而虜也傳謂宋滅曹經不書滅入人國都以其君歸不待書滅而罪已著如公入邾以邾子益來邾亦何嘗滅哉吳伐我凡伐我皆書鄙疆場被兵也吳伐我不書鄙兵薄國都也季康子專國以欲召盜入邾之役俘其君處其公宫師晝夜掠刻核太甚矣茅夷鴻道吳以復邾讎都邑受伐國如斿綴鄰邦環視無寸鏃尺兵之援一動之慘衆怒之犯也內勢方迫外援莫至景伯雖欲不為城下之盟得乎或以在廷諸臣無能以一言退敵兵三十里而盟為魯憾曽不知是盟不在於失謀而在於失禮吳索百牢拱手而與禮不能秉盟何能却哉伐我一辭我之致寇吳之猾夏皆見焉春秋可謂微而顯夏齊人取歡及闡歸邾子益于邾有所慕而為善有所畏而不為惡常人之情也勢迫機危智窮力屈然後改圗以紓禍此豈其情也哉魯施無道於邾吳為邾討至為城下之盟齊與邾有甥舅之好遂伐取二邑魯懼兩彊之合而念所以召寇者在益於是歸之于邾謂能知過自新不可也外迫之也春秋深幸其歸者邾子不歸魯難不已歸邾子可以紓禍也邾未歸而齊取邑邾已歸而齊歸邑疑若為義不為利者然亦豈齊之情哉魯成於吳必將挾吳以臨齊急歸所取亦以紓禍也其後公連會吳伐齊雖得邑前憾猶未平歟是知歸邾子歸歡闡皆出於不得已故其辭同秋七月冬十有二月癸亥杞伯過卒齊人歸歡及闡九年春王二月葬把僖公宋皇瑗帥師取鄭師于雍丘即鹿無虞必吝觀我朵頥必凶鄭罕達外求邑以處其嬖偏師輕舉圍宋雍丘宋皇瑗反從而圍之外圍合而裏兵出腹背夾攻全軍覆沒若取諸其懷之易也書取于雍丘以見用兵之奇夏楚人伐陳秋宋公伐鄭冬十月十年春王二月邾子益來奔人必有所懲艾有所戒懼有所愧恥而後能棄舊以圖新樂禍亂而縱細娛玩憂患而忘大辱則終於迷復凶而已魯師及門猶聞鍾聲益既以是為俘虜僥幸返國宜知少悛而無道猶故卒失國出奔奔豈無他國而甘心適獻亳社之魯不復知人間有愧恥事矣大愚者終身不靈故其來其歸其奔皆足以著其罪公會吳伐齊三月戊戌齊侯陽生卒怨不可長讎不可稔躬自厚而薄責人則兵可弭魯施不恕於邾齊因取我二邑魯歸邾君齊亦以邑歸我釋仇續好之機也魯不自反連年會吳伐齊挾南蠻以撼諸夏隳親䁥而長豺狼季康子之惡不可諱已况晉侵齊於陽生卒之後魯至公於葬悼公之前聞喪宜還而不還與晉伐喪之罪同也左氏齊人弒悼公赴于師兩傳不言弒是卒與伐會非弒明矣吳人以譎為兵三日哭於軍門之外而舟師自海入齊假討弒以動人心而左氏信之也春秋坦然明白安有以弒為卒自為迂晦哉觀葬悼公則疑可決矣夏宋人伐鄭晉趙鞅帥師侵齊五月公至自伐齊葬齊悼公衛公孟彄自齊歸于衛薛伯夷卒秋葬薛惠公冬楚公子結帥師伐陳吳救陳救未有不善故善救無中外之間陳即吳故楚子期伐陳吳延州來季子救陳謂二君不務德而力爭民何罪乃還吳可謂義札可謂賢矣然既善吳救乃以號舉何哉中國無伯楚伐吳救自爭一陳故舉號以抑勾吳之盛存中國之體坤上六嫌於無陽之意也十有一年春齊國書帥師伐我吳伐我薄國都矣齊伐我又薄國都魯連年搜兵城築而寇來蕩無闌防之固三家之心內離人莫與守故禦諸竟不能而次于雩門之外戰于郊勢良迫矣使非冉有倡其勇未必不再為城下之盟也孔門諸子有用之學類如此伐我不著所及之地為國諱夏陳轅頗出奔鄭五月公會吳伐齊甲戌齊國書帥師及吳戰于艾陵齊師敗績獲齊國書致寇者齊導寇者魯魯會葬齊悼之後齊既易世前怨可釋國子乃帥師深入以伐我宜其召寇也吳方驟勝魯連嵗會之以伐齊雖不與艾陵之戰而為吳鄉導其用心慘於戰矣春秋書會伐以著魯導寇之罪書及戰以著齊致寇之罪吳以國舉抑可知矣書敗書獲又以著國子誤國之罪秋七月辛酉滕子虞母卒冬十有一月葬滕隱公衛世叔齊出奔宋不邇聲色不殖貨利仲虺頌成湯之盛德不過如此甚哉人欲之難克也是年陳轅頗方以貪出奔衛世叔齊又以淫出奔利急則義緩色盛則德衰故皆足敗其家亡其身君子可不戒諸十有二年春用田賦禹貢厥賦厥田各不等周禮九賦斂財賄大府以其入待用謂之財賄賦非出於田明矣魯既有諸賦今復使出於田是三農九穀之地亦斂其財賄以供內外百費之須也時城築無虛嵗兵行無寧日彊吳來索百牢無厭之求無節之奉非復如事晉時所以國用日繁二猶不足變先王之法以厲民雖焚林竭澤不顧也且稅畝曰初作丘甲曰初田亦創始用賦不曰初何哉稅畝丘甲之時猶以作俑有惕然不自安之意今直用之如積久已行之法恬不為異夫變法以厲民而安之不以為異周公之典具在亦末如之何也已此所以泯其初也雖然季氏富於周公而為之聚斂求也安得不任其責夏五月甲辰孟子卒魯迫於彊吳且欲倚之為重故不顧禮義而娶同姓君而知禮孰不知禮陳司敗譏夫子蓋以為君隱也逮其卒夫子乃以喪小君之禮與弔豈故為是招君之過哉孟子伉儷昭公則嘗母其國嘗母其國烏可無一日之喪而藐然常人視之乎故不赴不祔則可季孫不絻則不可絰而弔放絰而拜聖人必有以權輕重之宜矣其曰孟子託言宋子之長若惠公元妃孟子云公會吳于槖臯秋公會衛侯宋皇瑗于鄖宋向巢帥師伐鄭冬十有二月螽十有三年春鄭罕達帥師取宋師于嵒佳兵不祥之器其事好還況懷報人之志者其謀深宋皇瑗取鄭師于雍丘之後繼伐鄭者再鄭不切切與校靜以俟機會之來及向巢圍嵒踰年師老矣鄭達救之遂取宋師于嵒外圍合而裏兵出腹背夾攻全軍覆沒猶前日鄭師之在雍丘也我以此施彼以此報孟子所謂非自殺之一間耳故春秋書取無異辭以示作不順施不恕之戒夏許男成卒公會晉侯及吳子于黃池天道陽居大夏主嵗功隂常積于空虛不用之處此春秋尊中國卑外域之意也晉合諸大夫會吳于鍾離而吳始通再合諸侯會吳于戚于柤而吳遂張但知假吳以制楚不思吳亦一楚也柏舉之役闔閭五戰入郢伐我之役夫差一舉盟城下艾陵之役又大敗齊師獲其五將日張之勢如暴漲稽天疾颶動地洶湧轟豗浩不可遏凡諸侯之事晉者悉轉而事吳晉方內離外叛不暇與校亦不能動吳之心黃池之會汲汲俯首以從之公往會焉天下大勢淪胥于荆蠻者七八扶植綱常為世砥柱聖人不得不任其責也是役吳主會既進吳稱子以見其强而以公會晉侯正所主於吳之上單平子以周卿士會而不書齊衛滕薛莫敢不至而不序與楚屈建主會而冠以趙武且不序諸侯之大夫同吳楚雖彊無得奸吾中國之正而中外大分不以世變紛紜而遂移其有功於人極信不在禹抑洪水周公懲荆舒之下也楚公子申帥師伐陳於越入吳黃池之會齊晉前驅魯衛驂乘滕薛俠轂而趨吳莫彊焉會未告至而越已入吳乘其驕搗其虛也楚方彊中國莫之制天以吳制之吳方彊中國莫之制天以越制之天之扶植中國何嘗不用其至而一時君臣上下但知倚天幸而不思所以當天心委天運而不求所以永天命拱手以諸夏之權禪楚又以禪吳且駸駸以禪越天獨奈之何哉春秋為扶天常立人極而作中外消長之故必謹其微而詳其變莊十年荆敗蔡之後方有楚安有所謂吳成七年入州來以後方有吳安有所謂越三者先後相乘盛衰相續皆足以病中國而未嘗並見於一年今吳會黃池楚伐陳越入吳數月之間鼎立橫行於中國荆蠻之強莫此為甚聖人憂患斯世之心宜何如哉秋公至自會晉魏曼多帥師侵衛葬許元公九月螽冬十有一月有星孛于東方盜殺陳夏區夫十有二月螽彗孛凡三見孛于北斗孛于大辰皆非小變也而孛于東方在衆星皆沒大明將升之旦未有烈於此時也蝝蜚螟螽蜂午竝起或自天而雨皆非小災也而十三月之間螽之為民害者三未有數於此時也變之烈災之數且見於一年春秋謹書之見憂患斯世之切十有四年春西狩獲麟天下有道麟鳯至麟趾見於風雅之始獲麟見於春秋之終周家終始以仁治天下故仁獸以類至也周道衰鳯鳥不至河不出圖王者復起殆絶望於斯世一旦麟獲於大野之狩安知疇昔之所絶望者不有所可望於是二百四十二年撥亂反正之筆託之以終蓋自堯舜禹以來五百嵗而湯作湯以來五百嵗而文武作文武以來五百有餘嵗宜有聖人出而續堯舜禹湯文武之傳然亂不極治不興天下之亂極於哀而麟至麟為王者之瑞其果有王者作乎有王者作天下其有不治乎且天下未有伯之時王命尚行於諸侯吳楚亦未橫於中國天下有伯而王室卑吳楚橫逮其無伯遂相繼擅夏盟楚張而吳起吳彊而越奮先後相乘未嘗竝見惟哀十三年吳會黃池楚入陳於越入吳三雄角峙衆蠱叢聚夷夏大變至此而極況方旦而星孛纍月而頻螽天人之變亦至此而極亂極思治方切切於憂世之心而麟出以著王者將興之符安得不為斯世幸為斯文感耶在詩正風熄而變風作匪風思周下泉思治變風極矣而豳七月次之春秋以獲麟終即此意也雖然聖人之生達而在上所以福天下窮而在下所以福萬世夫子抱帝王之學四代禮樂百聖文獻使獲推行於天下則龍馬可出鳯凰可儀鸑鷟可鳴騶虞可應堯舜禹湯文武之盛天下將復見之奈何有其道無其位吾為東周雖猶反手周公不夢竟成絶響不得已刪詩定書繫易正禮樂以垂後世望將來而春秋著之行事權衡王道柱石人極尤為懇切而明白蓋天所以續堯舜禹湯文武不傳之統在此不在彼也吁麟非一時之瑞乃萬世之瑞歟
