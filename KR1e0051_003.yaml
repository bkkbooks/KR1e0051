body:
  text: 春秋説卷三宋洪咨夔撰桓公上元年春王正月公即位位天位也有天德者可以居之君初嗣位稱子踰年改元行即位之禮而後稱公重居正之始也鼎之象曰君子以正位凝命位得其正則行之於身布之於國無一不得其正而天命為可凝隱公以攝自詭非正也公以篡立不正抑甚焉方隱之攝公固望其踐將遜之言日復一日嵗復一嵗久假之怨深矣羽父逆探其心反譖之遂成鍾巫之變紾臂得食公之罪尚焉逃天王不討與國不問嫁其罪於寪氏而揚揚行即位之禮如嗣立之常天理滅矣故春秋不沒其實以著其無忌憚之心三月公會鄭伯于垂鄭伯以璧假許田夏四月丁未公及鄭伯盟于越瞰人之危而撼之所圖無不濟乘人之疑而劫之所請無不從蓋人方處危疑之地其心虛其氣歉弦聲可以落雁鞭影可以行馬狐鳴可以嘯衆鶴唳可以走敵中其機也鄭伯前以祊歸我志在許田而田未入者魯如京師朝宿之所隱公難於輕與猶擬議而未決公犯天下之大惡人得而討此心蓋搖搖其危矣莊公坐窺其機謂許田可撼而劫於是要公為垂之會以璧而請之名假以飾其謙實劫以濟其欲公亦幸於大僇之不問屏息退聽以田歸之隱公纍年反覆躊躇而遲於與者一旦墮其掌握中矣凡弒立之君列於會盟則不復討故公亦乘其獲田之喜約為于越之盟兩得所欲豈暇顧義理之安哉秋大水水生于天一成于地六浮天行地周流不息如人之氣血運於一身之中不適其平則四肢百骸皆為受病之處此所以居五行之先也况天人精祲相為感通公之逆節悖理以陰干陽人飲其忿天泄其怒故水不潤下之變於初年見之冬十月二年春王正月戊申宋督弒其君與夷及其大夫孔父孔父義形于色隱然有虎豹在山之勢故華督必先翦孔父而後敢行無君之志賢者之係國安危係世有無若此可不重乎魯大惡春秋每為之諱使大惡果可以諱而隱亂賊將肆行而莫之畏綱常不立矣故假他國以行王法而魯之罪自著宋督之弒執簡謹書昭然如日月公于此不待壞室瀦宫而獄已蔽矣孔父書大夫以勸臣子之不失職滕子來朝隱末年滕偕薛來朝書侯公立來朝書子自此終春秋之世以子書時王所黜也或疑周之號令不行于諸侯久矣何能黜滕之爵然能錫命則能黜爵矣王政不綱能黜小國之爵不能黜大國之爵而賞行于其大罰行于其小尤見衰世之政若謂以朝篡君春秋降而為子則會盟之齊鄭皆可降何獨施于滕且惡惡及子孫乎若謂自貶以損貢如子産稱鄭伯男也之類則前年方以長薛為榮今遽自貶二等以辱其先非人情也榖梁注為長凡諸侯之朝于公直書來朝其貶自見三月公會齊侯陳侯鄭伯于稷以成宋亂大宰督與司馬孔父爭柄於是外交公子馮以傾之既殺孔父遂弒殤公而立馮此宋亂之所由來也而宋亂猶未成者有能討賊誅督亂根絶矣公以賊黨賊合齊陳從鄭為稷之會取賂而立華氏督既相莊公又相閔公厯二十九年宋萬弒閔公然後殺之於東宫之西是一督之相宋為之不寧者纍世非公與三國成之而誰耶春秋正黨賊之誅曰成宋亂成宋纍世之亂也宋亂既成而諸國多不討之賊其亂皆以是而成矣按杜預左傳注訓成為平今解為成就之成蓋本何休公羊注夏四月取郜大鼎于宋戊申納于大廟明堂位崇鼎貫鼎皆天子之器周公之廟詎少一鼎哉宋有郜之大鼎公以篡主篡取而納之大廟夸示得意於國人主藏之名賴姦之用為大凶德有常無赦宗廟享之乎王道衰義利不明於人心是非臧否與賄轉移篡逆大惡亦可賂免世之不相率為雞鳴之跖者幾何人秋七月把侯來朝武王克殷求禹後得東樓公封之把去魯為近公初嗣立把侯來朝不可謂不敬而兵隨入其國如細民軋於無道之豪強委命事之猶不免良可哀也已蔡侯鄭伯會于鄧按史記楚世家熊通二十三年衛弒其君桓公二十九年魯弒其君隱公三十一年宋華督弒其君殤公三十五年楚伐隨使請於王室尊其號三十七年自立為武王楚以蓽路藍縷啓國於荆蠻之地雖桀黠不常而狐嗥鼠拱不出灌莽敗垣間何敢自齒於衣冠玉帛之國至熊通始有所窺而動蓋中國所以貴于天下者以三綱五常在焉耳而隱桓之世衛魯宋並弒其君綱常淪斁王法不行楚於是乎僭王元氣憊而客邪入理勢然也蔡鄧與鄭鄰於楚知其將有所窺而動懼而為此會謀所以待楚者楚之聲采氣焰已足鑠之矣宜其終折而入楚也史遷記自王本末疑得諸經師之傳九月入把公及戎盟于唐冬公至自唐此即隱公親戎之故地也公自知大惡不容於天地戎人亦得而討之故汲汲為唐之盟唐即隱公盟戎之故地使知我之親戎猶隱之親戎冀戎之親我猶昔之親隱折節下交而不以為辱也然戎情安可保哉故至公以危之三年春正月元年正月書王以王法正弒立之罪也二年猶望有以王法討賊者亦書王三年隱喪且除王討竟不加焉故不書而公之無王王之不王諸侯之不知輔王其罪具見公會齊侯于嬴公昏於齊不待媒介而為嬴之會以定其議得國非正中正歉然欲挾齊以為安也觀鄭忽以辭昏而失國則知公之急于求昏意有在矣夏齊侯衛侯胥命于蒲春官有九儀之命命出于天而王司之不可私也諸侯可自私乎是時王室雖微猶有錫命齊衛侈然自大不待王命而彼此私相推尊車旗器服超軼命數以夸國人天所以章有德王所以懷萬邦皆為濟私之具矣劉氏謂私相伯即九命之伯也六月公會把侯于郕秋七月壬辰朔日有食之既日食朔而既陽微之極也夫君陽也臣陰也魯宋比年弒其君陰之干陽若此咎徵以類而應宜陽宗盡食以示譴也然陽無終剝之理而剝有復之機日無竟食之理而既有生之漸天道好還魯宋討賊之義安知不有時而伸乎公子翬如齊逆女親迎之禮廢久矣以大惡之君娶不可防間之女而賊翬逆之何凶德之參會也翬再帥師於隱之世未賜族故不稱公子公使逆女始以公子稱同惡相濟而賜之族賜族則世為大夫矣此與宋立華氏之意同九月齊侯送薑氏于歡公會齊侯于歡夫人薑氏至自齊冬齊侯使其弟年來聘在齊稱女自齊至魯郊稱薑氏入國稱夫人公女歸于天子諸卿皆行公猶不自送齊侯越境送女尋又使寵弟致之皆非禮也女在父母家女師教以婦德婦言婦容婦功其教素行其德素修也薑氏在齊師傅之教不嚴閨門之行不肅自齊適魯道阻且長安保其無單伯子叔姬之辱故齊侯親送于歡而授之公公會于歡而受之齊侯謹其防也以此為防曾不免魯道有蕩之刺故易之象曰勿用取女有年自古有年甫田思之以不得見帝王盛時美化洋溢和氣薰蒸而後能格五榖皆熟之應也今何時而有年蓋頻嵗無年此獨有年有年之寡所以形無年之多也夫秋方日有食之既而冬繼之有年豈天或未定耶四年春正月公狩于郎郎非其地狩非其時公之始立猶虞宋衛齊鄭之我討逮今四年鄭以璧田交我宋以郜鼎賂我齊以薑女妻我而衛則齊之所厚也上無明天子下無賢方伯尚誰我問于是揚揚合國人狩于逺郊之郎以示得意而鎮胥動之心鉗竊議之口何暇時與地之計哉夏天王使宰渠伯糾來聘宰官渠氏伯爵糾名公滔天之惡王討不加聘又先至章章乎旌逆而勸惡宰通乎四海上穆天縡下維人極宜舉八柄以詔誅廢而愆不知繩繆不知糾躬為行人下聘不道折足覆餗不勝其任矣宰咺歸賵失禮宰糾來聘失刑禮壞刑隳率天下而淪胥繄誰之咎書糾詳於咺罪重於咺也嗚呼公於是乎髙枕而卧矣是嵗不備秋冬二時以見天道之虧按經無秋冬杜預以為史闕文何休則謂桓公無王天子不能誅而反下聘故去二時以為貶原文本何説五年春正月甲戌巳丑陳侯鮑卒甲戌之下逸其事已丑陳侯鮑卒不必合二日而卒陳侯也夏齊侯鄭伯如紀如紀之行非盟非會非遇非朝果為何事哉二君用心忮忍而狡險見便逢利則扼喉拊背而奪之何小之恤義之問是行紀在其目中矣紀不虞二君之涉吾地自是始恐天王使仍叔之子來聘闕黨童子將命子曰非求益者也欲速成者也子路使子羔為費宰子曰賊夫人之子凡為人子者六年教之數與方名九年教之數日十年出就外傅十有三年學樂誦詩舞勺成童舞象學射御二十而冠始學禮是謂成人然亦未使從政也况聘于四方關國體之輕重専對有辭賔謁有儀一不中度獻笑取侮故雖弓冶之有傳亦必詩禮之素習詎容以乳臭子將事乎桓王之立武氏子來求賻今又使仍叔子來聘寵其父而榮其子不暇顧王命之辱也仍叔聽其子之辱王命烏得無罪葬陳桓公城祝丘秋蔡人衛人陳人從王伐鄭王室無伐久矣書伐大之也而閔周之意存焉大司馬以九伐之法正邦國鄭莊克段誓母入許入郕伐戴謀紀而成宋亂其麗於九伐非一而負固不服犯令陵政為特甚以畿內之諸侯為王朝之卿士陽為事周而中實無周交質方新而取麥取禾之師繼至交惡已甚而歸祊易許之謀隨動父雖不慈子不可以不孝王固失鄭鄭可以無王哉王問不朝之罪於鄭宜可以振綱紀伸威令而命將莫知所屬至於親屈萬乘之尊得無褻其威乎齊宋與魯無從者而蔡衛陳從蔡衛陳之君不從而以微者從諸侯拱視繻葛之戰如鄉鄰之鬭卒使鄭人得以犯六龍之顔吁可勝罪耶觀諸侯之意非不知周鄭尊卑之分枉直之情而莫有從王者慮王室之張皆當次第致不朝之討而魯宋之討又不止不朝而已此所以聽周鄭自為勝負也聖人甚欲扶王室以正諸侯而王不善用其伐故不書天大雩螽春官司巫大旱則帥巫而舞雩雩旱禱也又重之以螽螽蝗類挾旱氣而張昔也有年今也雩螽天其定乎雩以大書僭天子之禮冬州公如曹自相如也告則書六年春正月實來實人名猶祭伯來之類夏四月公會紀侯于成伯姬叔姬皆歸紀婚姻之密宜在宇下隱公時未嘗朝會至此齊鄭垂涎于紀故即公謀之三時之內既會又朝以公交鄭親齊庶幾帡幪之可藉也公身犯大戮何能芘人所以為紀謀者獨有歸女于周恃王為安耳而王亦安足恃哉此屯之上六所以至於泣血漣如也然則為紀當奈何曰強為善而巳矣秋八月壬午大閲周禮中冬教大閲遂以狩田習戰法而後從獸也前年狩而不閲今年閲而不狩其於僭禮之中不備禮可知夫天下之變常出於意料關防之所不及豹毅養生是巳故為國者惟求諸道得道者必多助失道者必寡助公上無以得助於天下無以得助於人此心有負常虞見討欲倚城池甲兵以鎮浮弭變城池修矣甲兵練矣而非常之變乃在房闈袵席間豈意料關防之所及乎論城必曰懷德惟寧論兵必曰好仁無敵百世不與易也大閲於國故不地蔡人殺陳他左氏文公子他殺太子免而代之公穀他淫於蔡而蔡殺之是蔡殺篡陳之賊也他勇為不義志得意滿翩然輕出宣淫于異境蔡人遂得而殺之篡弒之賊夫人可討使非微行適蔡亦豈談笑所能正其辜哉以此見天網之不漏九月丁卯子同生聲子隱母仲子桓母叔薑閔母成風僖母敬嬴宣母齊歸昭母兩定姒襄哀母皆庶也定則昭公之弟成則母穆薑通于僑如文則母聲薑無逆至之日惟文薑逆於公之三年同生於六年以太子之禮舉之重嫡長也且人疑其為齊侯之子春秋謹書日月以别嫌明微冬紀侯來朝七年春二月己亥焚咸丘益烈山澤而焚之與焚咸丘皆焚也彼以除民之害此以縱已之欲夫鳥獸昆蟲與人同生天地間愛生惡死其情則均故君子親親而仁民仁民而愛物物之被其愛即吾親親仁民之推耳網四而去三豝五而發一豈不能合圍掩羣快一時之欲不忍之心存焉公忍於同氣若此尚何有於民物火燎于原飛走蠕動無一得免其憯為特甚而况春方發生之時乎夏榖伯綏來朝鄧侯吾離來朝公負天下之大惡而諸侯朝之朝非所當朝也春秋凡書來朝公皆貶而于特筆纍書尤見深疾之意諸侯不生名失國則名榖鄧同時逺修朝魯之禮雖非旅見實相先後其降體折節與失國託人國者無異故因自賤而名之栽者培傾者覆造物何心哉四年無秋冬逮今三嵗天道又小變故復不備二時以見聖人感時悽愴之義八年春正月己卯蒸天王使家父來聘前書天王使宰渠伯糾來聘名宰以見聘所非宜聘後書王使榮叔來錫桓公命王不稱天以見錫非所當錫今家父之來無貶者使魯主紀婚而至非為公也凡王姬下嫁王后逆歸皆主魯其來非一日矣夏五月丁丑蒸黷於祭祀時謂弗欽故髙宗肜日有典祀無豐於昵之戒以祭之明日又祭也魯一嵗再舉非時之蒸身冒大惡而黷祭以徼福神豈歆之哉秋伐邾公即位以來滕子首朝把侯繼朝紀侯又朝榖伯鄧侯又自逺而朝魯邾錯壤雞犬相聞獨不我朝可謂知逆順之理矣已則有罪而問人之罪巳則無禮而責人之有禮是伐也惟可加藐乎之邾而已冬十月雨雪公政上干陰陽之和積年無雪而是冬雨雪故表而出之祭公來遂逆王后于紀天子命魯主紀婚在家父來聘之時祭公之來或曰告逆期實非也其來猶祭伯來也祭外交于魯非一世因逆后過魯首行外交之私禮而後適紀慢王命而輕王后豈三公體國之義哉九年春紀季薑歸于京師自周逆則稱王后自紀歸則稱季薑隨所繫也王者之治天下必有內德之助猶乾之有坤日之有月陰陽配合之義莫重焉太姒興周褒姒滅周正家而天下定不可不謹擇也桓王以隱三年嗣位至此十有八年始逆后以歸豈不輕其選遲之而又久乎夏四月秋七月冬曹伯使其世子射姑來朝諸侯相見曰朝命世子來朝曹伯之過攝君父來朝射姑之失然亦有故焉公之立非正天王再使下聘齊宋鄭陳列在會盟滕把穀鄧躬執朝禮而曹與邾小國獨不至邾既伐矣曹不能不為之動以為朝耶義有所不可不朝耶情有所不安于是身以病諉命世子攝而朝執德不剛遂至兩失為人父為人子之道孟子曰如知其非義斯速已矣
