body:
  text: 春秋說卷十五宋洪咨夔撰宣公一元年春王正月公即位人君莫大乎體元而居正位得其正之難也位得其正上無愧於天中無愧於祖宗下無愧於民而後可以行即位之禮盖天命不可以智力求天位不可以權術干而受之必以道茍一毫有愧於中則無以入宗廟見祖禰御朝廷臨臣民矣公爲文公庶子以母敬嬴私事襄仲殺兩嫡而立之其果以道乎茍其道舜受堯之天下不以為泰非其道簞食豆羮不可受於人簞食豆羮之得失輕重與受天下均非其道猶惕然動於心赧然見於顔面有寧貿貿以死不食嗟來者而非道得國顧不知恥改元即位侈然如常禮同氣之肝腦塗地適母之號呼徹天以是而行五始之禮心安乎哉冒天下之大惡以爲榮負天下之大僇以為安故書法與桓公同公子遂如齊逆女三月遂以夫人婦姜至自齊鑽燧改火期可已矣文公薨於去年二月公逆婦於今三月短䘮用期制也魯䘮紀之壞非一君而娶未有若此其亟者畏齊深則奉之勤倚齊重則求之切尚何暇顧禮哉况齊弑吾甥魯不問魯弑彼甥齊不責氣類孚合猜疑兩忘故襄仲以弑君大惡逆女於出姜父母之國恬然不以為怪也妾母為姑婦姜所以不氏夏季孫行父如齊晉放其大夫胥甲父于衞放放驩兠放蔡叔之放也秦晉戰於河曲臾駢欲薄諸河胥甲趙穿當軍門呼而止未為大罪也况相去八年豈應宿愆之猶在逸罰之復行是盖權臣之私惡殺之則無名留之則有憾故托放以屏逺之放而不失其大夫意必有當官而行忤權要者公㑹齊侯于平州公子遂如齊六月齊人取濟西田桓與公立皆非正桓壻於齊而強敢與齊抗公壻於齊而弱常為齊刼盖簒弑之君與盟㑹則免于討魯一日殺二嫡皆齊出安知其不孰何我國人之情盖甚洶洶也遂與季孫急於借齊鎮浮而弭變結轍徃來窘狀畢露茍得齊侯與為平州之㑹以壓危疑何愛濟西田之賂哉書取所以著齊之刼魯見利而忘義秋邾子來朝楚子鄭人侵陳遂侵宋晉趙盾帥師救陳宋公陳侯衞侯曹伯㑹晉師于棐林伐鄭爵楚而人鄭鄭輔楚人以躪中國也楚得鄭遂侵陳宋而晉獨救陳陳急而宋緩也宋陳衞曹之君㑹晉師伐鄭晉師次于棐林俟諸侯之至而後伐也救陳者惟晉伐鄭必俟諸侯之集何哉義不足以服人必衆而後濟也盾為政於晉惟利是求齊弑其君舎晉嘗合諸侯謀之取賂而還宋弑其君杵臼晉嘗合諸侯伐之復取賂而還簒弑大惡皆以賂免三綱五常掃地殆盡方伯連帥所以奉王命而行天討疑不如是此諸侯所以解體也方鄭請平之時固有舍楚即晉之志茍行事能服其心何至颺去之亟狥黨惡之利忘討賊之義盾之無君眹迹已見故鄭知其不足事而去之觀子家使執訊之辭豈偏師所能屈哉中有所慊外有所疑宜必俟四國之集而後進也善救故書盾大夫不可以受諸侯殊㑹之禮故不書盾冬晉趙穿帥師侵崇臨衝閑閑崇墉言言臨衝茀茀崇墉仡仡文王奉天命以討有罪之崇也晉欲求成於秦而侵其與國之崇以為諼崇何罪乎穿能知前日薄秦於河之非勇而不知今日諼秦於崇之非義急於兵柄之入手將動於惡天君亂矣晉人宋人伐鄭晉討鄭之從楚固似有名而挾簒君以同伐其何以令列國見哉宜不競於楚而人之二年春王二月壬子宋華元帥師及鄭公子歸生帥師戰于大棘宋師敗績獲宋華元春秋未有彼此皆書帥師者而華元歸生並書帥師何哉元乃前是弑君之黨歸生即後來弑君之賊皆專其國兵者也鄭受命於楚以伐宋疑曲在鄭而宋主兵宋文以簒得國不討已幸而一嵗從晉伐鄭者再固鄭師之招也晉敗秦師於殽獲三將不書孟明諸子猶可望桑榆之收元非將材一跌遂不復振徒包棄甲復來之羞故書獲以戒命將之非其人秦師伐晉夏晉人宋人衞人陳人侵鄭悼公三駕而楚莫與爭君臣同心而國勢強也鄭背晉即楚晉師三出卒無以服鄭而攘楚君臣離心而國勢弱也是時靈公有去盾之志宣子有弑靈之心睽睽相視謀為先發攘外匡内亦慢焉而已故初伐鄭則四國之君㑹再伐鄭則惟宋人從今侵鄭則為禦秦而出楚鬭椒救鄭盾亟設辭去之内難將作也劉裕伐秦踉蹡而歸者以此秋九月乙丑晉趙盾弑其君夷臯兵論渠魁獄論首惡弑隠公者羽父不可歸罪於寪氏弑閔公者共仲不可歸罪於卜齮晉弑其君夷臯太史書曰趙盾春秋因之亦書曰趙盾而傳者乃以為趙穿且謂董狐以亡不越竟反不討賊為盾罪夫子以為法受惡越境乃免為盾辭皆非事實也盾無君之心久矣靈公之立非其本志君臣之猜隙已深而盾以擁翼為已恩盡專晉政威福已出新城之盟棐林之㑹偃然以大夫敵列國之君而不忌桃園肆惡與穿素有成謀特至此而動爾穿攻公而盾出奔二人相為表裏以嫁其迹發縱不可掩也穿為盾弑盾為穿芘盾首穿從坦然明白使其越竟亦豈能逭弑君之罪哉夫造惡以用意為主蔽罪以主謀為重宜乎春秋成而亂臣賊子懼冬十月乙亥天王崩三年春王正月郊牛之口傷改卜牛牛死乃不郊猶三望此用越紼之禮天意弗之許也魯郊之僭久矣王崩而郊尤非禮之中非禮牛傷且死以示警天可違乎僖公免牲猶三望牲雖免郊禮未盡廢今不郊則郊禮盡廢矣畏威之心動悔過之念生聖人為之深喜望祭可已不已又越紼行之則所譏重於僖葬匡王頃王之䘮王室不赴告諸侯不弔葬螻蟻而無君乎匡王崩四月而葬無同軌之可待故殺禮而縮期公動多失禮猶以葬王書是亦蔀塞中一㸃之明也楚子伐陸渾之戎楚戎相攻何足算陸渾之戎則秦晉遷於伊川者也伊洛近在王畿楚子伐戎至雒觀兵問鼎勢良迫矣剥牀及膚春秋安得不懼夏楚人侵鄭秋赤狄侵齊戎一也有戎有山戎有茅戎狄一也有狄有赤狄有白狄木朽而蠧肉敗而蛆明王賢伯之不作綱常淪斁政刑廢墜故蠢爾小醜皆足以為吾天下害特謹而書之宋師圍曹簒弑之君自知名義所不貸必藉大刑大兵以立威而鉗國人之口梏與國之手宋鮑之簒既殺母弟及昭公子而盡逐武穆之族又見曹弱遽興大衆圍其國心危而示整氣索而示彊使莫我敢窺也小人之情類如此冬十月丙戌鄭伯蘭卒葬鄭穆公四年春王正月公及齊侯平莒及郯莒人不肯公伐莒取向權與物均而生衡衡平也惟天下之至平能平天下之不平未有已不平而能平人者也公以簒立不平甚矣乃欲挾齊強平莒郯之怨宜莒人之不從也莒不從而伐之取向始以義出終以利歸本心見矣胡不觀虞芮質厥成文王蹶厥生乎秦伯稻卒夏六月乙酉鄭公子歸生弑其君夷按左氏子公染指黿鼎公怒欲殺之子公與子家謀先子家曰畜老猶憚殺之况君乎反譖子家子家懼而從之夏弑靈公書曰鄭公子歸生弑其君夷權不足也左氏喜竒而誣類如此經書趙盾弑其君而傳謂趙穿實弑盾以不越竟而受惡經書歸生弑其君而傳謂子公實弑歸生以權不足而蒙罪是首謀為輕黨從為重也經如造化生殺萬物明白簡直無一毫迂曲之意傳則剪綵刻楮以為工失其本真矣雖曰春秋誅黨惡安有舎首惡不誅而嫁滔天大罪於其黨乎弑夷實歸生首惡非懼譖而黨惡無疑矣其後子家卒鄭人討幽公之亂斵子家之棺而逐其族討首惡也學者無疑經信傳而巧為辭赤狄侵齊秋公如齊公至自齊冬楚子伐鄭五年春公如齊夏公至自齊秋九月齊高固來逆子叔姬魯姬下嫁宋蕩莒慶已辱矣髙固強委禽而婚叔姬辱又甚焉大凡負罪重者畏於人必深求安急者依於人必切畏人如碩鼠依人如窮猿則人得以制其命矣公初弑立實謀於齊既立恐大國有負恩之疑則娶齊以自親既娶矣慮他國有問罪之舉則賂齊以同㑹齊有徳色魯有懼心連歳如齊惟恐不當其意此髙固所以請止公扼吭拊背而求婚也受刼而婚藉婚而脱不以卑子女辱祖禰為羞飲至于廟如平時固秋以親迎挾叔姬而去冬以反馬擁叔姬而來嘻嘻然受之晏晏然行之公之無恥一至於此夫齊魯甥舅之國魯之姬即齊之姜也齊惠公縱固刼婚以卑魯而聴其徃來莫之禁魯卑而齊亦卑矣叔孫得臣卒冬齊髙固及子叔姬來楚人伐鄭前年楚人侵鄭去年楚子伐鄭今年楚人伐鄭何前後皆人而中獨爵去年伐鄭於歸生弑君之後為有名也靈公弑襄公立逆賊不討儼然在列楚終始執此以問罪鄭將何辭而紛紛力競於鄭人從違去就之間所爭末矣故春秋方爵楚而復人楚六年春晉趙盾衞孫免侵陳衞州吁弑其君討州吁者陳也宋萬弑其君討萬者亦陳也陳於弑逆之賊未嘗黨晉方弑其君其肯黨乎故靈公之末既舎楚而從晉成公之初復背晉而即楚無瑕者可戮人晉亦盍思陳之所以去我者而盾以元惡帥衞侵之安知陳人不以州吁萬待其來也凡弑君之賊不再見而盾以侵陳書遂以為親弑者穿觀靈公欲殺盾而盾先發縱穿為桃園之攻既弑而盾使穿逆公子黒臀立之穿惟盾之聴耳威振國人恩結人主晉之政柄一出於盾是猶魯翬弑隠立桓而翬之專魯益重所以再見示天下以亂臣賊子之不討也嗚呼嚴矣哉夏四月秋八月螽冬十月七年春衞侯使孫良夫來盟公以簒立雖以賂㑹齊而未㑹晉猶不敢以為安衞在文公時嘗介魯平晉同盟新城今魯欲與晉㑹通彼此之情者非衞莫可故良夫來為前定之盟盖魯簒晉弑氣類方相求庶其謀之有濟也夏公㑹齊侯伐萊秋公至自伐萊公即位有年矣未嘗一㑹列國之君奴顔婢膝惟齊是事頥指氣使惟齊是聴連年如齊㑹齊必告至於廟不以臣僕齊為辱而以主齊為榮周公魯公實羞之大旱螽未已而大旱繼之一氣胚胎也順氣應則彌滿六合無非嘉生逆氣應則蟠際兩間無非咎徵精神之所感召方寸之所發見不可掩也夫孝婦伸而旱解𢎞羊烹而天雨公誠能追念出姜呼天之憾大正襄仲弑君之戮且痛自貶損怨艾以謝國人天意之回其庶幾乎冬公㑹晉侯宋公衞侯鄭伯曹伯于黒壤黒壤一㑹而四國元惡已逭諸侯之討人極隳矣晉趙盾弑其君夷臯而成公立宋人弑其君杵臼而文公立鄭公子歸生弑其君夷而襄公立魯則公子遂弑赤而公立事情輕重雖不同而簒一也簒弑列於諸侯之㑹則不討曹人嘗以是請負芻於晉是㑹宜討而不討者多矣晉之君臣中有所慊徒能以不朝不聘止公不敢以非所當立詰公㑹不與盟竟以賂解晉何以為盟主魯惟恃賂以立國其何以能國哉是㑹盖春秋之所深痛
