body:
  text: 春秋說卷八宋洪咨夔撰莊公四二十有六年春公伐戎夏公至自伐戎千鈞之弩不輕於發機百金之子不輕於倚衡前是追戎於濟西今又聲其罪伐之堂堂之師有足大者而至公以危辭蓋公精於四矢禦亂之射每師出輒身履行陳以公敵戎孰若命將制勝之為得體乎至伐春秋愛君之辭曹殺其大夫大夫非諸侯所得而専殺也戎侵曹出羈歸赤大夫豈無左右袒者至此盡取異已者殺之故不名其大夫獨著専殺之罪秋公㑹宋人齊人伐徐北杏始伯之後伐郳伐鄭伐徐皆宋主兵徐自偃王以來僣王久矣伯主以尊周為功而不遽問蓋以蠻夷待之倘未至於為中國擾不急於治也宋有憾於徐而齊從之其伐非桓公意故序宋下桓公之意謂中國勢成則蠻夷自服伐楚必待江黃皆至之後詳重可知矣冬十有二月癸亥朔日有食之二十有七年春公㑹杞伯姬于洮春秋禮義之大宗人君動不以禮必謹書之以為世戒古之愛女者毋違有訓送迎有節歸寧有時以義裁恩以禮勝情而弗納之於邪愛之至也伯姬公庶女人情愛女甚於男而愛庶女尤切其歸把再踰年公與㑹洮果為何事豈非習見齊侯越境送女㑹妹而不以為異乎夏六月公㑹齊侯宋公陳侯鄭伯同盟于幽十六年同盟於幽者九國而㑹不書公鄭亦隨叛幽再同盟公㑹而鄭服桓公得衆矣共工氏伯九州出於漢儒之記荒忽難考王降而伯實自桓公始其創始為力艱為謀深為功亦大故於事之難濟者不求速濟而終於必濟一畿內之鄭十有二年而始服一蠻夷之楚二十有五年而始盟定計於堅忍不搖之地收功於雍容不迫之中是雖伯者規模猶有王者氣象衣裳之㑹十一未嘗有歃血之盟兵車之㑹四未嘗有大戰雖曰假之其用力亦非一日之積也商鞅說秦始以帝次以王又次以伯鞅何有帝王之學而君以為久逺不能待及說以伯君意欲用又不若彊國之術可以速得志豈非以桓公之伯亦非急近功所能為歟秋公子友如陳葬原仲人臣外交有國之大患季友相魯原仲相陳以有舊好二國修聘不可謂無功原仲之卒友越國㑹其葬外交之私也魯自哀姜之入禍已有萌芽友逆知之不思弭亂於未萌而乃謀私於未亂既親聘陳又葬外大夫於陳託身既固至慶父之變遂奔於陳以魯君同氣之愛而為異邦之託國有大難不早力圖而為之尚得為賢乎冬把伯姬來莒慶來逆叔姬莒小國慶大夫叔姬適之公室卑也把伯姬主叔姬之嫁故歸寧與來逆相先後慶身逆叔姬莒政在大夫越境逆婦而莫之尼也異時慶父負大惡出奔莒蓋有主之者矣杞伯來朝男子剛不勝欲則制于婦杞伯踵伯姬歸寧而來朝制于伯姬矣密雲不雨自我西郊隂倡而陽不和也杞隂倡而陽隨之豈人道之正乎把夏後本公爵先書侯今書伯後又書子猶滕侯書子皆時王所黜觀杞伯惟婦言是聽婦迹是踐其黜固宜然王能黜滕杞小國大于滕杞者不能黜也公㑹齊侯于城濮二十有八年春王三月甲寅齊人伐衛衛人及齊人戰衛人敗績奉王命而討有罪方伯連帥之職也桓公得衆之後伐山戎伐楚伐鄭皆伯討惟伐衛為王討衛朔倚五國之援逆王命而篡其後釋憾於王室伐周而納子頺罪不勝誅矣朔卒赤立同盟于幽傲然不㑹至是惠王使召伯廖賜齊侯命且請伐衛桓公于是奉辭聲罪而討之逆順理明勝負勢决故春秋書日以大其討書及以著衛人敢于犯順之罪而伯主尊周之功昭然不可掩矣齊將卑師少故稱人按左傳稱齊侯取賂而還則齊桓是舉殊失敵愾之道原文所褒未合情事夏四月丁未邾子瑣卒秋荆伐鄭公㑹齊人宋人救鄭荆前伐鄭書州繼來聘書人再伐鄭復書州革靣未幾復出為惡故不人其人賞以春夏刑以秋冬天何心哉同盟于幽之初鄭有二心再同幽盟而鄭始服今荆伐鄭縣門不發示以閒暇知齊之必我救也伐兵方張救師已至不啻手足之相應列國孰不恃伯以為安乎此可見桓公有功于中國冬築郿大無麥禾麥登于夏禾登于秋嵗事告終而併計之咸無焉故以大書凶年饑嵗老羸轉于溝壑不知其幾所宜急民之急日講荒政乃于是時興大役于不急之邑猶為有人心乎臧孫辰告糴于齊國無三年之蓄國非其國也魯政失其平仍嵗大水又重之以大無麥禾民病極矣乞糴于齊勤懇迫切冀其惻然我憐以紓喁喁待哺之急先備何有哉葵丘五禁毋遏糴桓公深于救災恤鄰之義故魯得以吐其虛實安危之情告之否則室如懸罄野無青草未必不我窺也雖然告于人者急施于已者緩何以起吾溝中之瘠臧文仲盍歸詔公以罷不急之役乎二十有九年春新延廄挍人三乘為皂三皂為繫六繫為廄六廄成挍天子十有二間邦國六間圉人春除蓐釁廄馬政國之重務也延廄新于除蓐之時常事宜不書然嵗凶年榖不登君膳不祭肺馳道不除祭事不縣馬亦不食榖自貶損以憂民如此大無麥禾之後廄雖仍舊未害也必修舊而新之志不在民矣廄焚曰傷人乎不問馬重人命也民有饑色野有餓莩而廄有肥馬豈非率獸食人乎夏鄭人侵許秋有蜚莊公時記異尤異麋雖有之而今多􅈮本無之而今有蜚南方臭惡之蟲今亦始有之地氣自南而北也文姜之淫行未磨哀姜之淫行又著起穢貽臭充塞表裏公懵然莫聞乖氣致異隨事有徵禍至不悟天其若之何哉冬十有二月紀叔姬卒城諸及防水昏正而栽城其時矣非其嵗也或謂饑嵗興大役使民得食其力亦救荒之一術而荒政十二聚萬民未嘗有是者民勤于食則百事廢也魯當薦饑之餘老弱惟藉丁壯以養吾取丁壯趨城築之役一家俯仰事育孰任其責是以政而納之溝壑也况古者力役皆良農豈可與後世遊手食力者比哉三十年春王正月夏次于成秋七月齊人降鄣師次于郎師及齊師圍郕郕降于齊師我志于得郕郕不我降也次于成齊人降鄣我志不在鄣特次成以張齊之聲勢而鄣即降于齊矣鄣紀之遺邑霜風搖落之餘木杪一葉其何能久桓公方伯宜思一改前轍以大義服諸侯而復遂昔非恃強軋弱使紀無遺迹所得毫芒所喪丘山矣公黨强以滅無罪故不書公八月癸亥葬紀叔姬痛哉紀之亡也伯姬方卒而紀侯大去其國葬之者齊也叔姬方卒而齊人降其遺邑之鄣葬之者魯也伯姬未卒則紀侯未去叔姬未卒則鄣邑未降齊心知其無罪猶以二姬之故得保餘喘身死而國隨之且無與葬矣叔姬之賢以身為殘紀一線之脈竟與國為存亡故春秋詳録之為仗節守義之勸九月庚午朔日有食之鼓用牲于社日食修德月食修刑公不知恐懼修省以答天變而循用非禮不鼓于朝而于社且用不宜用之牲故春秋謹書之以見魯舍禮而用例冬公及齊侯遇于魯濟齊人伐山戎伐山戎以通燕之職貢問楚包茅不貢之張本也周官以九貢致邦國之用用不可闕則貢不可廢燕貢道里之所從入而山戎梗之是伐蓋伯討也公與桓公遇而謀之齊自伐之桓公治戎狄名正勢順恢乎有餘地豈待內有因國外有從諸侯而後動於義哉三十有一年春築臺于郎夏四月薛伯卒築臺于薛六月齊侯來獻戎捷諸侯有四夷之功則獻于王齊侯伐山戎不獻捷于周而獻于魯獻非所獻也蓋公嘗與聞伐戎之謀故齊以捷獻然仗王靈敵王愾以行伯討非為齊魯之私乃襲衛俘之迹故春秋病之使齊移所獻魯者躬擐甲胄獻之天子之庭天子大合樂而受之功與方叔召虎相頡頏矣惜乎夷吾智不及此秋築臺于秦夏啓有鈞臺之享文王有靈臺之樂居髙明逺眺望以紓煩宣鬱固不可無其地而于郎于薛于秦遊觀于逺非其地矣况興築之煩耶奪農時以趣土功窮民力以縱已欲公之心其蕩乎冬不雨三十有二年春城小穀按左氏城小穀為管仲也夷吾拙于未相齊之前智于已相齊之後初傅子糾不能入又不能存又不能死使當殺糾之日魯併殺而歸之則亦已矣魯不殺而歸之齊遂得以脫堂阜之囚輔成伯業是魯有大造于已也而夷吾亦念所以報魯者山戎之伐桓公躬獻捷于魯以寵光顯榮之莊公懷夷吾之德城其食邑以報誠相與為厚矣然君子愛人以德夷吾導其君來獻戎捷俾魯受非所當受之獻得為愛人以德乎人臣無外交小穀齊邑魯越境為之城而已安之得為無外交乎如其道萬鍾不以為泰非其道簞食豆羮不可受于人我以私厚魯魯以私厚我魯方薦饑用民力以城已邑得無大于簞食豆羮乎義利公私之間王伯之所由辨夷吾惟義不勝利公不勝私故輔伯之功雖大春秋無一字褒進之器小不足以大受也夏宋公齊侯遇于梁丘梁丘在曹邾之間去齊八百里二君相遇于此是不期之遇也使期而為殺禮之遇何待越八百里而遙乎宋序齊上宋先至也桓公圖伯以來他國皆一出一入于其間久而後定惟宋于桓公㑹鄄之後歷十七年常如一日志相得可知邂逅相遇適我願兮梁丘之謂矣秋七月癸巳公子牙卒八月癸亥公薨于路寢冬十月己未子般卒士有忘身殉國之節然後可以託孤寄命而其欺君賣國以為己利必患得患失者為之莊公病垂死召季友授之政而屬長子般且語以公子牙慶父材之說友退以君命鴆叔牙于針巫氏大義滅親似矣然君親無將叔牙既將矣慶父謀嗣獨不與聞其將乎友誠察其將一舉併慶父誅之以絶亂萌斯合周公誅管蔡之義而欲不能剛鴆叔牙漏慶父刺虎不斃是自遺禍也且公初築臺臨黨氏淫孟任而生般出非其正所以動庶長奪嫡之謀公薨般立日奉几筵于路寢禮嚴勢重人誰敢窺而次于黨氏自彰先君之過居處不尊拱扈不肅慶父遂得以行其謀是縱之弒也友許君以死奉般般戕于賊手友為荀息之死猶可見公于地下而奉身出奔為自全之計視君之存亡國之安危若無與於已是又將開魯未巳之難任顧託之重者如是乎般立未逾年故書子書卒公子慶父如齊隱公之弒羽父立桓公而討寪氏有死者子般弒慶父誅鄧扈樂而歸獄焉小人冒大惡假同謀以掩己罪而通國不敢問國無人焉故也國有人焉因人心之忿激聲首惡之罪而討之黨惡者次第正其獄則亂臣賊子知所懲矣叔牙之將友既鴆之慶父之弒友反避之惟其材弱氣餒而畏强禦是以不敢抉其情而暴其罪使堂堂如齊亡何又堂堂還魯猶常時尚為國有人乎叔牙為叔孫氏季友為季孫氏慶父為孟孫氏謂之三桓桓弒隱而立乖悖暴逆之氣鍾于諸孤季雖有賢譽而縱惡長姦胚胎再弒之禍其實同一氣耳厥後逐昭公擅公室而瓜裂之亦沴氣之傳也狄伐郉
