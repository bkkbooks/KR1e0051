body:
  text: 春秋說卷二十二宋洪咨夔撰襄公下十有一年春王正月作三軍井賦之制四丘為甸甸出甲士三人成公初年作丘甲丘出一甲則甸出甲士四人士卒牛馬隨甲遞增魯本三軍隂益而四季孫行父臧孫許叔孫僑如公孫嬰齊帥師㑹晉戰於鞍四卿並將其為四軍明矣夫大國三軍先王之舊制益三而四是為變古合四而三似非初作也而謂之作何哉三軍之名雖舊併前日隂益之數分𨽻其中而萬有二千五百人為軍之制非舊此所以為作也季文子作丘甲竭民力以奉國季武子作三軍奪公室以奉私世卿之權愈重而國愈削矣夏四月四卜郊不從乃不郊季孫宿初専政三卜郊不從乃免牲今作三軍三分公室之後四卜郊不從乃不郊天意厭季氏之日彊而大警魯也諸侯僭天子大夫僭諸侯其來已久而季氏更舞八佾歌雍徹旅泰山用天子禮樂於大夫之家其未僭者特郊爾上僭之心一萌何所不至祭則寡人公亦未必能有也卜郊不從天之示戒昭昭矣鄭公孫舍之帥師侵宋公㑹晉侯宋公衛侯曹伯齊世子光莒子邾子滕子薛伯杞伯小邾子伐鄭秋七月己未同盟于亳城北復之頻雖厲而無咎聖人所以開人遷善之門迷而不復則凶矣鄭前是從楚皆迷復今子展主從晉之謀以晉能驟來亟合兩國之爭候楚之憊而後堅於從晉故舍之侵宋以致晉師十二國伐鄭鄭即同盟盟已復叛叛已隨㑹迹雖睽而心之向慕則固不害其為頻復也凡同盟有誠同者有彊同者有隂同者誠同則能久彊同則隨異隂同則終合亳之盟其終合者歟載書曰無蕰年毋壅利毋保姦毋留慝救災患恤禍亂同好惡奬王室葵丘五禁不是過鄭人聞之必洗心易慮投誠委命之不暇而何楚之能奪哉公至自伐鄭楚子鄭伯伐宋公㑹晉侯宋公衛侯曹伯齊世子光莒子邾子滕子薛伯把伯小邾子伐鄭㑹于蕭魚鄭習反覆變詐為國隨服隨叛盟猶不賴㑹安足恃此其㑹而不盟者何信在盟前也盟亳雖叛晉伐即成敝楚已極與晉乃固蓋子展之本謀諸大夫之公願國人之真情也夫其背左衽而趨諸華出於本謀出於公願出於真情何待盟而後堅赦鄭囚皆禮而歸之納斥候禁侵掠藩墻盡剖矣天下之勢此重則彼輕謀國者能使重常在我奚敵國之足慮天保之治內車攻之修政正以是也齊晉更伯以來制楚服鄭之謀凡幾烏合瓦解逺不數嵗悼公乃能使鄭二十四年無二心夫豈有他竒巧哉約己任賢息民和戎而已子囊謂當今吾不可與晉爭事之而後可敵國心服若此信乎自治之策不可與易也公至自㑹楚人執鄭行人良霄楚非不彊且譎也今怯晉之彊又墮鄭之譎纍年經營一旦盡喪執行人則無策矣然則不德競而力爭未有不屈者冬秦人伐晉十有二年春王三月莒人伐我東鄙圍台季孫宿帥師救台遂入鄆以怨報怨者常過於所施莒自滅鄫以來五年三伐我鄙侮我甚矣魯連年勞役莫克報今甫休息宿於是乎救台入鄆救不可緩入則可已報之過也宿受命救台乘勝徑入無所禀承蓋其嗣父當國未嘗親握兵以出既作三軍假此役以收攬兵柄進退作止國人一委聽焉故書遂以見其専夏晉侯使士魴來聘悼公之待與國可謂有禮矣初年謀嗣文襄之業不敢輕動諸侯之兵必使士魴來乞師閲一周星鄭始堅定於是又使士魴來聘且拜師以大役小不以勢行由始迄終一以禮接謙尊而光孰不願為之用乎秋九月吳子乘卒吳赴告始通中國魯臨於周廟待以兄弟之國也吳本泰伯之後至夀夢自王遂併世爵之伯以王法奪之與楚同以子書擯于諸姬欲僭所無反喪所有昭然臣子不安命義之戒其不日不知以日告也冬楚公子貞帥師侵宋公如晉十有三年春公至自晉夏取邿義與利不兩立信與詐不並行邿亂分為三師救邿遂取之假義以出師乘危而滅國季孫宿盜賊之謀也秋九月庚辰楚子審卒諡以節惠而一行楚雖私諡其君不敢苟也靈王不能自克及難於乾溪而諡為靈共王知不德亡師之過請為靈若厲而子囊易以共血氣盡消神明復返審雖知過已晚猶愈於頑冥沉著至死而不悟也冬城防魯頻歲從晉于役僅爾少休而入鄆取邿荐用其民且興版築之功於防民亦勞止汔可小愒魯民之勞果何時而愒乎十有四年春王正月季孫宿叔老㑹晉士丐齊人宋人衛人鄭公孫蠆曹人莒人邾人滕人薛人把人小邾人㑹吳于向有屈必有伸有闔必有闢機至而權行焉善於應變者也吳敗於楚晉與列國謀之吳人習於前㑹之偃蹇安坐於向以待其來范宣子不能堪也於是數吳伐楚喪之不德以退之既以殺楚之怨又以抑吳之强屈伸闔闢之機晉蓋得之矣然晉初病楚挾吳以為聲援則屈已下之晉已服鄭楚不能爭於是挾大義以退吳勢合於恐懼之初情移於安樂之後權術反覆春秋不貴也故不沒其殊㑹之實以示譏季孫宿叔老皆魯卿君行卿從季武子出㑹亦以卿從是以君禮自居也使介並書所以著宿之上僭二月乙未朔日有食之夏四月叔孫豹㑹晉荀偃齊人宋人衛北宫括鄭公孫蠆曹人莒人邾人滕人薛人把人小邾人伐秦兵家敗不可以遽沮勝不可以常恃先是晉結吳以掣楚今吳楚皆折自相為讐晉遂以全力向秦圗釋前憾得先後之冝矣然衝風不能起鴻毛强弩不能穿魯縞晉既全制吳楚之勝釋秦以為外懼夫豈不可否則遣一介以通秦秦必望風來成何以伐為又否則養威持重使列國得以小休然後俟機而動蓋亦未晚慮不出此糾合十二國亟勞之師越險阻以窺彊國及涇不濟遷延無功知種而不知收也悼公興伯之業於是乎稅駕矣己未衛侯出奔齊莒人侵我東鄙秋楚公子貞帥師伐吳冬季孫宿㑹晉士丐宋華閲衛孫林父鄭公孫蠆莒人邾人于戚孟子論貴戚之卿曰君有大過則諫反覆之而不聽則易位又曰有伊尹之志則可無伊尹之志則篡易位以警萬世之為人君者篡以正萬世之為人臣者二義不可偏廢也衛獻公之不道反覆而諌者誰孫林父世執國柄挾晉而陵傲為君所忌故謀先發春秋書衛侯出奔而不名以君雖暴虐非臣下所得而逐也逐君置君一出林父之手而與寧殖相剽以聽命於諸侯盟主苟以天下分義為任必將大正孫寧之罪而還獻公顧乃號召列國大夫與林父㑹于戚以謀衛聽中行偃未可得志之譎因剽已立而定之偃即前日與欒書執厲公於匠麗氏者其罪蓋浮於孫寧飾辭以脫其逐君之罪乃所以自為地也悼公芘大惡廢大刑長天下臣子無忌憚之氣志於是乎荒矣然則君制其國臣敢奸之蘧伯玉為正論其君實甚弗去何為師曠之言雖意在警切實則所有避回也十有五年春宋公使向戌來聘二月己亥及向戌盟于劉劉夏逆王后于齊王后卿逆公監之禮也劉夏非卿也官冝稱大夫而不大夫爵冝稱子而不子惟繫以邑者是天王之私昵賜之邑而未爵者也王結婚於齊先賜齊侯環命為光寵命不以德而以婚夏實將之至此復使逆后王朝非無公卿大夫可使而獨使夏非其私昵乎后位坤儷乾奉承宗廟而安天下顧使私昵逆之婚禮微矣故直書劉夏且不書天王所使夏齊侯伐我北鄙圍成公救成至遇季孫宿叔孫豹帥師城成郛救台季孫行救成公行齊師重於莒臣當其輕君當其重也公至遇不進齊師退矣齊退而城成邑之郛為不虞備也異時孔子行乎季孫三月不違以家不藏甲邑無百雉之城而墮郈費至成獨弗克墮蓋襄公時所城者三費與防皆不書人惟成以二卿帥師用民力厚矣然則是城非以備齊乃所以固孟氏藏姦之窟秋八月丁巳日有食之邾人伐我南鄙冬十有一月癸亥晉侯周卒晉欒書中行偃使程滑弒厲公逆周子于京師而立之生十四年矣大夫逆於清原周子曰孤始願不及此雖及此豈非天乎抑人之求君使出命也立而不從將焉用君二三子用我今日否亦今日常情處此非氣奪於弒君之餘鋒則志動於得國之大福非自折以答羣臣翼戴之勤則自晦以待邦人危疑之定而公一見逆者出其不意吐出肺肝歸功於天無所私繫其英氣凛凛逼人雷動而地軸搖風行而海水立諸大夫震懾退聽不暇已而即位于朝凡所以命百官者皆培植國本之急務所以任六卿者皆興起人心之至機和戎以靖其外息民以安其內於是三駕而楚莫與爭夫以其年不若文公其佐不若桓公而少壯能老成英鋭能詳重規模位置駸駸飛度桓文之上此無他欲寡故耳人之血氣未定一為外務所移則志喪而神奪理昏而識蔽天下事無可為者欲寡則虛虛則明明則通治國猶運諸掌耳公方好田一聞虞人之針而田以時女樂二八方在庭斥其半以賜謀臣曽無難色車服器用悉從節約而朝聘有定數不過求於列國得寡欲之道矣若其始不能正弒君之大僇終不能行逐君之大誅㑹王室卿士以重初年之盟方假而遽歸之大節目所在因循曠失蓋方寸本來之明無與發之也故嘗謂春秋二百四十二年之君唯悼公可與有為惜乎不知尊德性而道問學十有六年春王正月葬晉悼公三月公㑹晉侯宋公衛侯鄭伯曹伯莒子邾子薛伯把伯小邾子于湨梁戊寅大夫盟禮樂征伐天子不能有降而自諸侯出諸侯不能有降而自大夫出大夫非遽敢干諸侯也諸侯不知有天子則大夫不知有諸侯也况古者有公盟無私盟盟出於列國相與要結之私不復關白於王朝在諸侯既潔矩非其道則內大夫敢於盟與國之君外大夫敢於盟公君臣之陛級始夷矣君臣之陛級既夷積而至於諸侯同盟諸侯之大夫又盟以諸侯之盟不足恃大夫之盟為可恃也然猶可諉曰諸侯命大夫而盟也至此大夫無所禀命而自盟無用乎諸侯之盟矣夫陽剝非一日而剝氷堅非一朝而堅陵夷之勢積漸日甚春秋深懼焉若曰信在大夫可以論雞澤之盟不可以論湨梁之盟是盟直不臣耳悼公於弒君逐君之罪一置不問故列國之大夫皆相視動無君之心平公之卑悼公之為也悼公崇用執弒厲公之中行偃權勢日盛遂使列國之大夫自為盟平公無如之何也若夫速葬以㑹諸侯而無哀戚之心則平公之罪晉人執莒子邾子以歸悼公在位十有六年未嘗有所執而晉日彊信義孚於人心威令不待執而自行也平公嗣立典刑未逺湨梁之㑹十國皆至苟能懷之以禮約之以義維之以信誰敢有二心使有二心因其來㑹而調劑彌縫之使泯其欲二之迹吾則退修德政以彊吾國國勢張則大如齊楚亦將震服况蕞爾之邾莒乎慮不出此顧一舉執兩國之君以歸欲示威於諸侯悼公之業不克紹可知矣齊侯伐我北鄙按自此至襄公三十一年永樂大典並闕今祗録經文夏公至自㑹五月甲子地震叔老㑹鄭伯晉荀偃衛寧殖宋人伐許秋齊侯伐我北鄙圍郕大雩冬叔孫豹如晉十有七年春王二月庚午邾子牼卒宋人伐陳夏衛石買帥師伐曹秋齊侯伐我北鄙圍桃高厚帥師伐我北鄙圍防九月大雩宋華臣出奔陳冬邾人伐我南鄙十有八年春白狄來夏晉人執衛行人石買秋齊師伐我北鄙冬十月公㑹晉侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯把伯小邾子同圍齊曹伯負芻卒于師楚公子午帥師伐鄭十有九年春王正月諸侯盟于祝柯晉人執邾子公至自伐齊取邾田自漷水季孫宿如晉葬曹成公夏衛孫林父帥師伐齊秋七月辛卯齊侯環卒晉士丐帥師侵齊至榖聞齊侯卒乃還八月丙辰仲孫蔑卒齊殺其大夫高厚鄭殺其大夫公子嘉冬葬齊靈公城西郛叔孫豹㑹晉士丐于柯城武城二十年春王正月辛亥仲孫速㑹莒人盟于向夏六月庚申公㑹晉侯齊侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯把伯小邾子盟于澶淵秋公至自㑹仲孫速帥師伐邾蔡殺其大夫公子燮蔡公子履出奔楚陳侯之弟黃出奔楚叔老如齊冬十月丙辰朔日有食之季孫宿如宋二十有一年春王正月公如晉邾庶其以漆閭丘來奔夏公至自晉秋晉欒盈出奔楚九月庚戌朔日有食之冬十月庚辰朔日有食之曹伯來朝公㑹晉侯齊侯宋公衛侯鄭伯曹伯莒子邾子于商任二十有二年春王正月公至自㑹夏四月秋七月辛酉叔老卒冬公會晉侯齊侯宋公衛侯鄭伯曹伯莒子邾子薛伯把伯小邾子于沙隨公至自㑹楚殺其大夫公子追舒二十有三年春王二月癸酉朔日有食之三月己巳把伯丐卒夏邾畀我來奔葬把孝公陳殺其大夫慶虎及慶寅陳侯之弟黃自楚歸于陳晉欒盈復入于晉入于曲沃秋齊侯伐衛遂伐晉八月叔孫豹帥師救晉次于雍榆己卯仲孫速卒冬十月乙亥臧孫紇出奔邾晉人殺欒盈齊侯襲莒二十有四年春叔孫豹如晉仲孫羯帥師侵齊夏楚子伐吳秋七月甲子朔日有食之既齊崔杼帥師伐莒大水八月癸巳朔日有食之公㑹晉侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯把伯小邾子于夷儀冬楚子蔡侯陳侯許男伐鄭公至自㑹陳針宜咎出奔楚叔孫豹如京師大饑二十有五年春齊崔杼帥師伐我北鄙夏五月乙亥齊崔杼弒其君光公㑹晉侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯把伯小邾子于夷儀六月壬子鄭公孫舍之帥師入陳秋八月己巳諸侯同盟于重丘公至自㑹衛侯入于夷儀楚屈建帥師滅舒鳩冬鄭公孫夏帥師伐陳十有二月吳子遏伐楚門于巢卒二十有六年春王二月辛卯衛寧喜弒其君剽衛孫林父入于戚以叛甲午衛侯衎復歸于衛夏晉侯使荀吳來聘公㑹晉人鄭良霄宋人曹人于澶淵秋宋公殺其世子痤晉人執衛寧喜八月壬午許男寧卒于楚冬楚子蔡侯陳侯伐鄭葬許靈公二十有七年春齊侯使慶封來聘夏叔孫豹㑹晉趙武楚屈建蔡公孫歸生衛石惡陳孔奐鄭良霄許人曹人于宋衛殺其大夫寧喜衛侯之弟鱄出奔晉秋七月辛巳豹及諸侯之大夫盟于宋冬十有二月乙亥朔日有食之二十有八年春無氷夏衛石惡出奔晉邾子來朝秋八月大雩仲孫羯如晉冬齊慶封來奔十有一月公如楚十有二月甲寅天王崩乙未楚子昭卒二十有九年春王正月公在楚夏五月公至自楚庚午衛侯衎卒閽弒吳子餘祭仲孫羯㑹晉荀盈齊髙止宋華定衛世叔儀鄭公孫段曹人莒人滕人薛人小邾人城把晉侯使士鞅來聘把子來盟吳子使札來聘秋九月葬衛獻公齊高止出奔北燕冬仲孫羯如晉三十年春王正月楚子使薳罷來聘夏四月蔡世子般弒其君固五月甲午宋災宋伯姬卒天王殺其弟佞夫王子瑕奔晉秋七月叔弓如宋葬宋共姬鄭良霄出奔許自許入于鄭鄭人殺良霄冬十月葬蔡景公晉人齊人宋人衛人鄭人曹人莒人邾人滕人薛人把人小邾人㑹于澶淵宋災故三十有一年春王正月夏六月辛巳公薨于楚宫秋九月癸巳子野卒己亥仲孫羯卒冬十月滕子來㑹葬癸酉葬我君襄公十有一月莒人弒其君密州
